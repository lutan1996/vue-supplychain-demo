      flex-shrink: 0;

    .sx-btn { border: 1px solid #dbe6f3; background: #fff; border-radius: 2px; color: #4d6480; font-size: 12px; padding: 4px 8px; cursor: pointer; }

    .sx-btn-add { background: #e8f4ff; border-color: #cfe5fb; color: #3e8ad9; }
    .sx-btn-edit { background: #eef9ea; border-color: #d8f0d2; color: #69a95a; }
    .sx-btn-del { background: #fff0f0; border-color: #f8d7d7; color: #d97f7f; }
    .sx-btn-exp { background: #fff6e8; border-color: #f5e2c6; color: #b08a57; }
    .sx-layout { display: grid; grid-template-columns: 170px 1fr; gap: 8px; height: calc(100vh - 176px); }
    .sx-tree { border: 1px solid #e7ecf3; border-radius: 3px; padding: 6px; overflow: hidden; }
    .sx-tree ul { list-style: none; margin: 0; padding: 0; }
    .sx-tree li { font-size: 11px; color: #4c6077; line-height: 1.7; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .sx-tree li::before { content: "• "; color: #9ab0c9; }
    .sx-table-box { border: 1px solid #e7ecf3; border-radius: 3px; overflow: hidden; display: flex; flex-direction: column; }
    .sx-table { width: 100%; border-collapse: collapse; table-layout: fixed; font-size: 11px; }
    .sx-table th, .sx-table td { border-bottom: 1px solid #edf1f6; padding: 5px 4px; text-align: center; color: #3f546f; }
    .sx-table thead { background: #f6f8fb; }
    .sx-table td { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .sx-status { display: inline-block; padding: 1px 5px; border-radius: 2px; font-size: 10px; }
    .sx-on { background: #e6f4ff; color: #1677ff; }
    .sx-ok { background: #f6ffed; color: #389e0d; }
    .sx-off { background: #fff1f0; color: #cf1322; }
    .sx-ops a { color: #79a9da; text-decoration: none; margin: 0 2px; }
    .sx-foot { margin-top: auto; display: flex; justify-content: flex-end; align-items: center; gap: 8px; padding: 6px; font-size: 11px; color: #617894; }

                  } else if (col === "系统内置") {
                    var c2 = v === "是" ? "sx-ok" : "sx-off";
                    td.innerHTML = "<span class='sx-status " + c2 + "'>" + v + "</span>";
                  } else td.textContent = v;
                });
              });
              return;
            }
            if (e.target.closest(".sx-btn") && (e.target.textContent || "").trim() === "查看") {
              e.preventDefault();
              M.openDetailModal(mod, cols, map);
            }
          });
          var tools = document.querySelector(".sx-tools");
          if (tools) {
            tools.addEventListener("click", function (e) {
              var b = e.target.closest("button");
              if (!b || !tools.contains(b)) return;
              var t = (b.textContent || "").trim();
              if (t === "新增") {
                e.preventDefault();
                M.openAddForm(window.__sxCfg.title, window.__sxCfg.cols, function (map) {
                  var newRow = [];
                  window.__sxCfg.cols.forEach(function (col) {
                    if (!col || col === "操作") return;
                    newRow.push(map[col] != null ? map[col] : "");
                  });
                  window.__sxCfg.rows.push(newRow);
                  var body = document.getElementById("sxBody");
                  var tr = document.createElement("tr");
                  window.__sxCfg.cols.forEach(function (col) {
                    var td = document.createElement("td");
                    if (col === "状态") {
                      var val = map[col] || "正常";
                      var cl = val === "停用" ? "sx-off" : "sx-on";
                      td.innerHTML = "<span class='sx-status " + cl + "'>" + val + "</span>";
                    } else if (col === "系统内置") {
                      var fg = map[col] || "否";
                      var c3 = fg === "是" ? "sx-ok" : "sx-off";
                      td.innerHTML = "<span class='sx-status " + c3 + "'>" + fg + "</span>";
                    } else if (col === "操作") {
                      td.className = "sx-ops";
                      td.innerHTML =
                        "<button type='button' class='sx-btn sx-btn-edit'>修改</button> " +
                        "<button type='button' class='sx-btn sx-btn-del'>删除</button> " +
                        "<button type='button' class='sx-btn'>查看</button>";
                    } else td.textContent = map[col] != null ? map[col] : "";
                    tr.appendChild(td);
                  });
                  body.appendChild(tr);
                  document.getElementById("sxTotal").textContent = String(window.__sxCfg.rows.length);
                });
              }
            });
          }
        }
      }
    })();
  </script>
</body>
</html>
