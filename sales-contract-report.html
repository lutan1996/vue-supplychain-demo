<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>销售合同报表管理 - 新能源物资供应链管理系统</title>
  <link rel="stylesheet" href="css/vendor/fa-all.min.css" />
  <link rel="stylesheet" href="css/subpage-base.css" />
  <link rel="stylesheet" href="css/carrier-management.css" />
  <link rel="stylesheet" href="css/source-navbar-header.css" />
  <link rel="stylesheet" href="css/sales-management.css?v=20260616-sales-fix-v6" />
</head>
<body class="page-source-navbar page-subpage sales-page" data-sales-page="report">
<div class="page-bg" aria-hidden="true"></div><div class="app">
<header class="header"><div class="header-left"><button type="button" class="header-hamburger" aria-label="菜单"><svg viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h16"/></svg></button><a class="header-logo" href="#"><img src="assets/logo-chenergy.png" alt="" width="220" height="40"/></a><div class="header-source-brand"><p>新能源供应链管理系统</p></div></div><div class="header-right"><span class="clock" id="clock"></span><div class="user-avatar">用</div></div></header>
<div class="layout"><aside class="sidebar" aria-label="主导航"><div class="nav-item"><span class="nav-label">销售管理</span></div></aside>
<main class="main-scroll"><div class="carrier-main-inner"><div class="sales-shell">
  <div class="sales-head"><div><h1>销售合同报表管理</h1><p class="sales-subtitle">按销售合同维度统计执行情况，支持通过订单编号关联查看合同履约明细。</p></div></div>
  <div class="sales-body">
    <div class="sales-report-tabs"><button type="button" class="sales-report-tab is-active" data-report-tab="charts">统计图</button><button type="button" class="sales-report-tab" data-report-tab="list">报表列表</button></div>
    <section class="sales-report-pane is-active" data-report-pane="charts">
      <div class="sales-kpi-grid" id="salesKpis"></div>
      <section class="sales-chart-grid"><article class="sales-chart"><h3 class="sales-chart-title">合同执行数量</h3><div class="sales-bars" id="salesBars"></div></article><article class="sales-chart"><h3 class="sales-chart-title">执行状态分布</h3><div class="sales-pie-wrap"><div class="sales-pie" id="salesPie"></div><div class="sales-pie-list" id="salesPieLegend"></div></div></article></section>
    </section>
    <section class="sales-report-pane" data-report-pane="list">
      <div class="sales-toolbar"><div class="sales-filter-row"><select class="sales-select"><option>2026</option><option>2025</option><option>2024</option></select><input class="sales-input" placeholder="订单编号" /><input class="sales-input" placeholder="销售合同编号" /><input class="sales-input" placeholder="合同名称" /><select class="sales-select"><option>全部供应商</option><option>联合动力</option><option>远景能源</option><option>中材科技</option></select><select class="sales-select"><option>全部状态</option><option>未执行</option><option>部分执行</option><option>已执行</option></select><button class="sales-btn sales-btn-primary" id="salesReportQuery">查询</button><button class="sales-btn" id="salesReportExport">导出Excel</button></div></div>
      <div class="sales-table-wrap"><table class="sales-table"><thead><tr><th>订单编号</th><th>销售合同编号</th><th>合同名称</th><th>供应商</th><th>执行率</th><th>合同金额</th><th>已执行金额</th><th>剩余金额</th><th>签订日期</th><th>合同有效期</th><th>执行状态</th><th>操作</th></tr></thead><tbody id="salesReportBody"></tbody></table></div>
    </section>
  </div>
</div></div></main></div></div>
<script src="js/sidebar-actions.js"></script><script src="js/subpage-feature-title.js"></script><script src="js/site-footer.js"></script><script src="js/map-demo-toast.js"></script><script src="js/subpage-clock.js?v=20260616-sales-track-fix-v1"></script><script src="js/sales-management.js?v=20260616-sales-fix-v6"></script>

</html>
