  <style>
    .pm-compact .carrier-main-inner { padding: 12px 14px 14px; overflow: hidden; }
    .pm-compact .carrier-page-title { margin-bottom: 12px; font-size: 18px; }
    /* 筛选：条件与搜索/重置同一行流式排列，紧挨最后一项（与 Element 原型一致，非两端对齐） */
    .pm-filter-bar {
      display: flex;
      align-items: flex-end;
      justify-content: flex-start;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 0;
      padding-bottom: 12px;
      border-bottom: 1px solid #f0f0f0;
    }
    .pm-filter-grid {
      display: inline-flex;
      flex-wrap: wrap;
      align-items: flex-end;
      gap: 10px 14px;
      flex: 0 1 auto;
      min-width: 0;
      max-width: 100%;
    }
    .pm-field {
      display: grid;
      grid-template-columns: 100px minmax(260px, 420px);
      align-items: center;
      gap: 8px;
    }
    .pm-field label { font-size: 13px; color: #4c6077; white-space: nowrap; text-align: right; }
    .pm-field input {
      width: 100%;
      height: 32px;
      border: 1px solid #d9d9d9;
      border-radius: 4px;
      padding: 0 10px;
      font-size: 13px;
      color: #333;
      background: #fff;
      outline: none;
    }
    .pm-field input:focus { border-color: #1890ff; box-shadow: 0 0 0 2px rgba(24, 144, 255, 0.12); }
    .pm-filter-actions {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }
    /* 工具条：在筛选线下方，与 carrier-toolbar 节奏一致 */
    .pm-toolbar {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      flex-wrap: wrap;
      gap: 10px;
      padding: 12px 0;
      margin-bottom: 0;
    }
    .pm-tools { display: flex; align-items: center; flex-wrap: wrap; gap: 10px; }
    .pm-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      height: 32px;
      padding: 0 14px;
      font-size: 13px;
      line-height: 1;
      border-radius: 6px;
      cursor: pointer;
      font-family: inherit;
      box-sizing: border-box;
      border: 1px solid #d9d9d9;
      background: #fff;
      color: rgba(0, 0, 0, 0.88);
      transition: border-color 0.15s, color 0.15s, background 0.15s;
    }
    .pm-btn:hover { border-color: #1890ff; color: #1890ff; }
    .pm-btn-primary {
      background: #1890ff;
      border-color: #1890ff;
      color: #fff;
    }
    .pm-btn-primary:hover { background: #40a9ff; border-color: #40a9ff; color: #fff; }
    .pm-btn-add { color: #1890ff; border-color: #69c0ff; background: rgba(24, 144, 255, 0.08); }
    .pm-btn-add:hover { color: #096dd9; border-color: #40a9ff; background: rgba(24, 144, 255, 0.16); }
    .pm-btn-edit { color: #52c41a; border-color: #b7eb8f; background: #f6ffed; }
    .pm-btn-edit:hover { color: #389e0d; border-color: #95de64; }
    .pm-btn-del { color: #ff4d4f; border-color: #ffccc7; background: #fff2f0; }
    .pm-btn-del:hover { color: #cf1322; border-color: #ffa39e; }
    .pm-btn-exp { color: #d48806; border-color: #ffd591; background: #fffbe6; }
    .pm-btn-exp:hover { color: #ad6800; border-color: #ffc53d; }
    .pm-btn-imp { color: #1677ff; border-color: #91caff; background: #e6f4ff; }
    .pm-btn-imp:hover { color: #0958d9; border-color: #69b1ff; }
    .pm-table-wrap { border: 1px solid #e7ecf3; border-radius: 4px; overflow-x: auto; overflow-y: hidden; }
    .pm-table { width: 100%; min-width: 1280px; border-collapse: collapse; table-layout: fixed; font-size: 12px; }
    .pm-table thead tr { background: #f6f8fb; }
    .pm-table th, .pm-table td { border-bottom: 1px solid #edf1f6; padding: 8px 8px; text-align: center; color: #3e536c; }
    .pm-table th.pm-th-op,
    .pm-table td.pm-ops { min-width: 268px; width: 268px; }
    .pm-table td { vertical-align: middle; }
    .pm-table td:not(.pm-ops) { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .pm-table td.pm-ops { white-space: nowrap; }
    .pm-status { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 12px; font-weight: 500; }
    .pm-s1 { color: #1677ff; background: #e6f4ff; border: 1px solid #91caff; }
    .pm-s2 { color: #389e0d; background: #f6ffed; border: 1px solid #b7eb8f; }
    .pm-s3 { color: #cf1322; background: #fff1f0; border: 1px solid #ffccc7; }
    /* 操作列：与物资台账类似的文字按钮组 */
    .pm-ops-inner { display: inline-flex; align-items: center; justify-content: center; flex-wrap: nowrap; gap: 6px; }
    .pm-op-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 44px;
      height: 26px;
      padding: 0 8px;
      font-size: 12px;
      line-height: 1;
      border-radius: 4px;
      text-decoration: none;
      cursor: pointer;
      border: 1px solid transparent;
      box-sizing: border-box;
      margin: 0;
      font-family: inherit;
      appearance: none;
      -webkit-appearance: none;
    }
    .pm-op-btn--primary { color: #1677ff; background: #e6f4ff; border-color: #91caff; }
    .pm-op-btn--primary:hover { color: #0958d9; background: #bae0ff; border-color: #69b1ff; }
    .pm-op-btn--danger { color: #cf1322; background: #fff2f0; border-color: #ffccc7; }
    .pm-op-btn--danger:hover { color: #a8071a; background: #ffccc7; border-color: #ffa39e; }
    .pm-op-btn--ghost { color: #595959; background: #fafafa; border-color: #d9d9d9; }
    .pm-op-btn--ghost:hover { color: #1677ff; border-color: #69c0ff; background: #e6f4ff; }
    .pm-expand-cell { color: #1677ff; font-weight: 600; cursor: pointer; user-select: none; }
    .pm-foot { display: flex; justify-content: flex-end; align-items: center; gap: 8px; margin-top: 12px; color: #5d738d; font-size: 12px; }
    .pm-foot select, .pm-foot input { height: 28px; border: 1px solid #d9d9d9; border-radius: 4px; font-size: 12px; color: #5d738d; padding: 0 8px; }
    .pm-foot .page { width: 32px; text-align: center; }
  </style>
</head>
