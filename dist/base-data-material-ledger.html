    .bd-pc-node-row:hover .bd-pc-row-actions,.bd-pc-node-row.is-active .bd-pc-row-actions{display:inline-flex}
    .bd-pc-row-action{width:22px;height:22px;border:none;border-radius:4px;background:transparent;color:#4f95cf;font-size:13px;line-height:1;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;padding:0;position:relative;flex-shrink:0}
    .bd-pc-row-action:hover:not(:disabled){color:#1677ff;background:#eef4ff}

    .bd-pc-row-action::after{content:attr(data-tip);position:absolute;left:50%;bottom:calc(100% + 8px);transform:translateX(-50%);display:none;white-space:nowrap;background:rgba(31,41,55,.94);color:#fff;border-radius:4px;padding:4px 7px;font-size:12px;font-weight:400;line-height:1.2;z-index:10;pointer-events:none}

    .bd-pc-modal-ft{padding:10px 16px 14px;display:flex;justify-content:flex-end;gap:8px;border-top:1px solid #e8edf4}

      function pcBuildACode(chain, suffixDigits) {

          return MCS
            ? MCS.buildACode(major, medium, small)
            : "A" +
                major.replace(/\D/g, "").padStart(3, "0").slice(-3) +
                medium.replace(/\D/g, "").padStart(3, "0").slice(-3) +

        if (chain.length === 2) {

          return MCS

                medium2.replace(/\D/g, "").padStart(3, "0").slice(-3) +

        var nid = "n-" + Date.now();

          name: depth === 2 ? label : undefined,
          code: depth === 2 ? code : "",
          unit: depth === 2 ? "" : undefined,
          def: depth === 2 ? "" : undefined,
          status: depth === 2 ? true : undefined
        };
        if (pcIsLeaf(pHit.node) && depth === 2) {

          if (btn) btn.style.display = "none";
        });
        ["btnView", "btnExport", "btnDownloadTemplate", "btnImport"].forEach(function (id) {
          var btn = document.getElementById(id);
          if (btn) btn.style.display = "none";
        });
        var toolbar = document.querySelector(".bd-toolbar");
        if (toolbar) toolbar.style.display = "";
        var btnSearch = document.getElementById("btnSearch");
        var btnReset = document.getElementById("btnReset");
        if (btnSearch) btnSearch.style.display = "none";
        if (btnReset) btnReset.style.display = "none";
        if (bdFilterActions) bdFilterActions.style.display = "flex";
        var crumb = document.querySelector(".subpage-breadcrumb");
        if (crumb) {
          var segs = crumb.querySelectorAll("a, span:not(.sep)");
          if (segs.length) segs[segs.length - 1].textContent = "制造商数据";
        }
        var pageTitle = document.querySelector(".carrier-page-title");
        if (pageTitle) pageTitle.textContent = "制造商数据";
        renderManufacturerFilters();
        applyManufacturerFilter();
        renderManufacturerTable();
      }
      function render() {
        renderTabs();
        var isProduct = tabKey === "product";
        bdProductCatalog.classList.toggle("is-show", isProduct);
        bdProductCatalog.setAttribute("aria-hidden", isProduct ? "false" : "true");
        bdProductCatalog.style.display = isProduct ? "" : "none";
        bdDefaultView.style.display = isProduct ? "none" : "";
        var bdViewEl = document.getElementById("bdDefaultView");
        if (bdViewEl) bdViewEl.classList.remove("bd-supplier-view");
        if (isProduct) {
          if (filtersEl.parentElement) filtersEl.parentElement.classList.remove("bd-filters--supplier");
          if (bdFilterActions) bdFilterActions.style.display = "none";
          kpiEl.innerHTML = "";
          kpiEl.style.display = "none";
          var toolbarP = document.querySelector(".bd-toolbar");
          if (toolbarP) toolbarP.style.display = "none";
          ["btnAdd", "btnEdit", "btnView", "btnDelete", "btnExport", "btnDownloadTemplate", "btnImport", "btnSearch", "btnReset"].forEach(function (id) {
            var btn = document.getElementById(id);
            if (btn) btn.style.display = "none";
          });
          var pageTitleP = document.querySelector(".carrier-page-title");
          if (pageTitleP) pageTitleP.textContent = "物资类型";
          if (!pcInited) { pcInitProductCatalog(); pcInited = true; }
          pcRenderTree();
          pcApplyForm();
          return;
        }
        var isSupplier = tabKey === "supplier";
        if (isSupplier) {
          renderSupplierPage();
          return;
        }
        var isManufacturer = tabKey === "manufacturer";
        if (isManufacturer) {
          renderManufacturerPage();
          return;
        }
        if (filtersEl.parentElement) filtersEl.parentElement.classList.remove("bd-filters--supplier");
        if (bdFilterActions) bdFilterActions.style.display = "none";
        var toolbarG = document.querySelector(".bd-toolbar");
        if (toolbarG) toolbarG.style.display = "";
        var btnSearchG = document.getElementById("btnSearch");
        var btnResetG = document.getElementById("btnReset");
        if (btnSearchG) btnSearchG.style.display = "";
        if (btnResetG) btnResetG.style.display = "";
        ["btnAdd", "btnEdit", "btnView", "btnDelete", "btnExport", "btnDownloadTemplate", "btnImport"].forEach(function (id) {
          var btn = document.getElementById(id);
          if (btn) btn.style.display = "";
        });
        var c = getByKey(tabKey);
        var pageTitleG = document.querySelector(".carrier-page-title");
        if (pageTitleG) pageTitleG.textContent = "物资类型";
        kpiEl.style.display = "grid";
        kpiEl.innerHTML = c.kpis.map(function (x) { return '<div class="bd-kpi"><div class="k">' + x[0] + '</div><div class="v">' + x[1] + "</div></div>"; }).join("");
        filtersEl.innerHTML = c.filters.map(function (x, idx) {
          return idx % 2 === 0 ? '<input placeholder="' + x + '">' : "<select>" + option(x) + option("全部") + "</select>";
        }).join("");
        var controls = Array.prototype.slice.call(filtersEl.querySelectorAll("input,select"));
        var saved = filterStateByTab[tabKey] || [];
        controls.forEach(function (ctrl, i) {
          ctrl.value = saved[i] || "";
        });
        applyFilter(c);
        headEl.innerHTML = "<tr>" + c.cols.map(function (x) { return "<th>" + x + "</th>"; }).join("") + "</tr>";
        var start = (page - 1) * pageSize;
        var list = filteredRows.slice(start, start + pageSize);
        bodyEl.innerHTML = list.map(function (r, i) {
          var realIndex = start + i;
          return '<tr data-idx="'+realIndex+'">' + r.map(function (td, tdIdx) {
            if (tdIdx === r.length - 1) return '<td><a href="#" class="bd-op-link" data-act="view">查看</a><a href="#" class="bd-op-link" data-act="edit">编辑</a><a href="#" class="bd-op-link" data-act="del">删除</a></td>';
            return "<td>" + td + "</td>";
          }).join("") + "</tr>";
        }).join("");
        totalEl.textContent = "共 " + filteredRows.length + " 条";
        document.getElementById("pageCurrent").textContent = String(page);
      }
      var qs = new URLSearchParams(window.location.search);
      var qsTab = (qs.get("tab") || "").trim();
      if (qsTab === "supplier" || qsTab === "manufacturer" || (qsTab && tabs.some(function (x) { return x.key === qsTab; }))) {
        tabKey = qsTab;
      }
      if (bdTabsEl) {
        bdTabsEl.addEventListener("click", function (e) {
          var btn = e.target.closest("[data-tab]");
          if (!btn) return;
          var next = btn.getAttribute("data-tab");
          if (!next || next === tabKey) return;
          tabKey = next;
          page = 1;
          selectedIndex = -1;
          render();
        });
      }
      document.getElementById("btnSearchSupplier").addEventListener("click", function () {
        if (tabKey === "manufacturer") {
          readManufacturerFilterFromDom();
          page = 1;
          applyManufacturerFilter();
          renderManufacturerTable();
          toast("已按条件搜索（演示）");
          return;
        }
        readSupplierFilterFromDom();
        page = 1;
        applySupplierFilter();
        renderSupplierTable();
        toast("已按条件搜索（演示）");
      });
      document.getElementById("btnResetSupplier").addEventListener("click", function () {
        if (tabKey === "manufacturer") {
          manufacturerFilterState = ["", "", ""];
          page = 1;
          renderManufacturerPage();
          toast("筛选已重置（演示）");
          return;
        }
        supplierFilterState = ["", "", ""];
        page = 1;
        renderSupplierPage();
        toast("筛选已重置（演示）");
      });
      document.getElementById("bdSupplierModalClose").addEventListener("click", closeSupplierDetailModal);
      document.getElementById("bdSupplierModalFooterClose").addEventListener("click", closeSupplierDetailModal);
      document.getElementById("bdSupplierModalMask").addEventListener("click", function (e) {
        if (e.target.id === "bdSupplierModalMask") closeSupplierDetailModal();
      });
      document.getElementById("btnSearch").addEventListener("click", function(){
        if (tabKey === "supplier" || tabKey === "manufacturer") return;
        filterStateByTab[tabKey] = Array.prototype.slice.call(filtersEl.querySelectorAll("input,select")).map(function(x){ return x.value || ""; });
        page = 1;
        render();
        toast("已按条件搜索（演示）");
      });
      document.getElementById("btnReset").addEventListener("click", function(){
        if (tabKey === "supplier" || tabKey === "manufacturer") return;
        filterStateByTab[tabKey] = []; page = 1; render(); toast("筛选已重置（演示）");
      });
      document.getElementById("btnExport").addEventListener("click", function(){ toast("已导出Excel（演示）"); });
      document.getElementById("btnDownloadTemplate").addEventListener("click", function(){ toast("已下载导入模板（演示）"); });
      document.getElementById("btnImport").addEventListener("click", function(){ toast("请选择文件导入（演示）"); });
      document.getElementById("btnAdd").addEventListener("click", function(){ openModal("add"); });
      document.getElementById("btnView").addEventListener("click", function(){ if(selectedIndex<0){toast("请先选择一行");return;} openModal("view"); });
      document.getElementById("btnEdit").addEventListener("click", function(){ if(selectedIndex<0){toast("请先选择一行");return;} openModal("edit"); });
      document.getElementById("btnDelete").addEventListener("click", function(){
        if(selectedIndex<0){toast("请先选择一行");return;}
        if (tabKey === "supplier") {
          if (window.confirm("确认删除当前记录？")) {
            supplierRecords.splice(selectedIndex, 1);
            saveSupplierRecords();
            selectedIndex = -1;
            render();
            toast("删除成功（演示）");
          }
          return;
        }
        if (tabKey === "manufacturer") {
          if (window.confirm("确认删除当前记录？")) {
            manufacturerRecords.splice(selectedIndex, 1);
            saveManufacturerRecords();
            selectedIndex = -1;
            render();
            toast("删除成功（演示）");
          }
          return;
        }
        if (window.confirm("确认删除当前记录？")) {
          getByKey(tabKey).rows.splice(selectedIndex,1);
          selectedIndex = -1;
          render();
          toast("删除成功（演示）");
        }
      });
      bodyEl.addEventListener("change", function (e) {
        if (tabKey === "manufacturer") {
          var ipM = e.target && e.target.matches ? e.target : null;
          if (!ipM || !ipM.matches("input[data-mfr-coop-switch]")) return;
          var idxM = Number(ipM.getAttribute("data-mfr-idx"));
          if (Number.isNaN(idxM) || !manufacturerRecords[idxM]) return;
          manufacturerRecords[idxM].status = ipM.checked ? "正常合作" : "暂停合作";
          saveManufacturerRecords();
          renderManufacturerTable();
          return;
        }
        if (tabKey !== "supplier") return;
        var ip = e.target && e.target.matches ? e.target : null;
        if (!ip || !ip.matches("input[data-sup-coop-switch]")) return;
        var idx = Number(ip.getAttribute("data-sup-idx"));
        if (Number.isNaN(idx) || !supplierRecords[idx]) return;
        supplierRecords[idx].status = ip.checked ? "正常合作" : "暂停合作";
        saveSupplierRecords();
        renderSupplierTable();
      });
      bodyEl.addEventListener("click", function(e){
        if (tabKey === "manufacturer") {
          var viewM = e.target.closest("[data-mfr-view]");
          if (viewM) {
            e.preventDefault();
            var mid = viewM.getAttribute("data-mfr-id");
            var recM = manufacturerRecords.find(function (x) { return x.id === mid; });
            if (recM) openManufacturerDetailModal(recM);
            return;
          }
          var editM = e.target.closest("[data-mfr-edit]");
          if (editM) {
            e.preventDefault();
            var midE = editM.getAttribute("data-mfr-id");
            selectedIndex = manufacturerRecords.findIndex(function (x) { return x.id === midE; });
            if (selectedIndex >= 0) openModal("edit");
            return;
          }
          var delM = e.target.closest("[data-mfr-del]");
          if (delM) {
            e.preventDefault();
            var midD = delM.getAttribute("data-mfr-id");
            selectedIndex = manufacturerRecords.findIndex(function (x) { return x.id === midD; });
            if (selectedIndex < 0) return;
            if (window.confirm("确认删除该制造商？")) {
              manufacturerRecords.splice(selectedIndex, 1);
              saveManufacturerRecords();
              selectedIndex = -1;
              render();
              toast("删除成功（演示）");
            }
            return;
          }
          return;
        }
        if (tabKey === "supplier") {
          var viewLink = e.target.closest("[data-sup-view]");
          if (viewLink) {
            e.preventDefault();
            var sid = viewLink.getAttribute("data-sup-id");
            var rec = supplierRecords.find(function (x) { return x.id === sid; });
            if (rec) openSupplierDetailModal(rec);
            return;
          }
          var editLink = e.target.closest("[data-sup-edit]");
          if (editLink) {
            e.preventDefault();
            var sidE = editLink.getAttribute("data-sup-id");
            selectedIndex = supplierRecords.findIndex(function (x) { return x.id === sidE; });
            if (selectedIndex >= 0) openModal("edit");
            return;
          }
          var delLink = e.target.closest("[data-sup-del]");
          if (delLink) {
            e.preventDefault();
            var sidD = delLink.getAttribute("data-sup-id");
            selectedIndex = supplierRecords.findIndex(function (x) { return x.id === sidD; });
            if (selectedIndex < 0) return;
            if (window.confirm("确认删除该供应商？")) {
              supplierRecords.splice(selectedIndex, 1);
              saveSupplierRecords();
              selectedIndex = -1;
              render();
              toast("删除成功（演示）");
            }
            return;
          }
          return;
        }
        var tr = e.target.closest("tr[data-idx]");
        if (tr) selectedIndex = Number(tr.getAttribute("data-idx"));
        var act = e.target.getAttribute("data-act");
        if (!act) return;
        e.preventDefault();
        if (act === "view") openModal("view");
        if (act === "edit") openModal("edit");
        if (act === "del") {
          if (window.confirm("确认删除该记录？")) {
            getByKey(tabKey).rows.splice(selectedIndex,1);
            selectedIndex = -1;
            render();
            toast("删除成功（演示）");
          }
        }
      });
      document.getElementById("pagePrev").addEventListener("click", function(){
        if (page > 1) {
          page--;
          if (tabKey === "supplier") renderSupplierTable();
          else if (tabKey === "manufacturer") renderManufacturerTable();
          else render();
        }
      });
      document.getElementById("pageNext").addEventListener("click", function(){
        var total = tabKey === "supplier" ? supplierFiltered.length : tabKey === "manufacturer" ? manufacturerFiltered.length : filteredRows.length;
        var maxPage = Math.max(1, Math.ceil(total / pageSize));
        if (page < maxPage) {
          page++;
          if (tabKey === "supplier") renderSupplierTable();
          else if (tabKey === "manufacturer") renderManufacturerTable();
          else render();
        }
      });
      document.getElementById("bdModalClose").addEventListener("click", function(){ modalMask.classList.remove("show"); });
      modalCancel.addEventListener("click", function(){ modalMask.classList.remove("show"); });
      modalMask.addEventListener("click", function(e){ if(e.target===modalMask) modalMask.classList.remove("show"); });
      render();
    })();
  </script>
</body>
</html>
