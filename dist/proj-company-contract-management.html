<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>项目公司合同信息管理 - 新能源物资供应链管理系统</title>
  <link rel="stylesheet" href="css/vendor/fa-all.min.css" />
  <link rel="stylesheet" href="css/subpage-base.css" />
  <link rel="stylesheet" href="css/carrier-management.css" />
  <link rel="stylesheet" href="css/source-navbar-header.css" />
  <style>
    .pccm-tabs{ display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap; }
    .pccm-tabs button{ height:34px;padding:0 18px;border-radius:6px;border:1px solid #d9d9d9;background:#fff;font-size:13px;cursor:pointer;color:#495057; }
    .pccm-tabs button:hover{ border-color:#1677ff;color:#1677ff; }
    .pccm-tabs button.is-active{ background:#1677ff;border-color:#1677ff;color:#fff; }
    .pccm-toolbar{ display:flex;flex-wrap:wrap;gap:10px;align-items:flex-end;margin-bottom:12px;padding:12px;background:#fff;border:1px solid #edf2f8;border-radius:8px; }
    .pccm-toolbar label{ display:block;font-size:12px;color:#62788f;margin-bottom:4px; }
    .pccm-ops{ display:inline-flex;flex-wrap:wrap;gap:8px;align-items:center; }
    .pccm-ops .carrier-btn-add{ padding:0;font-size:14px;min-height:auto;border:none;background:transparent;box-shadow:none;color:#1677ff;font-weight:600;line-height:1.2;text-decoration:none; }
    .pccm-ops .carrier-btn-add:hover{ color:#4096ff;text-decoration:underline; }
    .cell-num{ text-align:right;font-variant-numeric:tabular-nums; }
    .pccm-empty{ text-align:center;padding:24px !important;color:#8c8c8c; }
    .pccm-form-grid{ display:grid;gap:10px;margin-bottom:10px; }
    .pccm-form-grid-2{ grid-template-columns:1fr 1fr; }
    @media(max-width:900px){ .pccm-form-grid-2{ grid-template-columns:1fr; } }
    .pccm-form-full{ grid-column:1/-1; }
    .pccm-form label{ display:block;font-size:13px;color:#516a87;margin-bottom:4px; }
    .pccm-form-seg{ margin:14px 0 8px;font-size:14px;color:#1f3551;border-left:3px solid #1677ff;padding-left:8px; }
    .pccm-req{ color:#cf1322; }
    .pccm-modal-mask{ position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:2400;display:none;align-items:center;justify-content:center;padding:16px;box-sizing:border-box; }
    .pccm-modal-mask.show{ display:flex; }
    .pccm-dialog{ background:#fff;border-radius:10px;max-height:92vh;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 16px 48px rgba(0,0,0,.2);width:100%; }
    .pccm-dialog--xl{ max-width:1000px; }
    .pccm-dialog--sm{ max-width:400px; }
    .pccm-dialog-hd{ padding:12px 16px;border-bottom:1px solid #edf2f8;font-weight:600;display:flex;justify-content:space-between;align-items:center;color:#1f3551; }
    .pccm-dialog-bd{ padding:14px 16px;overflow-y:auto;font-size:13px; }
    .pccm-dialog-ft{ padding:10px 16px;border-top:1px solid #edf2f8;display:flex;justify-content:flex-end;gap:8px;flex-wrap:wrap; }
    .pccm-steps{ display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px; }
    .pccm-step{ padding:6px 10px;border-radius:6px;background:#f0f5ff;border:1px solid #adc6ff;font-size:12px;color:#1d39c4; }
    .pccm-step.done{ background:#f6ffed;border-color:#b7eb8f;color:#389e0d; }
    .pccm-table-wrap{ overflow-x:auto;max-width:100%; }
    .pccm-table{ min-width:1200px;width:max-content;table-layout:auto; }
    .pccm-table th,.pccm-table td{ white-space:nowrap; }
  </style>
</head>
<body class="page-source-navbar page-subpage page-logistics">
  <div class="page-bg" aria-hidden="true"></div>
  <div class="app">
    <header class="header">
      <div class="header-left">
        <button type="button" class="header-hamburger" aria-label="菜单"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 6h16M4 12h16M4 18h16"/></svg></button>
        <a class="header-logo" href="index-portal-screen-alt.html"><img src="assets/logo-chenergy.png" width="220" height="40" alt="" /></a>
        <div class="header-source-brand"><p>新能源物资供应链管理系统</p></div>
      </div>
      <div class="header-right">
        <span class="clock" id="clock"></span>
        <div class="user-avatar" title="用户">用</div>
      </div>
    </header>
    <div class="layout">
      <aside class="sidebar" aria-label="主导航">
        <div class="nav-item nav-item--module-active" title="采购管理"><span class="nav-label">采购管理</span></div>
      </aside>
      <main class="main-scroll">
        <nav class="subpage-breadcrumb" aria-label="面包屑">
          <a href="index-portal-screen-alt.html">首页</a><span class="sep">/</span><span>采购管理</span><span class="sep">/</span><span>项目公司合同信息管理</span>
        </nav>
        <div class="carrier-main-inner">
          <h1 class="carrier-page-title">项目公司合同信息管理</h1>
          <div class="pccm-tabs">
            <button type="button" class="is-active" data-tab="purchase">采购合同</button>
            <button type="button" data-tab="sales">销售合同</button>
          </div>
          <div class="pccm-toolbar">
            <div>
              <label for="pccmFName">合同名称</label>
              <input id="pccmFName" class="carrier-search" placeholder="模糊搜索" />
            </div>
            <div>
              <label for="pccmFSupplier">供应商</label>
              <input id="pccmFSupplier" class="carrier-search" placeholder="供应商名称" />
            </div>
            <div>
              <label for="pccmFStatus">合同状态</label>
              <select id="pccmFStatus" class="carrier-select">
                <option value="">全部</option>
                <option>执行中</option>
                <option>已执行</option>
                <option>已终止</option>
              </select>
            </div>
            <div>
              <label>&nbsp;</label>
              <button type="button" class="carrier-btn-add" id="pccmBtnSearch" style="background:#1677ff;border-color:#1677ff;color:#fff;">搜索</button>
              <button type="button" class="carrier-btn-add" id="pccmBtnReset">重置</button>
            </div>
          </div>
          <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px;">
            <button type="button" class="carrier-btn-add" id="pccmBtnAdd" style="background:#1677ff;border-color:#1677ff;color:#fff;"><i class="fa-solid fa-plus" aria-hidden="true"></i> 新增</button>
            <button type="button" class="carrier-btn-add" id="pccmBtnImport" style="background:#fff;color:#389e0d;border:1px solid #b7eb8f"><i class="fa-solid fa-file-import" aria-hidden="true"></i> 导入</button>
            <button type="button" class="carrier-btn-add" id="pccmBtnExport"><i class="fa-solid fa-file-export" aria-hidden="true"></i> 导出</button>
          </div>
          <div class="carrier-table-wrap">
            <table class="carrier-table">
              <thead id="pccmThead">
                <tr>
                  <th>合同编号</th>
                  <th>合同名称</th>
                  <th>供应商</th>
                  <th>签约金额（万元）</th>
                  <th>已执行金额（万元）</th>
                  <th>签订日期</th>
                  <th>有效期</th>
                  <th>合同状态</th>
                  <th>操作</th>
                </tr>
              </thead>
              <tbody id="pccmTableBody"></tbody>
            </table>
          </div>
        </div>
      </main>
    </div>
  </div>

  <!-- 新增/编辑合同弹窗 -->
  <div id="pccmModalEdit" class="pccm-modal-mask" role="dialog" aria-modal="true">
    <div class="pccm-dialog pccm-dialog--xl">
      <div class="pccm-dialog-hd"><span id="pccmModalTitle">新增采购合同</span><button type="button" class="carrier-btn-add" style="padding:4px 10px" data-close>×</button></div>
      <div class="pccm-dialog-bd" id="pccmModalBody"></div>
      <div class="pccm-dialog-ft">
        <button type="button" class="carrier-btn-add" id="pccmSave">保存</button>
        <button type="button" class="carrier-btn-add" data-close style="background:#fff;color:#595959;border:1px solid #d9d9d9">取消</button>
      </div>
    </div>
  </div>

  <!-- 删除确认 -->
  <div id="pccmModalDel" class="pccm-modal-mask" role="dialog">
    <div class="pccm-dialog pccm-dialog--sm">
      <div class="pccm-dialog-hd">删除确认 <button type="button" class="carrier-btn-add" style="padding:4px 10px" data-close>×</button></div>
      <div class="pccm-dialog-bd"><p style="margin:0;line-height:1.6">是否确认删除该合同？删除后不可恢复。</p></div>
      <div class="pccm-dialog-ft">
        <button type="button" class="carrier-btn-add" id="pccmDelOk" style="background:#fff1f0;color:#cf1322;border:1px solid #ffccc7">确认删除</button>
        <button type="button" class="carrier-btn-add" data-close style="background:#fff;color:#595959;border:1px solid #d9d9d9">取消</button>
      </div>
    </div>
  </div>

  <script src="js/sidebar-actions.js"></script>
  <script src="js/subpage-feature-title.js"></script>
  <script src="js/site-footer.js"></script>
  <script src="js/subpage-clock.js"></script>
  <script>
  (function(){
    var CTX = { tab:'purchase', list:[], editingId:null, pendingDelId:null };

    var purchaseData = [
      {id:"PCCM001",no:"PC-2026-001",name:"宁夏盐池光伏逆变器采购合同",supplier:"阳光电源",amount:320,execAmt:180,signDate:"2026-01-10",term:"2026-01-10~2026-12-31",status:"执行中"},
      {id:"PCCM002",no:"PC-2026-002",name:"甘肃酒泉风电主轴采购合同",supplier:"中国一重",amount:480,execAmt:0,signDate:"2026-02-15",term:"2026-02-15~2027-02-14",status:"执行中"},
      {id:"PCCM003",no:"PC-2026-003",name:"陕西榆林光伏支架采购合同",supplier:"中信金属",amount:156,execAmt:156,signDate:"2026-01-20",term:"2026-01-20~2026-08-31",status:"已执行"},
      {id:"PCCM004",no:"PC-2026-004",name:"新疆哈密风电齿轮箱采购",supplier:"南高齿",amount:680,execAmt:120,signDate:"2026-03-01",term:"2026-03-01~2027-02-28",status:"执行中"},
      {id:"PCCM005",no:"PC-2026-005",name:"内蒙古光伏电缆采购合同",supplier:"亨通光电",amount:95,execAmt:0,signDate:"2026-04-05",term:"2026-04-05~2026-10-31",status:"已终止"},
    ];

    var salesData = [
      {id:"PCCM101",no:"SC-2026-001",name:"龙源电力光伏设备销售合同",buyer:"龙源电力",amount:560,execAmt:320,signDate:"2026-01-18",term:"2026-01-18~2026-12-31",status:"执行中"},
      {id:"PCCM102",no:"SC-2026-002",name:"国电投风电备件供货协议",buyer:"国电投",amount:240,execAmt:0,signDate:"2026-03-10",term:"2026-03-10~2027-03-09",status:"执行中"},
    ];

    function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

    function statusCls(s){
      if(s==='执行中') return 'status-pass';
      if(s==='已执行') return 'status-draft';
      if(s==='已终止') return 'status-reject';
      return 'status-draft';
    }

    function render(){
      var data = CTX.tab==='purchase' ? purchaseData : salesData;
      var name = document.getElementById("pccmFName").value.trim().toLowerCase();
      var sup = document.getElementById("pccmFSupplier").value.trim().toLowerCase();
      var status = document.getElementById("pccmFStatus").value;
      var filtered = data.filter(function(r){
        if(name && r.name.toLowerCase().indexOf(name)<0 && (r.supplier||'').toLowerCase().indexOf(name)<0 && (r.buyer||'').toLowerCase().indexOf(name)<0) return false;
        if(sup && (r.supplier||'').toLowerCase().indexOf(sup)<0 && (r.buyer||'').toLowerCase().indexOf(sup)<0) return false;
        if(status && r.status !== status) return false;
        return true;
      });
      var field = CTX.tab==='purchase' ? 'supplier' : 'buyer';
      var thead = CTX.tab==='purchase'
        ? '<tr><th>合同编号</th><th>合同名称</th><th>供应商</th><th>签约金额（万元）</th><th>已执行金额（万元）</th><th>签订日期</th><th>有效期</th><th>合同状态</th><th>操作</th></tr>'
        : '<tr><th>合同编号</th><th>合同名称</th><th>采购方</th><th>签约金额（万元）</th><th>已执行金额（万元）</th><th>签订日期</th><th>有效期</th><th>合同状态</th><th>操作</th></tr>';
      document.getElementById("pccmThead").innerHTML = thead;
      var tb = document.getElementById("pccmTableBody");
      if(!filtered.length){ tb.innerHTML='<tr><td colspan="9" class="pccm-empty">暂无数据</td></tr>'; return; }
      tb.innerHTML = filtered.map(function(r){
        var party = r[field]||'';
        return '<tr>'+
          '<td>'+esc(r.no)+'</td>'+
          '<td>'+esc(r.name)+'</td>'+
          '<td>'+esc(party)+'</td>'+
          '<td class="cell-num">'+r.amount.toFixed(2)+'</td>'+
          '<td class="cell-num">'+r.execAmt.toFixed(2)+'</td>'+
          '<td>'+esc(r.signDate)+'</td>'+
          '<td>'+esc(r.term)+'</td>'+
          '<td><span class="status-pill '+statusCls(r.status)+'">'+esc(r.status)+'</span></td>'+
          '<td><span class="pccm-ops"><a href="#" class="pccm-view" data-id="'+esc(r.id)+'">查看</a> <a href="#" class="pccm-edit" data-id="'+esc(r.id)+'">编辑</a> <a href="#" class="pccm-del" data-id="'+esc(r.id)+'" style="color:#cf1322">删除</a></span></td>'+
        '</tr>';
      }).join('');
    }

    function buildForm(rec){
      rec = rec || {};
      var isSale = CTX.tab === 'sales';
      return '<div class="pccm-form-grid pccm-form-grid-2">'+
        '<div class="pccm-form-full">'+
          '<label>合同名称 <span class="pccm-req">*</span></label>'+
          '<input class="carrier-search" id="pccmFName2" value="'+esc(rec.name||'')+'" placeholder="请输入合同名称" style="width:100%;box-sizing:border-box;height:34px;border:1px solid #d9d9d9;border-radius:8px;padding:0 10px" />'+
        '</div>'+
        '<div>'+
          '<label>'+(isSale?'采购方':'供应商')+' <span class="pccm-req">*</span></label>'+
          '<input class="carrier-search" id="pccmFParty" value="'+esc(rec[field]||'')+'" placeholder="请输入'+(isSale?'采购方':'供应商')+'名称" style="width:100%;box-sizing:border-box;height:34px;border:1px solid #d9d9d9;border-radius:8px;padding:0 10px" />'+
        '</div>'+
        '<div>'+
          '<label>签约金额（万元） <span class="pccm-req">*</span></label>'+
          '<input type="number" class="carrier-search" id="pccmFAmount" value="'+esc(rec.amount||'')+'" placeholder="0.00" style="width:100%;box-sizing:border-box;height:34px;border:1px solid #d9d9d9;border-radius:8px;padding:0 10px" />'+
        '</div>'+
        '<div>'+
          '<label>签订日期</label>'+
          '<input type="date" id="pccmFSignDate" value="'+esc(rec.signDate||'')+'" style="width:100%;box-sizing:border-box;height:34px;border:1px solid #d9d9d9;border-radius:8px;padding:0 10px" />'+
        '</div>'+
        '<div>'+
          '<label>有效期至</label>'+
          '<input type="date" id="pccmFTerm" value="'+(rec.term?esc(rec.term.split('~')[1]||''):'')+'" style="width:100%;box-sizing:border-box;height:34px;border:1px solid #d9d9d9;border-radius:8px;padding:0 10px" />'+
        '</div>'+
        '<div>'+
          '<label>合同状态</label>'+
          '<select id="pccmFStatus2" style="width:100%;box-sizing:border-box;height:34px;border:1px solid #d9d9d9;border-radius:8px;padding:0 10px">'+
            ['执行中','已执行','已终止'].map(function(s){ return '<option'+(rec.status===s?' selected':'')+'>'+s+'</option>'; }).join('')+
          '</select>'+
        '</div>'+
        '<div class="pccm-form-full">'+
          '<label>备注</label>'+
          '<textarea id="pccmFNote" rows="3" style="width:100%;box-sizing:border-box;border:1px solid #d9d9d9;border-radius:8px;padding:8px" placeholder="选填"></textarea>'+
        '</div>'+
      '</div>';
    }

    var field = 'supplier';

    function closeModal(id){ document.getElementById(id).classList.remove("show"); }

    function init(){
      bindEvents();
      render();
    }

    function bindEvents(){
      document.querySelectorAll(".pccm-tabs button").forEach(function(btn){
        btn.onclick = function(){
          document.querySelectorAll(".pccm-tabs button").forEach(function(b){ b.classList.remove("is-active"); });
          btn.classList.add("is-active");
          CTX.tab = btn.dataset.tab;
          field = CTX.tab === 'purchase' ? 'supplier' : 'buyer';
          render();
        };
      });
      document.getElementById("pccmBtnSearch").onclick = render;
      document.getElementById("pccmBtnReset").onclick = function(){
        document.getElementById("pccmFName").value='';
        document.getElementById("pccmFSupplier").value='';
        document.getElementById("pccmFStatus").value='';
        render();
      };
      document.getElementById("pccmBtnAdd").onclick = function(){
        CTX.editingId = null;
        var isSale = CTX.tab==='sales';
        document.getElementById("pccmModalTitle").textContent = isSale ? '新增销售合同' : '新增采购合同';
        document.getElementById("pccmModalBody").innerHTML = buildForm(null);
        document.getElementById("pccmModalEdit").classList.add("show");
      };
      document.getElementById("pccmTableBody").onclick = function(e){
        var t = e.target;
        var editLink = t.closest(".pccm-edit");
        var viewLink = t.closest(".pccm-view");
        var delLink = t.closest(".pccm-del");
        if(editLink){ e.preventDefault(); openEdit(viewLink.dataset.id); return; }
        if(viewLink){ e.preventDefault(); openEdit(viewLink.dataset.id); return; }
        if(delLink){ e.preventDefault(); CTX.pendingDelId=delLink.dataset.id; document.getElementById("pccmModalDel").classList.add("show"); return; }
      };
      document.getElementById("pccmSave").onclick = function(){
        var name = document.getElementById("pccmFName2").value.trim();
        var party = document.getElementById("pccmFParty").value.trim();
        var amount = parseFloat(document.getElementById("pccmFAmount").value)||0;
        var signDate = document.getElementById("pccmFSignDate").value;
        var termEnd = document.getElementById("pccmFTerm").value;
        var status = document.getElementById("pccmFStatus2").value;
        if(!name){ alert("请填写合同名称"); return; }
        if(!party){ alert("请填写"+(CTX.tab==='purchase'?'供应商':'采购方')+"名称"); return; }
        if(!amount){ alert("请填写签约金额"); return; }
        var rec = { id: CTX.editingId||('PCCM'+(Date.now()+Math.floor(Math.random()*999))), no:'PC-2026-'+(Math.floor(Math.random()*900)+100), name:name };
        rec[field]=party; rec.amount=amount; rec.execAmt=0; rec.signDate=signDate||new Date().toISOString().slice(0,10); rec.term=(signDate||new Date().toISOString().slice(0,10))+'~'+(termEnd||''); rec.status=status;
        var data = CTX.tab==='purchase'?purchaseData:salesData;
        if(CTX.editingId){ var idx=data.findIndex(function(r){return r.id===CTX.editingId;}); if(idx>=0) data[idx]=rec; }
        else data.unshift(rec);
        closeModal("pccmModalEdit");
        render();
      };
      document.getElementById("pccmDelOk").onclick = function(){
        var data = CTX.tab==='purchase'?purchaseData:salesData;
        var idx=data.findIndex(function(r){return r.id===CTX.pendingDelId;});
        if(idx>=0) data.splice(idx,1);
        closeModal("pccmModalDel");
        render();
      };
      document.getElementById("pccmBtnImport").onclick = function(){ alert("演示：导入功能"); };
      document.getElementById("pccmBtnExport").onclick = function(){ alert("演示：导出功能"); };
      [document.getElementById("pccmModalEdit"),document.getElementById("pccmModalDel")].forEach(function(el){
        el.addEventListener("click",function(e){ if(e.target===el) closeModal(el.id); });
        el.querySelectorAll("[data-close]").forEach(function(btn){ btn.onclick = function(){ closeModal(el.id); }; });
      });
    }

    function openEdit(id){
      var data = CTX.tab==='purchase'?purchaseData:salesData;
      var rec = data.find(function(r){ return r.id===id; });
      CTX.editingId = id;
      var isSale = CTX.tab==='sales';
      document.getElementById("pccmModalTitle").textContent = isSale ? '编辑销售合同' : '编辑采购合同';
      document.getElementById("pccmModalBody").innerHTML = buildForm(rec);
      document.getElementById("pccmModalEdit").classList.add("show");
    }

    document.addEventListener("DOMContentLoaded", init);
  })();
  </script>
</body>
</html>
