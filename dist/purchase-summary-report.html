    .subpage-table{min-width:2080px;font-size:12px;background:#fff}
    .subpage-table thead tr{background:#f2f5f9}
    .subpage-table th,.subpage-table td{border-bottom:1px solid #edf1f6;padding:8px 8px;text-align:center;white-space:normal;word-break:break-word;overflow-wrap:anywhere}

    .subpage-table a{color:#1677ff;text-decoration:none;font-weight:500}

      align-items:center;
      justify-content:center;

    .ps-acc-pending{ color:#d48806; border-color:#f3d7a1; background:#fff8e6; }
    .ps-acc-partial{ color:#1677ff; border-color:#91caff; background:#e6f4ff; }

    .ps-pane.is-active{display:block}

    .ps-chart-card{background:#fff;border:1px solid #dde3ea;border-radius:6px;padding:10px 12px}
    .ps-chart-title{font-size:13px;font-weight:600;color:#334155;margin:0 0 10px}
    .ps-kpi-row{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px}
    .ps-kpi{background:#f8fafc;border:1px solid #e5edf7;border-radius:6px;padding:10px}
    .ps-kpi-label{font-size:12px;color:#64748b}

    .ps-bar-col{flex:1;min-width:0;display:flex;flex-direction:column;align-items:center;gap:6px}
    .ps-bar-stack{width:42px;height:140px;border:1px solid #e6edf5;border-radius:6px;background:#f8fafc;display:flex;flex-direction:column-reverse;overflow:hidden}
    .ps-bar-done{background:#52c41a}
    .ps-bar-left{background:#faad14}
    .ps-bar-lab{font-size:11px;color:#64748b;text-align:center;line-height:1.3}

    .ps-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:4px}
    .ps-pie-wrap{display:flex;align-items:center;gap:14px}
    .ps-pie{width:140px;height:140px;border-radius:50%;border:1px solid #e6edf5;flex-shrink:0}

    .ps-top-list{display:grid;grid-template-columns:1fr;gap:8px}
    .ps-top-item{display:grid;grid-template-columns:90px 1fr 44px;align-items:center;gap:8px;font-size:12px;color:#475569}
    .ps-top-track{height:8px;border-radius:999px;background:#edf2f7;overflow:hidden}

    @media (max-width: 1200px){ .ps-analytics{grid-template-columns:1fr} .ps-kpi-row{grid-template-columns:repeat(2,minmax(0,1fr));} }

        var legacy = document.getElementById("psPageDesc");

        if (!panel) return;
        panel.querySelectorAll("div").forEach(function (el) {

          if (st.indexOf("64748b") >= 0 || el.classList.contains("role-hint-banner")) {
            if (!el.classList.contains("role-hint-banner")) el.remove();
          }
        });
      }
      sweep();
      document.addEventListener("DOMContentLoaded", sweep);
      setTimeout(sweep, 0);
      setTimeout(sweep, 120);
    })();
  </script>

    function getOwningCompanyLabel() {
      var engLabel = "工程技术公司";
      var defaultProj = "龙源山西分公司";
      try {
        var kind = (sessionStorage.getItem("demoLoginOrgKind") || "").trim();
        var company = (sessionStorage.getItem("demoLoginCompanyName") || "").trim();
        if (kind === "project") return company || defaultProj;
        if (kind === "eng") return engLabel;
        var pageSub = "";
        try {
          pageSub = (new URLSearchParams(location.search || "").get("pageSub") || "").trim();
          if (!pageSub) pageSub = (sessionStorage.getItem("pageSub") || "").trim();
        } catch (ePageSub) {}
        if (pageSub.indexOf("项目公司") >= 0) return company || defaultProj;
      } catch (eKind) {}
      return engLabel;
    }

    function applySceneFilter(rows) {
      var company = getOwningCompanyLabel();
      return rows.filter(function (r) {
        return (r.owningCompany || "工程技术公司") === company;
      });
    }

    function renderRows(rows){
      const tbody = document.getElementById("reportBody");
      if (!rows.length) {
        tbody.innerHTML = '<tr><td colspan="13" style="padding:24px;color:#8c8c8c;">暂无本公司采购合同报表数据</td></tr>';
        return;
      }
      function renderStatusTag(status){
        var txt = String(status || "");
        var cls = "ps-acc-tag ps-acc-pending";
        if (txt === "已执行") cls = "ps-acc-tag ps-acc-pass";
        else if (txt === "部分执行") cls = "ps-acc-tag ps-acc-partial";
        else if (txt === "未执行") cls = "ps-acc-tag ps-acc-pending";
        else cls = "ps-acc-tag ps-acc-review";
        return '<span class="' + cls + '">' + txt + "</span>";
      }
      tbody.innerHTML = rows.map(function(r){
        return "<tr>"
          + "<td><a href=\"material-procurement-hub.html?tab=m3\">"+r.orderNo+"</a></td>"
          + "<td>"+r.contractNo+"</td>"
          + "<td>"+r.execNo+"</td>"
          + "<td>"+r.contractName+"</td>"
          + "<td>"+r.supplier+"</td>"
          + "<td>"+r.progress+"</td>"
          + "<td>"+r.totalAmount.toFixed(2)+"</td>"
          + "<td>"+r.executedAmount.toFixed(2)+"</td>"
          + "<td>"+r.remainingAmount.toFixed(2)+"</td>"
          + "<td>"+r.signDate+"</td>"
          + "<td>"+r.term+"</td>"
          + "<td>"+renderStatusTag(r.status)+"</td>"
          + "<td><a href=\"contract-management.html\">查看</a></td>"
          + "</tr>";
      }).join("");
    }

    function calcStats(rows){
      var total = rows.length;
      var doneSum = 0;
      var leftSum = 0;
      var statusMap = {};
      var typeMap = {};
      var supplierMap = {};
      var deptMap = {};

      rows.forEach(function(r){
        leftSum += Number(r.remainingAmount) || 0;
        doneSum += Number(r.executedAmount) || 0;
        statusMap[r.status] = (statusMap[r.status] || 0) + 1;
        typeMap[r.contractType] = (typeMap[r.contractType] || 0) + 1;
        supplierMap[r.supplier] = (supplierMap[r.supplier] || 0) + 1;
        if (!deptMap[r.dept]) deptMap[r.dept] = { done:0, left:0 };
        deptMap[r.dept].done += Number(r.executedAmount) || 0;
        deptMap[r.dept].left += Number(r.remainingAmount) || 0;
      });

      return {
        total: total,
        doneSum: doneSum,
        leftSum: leftSum,
        doneRate: (doneSum + leftSum) ? ((doneSum / (doneSum + leftSum)) * 100).toFixed(1) : "0.0",
        statusMap: statusMap,
        typeMap: typeMap,
        supplierMap: supplierMap,
        deptMap: deptMap
      };
    }

    function buildPie(map, elPie, elLegend, colors){
      var keys = Object.keys(map);
      var total = keys.reduce(function(s,k){ return s + map[k]; }, 0) || 1;
      var start = 0;
      var segs = [];
      var legend = [];
      keys.forEach(function(k, idx){
        var val = map[k];
        var pct = (val / total) * 100;
        var end = start + pct;
        var color = colors[idx % colors.length];
        segs.push(color + " " + start.toFixed(2) + "% " + end.toFixed(2) + "%");
        legend.push('<div><i class="ps-dot" style="background:'+color+'"></i>'+k+'：'+val+'（'+pct.toFixed(1)+'%）</div>');
        start = end;
      });
      document.getElementById(elPie).style.background = "conic-gradient(" + segs.join(",") + ")";
      document.getElementById(elLegend).innerHTML = legend.join("");
    }

      var s = calcStats(rows);
      document.getElementById("kpiRow").innerHTML = [
        {k:"合同条数",v:s.total},
        {k:"已执行金额（万元）",v:s.doneSum.toFixed(2)},
        {k:"剩余金额（万元）",v:s.leftSum.toFixed(2)},
        {k:"整体执行率",v:s.doneRate + "%"}
      ].map(function(x){
        return '<div class="ps-kpi"><div class="ps-kpi-label">'+x.k+'</div><div class="ps-kpi-val">'+x.v+'</div></div>';
      }).join("");

      var deptKeys = Object.keys(s.deptMap);
      var maxTotal = 1;
      deptKeys.forEach(function(k){
        var t = s.deptMap[k].done + s.deptMap[k].left;
        if (t > maxTotal) maxTotal = t;
      });
      document.getElementById("deptBars").innerHTML = deptKeys.map(function(k){
        var it = s.deptMap[k];
        var doneH = Math.round((it.done / maxTotal) * 140);
        var leftH = Math.round((it.left / maxTotal) * 140);
        return '<div class="ps-bar-col">'
          + '<div class="ps-bar-stack">'
          + '<div class="ps-bar-done" style="height:'+doneH+'px"></div>'
          + '<div class="ps-bar-left" style="height:'+leftH+'px"></div>'
          + '</div>'
          + '<div class="ps-bar-lab">'+k+'</div>'
          + '</div>';
      }).join("");

      buildPie(s.statusMap, "inboundPie", "inboundLegend", ["#52c41a","#1677ff","#faad14","#f5222d","#722ed1"]);
      buildPie(s.typeMap, "acceptPie", "acceptLegend", ["#1677ff","#13c2c2","#faad14","#722ed1"]);

      var tops = Object.keys(s.supplierMap).map(function(k){ return {name:k,val:s.supplierMap[k]}; })
        .sort(function(a,b){ return b.val - a.val; })
        .slice(0,5);
      var max = tops.length ? tops[0].val : 1;
      document.getElementById("supplierTop").innerHTML = tops.map(function(x){
        var w = Math.max(8, Math.round((x.val / max) * 100));
        return '<div class="ps-top-item"><span>'+x.name+'</span><span class="ps-top-track"><span class="ps-top-bar" style="width:'+w+'%"></span></span><b>'+x.val+'</b></div>';
      }).join("");
    }
    function refreshAll() {
      var rows = applySceneFilter(reportRows);
      updateSceneHint();
      renderRows(rows);
      renderAnalytics(rows);
    }

    refreshAll();

    document.querySelectorAll("[data-ps-tab]").forEach(function(btn){
      btn.addEventListener("click", function(){
        var key = btn.getAttribute("data-ps-tab");
        document.querySelectorAll("[data-ps-tab]").forEach(function(item){
          item.classList.toggle("is-active", item === btn);
        });
        document.querySelectorAll("[data-ps-pane]").forEach(function(pane){
          pane.classList.toggle("is-active", pane.getAttribute("data-ps-pane") === key);
        });
      });
    });

    document.getElementById("btnQuery").addEventListener("click", function () {
      refreshAll();
    });
    document.getElementById("btnReset").addEventListener("click", function () {
      document.getElementById("year").selectedIndex = 0;
      document.getElementById("supplier").selectedIndex = 0;
      document.getElementById("cat").selectedIndex = 0;
      refreshAll();
    });
    document.getElementById("btnExport").addEventListener("click", function () {
      alert("已导出采购合同报表 Excel（演示）");
    });
    (function () {
      var label = new URLSearchParams(location.search || "").get("pageSub") || "";
      if (!label) {
        try {
          var stored = sessionStorage.getItem("pageSub") || "";
          if (stored === "项目公司采购合同报表管理") label = stored;
        } catch (eStorage) {}
      }
      if (!label) return;
      var segs = document.querySelectorAll(".subpage-breadcrumb a, .subpage-breadcrumb span:not(.sep)");
      if (segs.length) segs[segs.length - 1].textContent = label;
    })();
  </script>
</body>
</html>
