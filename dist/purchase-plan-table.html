<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>采购计划表 - 新能源物资供应链管理系统</title>
  <link rel="stylesheet" href="css/vendor/fa-all.min.css" />
  <link rel="stylesheet" href="css/subpage-base.css" />
  <link rel="stylesheet" href="css/carrier-management.css" />
  <link rel="stylesheet" href="css/source-navbar-header.css" />
  <style>
    .pp-kpis{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-bottom:10px}
    .pp-kpi{background:#fff;border:1px solid #e6edf6;border-radius:10px;padding:12px}
    .pp-kpi b{display:block;font-size:12px;color:#5b6b7f}
    .pp-kpi span{display:block;margin-top:6px;font-size:20px;color:#1677ff;font-weight:700}
    .pp-tag{display:inline-flex;padding:2px 8px;border-radius:10px;font-size:12px;border:1px solid transparent}
    .pp-tag.wait{background:#fff7e6;color:#d48806;border-color:#ffd591}
    .pp-tag.ok{background:#f6ffed;color:#389e0d;border-color:#b7eb8f}
    .pp-ops{display:inline-flex;gap:8px;white-space:nowrap}
    .pp-ops a{color:#1677ff;text-decoration:none;font-weight:500}
    .pp-ops a:hover{text-decoration:underline}
  </style>
</head>
<body class="page-source-navbar page-subpage page-logistics">
  <div class="page-bg" aria-hidden="true"></div>
  <div class="app">
    <header class="header"><div class="header-left"><button class="header-hamburger"><svg viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h16"/></svg></button><a class="header-logo" href="#"><img src="assets/logo-chenergy.png" width="220" height="40" alt=""/></a><div class="header-source-brand"><p>新能源供应链管理系统</p></div></div><div class="header-right"><span class="clock" id="clock"></span><div class="user-avatar">用</div></div></header>
    <div class="layout">
      <aside class="sidebar"><div class="nav-item nav-item--module-active"><span class="nav-label">采购管理</span></div></aside>
      <main class="main-scroll">
        <div class="carrier-main-inner">
          <h1 class="carrier-page-title">采购计划表（XQ-PROC-1）</h1>
          <div class="pp-kpis">
            <div class="pp-kpi"><b>计划总数</b><span>42</span></div>
            <div class="pp-kpi"><b>待审批</b><span>9</span></div>
            <div class="pp-kpi"><b>已通过</b><span>31</span></div>
            <div class="pp-kpi"><b>执行中合同</b><span>18</span></div>
          </div>
          <div class="carrier-toolbar">
            <button class="carrier-btn-add"><i class="fa-solid fa-plus"></i> 新增计划</button>
            <div class="carrier-toolbar-right">
              <select class="carrier-select"><option>全部年度</option><option>2026</option><option>2025</option></select>
              <select class="carrier-select"><option>全部状态</option><option>待审批</option><option>已通过</option></select>
              <input class="carrier-search" placeholder="计划编号/执行合同号" />
              <button class="carrier-btn-add">查询</button>
            </div>
          </div>
          <div class="carrier-table-wrap">
            <table class="carrier-table">
              <thead><tr><th>计划编号</th><th>执行合同号</th><th>子合同列表</th><th>剩余执行数量</th><th>已执行数量</th><th>审批状态</th><th>操作</th></tr></thead>
              <tbody>
                <tr><td>CGJH-2026-001</td><td>HT-2026-301</td><td>SUB-2026-001、SUB-2026-002、SUB-2026-003</td><td>70</td><td>50</td><td><span class="pp-tag wait">待审批</span></td><td><span class="pp-ops"><a href="#">查看</a><a href="#">编辑</a><a href="#">提交审批</a></span></td></tr>
                <tr><td>CGJH-2026-002</td><td>HT-2026-309</td><td>SUB-2026-021、SUB-2026-022</td><td>24</td><td>0</td><td><span class="pp-tag ok">已通过</span></td><td><span class="pp-ops"><a href="#">查看</a><a href="#">编辑</a></span></td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </main>
    </div>
  </div>
  <script src="js/sidebar-actions.js"></script><script src="js/subpage-feature-title.js"></script><script src="js/site-footer.js"></script>
<script src="js/subpage-clock.js"></script>
</body>
</html>
