    .std-left {

      color:#1890ff;

    .std-right {
      flex:1;
      min-width:0;
      background:#fff;
      border:1px solid #e7ecf3;
      border-radius:4px;
      padding:8px 10px;
      display:flex;
      flex-direction:column;
      margin-top: 0;
    }
    .std-search {

      align-items:center;
      gap:8px;
      margin-bottom:8px;
      font-size:12px;
    }
    .std-search label { color:#4d6480; white-space:nowrap; }
    .std-search input {
      flex:0 0 260px;
      height:28px;
      border:1px solid #dbe6f3;
      border-radius:2px;
      padding:0 8px;
      font-size:12px;
    }
    .std-search button {
      border-radius:2px;
      font-size:12px;
      padding:4px 10px;
      cursor:pointer;
    }
    .std-search .btn-search { background:#1890ff; border:1px solid #1890ff; color:#fff; }
    .std-search .btn-reset { background:#fff; border:1px solid #dbe6f3; color:#4d6480; }
    .std-toolbar {
      display:flex;
      align-items:center;
      gap:6px;
      margin-bottom:8px;
    }
    .std-btn {
      border-radius:2px;
      font-size:12px;
      padding:4px 10px;
      border:1px solid transparent;
      cursor:pointer;
    }
    .std-btn-add { background:#e8f4ff; border-color:#cfe5fb; color:#3e8ad9; }
    .std-btn-edit { background:#eef9ea; border-color:#d8f0d2; color:#69a95a; }
    .std-btn-del { background:#fff0f0; border-color:#f8d7d7; color:#d97f7f; }
    .std-btn-exp { background:#fff6e8; border-color:#f5e2c6; color:#b08a57; }
    .std-table-wrap {
      flex:1;
      border:1px solid #e7ecf3;
      border-radius:3px;
      overflow:hidden;
      margin-top:4px;
      display:flex;
      flex-direction:column;
    }
    .std-table {
      width:100%;
      border-collapse:collapse;
      font-size:12px;
    }
    .std-table thead th {
      background:#f6f8fb;
      border-bottom:1px solid #edf1f6;
      padding:8px 6px;
      text-align:left;
      color:#3f546f;
      white-space:nowrap;
    }
    .std-table tbody td {
      border-bottom:1px solid #edf1f6;
      padding:8px 6px;
      color:#3f546f;
      font-size:12px;
    }
    .std-col-check { width:32px; text-align:center; }
    .std-col-name { min-width:260px; }
    .std-col-ops { width:80px; text-align:center; white-space:nowrap; }
    .std-col-ops a {
      color:#1890ff;
      font-size:14px;
      text-decoration:none;
    }
    .std-foot {
      margin-top:auto;
      padding:6px 8px;
      display:flex;
      justify-content:flex-end;
      align-items:center;
      gap:8px;
      font-size:11px;
      color:#617894;
      background:#fff;
    }
    .std-foot select {
      height:22px;
      border:1px solid #dbe6f3;
      border-radius:2px;
      font-size:11px;
      padding:0 4px;
    }
    .std-pages button {
      min-width:22px;
      height:20px;
      border:1px solid #dbe6f3;
      background:#fff;
      font-size:11px;
      cursor:pointer;
    }
    .std-pages button.is-current {
      background:#1890ff;
      border-color:#1890ff;
      color:#fff;
    }
