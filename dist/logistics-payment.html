  <!-- 新增付款申请弹框 -->

        <div class="field full">

        <div class="field">
          <label for="paAmount">应付金额</label>
          <input id="paAmount" type="text" readonly />
        </div>
        <div class="field">
          <label for="paPaid">实付金额</label>
          <input id="paPaid" type="text" readonly value="—" />

        <div class="field">

      <div class="modal-body">
        <div class="field"><label>申请单号</label><div id="pdNo" class="detail-cell"></div></div>
        <div class="field"><label>关联运单号</label><div id="pdWaybill" class="detail-cell"></div></div>

        <div class="field full"><label>付款说明</label><pre id="pdDesc" class="detail-pre"></pre></div>

  <script>
    (function () {
      var tbody = document.getElementById("paymentTableBody");
      var totalEl = document.getElementById("paymentTotalText");
      var search = document.getElementById("paymentWaybillSearch");
      var filter = document.getElementById("paymentStatusFilter");
      var btnAdd = document.getElementById("btnAddPayment");

      try {
        var sr0 = sessionStorage.getItem("demoLogisticsRole");
        if (sr0 !== "staff" && sr0 !== "leader" && sr0 !== "finance") {
          sessionStorage.setItem("demoLogisticsRole", "staff");
        }
      } catch (e0) {}

      function getRole() {
        try {
          var s = sessionStorage.getItem("demoLogisticsRole");
          if (s === "staff" || s === "leader" || s === "finance") return s;
        } catch (e) {}
        return "staff";
      }

      /** 付款单数据：status 对应筛选；step=dept|finance|pending_pay|done|reject */
      var paymentRows = [
        { no: "FK20260301001", waybill: "YD20260301001", carrier: "华通物流有限公司", due: 12800, paid: 12800, status: "paid", step: "done", date: "2026-03-20", applicant: "张明", desc: "到货验收完成，按合同条款支付。" },
        { no: "FK20260302015", waybill: "YD20260302088", carrier: "远达运输集团", due: 6500, paid: null, status: "approve", step: "dept", date: "2026-03-21", applicant: "李娜", desc: "常规物流费用，附件含发票与说明。" },
        { no: "FK20260303009", waybill: "YD20260303156", carrier: "联程供应链科技", due: 18200, paid: null, status: "reject", step: "reject", date: "2026-03-22", applicant: "王强", desc: "单据不齐全，需补充发票后重新提报。" }
      ];

      // modal refs
      var paymentApplyMask = document.getElementById("paymentApplyMask");
      var paymentDetailMask = document.getElementById("paymentDetailMask");
      var paWaybill = document.getElementById("paWaybill");
      var paCarrier = document.getElementById("paCarrier");
      var paApplicant = document.getElementById("paApplicant");
      var paAmount = document.getElementById("paAmount");
      var paPaid = document.getElementById("paPaid");
      var paPayStatus = document.getElementById("paPayStatus");
      var paApplyDate = document.getElementById("paApplyDate");
      var paInvoice = document.getElementById("paInvoice");
      var paInvoiceHelp = document.getElementById("paInvoiceHelp");
      var paDesc = document.getElementById("paDesc");

      // 运单主数据（演示）：签收后才可付款，付款完成后回写 paymentStatus
      var waybillStore = {
        YD20260301001: { status: "已签收", location: "上海浦东仓", paymentStatus: "已付款", carrier: "华通物流有限公司", contractPrice: 12800 },
        YD20260302088: { status: "已签收", location: "天津滨海仓", paymentStatus: "待付款", carrier: "远达运输集团", contractPrice: 6500 },
        YD20260303156: { status: "在途", location: "苏州园区高速口", paymentStatus: "待付款", carrier: "联程供应链科技", contractPrice: 18200 }
      };

      function fmtDate(d) {
        var y = d.getFullYear();
        var m = String(d.getMonth() + 1).padStart(2, "0");
        var day = String(d.getDate()).padStart(2, "0");
        return y + "-" + m + "-" + day;
      }

      function statusText(code) {
        if (code === "approve") return "待审批";
        if (code === "pending") return "待付款";
        if (code === "paid") return "已付款";
        if (code === "reject") return "已驳回";
        return code;
      }

      function moneyCell(n) {
        return "¥ " + Number(n || 0).toLocaleString("zh-CN", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
      }

      function rowUiStatus(pr) {
        if (pr.status === "paid") return "paid";
        if (pr.status === "reject") return "reject";
        if (pr.step === "pending_pay") return "pending";
        return "approve";
      }

      function buildOpsHtml(_pr, idx) {
        return '<div class="wh-ops"><a href="#" data-action="view" data-idx="' + idx + '">查看详情</a></div>';
      }

      function renderPaymentRows() {
        tbody.innerHTML = "";
        paymentRows.forEach(function (pr, idx) {
          var tr = document.createElement("tr");
          tr.setAttribute("data-waybill", pr.waybill);
          tr.setAttribute("data-status", rowUiStatus(pr));
          tr.setAttribute("data-approval-step", pr.step);
          tr.setAttribute("data-pay-desc", pr.desc || "");
          tr.setAttribute("data-row-index", String(idx));
          var tag = "";
          var us = rowUiStatus(pr);
          if (us === "paid") tag = '<span class="tag-status tag-status--paid">已付款</span>';
          else if (us === "reject") tag = '<span class="tag-status tag-status--reject">已驳回</span>';
          else if (us === "pending") tag = '<span class="tag-status tag-status--pending">待付款</span>';
          else tag = '<span class="tag-status tag-status--approve">待审批</span>';
          tr.innerHTML =
            "<td>" + pr.no + "</td>" +
            "<td>" + pr.waybill + "</td>" +
            "<td>" + pr.carrier + "</td>" +
            '<td class="cell-amount">' + moneyCell(pr.due) + "</td>" +
            '<td class="cell-paid-amount">' + (pr.paid != null ? moneyCell(pr.paid) : "—") + "</td>" +
            '<td class="cell-status">' + tag + "</td>" +
            "<td>" + pr.date + "</td>" +
            "<td>" + pr.applicant + "</td>" +
            "<td>" + buildOpsHtml(pr, idx) + "</td>";
          tbody.appendChild(tr);
        });
        applyFilter();
      }

      function applyFilter() {
        var q = (search.value || "").trim().toLowerCase();
        var st = filter.value;
        tbody.querySelectorAll("tr").forEach(function (row) {
          var wb = (row.getAttribute("data-waybill") || "").toLowerCase();
          var status = row.getAttribute("data-status") || "";
          var okWaybill = !q || wb.indexOf(q) !== -1;
          var okStatus = !st || status === st;
          row.style.display = okWaybill && okStatus ? "" : "none";
        });
        var n = 0;
        tbody.querySelectorAll("tr").forEach(function (row) {
          if (row.style.display !== "none") n++;
        });
        totalEl.textContent = "共 " + n + " 条";
      }

      function openMask(mask) {
        if (!mask) return;
        mask.classList.add("show");
        mask.setAttribute("aria-hidden", "false");
      }
      function closeMask(mask) {
        if (!mask) return;
        mask.classList.remove("show");
        mask.setAttribute("aria-hidden", "true");
      }

      function bindModalClose(maskId, closeIds) {
        var mask = document.getElementById(maskId);
        if (!mask) return;
        closeIds.forEach(function (id) {
          var el = document.getElementById(id);
          if (el) el.addEventListener("click", function () { closeMask(mask); });
        });
        mask.addEventListener("click", function (e) {
          if (e.target === mask) closeMask(mask);
        });
      }

      bindModalClose("paymentApplyMask", ["btnClosePaymentApply", "btnCancelPaymentApply"]);
      bindModalClose("paymentDetailMask", ["btnClosePaymentDetail", "btnCancelPaymentDetail"]);

      // 申请弹框：运单选项填充
      function refreshWaybillOptions() {
        var html = "";
        Object.keys(waybillStore).forEach(function (wb) {
          var w = waybillStore[wb];
          if (w.status === "已签收" && w.paymentStatus !== "已付款") {
            html += '<option value="' + wb + '">' + wb + " / " + w.carrier + "</option>";
          }
        });
        paWaybill.innerHTML = html || '<option value="">暂无可申请运单</option>';
        if (!paWaybill.value && paWaybill.options.length) paWaybill.selectedIndex = 0;
        updateApplyFormByWaybill();
      }

      function updateApplyFormByWaybill() {
        var wb = paWaybill.value;
        var w = waybillStore[wb];
        if (!w) {
          paCarrier.value = "";
          paAmount.value = "";
          if (paPaid) paPaid.value = "—";
          return;
        }
        paCarrier.value = w.carrier || "";
        paAmount.value = "¥ " + Number(w.contractPrice || 0).toLocaleString("zh-CN", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
      }

      if (paWaybill) paWaybill.addEventListener("change", updateApplyFormByWaybill);
      if (paInvoice) {
        paInvoice.addEventListener("change", function () {
          var f = (paInvoice.files && paInvoice.files[0]) ? paInvoice.files[0].name : "";
          paInvoiceHelp.textContent = f ? ("已选择：" + f) : "未选择文件";
        });
      }

      function openDetailByIndex(idx) {
        var pr = paymentRows[idx];
        if (!pr) return;
        document.getElementById("pdNo").textContent = pr.no;
        document.getElementById("pdWaybill").textContent = pr.waybill;
        document.getElementById("pdCarrier").textContent = pr.carrier;
        document.getElementById("pdDueAmount").textContent = moneyCell(pr.due);
        document.getElementById("pdPaidAmount").textContent = pr.paid != null ? moneyCell(pr.paid) : "—";
        document.getElementById("pdStatus").textContent = statusText(rowUiStatus(pr));
        document.getElementById("pdApplyDate").textContent = pr.date;
        document.getElementById("pdApplicant").textContent = pr.applicant;
        document.getElementById("pdDesc").textContent = pr.desc || "无";
        openMask(paymentDetailMask);
      }

      search.addEventListener("input", applyFilter);
      filter.addEventListener("change", applyFilter);
      btnAdd.addEventListener("click", function () {
        if (getRole() !== "staff") {
          alert("演示：新增付款申请仅部门用户（普通经办）可操作。");
          return;
        }
        paApplicant.value = "当前用户";
        paDesc.value = "";
        if (paPayStatus) paPayStatus.value = "待审批";
        if (paPaid) paPaid.value = "—";
        if (paApplyDate) paApplyDate.value = fmtDate(new Date());
        if (paInvoice) paInvoice.value = "";
        if (paInvoiceHelp) paInvoiceHelp.textContent = "未选择文件";
        refreshWaybillOptions();
        openMask(paymentApplyMask);
      });

      document.getElementById("btnSavePaymentApply").addEventListener("click", function () {
        var wb = (paWaybill.value || "").trim();
        var w = waybillStore[wb];
        if (!w) {
          alert("暂无可申请的已签收未付款运单。");
          return;
        }
        var payNo = "FK" + fmtDate(new Date()).replace(/-/g, "") + String(Math.floor(Math.random() * 900 + 100));
        paymentRows.unshift({
          no: payNo,
          waybill: wb,
          carrier: w.carrier || "",
          due: w.contractPrice || 0,
          paid: null,
          status: "approve",
          step: "dept",
          date: fmtDate(new Date()),
          applicant: paApplicant.value || "当前用户",
          desc: (paDesc.value || "").trim()
        });
        w.paymentStatus = "审批中";
        closeMask(paymentApplyMask);
        renderPaymentRows();
      });

      tbody.addEventListener("click", function (e) {
        var a = e.target.closest(".wh-ops a");
        if (!a) return;
        e.preventDefault();
        var action = a.getAttribute("data-action");
        var idx = parseInt(a.getAttribute("data-idx"), 10);
        if (isNaN(idx)) return;
        if (action === "view") {
          openDetailByIndex(idx);
          return;
        }
      });

      renderPaymentRows();
    })();
  </script>
</body>
</html>
