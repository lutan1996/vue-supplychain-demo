<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fc"/>
      <stop offset="45%" style="stop-color:#d6e8f8"/>
      <stop offset="100%" style="stop-color:#c5ddf2"/>
    </linearGradient>
    <linearGradient id="haze" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.35"/>
      <stop offset="100%" style="stop-color:#f0f2f5;stop-opacity:0.95"/>
    </linearGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" fill="none" stroke="#94a3b8" stroke-opacity="0.12" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="100%" height="100%" fill="url(#sky)"/>
  <rect width="100%" height="100%" fill="url(#grid)" opacity="0.6"/>
  <ellipse cx="960" cy="520" rx="780" ry="220" fill="#bfdbfe" opacity="0.25"/>
  <ellipse cx="200" cy="200" rx="280" ry="120" fill="#ffffff" opacity="0.4"/>
  <ellipse cx="1700" cy="320" rx="360" ry="140" fill="#e0f2fe" opacity="0.5"/>
  <rect width="100%" height="100%" fill="url(#haze)"/>
</svg>
