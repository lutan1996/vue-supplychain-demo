  <script>
    (function () {
      function resolvePerfTab() {
        var t = "";
        try {
          var sp = new URLSearchParams(window.location.search);
          t = (sp.get("tab") || "").trim();
          if (t === "flow-exec") t = "flow";
          if (!t) {
            var ps = (sp.get("pageSub") || "").trim();
            if (
              ps === "流程频次统计" ||
              ps === "KPI考核" ||
              ps === "考核规则"
            ) {
              t = "flow";
            } else if (ps === "登录频次统计" || ps === "绩效看板") {
              t = "login";
            }
          }
        } catch (e0) {}
        if (!t) {
          try {
            var n = window.name || "";
            if (n) t = (new URLSearchParams(n).get("tab") || "").trim();
            if (t === "flow-exec") t = "flow";
          } catch (e1) {}
        }
        if (!t) {
          try {
            t = (sessionStorage.getItem("demoPerformanceTab") || "").trim();
          } catch (e2) {}
        }
        /* 离线演示壳 __demoOpenPage 写入的是 demoTab；iframe 与父页 sessionStorage 隔离时与 demoPerformanceTab 互补 */
        if (!t || (t !== "flow" && t !== "login")) {
          try {
            var dt = (sessionStorage.getItem("demoTab") || "").trim();
            if (dt === "flow" || dt === "login") t = dt;
          } catch (e2b) {}
        }
        if (t === "flow-exec") t = "flow";
        if (t !== "flow" && t !== "login") t = "login";
        try {
          document.documentElement.setAttribute("data-perf-tab", t);
          sessionStorage.setItem("demoPerformanceTab", t);
        } catch (e3) {}
        return t;
      }
      var tab = resolvePerfTab();
      var titleMap = {
        login: "登录频次统计",
        flow: "流程频次统计"
      };
      function applyPerfTabUi(activeTab) {
        var h1 = document.querySelector(".carrier-page-title");
        if (h1 && titleMap[activeTab]) h1.textContent = titleMap[activeTab];
        try {
          document.title = titleMap[activeTab] + " - 新能源物资供应链管理系统";
        } catch (e4) {}
      }
      function applyPerfPanels(activeTab) {
        try {
          document.documentElement.setAttribute("data-perf-tab", activeTab);
          var loginPanel = document.querySelector('.module-hub-panel[data-panel="login"]');
          var flowPanel = document.querySelector('.module-hub-panel[data-panel="flow"]');
          if (loginPanel) loginPanel.classList.toggle("is-visible", activeTab === "login");
          if (flowPanel) flowPanel.classList.toggle("is-visible", activeTab === "flow");
          sessionStorage.setItem("demoPerformanceTab", activeTab);
          sessionStorage.setItem("demoTab", activeTab);
        } catch (e5) {}
      }
      document.addEventListener("DOMContentLoaded", function () {
        /* 演示壳 iframe 在 head 执行时 window.name 可能尚未带上 tab=，DOM 就绪后再解析一次 */
        var tab2 = resolvePerfTab();
        tab = tab2;
        applyPerfTabUi(tab2);
        applyPerfPanels(tab2);
      });
      window.addEventListener("demo-performance-tab-change", function (e) {
        var next = e && e.detail && e.detail.tab ? String(e.detail.tab).trim() : "";
        if (next !== "flow" && next !== "login") return;
        tab = next;
        applyPerfTabUi(next);
        applyPerfPanels(next);
      });
      applyPerfTabUi(tab);
    })();
  </script>

    (function () {
      var FLOW_ROWS = [

      var DETAIL_BY_FLOW = {
        采购审批: [
          { task: "备件集中采购申请 PA-2026-0312", user: "张明", time: "2026-03-01 09:20", node: "部门负责人", elapsed: "6 天" },

        ],

          { task: "风机报废计划 BHJH-2026-02", user: "赵敏", time: "2026-02-20 08:30", node: "设备评估", elapsed: "18 天" },
          { task: "齿轮箱报废申请 BF-2026-0099", user: "钱磊", time: "2026-03-10 16:45", node: "董事会", elapsed: "12 天" },
          { task: "叶片处置审批 BF-2026-0101", user: "孙涛", time: "2026-03-12 10:00", node: "会议审批", elapsed: "9 天" },
          { task: "箱变退役报废 BF-2026-0105", user: "周杰", time: "2026-03-15 09:15", node: "部门复核", elapsed: "7 天" }
        ],
        领用审批: [
          { task: "主轴轴承领用 LY-2026-1201", user: "吴刚", time: "2026-03-18 13:20", node: "仓储主管", elapsed: "3 天" },
          { task: "润滑油领用 LY-2026-1208", user: "郑芳", time: "2026-03-20 08:50", node: "场站负责人", elapsed: "2 天" }
        ],
        调剂审批: [
          { task: "华北-华东备件调剂 TJ-2026-003", user: "陈静", time: "2026-03-02 10:00", node: "调入方确认", elapsed: "11 天" },
          { task: "闲置电缆调剂 TJ-2026-007", user: "杨洋", time: "2026-03-11 15:30", node: "调出方审批", elapsed: "8 天" },

        ]
      };

      var flowChartInst = null;

      function renderFlowTable(rows) {
        var tb = document.getElementById("perfFlowTableBody");
        if (!tb) return;
        tb.innerHTML = "";
        rows.forEach(function (r) {
          var tr = document.createElement("tr");
          var alert = r.rateNum > 17;
          if (alert) tr.className = "perf-row-alert";
          tr.innerHTML =
            "<td>" +
            r.name +
            "</td><td>" +
            r.start +
            "</td><td>" +
            r.done +
            "</td><td>" +
            (typeof r.avgDays === "number" ? r.avgDays.toFixed(1) : r.avgDays) +
            "</td><td>" +
            r.overdue +
            '</td><td><span class="perf-rate">' +
            r.rateStr +
            '</span></td><td><a href="#" class="perf-link-detail" data-flow="' +
            r.name +
            '">查看明细</a></td>';
          tb.appendChild(tr);
        });
      }

      function filterFlowRows() {
        var sel = document.getElementById("perfFlowType");
        var v = sel ? sel.value : "";
        if (!v) return FLOW_ROWS.slice();
        return FLOW_ROWS.filter(function (r) {
          return r.name === v;
        });
      }

      function bindFlowTableClicks() {
        var tb = document.getElementById("perfFlowTableBody");
        if (!tb) return;
        tb.onclick = function (e) {
          var a = e.target.closest && e.target.closest("a.perf-link-detail");
          if (!a) return;
          e.preventDefault();
          var flow = a.getAttribute("data-flow") || "";
          openFlowDetail(flow);
        };
      }

      function openFlowDetail(flowName) {
        var mask = document.getElementById("perfFlowDetailMask");
        var titleEl = document.getElementById("perfDetailFlowName");
        var body = document.getElementById("perfFlowDetailBody");
        if (!mask || !body) return;
        if (titleEl) titleEl.textContent = flowName || "—";
        var rows = DETAIL_BY_FLOW[flowName] || [];
        body.innerHTML = "";
        if (!rows.length) {
          body.innerHTML = '<tr><td colspan="5" style="text-align:center;color:#8ca0b8;padding:16px">暂无超期任务</td></tr>';
        } else {
          rows.forEach(function (x) {
            var tr = document.createElement("tr");
            tr.innerHTML =
              "<td>" +
              x.task +
              "</td><td>" +
              x.user +
              "</td><td>" +
              x.time +
              "</td><td>" +
              x.node +
              "</td><td>" +
              x.elapsed +
              "</td>";
            body.appendChild(tr);
          });
        }
        mask.classList.add("is-open");
        mask.setAttribute("aria-hidden", "false");
      }

      function closeFlowDetail() {
        var mask = document.getElementById("perfFlowDetailMask");
        if (!mask) return;
        mask.classList.remove("is-open");
        mask.setAttribute("aria-hidden", "true");
      }

      function initFlowTrendChart() {
        var el = document.getElementById("perfFlowTrend");
        if (!el || typeof echarts === "undefined") return;
        if (!flowChartInst) flowChartInst = echarts.init(el);
        var months = ["1月", "2月", "3月", "4月", "5月", "6月", "7月", "8月", "9月", "10月", "11月", "12月"];
        flowChartInst.setOption({
          color: ["#1890ff", "#52c41a", "#faad14", "#722ed1"],
          tooltip: {
            trigger: "axis",
            axisPointer: { type: "cross", crossStyle: { color: "#999" } }
          },
          legend: {
            data: ["采购审批", "报废审批", "领用审批", "调剂审批"],
            bottom: 4,
            itemWidth: 14,
            itemHeight: 8,
            textStyle: { fontSize: 12, color: "#5d738d" }
          },
          grid: { left: 52, right: 28, top: 28, bottom: 52 },
          xAxis: {
            type: "category",
            boundaryGap: false,
            data: months,
            axisLine: { lineStyle: { color: "#e0e6ee" } },
            axisLabel: { color: "#5d738d", fontSize: 11 }
          },
          yAxis: {
            type: "value",
            name: "天",
            nameTextStyle: { color: "#8ca0b8", fontSize: 12, padding: [0, 0, 0, 8] },
            axisLabel: { color: "#5d738d", fontSize: 11 },
            splitLine: { lineStyle: { color: "#f0f2f5", type: "dashed" } }
          },
          series: [
            {
              name: "采购审批",
              type: "line",
              smooth: true,
              symbol: "circle",
              symbolSize: 5,
              lineStyle: { width: 2 },
              data: [2.9, 2.7, 2.6, 2.5, 2.4, 2.5, 2.4, 2.5, 2.6, 2.5, 2.4, 2.5]
            },
            {
              name: "报废审批",
              type: "line",
              smooth: true,
              symbol: "circle",
              symbolSize: 5,
              lineStyle: { width: 2 },
              data: [3.4, 3.3, 3.2, 3.4, 3.5, 3.3, 3.2, 3.3, 3.4, 3.2, 3.3, 3.2]
            },
            {
              name: "领用审批",
              type: "line",
              smooth: true,
              symbol: "circle",
              symbolSize: 5,
              lineStyle: { width: 2 },
              data: [1.4, 1.3, 1.25, 1.2, 1.15, 1.2, 1.18, 1.2, 1.22, 1.2, 1.19, 1.2]
            },
            {
              name: "调剂审批",
              type: "line",
              smooth: true,
              symbol: "circle",
              symbolSize: 5,
              lineStyle: { width: 2 },

          ]
        });
        flowChartInst.resize();
      }

      function tryInitFlowPanel() {
        var panel = document.querySelector('.module-hub-panel[data-panel="flow"]');
        if (!panel || !panel.classList.contains("is-visible")) return;
        renderFlowTable(filterFlowRows());
        bindFlowTableClicks();
        setTimeout(function () {
          initFlowTrendChart();
        }, 80);
      }

    if (typeof echarts !== "undefined") {
        var elLogin = document.getElementById("perfLine");
        if (elLogin) {
          var chLogin = echarts.init(elLogin);
          chLogin.setOption({
          tooltip: { trigger: "axis" },
          xAxis: { type: "category", data: ["3/1", "3/5", "3/10", "3/15", "3/20", "3/25", "3/30"] },
            yAxis: { type: "value", name: "次数" },
            series: [{ name: "登录次数", type: "line", data: [12, 15, 10, 18, 22, 20, 24], smooth: true, itemStyle: { color: "#1890ff" } }]
          });
        }
      }

      renderFlowTable(FLOW_ROWS);
      bindFlowTableClicks();

      document.getElementById("perfFlowQuery").addEventListener("click", function (e) {
        e.preventDefault();
        renderFlowTable(filterFlowRows());
        bindFlowTableClicks();
      });
      document.getElementById("perfFlowReset").addEventListener("click", function (e) {
        e.preventDefault();
        var sel = document.getElementById("perfFlowType");
        var ds = document.getElementById("perfFlowDateStart");
        var de = document.getElementById("perfFlowDateEnd");
        if (sel) sel.value = "";
        if (ds) ds.value = "2026-01-01";
        if (de) de.value = "2026-12-31";
        renderFlowTable(FLOW_ROWS);
        bindFlowTableClicks();
      });
      document.getElementById("perfFlowExport").addEventListener("click", function (e) {
        e.preventDefault();
        alert("演示环境：导出报表将生成 Excel（原型未接入后端）。");
      });

      document.getElementById("perfFlowDetailClose").addEventListener("click", closeFlowDetail);
      document.getElementById("perfFlowDetailMask").addEventListener("click", function (e) {
        if (e.target === this) closeFlowDetail();
      });

      var flowPanel = document.querySelector('.module-hub-panel[data-panel="flow"]');
      if (flowPanel) {
        var obs = new MutationObserver(function () {
          if (flowPanel.classList.contains("is-visible")) tryInitFlowPanel();
        });
        obs.observe(flowPanel, { attributes: true, attributeFilter: ["class"] });
      }

      if (document.readyState === "loading") {
        document.addEventListener("DOMContentLoaded", function () {
          try {
            var sp = new URLSearchParams(window.location.search || "");
            if ((sp.get("tab") || "").trim() === "flow") tryInitFlowPanel();
          } catch (err) {}
        });
      } else {
        try {
          var sp2 = new URLSearchParams(window.location.search || "");
          if ((sp2.get("tab") || "").trim() === "flow") tryInitFlowPanel();
        } catch (err2) {}
      }

      window.addEventListener("resize", function () {
        if (flowChartInst) flowChartInst.resize();
      });
    })();
  </script>
</body>
</html>
