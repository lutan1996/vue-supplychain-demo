<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>项目公司采购合同报表管理</title>
  <link rel="stylesheet" href="css/subpage-base.css" />
  <link rel="stylesheet" href="css/source-navbar-header.css" />
  <style>
    .pcreport-panel{padding:10px 12px 12px;background:#f5f6f8}
    .pcreport-toolbar{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:8px}
    .pcreport-left{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
    .pcreport-left select,.pcreport-left input{height:30px;border:1px solid #d9d9d9;border-radius:3px;padding:0 8px;font-size:12px;background:#fff}
    .pcreport-btn{height:30px;border:1px solid #d9d9d9;border-radius:4px;background:#fff;padding:0 12px;font-size:12px;cursor:pointer}
    .pcreport-btn.pri{background:#1890ff;border-color:#1890ff;color:#fff}
    .pcreport-table-wrap{border:1px solid #dde3ea;border-radius:4px;overflow:auto;background:#fff}
    .pcreport-table{min-width:2080px;font-size:12px;background:#fff}
    .pcreport-table thead tr{background:#f2f5f9}
    .pcreport-table th,.pcreport-table td{border-bottom:1px solid #edf1f6;padding:8px 8px;text-align:center;white-space:normal;word-break:break-word;overflow-wrap:anywhere}
    .pcreport-table th{color:#5a6677;font-weight:600}
    .pcreport-table a{color:#1677ff;text-decoration:none;font-weight:500}
    .pcreport-table a:hover{text-decoration:underline}
    .pcreport-tag{ display:inline-flex;align-items:center;justify-content:center;min-width:74px;height:30px;padding:0 12px;border-radius:999px;border:1px solid #d9d9d9;font-size:12px;font-weight:600;box-sizing:border-box;background:#fff; }
    .pcreport-tag-pass{ color:#389e0d;border-color:#b7eb8f;background:#f6ffed; }
    .pcreport-tag-pending{ color:#d48806;border-color:#f3d7a1;background:#fff8e6; }
    .pcreport-tag-partial{ color:#1677ff;border-color:#91caff;background:#e6f4ff; }
    .pcreport-tag-review{ color:#722ed1;border-color:#d3adf7;background:#f9f0ff; }
    .pcreport-tabs{display:flex;gap:4px;margin-bottom:10px;border-bottom:1px solid #dde3ea}
    .pcreport-tab{height:34px;border:none;background:transparent;padding:0 16px;font-size:13px;color:#64748b;cursor:pointer;border-bottom:2px solid transparent}
    .pcreport-tab.is-active{color:#1677ff;border-bottom-color:#1677ff;font-weight:600}
    .pcreport-pane{display:none}
    .pcreport-pane.is-active{display:block}
    .pcreport-analytics{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}
    .pcreport-chart-card{background:#fff;border:1px solid #dde3ea;border-radius:6px;padding:10px 12px}
    .pcreport-chart-title{font-size:13px;font-weight:600;color:#334155;margin:0 0 10px}
    .pcreport-kpi-row{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px}
    .pcreport-kpi{background:#f8fafc;border:1px solid #e5edf7;border-radius:6px;padding:10px}
    .pcreport-kpi-label{font-size:12px;color:#64748b}
    .pcreport-kpi-val{margin-top:6px;font-size:20px;line-height:1.2;color:#1677ff;font-weight:700}
    .pcreport-bars{display:flex;align-items:flex-end;gap:16px;height:180px;padding:10px 6px 0}
    .pcreport-bar-col{flex:1;min-width:0;display:flex;flex-direction:column;align-items:center;gap:6px}
    .pcreport-bar-stack{width:42px;height:140px;border:1px solid #e6edf5;border-radius:6px;background:#f8fafc;display:flex;flex-direction:column-reverse;overflow:hidden}
    .pcreport-bar-done{background:#52c41a}
    .pcreport-bar-left{background:#faad14}
    .pcreport-bar-lab{font-size:11px;color:#64748b;text-align:center;line-height:1.3}
    .pcreport-legend{display:flex;gap:12px;flex-wrap:wrap;font-size:12px;color:#64748b;margin-top:8px}
    .pcreport-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:4px}
    .pcreport-pie-wrap{display:flex;align-items:center;gap:14px}
    .pcreport-pie{width:140px;height:140px;border-radius:50%;border:1px solid #e6edf5;flex-shrink:0}
    .pcreport-pie-list{font-size:12px;color:#475569;line-height:1.9}
    @media(max-width:1200px){.pcreport-analytics{grid-template-columns:1fr}.pcreport-kpi-row{grid-template-columns:repeat(2,minmax(0,1fr));}}
  </style>
</head>
<body class="page-source-navbar page-subpage">
  <div class="app">
    <header class="header"><div class="header-left"><button class="header-hamburger"><svg viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h16"/></svg></button><a class="header-logo" href="#"><img src="assets/logo-chenergy.png" width="220" height="40" alt="" /></a><div class="header-source-brand"><p>新能源供应链管理系统</p></div></div><div class="header-right"><span class="clock" id="clock"></span><div class="user-avatar">用</div></div></header>
    <div class="layout">
      <aside class="sidebar"><div class="nav-item"><span class="nav-label">采购管理</span></div></aside>
      <main class="main-scroll">
        <div class="pcreport-panel">
          <div style="margin-bottom:10px;padding:10px 12px;background:#fff;border:1px solid #dde3ea;border-radius:6px;">
            <div style="font-size:16px;font-weight:600;color:#1f3551;">项目公司采购合同报表管理</div>
            <div style="margin-top:4px;font-size:12px;color:#64748b;">按项目公司采购合同维度统计执行情况，供物资采购模块查看合同履约与执行进度。</div>
          </div>
          <div class="pcreport-tabs">
            <button type="button" class="pcreport-tab is-active" data-tab="charts">统计图</button>
            <button type="button" class="pcreport-tab" data-tab="list">报表列表</button>
          </div>
          <section class="pcreport-pane is-active" data-pane="charts">
            <div class="pcreport-analytics">
              <article class="pcreport-chart-card" style="grid-column:1/-1">
                <h3 class="pcreport-chart-title">核心统计</h3>
                <div class="pcreport-kpi-row" id="pcreportKpiRow"></div>
              </article>
              <article class="pcreport-chart-card">
                <h3 class="pcreport-chart-title">项目执行进度（已执行 vs 剩余）</h3>
                <div class="pcreport-bars" id="pcreportDeptBars"></div>
                <div class="pcreport-legend">
                  <span><i class="pcreport-dot" style="background:#52c41a"></i>已执行</span>
                  <span><i class="pcreport-dot" style="background:#faad14"></i>剩余执行</span>
                </div>
              </article>
              <article class="pcreport-chart-card">
                <h3 class="pcreport-chart-title">执行状态分布</h3>
                <div class="pcreport-pie-wrap">
                  <div class="pcreport-pie" id="pcreportInbPie"></div>
                  <div class="pcreport-pie-list" id="pcreportInbLegend"></div>
                </div>
              </article>
              <article class="pcreport-chart-card">
                <h3 class="pcreport-chart-title">供应商分布</h3>
                <div class="pcreport-pie-wrap">
                  <div class="pcreport-pie" id="pcreportAccPie"></div>
                  <div class="pcreport-pie-list" id="pcreportAccLegend"></div>
                </div>
              </article>
            </div>
          </section>
          <section class="pcreport-pane" data-pane="list">
            <div class="pcreport-toolbar">
              <div class="pcreport-left">
                <select id="pcreportYear"><option value="">全部年份</option><option>2026</option><option>2025</option></select>
                <select id="pcreportStatus"><option value="">全部状态</option><option>部分执行</option><option>已执行</option><option>未执行</option></select>
                <input id="pcreportKeyword" placeholder="合同名称/供应商" style="height:30px;border:1px solid #d9d9d9;border-radius:3px;padding:0 8px;font-size:12px;background:#fff;min-width:160px" />
              </div>
              <div>
                <button type="button" class="pcreport-btn" id="pcreportBtnQuery" style="background:#1890ff;border-color:#1890ff;color:#fff;">查询</button>
                <button type="button" class="pcreport-btn" id="pcreportBtnReset">重置</button>
                <button type="button" class="pcreport-btn" id="pcreportBtnExport">导出</button>
              </div>
            </div>
            <div class="pcreport-table-wrap">
              <table class="pcreport-table">
                <thead>
                  <tr>
                    <th>合同编号</th>
                    <th>项目公司</th>
                    <th>合同名称</th>
                    <th>供应商</th>
                    <th>总金额（万元）</th>
                    <th>已执行（万元）</th>
                    <th>剩余（万元）</th>
                    <th>执行率</th>
                    <th>签订日期</th>
                    <th>有效期</th>
                    <th>执行状态</th>
                  </tr>
                </thead>
                <tbody id="pcreportBody"></tbody>
              </table>
            </div>
          </section>
        </div>
      </main>
    </div>
  </div>
  <script src="js/sidebar-actions.js"></script>
  <script src="js/subpage-feature-title.js"></script>
  <script src="js/site-footer.js"></script>
  <script src="js/subpage-clock.js"></script>
  <script>
  (function(){
    var reportRows = [
      {orderNo:"PJ-ORD-001",project:"宁夏盐池项目公司",contractNo:"PJ-HT-2026-001",contractName:"阳光电源逆变器采购合同",supplier:"阳光电源",progress:"35%",totalAmount:320.00,executedAmount:112.00,remainingAmount:208.00,signDate:"2026-01-10",term:"2026-01-10~2026-12-31",status:"部分执行"},
      {orderNo:"PJ-ORD-002",project:"甘肃酒泉项目公司",contractNo:"PJ-HT-2026-002",contractName:"中国一重重型装备采购合同",supplier:"中国一重",progress:"0%",totalAmount:480.00,executedAmount:0,remainingAmount:480.00,signDate:"2026-02-15",term:"2026-02-15~2027-02-14",status:"未执行"},
      {orderNo:"PJ-ORD-003",project:"陕西榆林项目公司",contractNo:"PJ-HT-2026-003",contractName:"中信金属光伏支架采购合同",supplier:"中信金属",progress:"100%",totalAmount:156.00,executedAmount:156.00,remainingAmount:0,signDate:"2026-01-20",term:"2026-01-20~2026-08-31",status:"已执行"},
      {orderNo:"PJ-ORD-004",project:"新疆哈密项目公司",contractNo:"PJ-HT-2026-004",contractName:"南高齿风电齿轮箱采购合同",supplier:"南高齿",progress:"18%",totalAmount:680.00,executedAmount:122.40,remainingAmount:557.60,signDate:"2026-03-01",term:"2026-03-01~2027-02-28",status:"部分执行"},
      {orderNo:"PJ-ORD-005",project:"内蒙古乌兰察布项目公司",contractNo:"PJ-HT-2026-005",contractName:"亨通光电电缆采购合同",supplier:"亨通光电",progress:"76%",totalAmount:95.00,executedAmount:72.20,remainingAmount:22.80,signDate:"2026-03-15",term:"2026-03-15~2026-09-30",status:"部分执行"},
      {orderNo:"PJ-ORD-006",project:"宁夏盐池项目公司",contractNo:"PJ-HT-2026-006",contractName:"远景能源变流柜采购合同",supplier:"远景能源",progress:"55%",totalAmount:210.00,executedAmount:115.50,remainingAmount:94.50,signDate:"2026-02-28",term:"2026-02-28~2026-11-30",status:"部分执行"},
    ];

    function renderStatusTag(status){
      var cls = "pcreport-tag pcreport-tag-pending";
      if(status==="已执行") cls="pcreport-tag pcreport-tag-pass";
      else if(status==="部分执行") cls="pcreport-tag pcreport-tag-partial";
      else if(status==="未执行") cls="pcreport-tag pcreport-tag-pending";
      return '<span class="'+cls+'">'+status+'</span>';
    }

    function renderRows(rows){
      var tbody = document.getElementById("pcreportBody");
      tbody.innerHTML = rows.map(function(r){
        return "<tr>"
          +"<td>"+r.contractNo+"</td>"
          +"<td>"+r.project+"</td>"
          +"<td>"+r.contractName+"</td>"
          +"<td>"+r.supplier+"</td>"
          +"<td>"+r.totalAmount.toFixed(2)+"</td>"
          +"<td>"+r.executedAmount.toFixed(2)+"</td>"
          +"<td>"+r.remainingAmount.toFixed(2)+"</td>"
          +"<td>"+r.progress+"</td>"
          +"<td>"+r.signDate+"</td>"
          +"<td>"+r.term+"</td>"
          +"<td>"+renderStatusTag(r.status)+"</td>"
        +"</tr>";
      }).join("");
    }

    function calcStats(rows){
      var total=rows.length, doneSum=0, leftSum=0;
      var statusMap={}, supplierMap={}, deptMap={};
      rows.forEach(function(r){
        doneSum+=Number(r.executedAmount)||0;
        leftSum+=Number(r.remainingAmount)||0;
        statusMap[r.status]=(statusMap[r.status]||0)+1;
        supplierMap[r.supplier]=(supplierMap[r.supplier]||0)+1;
        if(!deptMap[r.project]) deptMap[r.project]={done:0,left:0};
        deptMap[r.project].done+=Number(r.executedAmount)||0;
        deptMap[r.project].left+=Number(r.remainingAmount)||0;
      });
      return {
        total:total,doneSum:doneSum,leftSum:leftSum,
        doneRate:(doneSum+leftSum)?((doneSum/(doneSum+leftSum))*100).toFixed(1):"0.0",
        statusMap:statusMap,supplierMap:supplierMap,deptMap:deptMap
      };
    }

    function buildPie(map,elPie,elLegend,colors){
      var keys=Object.keys(map);
      var total=keys.reduce(function(s,k){return s+map[k];},0)||1;
      var start=0,segs=[],legend=[];
      keys.forEach(function(k,idx){
        var val=map[k],pct=(val/total)*100,end=start+pct,color=colors[idx%colors.length];
        segs.push(color+" "+start.toFixed(2)+"% "+end.toFixed(2)+"%");
        legend.push('<div><i class="pcreport-dot" style="background:'+color+'"></i>'+k+'：'+val+'（'+pct.toFixed(1)+'%）</div>');
        start=end;
      });
      document.getElementById(elPie).style.background="conic-gradient("+segs.join(",")+")";
      document.getElementById(elLegend).innerHTML=legend.join("");
    }

    function renderAnalytics(rows){
      var s=calcStats(rows);
      document.getElementById("pcreportKpiRow").innerHTML=[
        {k:"合同条数",v:s.total},
        {k:"已执行金额（万元）",v:s.doneSum.toFixed(2)},
        {k:"剩余金额（万元）",v:s.leftSum.toFixed(2)},
        {k:"整体执行率",v:s.doneRate+"%"}
      ].map(function(x){ return '<div class="pcreport-kpi"><div class="pcreport-kpi-label">'+x.k+'</div><div class="pcreport-kpi-val">'+x.v+'</div></div>'; }).join("");

      var deptKeys=Object.keys(s.deptMap);
      var maxVal=Math.max.apply(null,deptKeys.map(function(k){return s.deptMap[k].done+s.deptMap[k].left;}))||1;
      document.getElementById("pcreportDeptBars").innerHTML=deptKeys.map(function(k){
        var d=s.deptMap[k];
        var tot=d.done+d.left;
        var doneH=tot?Math.round((d.done/tot)*120):0;
        var leftH=tot?Math.round((d.left/tot)*120):0;
        return '<div class="pcreport-bar-col">'+
          '<div class="pcreport-bar-stack">'+
            (doneH?'<div class="pcreport-bar-done" style="height:'+doneH+'px"></div>':'')+
            (leftH?'<div class="pcreport-bar-left" style="height:'+leftH+'px"></div>':'')+
          '</div>'+
          '<div class="pcreport-bar-lab">'+k.replace('项目公司','').slice(0,4)+'</div>'+
        '</div>';
      }).join("");

      buildPie(s.statusMap,"pcreportInbPie","pcreportInbLegend",["#52c41a","#faad14","#1890ff","#722ed1"]);
      buildPie(s.supplierMap,"pcreportAccPie","pcreportAccLegend",["#1677ff","#52c41a","#faad14","#722ed1","#cf1322"]);
    }

    function filterRows(){
      var year=document.getElementById("pcreportYear").value;
      var status=document.getElementById("pcreportStatus").value;
      var kw=document.getElementById("pcreportKeyword").value.trim().toLowerCase();
      return reportRows.filter(function(r){
        if(year && !r.signDate.startsWith(year)) return false;
        if(status && r.status!==status) return false;
        if(kw && r.contractName.toLowerCase().indexOf(kw)<0 && r.supplier.toLowerCase().indexOf(kw)<0) return false;
        return true;
      });
    }

    document.querySelectorAll("[data-tab]").forEach(function(btn){
      btn.addEventListener("click",function(){
        var key=btn.dataset.tab;
        document.querySelectorAll("[data-tab]").forEach(function(b){b.classList.toggle("is-active",b===btn);});
        document.querySelectorAll("[data-pane]").forEach(function(p){p.classList.toggle("is-active",p.dataset.pane===key);});
      });
    });

    renderRows(reportRows);
    renderAnalytics(reportRows);

    document.getElementById("pcreportBtnQuery").addEventListener("click",function(){
      renderRows(filterRows());
    });
    document.getElementById("pcreportBtnReset").addEventListener("click",function(){
      document.getElementById("pcreportYear").value="";
      document.getElementById("pcreportStatus").value="";
      document.getElementById("pcreportKeyword").value="";
      renderRows(reportRows);
    });
    document.getElementById("pcreportBtnExport").addEventListener("click",function(){alert("演示：导出报表");});
  })();
  </script>
</body>
</html>
