<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>物资领用</title>
  <link rel="stylesheet" href="css/subpage-base.css" />
  <link rel="stylesheet" href="css/source-navbar-header.css" />
  <style>
    :root{
      --primary:#2d6a4f;
      --secondary:#40916c;
      --accent:#f4a261;
      --danger:#e76f51;
      --bg:#f8f9fa;
      --card:#ffffff;
      --border:#e9ecef;
      --text:#1f2937;
      --muted:#6b7280;
    }
    body{background:var(--bg)}
    .page-wrap{padding:12px 16px 20px}
    .panel{
      background:var(--card);border:1px solid var(--border);border-radius:12px;
      box-shadow:0 8px 24px rgba(45,106,79,.08);
    }
    .panel-head{padding:14px 16px;border-bottom:1px solid var(--border)}
    .panel-head h2{margin:0;color:var(--primary);font-size:20px}
    .tabs{display:flex;gap:8px;padding:10px 16px;border-bottom:1px solid var(--border)}
    .tab-btn{
      border:1px solid #d7e4dd;background:#fff;color:var(--primary);
      border-radius:999px;padding:6px 14px;font-size:12px;cursor:pointer;
      transition:all .2s ease;
    }
    .tab-btn:hover{background:#eef7f2;border-color:var(--secondary);transform:translateY(-1px)}
    .tab-btn.is-active{background:var(--primary);border-color:var(--primary);color:#fff}
    .filters{
      display:flex;flex-wrap:wrap;gap:10px;align-items:flex-end;
      padding:12px 16px;border-bottom:1px solid var(--border);
    }
    .field{display:flex;flex-direction:column;gap:4px}
    .field label{font-size:12px;color:var(--muted)}
    .field input,.field select{
      height:32px;border:1px solid var(--border);border-radius:8px;padding:0 10px;min-width:150px;
      transition:border-color .2s ease, box-shadow .2s ease;
    }
    .field input:focus,.field select:focus{
      outline:none;border-color:var(--secondary);box-shadow:0 0 0 3px rgba(64,145,108,.16);
    }
    .btn{
      height:32px;padding:0 12px;border-radius:8px;border:1px solid var(--border);
      background:#fff;color:var(--text);font-size:12px;cursor:pointer;transition:all .2s ease;
    }
    .btn:hover{transform:translateY(-1px);box-shadow:0 6px 14px rgba(31,41,55,.12)}
    .btn.primary{background:var(--primary);border-color:var(--primary);color:#fff}
    .btn.primary:hover{background:#245a43}
    .btn.secondary{background:var(--secondary);border-color:var(--secondary);color:#fff}
    .btn.secondary:hover{background:#337a5b}
    .cards{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;padding:12px 16px}
    .stat{
      background:#fff;border:1px solid var(--border);border-radius:10px;padding:10px 12px;
      box-shadow:0 4px 12px rgba(0,0,0,.04);
    }
    .stat .k{font-size:12px;color:var(--muted)}
    .stat .v{margin-top:6px;font-size:22px;font-weight:700;color:var(--primary)}
    .table-wrap{overflow-x:hidden;padding:0 16px 10px}
    table{width:100%;min-width:0;border-collapse:collapse;font-size:12px;background:#fff;table-layout:fixed}
    th,td{border:1px solid var(--border);padding:8px 6px;text-align:center;white-space:normal;word-break:break-word;line-height:1.35}
    th:last-child,td:last-child,.ops{white-space:nowrap}
    th{background:#f3f7f5;color:#334155;cursor:pointer;user-select:none}
    th:hover{background:#eaf3ef}
    tr:hover td{background:#fbfcfc}
    .tag{display:inline-block;padding:2px 8px;border-radius:999px;font-size:12px;border:1px solid transparent}
    .tag.green{background:#e9f8ef;border-color:#b4e4c4;color:#1b7a46}
    .tag.blue{background:#ecf4ff;border-color:#c6dcff;color:#2559b2}
    .tag.orange{background:#fff5ea;border-color:#ffd8ae;color:#b56f1f}
    .tag.red{background:#fff0ed;border-color:#ffc8bd;color:#c75239}
    .warn{color:var(--danger);font-weight:700}
    .ops{display:flex;justify-content:center;gap:12px;align-items:center}
    .op-btn{
      min-width:auto;height:auto;line-height:1.2;border:none;border-radius:0;
      background:transparent;color:#1677ff;cursor:pointer;font-size:14px;font-weight:600;padding:0;
    }
    .op-btn:hover{color:#4096ff;text-decoration:underline;background:transparent;transform:none}
    .pager{
      display:flex;justify-content:space-between;align-items:center;padding:8px 16px 14px;color:var(--muted);font-size:12px
    }
    .pager-right{display:flex;gap:6px;align-items:center}
    .page-btn{
      min-width:28px;height:28px;border:1px solid var(--border);border-radius:6px;background:#fff;cursor:pointer;font-size:12px
    }
    .page-btn:hover{border-color:var(--secondary);color:var(--primary)}
    .page-btn.is-active{background:var(--primary);border-color:var(--primary);color:#fff}

    .modal-mask{
      position:fixed;inset:0;background:rgba(0,0,0,.36);display:none;align-items:center;justify-content:center;z-index:3000
    }
    .modal-mask.show{display:flex}
    .modal{
      width:min(980px,96vw);max-height:90vh;overflow:auto;background:#fff;border-radius:12px;border:1px solid var(--border);
      box-shadow:0 16px 40px rgba(0,0,0,.18);
    }
    .modal-hd{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;border-bottom:1px solid var(--border);font-weight:700;color:#1f2937}
    .modal-bd{padding:12px 14px;font-size:13px;color:#374151}
    .modal-ft{padding:10px 14px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px}
    .x-btn{border:none;background:transparent;cursor:pointer;font-size:18px;color:#6b7280}
    .x-btn:hover{color:#111827}
    .detail-body{display:block}
    .detail-grid{display:grid;grid-template-columns:110px 1fr 110px 1fr;gap:8px 12px}
    .detail-grid .k{color:#64748b}
    .detail-grid .v{color:#111827}
    .name-link{color:#000;font-weight:400;cursor:pointer}
    .name-link:hover{text-decoration:underline}
    .stage-wrap{margin-top:12px;border:1px solid #edf1f6;border-radius:12px;padding:12px;background:#f8fafc}
    .stage-line{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
    .stage-item{flex:1;text-align:center;position:relative}
    .stage-dot{
      width:34px;height:34px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;
      border:1px solid #d8e2ef;background:#eef2f8;color:#64748b;font-weight:700
    }
    .stage-item.done .stage-dot,.stage-item.active .stage-dot{background:#10b981;color:#fff;border-color:#10b981}
    .stage-item.active .stage-dot{background:#2563eb;border-color:#2563eb}
    .stage-label{display:block;margin-top:6px;font-size:12px;color:#334155}
    .stage-item:not(:last-child)::after{
      content:"";position:absolute;top:16px;left:calc(50% + 24px);right:calc(-50% + 10px);height:2px;background:#d8e2ef
    }
    .stage-item.done:not(:last-child)::after{background:#10b981}
    .record-list{margin-top:12px;display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}
    .record-card{
      border:1px solid #e9edf4;border-radius:10px;padding:10px 12px;background:#fff;
      writing-mode:horizontal-tb;text-orientation:mixed;word-break:break-word;
    }
    .record-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
    .record-title{font-weight:700;color:#0f172a}
    .record-link{color:#2563eb;text-decoration:none;font-size:12px;writing-mode:horizontal-tb}
    .record-link:hover{text-decoration:underline}
    .record-desc{font-size:12px;color:#475569;line-height:1.5}
    #stageNarrativeBox{word-break:break-word;font-size:13px;line-height:1.65}
    .stage-prose{margin:0 0 12px;color:#1f2937;font-size:13px;line-height:1.85;text-align:justify}
    .stage-prose:last-child{margin-bottom:0}
    .stage-prose strong{color:#0f172a;font-weight:600}
    @media (max-width:1000px){
      .detail-grid{grid-template-columns:110px 1fr}
      .record-list{grid-template-columns:1fr}
    }
    @media (max-width:1100px){.cards{grid-template-columns:repeat(2,minmax(0,1fr));}}

    /* 新增领用 · 选择物资弹窗（左树右表） */
    .pl-req-picker-mask{

    }

    .pl-req-picker-hd{

    .pl-req-picker-toggle{

    }
    .pl-req-picker-toggle.is-leaf{visibility:hidden}
    .pl-req-picker-label{flex:1;min-width:0}
    .pl-req-picker-count{color:#8b9ab0;font-size:12px;font-weight:400;margin-left:2px}
    .pl-req-picker-node-row.is-active .pl-req-picker-count{color:#5b8fd9}

    .pl-req-picker-children.is-open{display:block}
    .pl-req-picker-main{flex:1;min-width:0;display:flex;flex-direction:column;min-height:0}
    .pl-req-picker-toolbar{

    }
    .pl-req-picker-search{
      width:220px;height:32px;border:1px solid #d9d9d9;border-radius:4px;padding:0 10px;font-size:13px;
    }
    .pl-req-picker-table-wrap{flex:1;min-height:0;overflow-x:hidden;overflow-y:auto;padding:0 12px}
    .pl-req-picker-table{
      width:100% !important;min-width:0 !important;border-collapse:collapse;font-size:11px;
      table-layout:fixed !important;
    }
    .pl-req-picker-table th,.pl-req-picker-table td{
      border:1px solid #e8eef5;padding:6px 4px;white-space:normal;word-break:break-word;text-align:left;
      overflow:hidden;line-height:1.35;vertical-align:middle;
    }
    .pl-req-picker-table th:first-child,.pl-req-picker-table td:first-child{
      width:36px;min-width:36px;max-width:36px;text-align:center;white-space:nowrap;padding:6px 2px;
    }
    .pl-req-picker-table th{background:#e8f4fc;color:#334155;font-weight:600}
    .pl-req-picker-table tbody td{color:#000}
    .pl-req-picker-table tbody tr:hover td{background:#f8fbff}
    .pl-req-picker-table tbody tr.is-checked td{background:#f0f7ff}
    .pl-req-picker-table thead th:last-child,
    .pl-req-picker-table tbody td:last-child{
      text-align:center !important;
      padding:6px 2px !important;
      width:52px;
      min-width:52px;
      max-width:52px;
      box-sizing:border-box;
      vertical-align:middle;
    }
    #detailBody table {
      table-layout: auto;
    }
    #detailBody table thead th:last-child,
    #detailBody table tbody td:last-child {
      text-align: center !important;
      padding: 8px !important;
      width: 170px;
      min-width: 170px;
      max-width: none;
      box-sizing: border-box;
      vertical-align: middle;
      overflow: visible;
    }
    #detailBody table tbody td:last-child,
    .pl-req-picker-table tbody td:last-child {
      text-align: center;
    }
    #detailBody table tbody td:last-child .req-op-wrap,
    .pl-req-picker-table tbody td:last-child .req-op-wrap {
      display: inline-flex;
      gap: 10px;
      align-items: center;
      justify-content: center;
      white-space: nowrap;
      min-width: 140px;
    }
    #detailBody table tbody td:last-child .req-op-wrap a {
      display: inline-flex;
      color: #1677ff !important;
      text-decoration: none !important;
      font-weight: 600;
      white-space: nowrap;
      min-width: auto;
    }
    #actionBody table tbody td:last-child .req-op-wrap a {
      display: inline-flex !important;
      visibility: visible !important;
      color: #1677ff !important;
      text-decoration: none !important;
      font-weight: 600;
      white-space: nowrap;
    }
    .pl-req-picker-ft{
      display:flex;align-items:center;justify-content:space-between;padding:8px 12px;border-top:1px solid #e8eef5;background:#fafbfc;font-size:12px;color:#64748b;
    }
    .pl-req-picker-pager{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
    .pl-req-picker-pager button{
      min-width:28px;height:28px;border:1px solid #d9d9d9;border-radius:4px;background:#fff;cursor:pointer;font-size:12px;color:#334155;
    }
    .pl-req-picker-pager button:disabled{opacity:.45;cursor:not-allowed}
    .pl-req-picker-actions{display:flex;gap:8px;padding:10px 14px;border-top:1px solid #e8eef5;justify-content:flex-end}
    .req-pick-summary{font-size:12px;color:#64748b;margin-top:4px}
    #btnReqPickMaterial{min-width:120px}
  </style>
</head>

  <script>
(function(){
      var PAGE_SIZE = 10;
      var MCS = window.MaterialCodeScheme;
      function esc(v){ return String(v == null ? "" : v).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;"); }
      function q(v){ return encodeURIComponent(String(v == null ? "" : v)); }
      function demoInstanceCode(category, name, seq, padLen){
        if (!MCS) return "A0100100001";
        return MCS.materialTypeCode(category, name);
      }
      function demoMaterialCode(category, name, seq, padLen){
        if (!MCS) return "B" + String(seq).padStart(8, "0");
        var tc = MCS.materialTypeCode(category, name);
        return MCS.materialInstanceCode(tc, seq, padLen == null ? 3 : padLen);
      }
      function normalizeCategoryCode(v){
        return MCS ? MCS.parseTypeCode(v) : String(v == null ? "" : v);
      }
      function normalizeMaterialCode(v){
        return MCS ? MCS.parseInstanceCode(v, 3) : String(v == null ? "" : v);
      }
      function normalizeMaterialCode4(v){
        return MCS ? MCS.parseInstanceCode(v, 4) : String(v == null ? "" : v);
      }
      function ledgerHashSeed(s) {
        var h = 0;
        var str = String(s || "");
        for (var i = 0; i < str.length; i++) {
          h = ((h << 5) - h + str.charCodeAt(i)) | 0;
        }
        return Math.abs(h);

      function closeReqMaterialPicker() {
        var mask = document.getElementById("reqMatPickerMask");
        if (mask) {
          mask.classList.remove("show");
          mask.setAttribute("aria-hidden", "true");
        }
        reqMatPickerState.onDone = null;
        reqMatPickerState.variant = "req";
      }

      function bindReqMatPickerEventsOnce() {
        if (bindReqMatPickerEventsOnce._done) return;
        bindReqMatPickerEventsOnce._done = true;
        var mask = document.getElementById("reqMatPickerMask");
        if (!mask) return;

        function setPending(code, row, on) {
          if (!code) return;
          if (on) reqMatPickerState.pendingSelected[code] = row;
          else delete reqMatPickerState.pendingSelected[code];
        }
        function reqPickerFindRowByCode(code) {
          var i;
          for (i = 0; i < reqMatPickerState.catalog.length; i++) {
            var r = reqMatPickerState.catalog[i];
            var rid = reqPickerDetailRowId(r);
            if (rid === code) return r;
          }
          return null;
        }

        mask.addEventListener("click", function (e) {
          if (e.target === mask) {
            closeReqMaterialPicker();
            return;
          }
          var treeToggle = e.target.closest ? e.target.closest("[data-tree-toggle]") : null;
          if (treeToggle) {
            e.preventDefault();
            e.stopPropagation();
            var tid = String(treeToggle.getAttribute("data-tree-toggle") || "");
            var tnode = reqPickerTreeFindNode(REQ_PICKER_TREE_DATA, tid);
            if (tnode && tnode.children && tnode.children.length) {
              tnode.open = !tnode.open;
              renderReqMatPickerTree();
            }
            return;
          }
          var treeRow = e.target.closest ? e.target.closest(".pl-req-picker-node-row") : null;
          if (treeRow) {
            var nodeId = String(treeRow.getAttribute("data-tree-id") || "");
            if (nodeId) {
              reqPickerSelectTreeNode(nodeId);
              updateReqMatPickerTreeActive();
              renderReqMatPickerTable();
            }
            return;
          }
          if (e.target.id === "reqMatPickerClose" || e.target.id === "reqMatPickerCancel") {
            closeReqMaterialPicker();
            return;
          }
          if (e.target.id === "reqMatPickerOk") {
            var picked = [];
            var pend = reqMatPickerState.pendingSelected || {};
            Object.keys(pend).forEach(function (k) {
              if (pend[k]) picked.push(pend[k]);
            });
            var done = reqMatPickerState.onDone;
            closeReqMaterialPicker();
            if (typeof done === "function") done(picked);
            return;
          }
          if (e.target.id === "reqMatPickerFirst") {
            reqMatPickerState.page = 1;
            renderReqMatPickerTable();
            return;
          }
          if (e.target.id === "reqMatPickerPrev") {
            reqMatPickerState.page = Math.max(1, reqMatPickerState.page - 1);
            renderReqMatPickerTable();
            return;
          }
          if (e.target.id === "reqMatPickerNext") {
            reqMatPickerState.page += 1;
            renderReqMatPickerTable();
            return;
          }
          if (e.target.id === "reqMatPickerLast") {
            reqMatPickerState.page = 99999;
            renderReqMatPickerTable();
            return;
          }
          if (e.target.id === "reqMatPickerGo") {
            var inp = document.getElementById("reqMatPickerPageInp");
            reqMatPickerState.page = Math.max(1, Number(inp && inp.value) || 1);
            renderReqMatPickerTable();
            return;
          }
          var chk = e.target.closest ? e.target.closest(".req-mat-pick-chk") : null;
          if (chk) {
            var code = String(chk.getAttribute("data-code") || "");
            var row = reqPickerFindRowByCode(code);
            setPending(code, row, chk.checked);
            var tr = chk.closest ? chk.closest("tr") : null;
            if (tr) tr.classList.toggle("is-checked", chk.checked);
            var chkAll = document.getElementById("reqMatPickerChkAll");
            if (chkAll) {
              var pageChks = Array.prototype.slice.call(document.querySelectorAll(".req-mat-pick-chk"));
              chkAll.checked = pageChks.length > 0 && pageChks.every(function (x) {
                return x.checked;
              });
              chkAll.indeterminate =
                !chkAll.checked && pageChks.some(function (x) {
                  return x.checked;
                });
            }
            return;
          }
          if (e.target.id === "reqMatPickerChkAll") {
            var on = !!e.target.checked;
            Array.prototype.forEach.call(document.querySelectorAll(".req-mat-pick-chk"), function (chkEl) {
              chkEl.checked = on;
              var code = String(chkEl.getAttribute("data-code") || "");
              var row = reqPickerFindRowByCode(code);
              setPending(code, row, on);
              var tr = chkEl.closest ? chkEl.closest("tr") : null;
              if (tr) tr.classList.toggle("is-checked", on);
            });
          }
        });

        var searchEl = document.getElementById("reqMatPickerSearch");
        if (searchEl) {
          searchEl.addEventListener("input", function () {
            reqMatPickerState.search = String(searchEl.value || "");
            reqMatPickerState.page = 1;
            renderReqMatPickerTable();
          });
        }
        var sizeEl = document.getElementById("reqMatPickerPageSize");
        if (sizeEl) {
          sizeEl.addEventListener("change", function () {
            reqMatPickerState.pageSize = Math.max(1, Number(sizeEl.value) || 20);
            reqMatPickerState.page = 1;
            renderReqMatPickerTable();
          });
        }
      }

            var k=s[0],v=String(fs[k]||"").trim();
        if(!v) return true;
            return String(r[k]==null?"":r[k]).indexOf(v)>=0;
      });
    });
        if(st.key){
          rows = rows.slice().sort(function(a,b){
            var av = a[st.key], bv = b[st.key];

          });
        }
        return rows;
      }

      function loadInvoiceUpdates(){
        try { return JSON.parse(localStorage.getItem("map_invoice_updates_v1") || "[]"); } catch(e) { return []; }
      }
      function applyInvoiceUpdates(rows){
        var list = loadInvoiceUpdates();
        if(!list.length) return;
        rows.forEach(function(r){
          var rCode = String(r.code || r.assetNo || "");
          for (var i=0;i<list.length;i++){
            var x = list[i];
            var hitByCode = String(x.materialCode || "") && rCode && String(x.materialCode) === rCode;
            var hitByContract = String(x.contractNo || "") && String(r.contractNo || "") === String(x.contractNo || "");
            var hitByName = String(x.materialName || "") && String(r.name || "") === String(x.materialName || "");
            if (hitByCode || hitByContract || hitByName){
              r.invoiceStatus = x.invoiceStatus || r.invoiceStatus || "未开票";
              r.invoiceTime = x.invoiceStatus === "已开票" ? (x.invoiceTime || r.invoiceTime || "") : "";
              if (x.shipStatus) r.shipStatus = x.shipStatus;
              break;
            }
          }
        });
      }
      function persistInvoiceForRow(row){
        if(!row) return;
        var key = "map_invoice_updates_v1";
        var list = loadInvoiceUpdates();
        var item = {
          materialCode: row.code || row.assetNo || "",
          contractNo: row.contractNo || "",
          materialName: row.name || "",
          spec: row.spec || "",
          invoiceStatus: row.invoiceStatus || "未开票",
          invoiceTime: row.invoiceStatus === "已开票" ? (row.invoiceTime || "") : "",
          shipStatus: row.shipStatus || "",
          shipTime: row.inDate || "",
          customerName: row.dept || "",
          reason: row.invoiceStatus === "已开票" ? "财务确认已开票" : "发货后待财务开票确认"
        };
        var hit = false;
        list = list.map(function(x){
          var sameCode = item.materialCode && String(x.materialCode || "") === String(item.materialCode);
          var sameLegacy = (x.contractNo && x.contractNo === item.contractNo) || (x.materialName && x.materialName === item.materialName);
          if (sameCode || sameLegacy) {
            hit = true;
            return item;
          }
          return x;
        });
        if(!hit) list.push(item);

          var flowHead = '<div class="detail-grid">' + buildDetailGridByColumns(row, flowCols) + '</div>';
          var flowCount = Math.max(0, Number(row.qty) || 0);
          var flowDetailLines =
            row.detailLines && row.detailLines.length
              ? row.detailLines
              : (function () {
                  var ledgerRows = (tabs.ledger && tabs.ledger.rows) || [];
                  var matched = null;
                  var mc = String(row.materialCode || "").trim();
                  if (mc) {
                    for (var fi = 0; fi < ledgerRows.length; fi++) {
                      var c = String(ledgerRows[fi].code || ledgerRows[fi].assetNo || "").trim();
                      if (c && c === mc) {
                        matched = ledgerRows[fi];
                        break;
                      }
                    }
                  }
                  if (!matched && row.materialName) {
                    for (var fj = 0; fj < ledgerRows.length; fj++) {
                      if (String(ledgerRows[fj].name || "") === String(row.materialName || "")) {
                        matched = ledgerRows[fj];
                        break;
                      }
                    }
                  }
                  var src = matched || {
                    name: row.materialName,
                    code: row.materialCode,
                    category: normalizeAssetCategory(row.assetType || row.category || row.materialName || ""),
                    dept: row.fromDept,
                    purchaseDept: row.fromDept,
                    keeper: row.keeper,
                    location: row.warehouse
                  };
                  return buildLedgerDetailRowsFromSummary(src, flowCount).slice(0, flowCount || 1);
                })();
          flowDetailLines = flowDetailLines.map(function (line) {
            var copy = {};
            for (var k in line) {
              if (Object.prototype.hasOwnProperty.call(line, k)) copy[k] = line[k];
            }
            return copy;
          });
          flowDetailLines.forEach(function (line) {
            line.userName = row.receiver || row.toKeeper || line.userName;
            line.warehouse = row.toWarehouse || line.warehouse || line.location;
            line.location = row.toWarehouse || line.location || line.warehouse;
          });
          var flowDetailTable = buildReqMatDetailBlockFromLines(flowDetailLines, "流转物资明细表", {
            showUserCol: true,

          document.getElementById("detailMask").classList.add("show");

        if (row && row.reqNo) {

          var ledgerRows = (tabs.ledger && tabs.ledger.rows) || [];
          var matched = null;
          var reqCode = String(row.code || "").trim();
          if (reqCode) {
            for (var i = 0; i < ledgerRows.length; i++) {
              var c = String(ledgerRows[i].code || ledgerRows[i].assetNo || "").trim();
              if (c && c === reqCode) { matched = ledgerRows[i]; break; }
            }
          }
          if (!matched) {
            for (var j = 0; j < ledgerRows.length; j++) {
              if (String(ledgerRows[j].name || "") === String(row.name || "")) { matched = ledgerRows[j]; break; }
            }
          }
          var baseCodeReq = String((matched && (matched.code || matched.assetNo)) || row.code || "");
          var baseNameReq = String((matched && matched.name) || row.name || "");
          var detailCountReq = Math.max(0, Number(row.receiveQty) || Number(row.qty) || 0);
          var fixedCodeReq =
            matched && matched.fixedCode != null && String(matched.fixedCode) !== ""
              ? String(matched.fixedCode)
              : "—";
          var sourceRow = {};
          if (matched) {
            for (var sk in matched) {
              if (Object.prototype.hasOwnProperty.call(matched, sk)) sourceRow[sk] = matched[sk];
            }
          }
          sourceRow.dept = (matched && matched.dept) || row.applyDept || sourceRow.dept || "";
          sourceRow.keeper = (matched && matched.keeper) || row.applicant || sourceRow.keeper || "";
          sourceRow.location = (matched && matched.location) || sourceRow.location || "";
          var listSource = matched || {
            code: baseCodeReq,
            name: baseNameReq,
            spec: row.spec || "",
            category: normalizeAssetCategory(row.assetType || row.category || row.materialType || row.name || ""),
            stockQty: row.stockQty,
            location: "",
            supplier: row.supplier || "",
            purchaseDept: row.purchaseDept || row.applyDept || "",
            unitPriceIncl: row.unitPriceIncl || "",
            invoiceStatus: row.invoiceStatus || ""
          };
          var detailLines =
            row.detailLines && row.detailLines.length
              ? row.detailLines
              : (function () {
                  var joinedNames = String(row.productNames || "").trim();
                  if (!joinedNames || joinedNames.indexOf(".") < 0) {
                    return buildLedgerDetailRowsFromSummary(listSource, detailCountReq).slice(0, detailCountReq);
                  }
                  var names = joinedNames
                    .split(".")
                    .map(function (x) { return String(x || "").trim(); })
                    .filter(Boolean);
                  if (!names.length) {
                    return buildLedgerDetailRowsFromSummary(listSource, detailCountReq).slice(0, detailCountReq);
                  }
                  var ledgerRows = (tabs.ledger && tabs.ledger.rows) || [];
                  var lines = [];
                  names.forEach(function (nm) {
                    var hit = null;
                    for (var ni = 0; ni < ledgerRows.length; ni++) {
                      if (String(ledgerRows[ni].name || "").trim() === nm) {
                        hit = ledgerRows[ni];
                        break;
                      }
                    }
                    var src = hit || {
                      code: row.code || "",
                      name: nm,
                      spec: row.spec || "",
                      category: normalizeAssetCategory(row.assetType || row.category || row.materialType || nm || ""),
                      stockQty: row.stockQty,
                      location: row.location || "",
                      supplier: row.supplier || "",
                      purchaseDept: row.purchaseDept || row.applyDept || "",
                      unitPriceIncl: row.unitPriceIncl || "",
                      invoiceStatus: row.invoiceStatus || ""
                    };
                    var one = buildLedgerDetailRowsFromSummary(src, 1).slice(0, 1);
                    if (one.length) lines.push(one[0]);
                  });
                  return lines.length ? lines : buildLedgerDetailRowsFromSummary(listSource, detailCountReq).slice(0, detailCountReq);
                })();
          detailLines = detailLines.map(function (line) {
            var copy = {};
            for (var k in line) {
              if (Object.prototype.hasOwnProperty.call(line, k)) copy[k] = line[k];
            }
            return copy;

          detailLines.forEach(function (line) {
            line.userName = row.applicant || sourceRow.keeper || line.userName;
            line.warehouse = line.warehouse || sourceRow.location || row.warehouse || "";
            line.location = line.location || line.warehouse || sourceRow.location || "";
          });
          body.innerHTML =
            '<div class="detail-grid" style="margin-top:0">' +
            buildReqLedgerSummaryGridHtml(sourceRow, row) +
            "</div>" +
            buildReqMatDetailBlockFromLines(detailLines, "领用物资明细表", {
              showUserCol: true,
              defaultUserName: row.applicant || sourceRow.keeper || "",
              detailAction: "track"
            });
          document.getElementById("detailTitle").textContent = "领用记录 - " + (row.reqNo || "");
          document.getElementById("detailMask").classList.add("show");
          return;
        }
        var ledgerCols = (tabs.ledger && tabs.ledger.columns) || [];
        var head = '<div class="detail-grid">' + buildDetailGridByColumns(row, ledgerCols) + '</div>';
        var baseCode = String(row.code || row.assetNo || "");

        var invoiceLedger = row && row.invoiceStatus != null && String(row.invoiceStatus) !== "" ? String(row.invoiceStatus) : "—";

        document.getElementById("detailMask").classList.add("show");
        restoreLedgerDetailOperationButtons();

                  '<textarea id="reqUserChangeReason" class="carrier-search" placeholder="请输入变更原因" style="width:100%;height:72px;border:1px solid #e9ecef;border-radius:8px;padding:8px 10px;box-sizing:border-box;font-family:inherit;font-size:13px;resize:vertical"></textarea>' +
                '</div>' +
                '<div class="modal-ft"><button type="button" class="btn secondary" data-close-user-change="1">取消</button><button type="button" class="btn primary" data-ok-user-change="1">确定</button></div>' +
              '</div>' +
            '</div>';
          document.body.insertAdjacentHTML("beforeend", maskHtml);
          var modalMask = document.getElementById("reqUserChangeModalMask");
          var userSearch = modalMask ? modalMask.querySelector(".req-user-search") : null;
          var userOptions = modalMask ? modalMask.querySelectorAll(".req-user-option") : [];
          function closeUserChangeModal() {
            var m = document.getElementById("reqUserChangeModalMask");
            if (m && m.parentNode) m.parentNode.removeChild(m);
          }
          if (userSearch) {
            userSearch.addEventListener("input", function () {
              var kw = String(userSearch.value || "").trim();
              Array.prototype.forEach.call(userOptions, function (label) {
                label.style.display = !kw || String(label.textContent || "").indexOf(kw) >= 0 ? "flex" : "none";
              });
            });
          }
          if (modalMask) {
            modalMask.addEventListener("click", function (ev) {
              if (ev.target === modalMask || (ev.target && ev.target.getAttribute("data-close-user-change") === "1")) closeUserChangeModal();
              if (ev.target && ev.target.getAttribute("data-ok-user-change") === "1") closeUserChangeModal();
            });
          }
          return;
        }
        if (e.target.classList && e.target.classList.contains("trf-track-link")) {
          e.preventDefault();
          var tn = e.target.getAttribute("data-track-name") || "";
          var tc = e.target.getAttribute("data-track-code") || "";
          var tbox = document.getElementById("trfTrackBox");
          if (tbox) {
            tbox.style.display = "";
            tbox.innerHTML =
              '<div style="font-weight:600;color:#1f3551;margin-bottom:8px">流转节点</div>'
              + '<div style="display:flex;gap:10px;align-items:flex-start;margin-bottom:8px"><span style="width:10px;height:10px;border-radius:999px;background:#2563eb;display:inline-block;margin-top:6px"></span><div><div style="color:#111827">2026.4.20 入库：' + esc(tn) + '（' + esc(tc) + '）</div><div style="color:#6b7280;font-size:12px;margin-top:2px">存放中心库，待内部流转</div></div></div>'
              + '<div style="display:flex;gap:10px;align-items:flex-start;margin-bottom:8px"><span style="width:10px;height:10px;border-radius:999px;background:#10b981;display:inline-block;margin-top:6px"></span><div><div style="color:#111827">2026.5.10 机械所发起内部流转</div><div style="color:#6b7280;font-size:12px;margin-top:2px">流转单：LZ-2026-0510（演示）</div></div></div>'
              + '<div style="display:flex;gap:10px;align-items:flex-start"><span style="width:10px;height:10px;border-radius:999px;background:#0ea5e9;display:inline-block;margin-top:6px"></span><div><div style="color:#111827">2026.5.11 电控所签收完成</div><div style="color:#6b7280;font-size:12px;margin-top:2px">状态：已完成内部流转</div></div></div>';
          }
          return;
        }
        if(e.target.id==="btnDeleteBatch"){
          alert("当前页面已移除多选列，请在操作列逐条删除。");
          return;
        }
        if(e.target.id==="detailProgressInline"){
          if (typeof window.openUnifiedProgressModal === "function" && window.openUnifiedProgressModal()) return;
          alert("流程进度（演示）");
          return;
        }
        if(e.target.id==="detailProgressTop"){
          if (typeof window.openUnifiedProgressModal === "function" && window.openUnifiedProgressModal()) return;
          alert("流程进度（演示）");
          return;
        }
        if(e.target.id==="reqProgressInline"){
          if (typeof window.openUnifiedProgressModal === "function" && window.openUnifiedProgressModal()) return;
          alert("流程进度（演示）");
          return;
        }
        if(e.target.id==="detailClose" || e.target.id==="detailX"){ closeDetail(); return; }
        if(e.target.id==="detailMask" && e.target===document.getElementById("detailMask")){ closeDetail(); return; }
        if(e.target.id==="actionCancel" || e.target.id==="actionX"){ closeActionModal(); return; }
        if(e.target.id==="actionProgress"){
          if (typeof window.openUnifiedProgressModal === "function" && window.openUnifiedProgressModal()) return;
          alert("流程进度（演示）");
          return;
        }
        if(e.target.id==="actionProgressTop"){
          if (typeof window.openUnifiedProgressModal === "function" && window.openUnifiedProgressModal()) return;
          alert("流程进度（演示）");
          return;
        }
        if(e.target.id==="actionMask" && e.target===document.getElementById("actionMask")){ closeActionModal(); return; }
        if(e.target.id==="actionOk"){
          if(!actionCtx.mode){ closeActionModal(); return; }
          if(actionCtx.mode==="requisition"){
            var sel = document.getElementById("reqMaterialSel");
            var codesRaw = sel ? String(sel.value || "").trim() : "";
            var codes = codesRaw ? codesRaw.split(",").filter(Boolean) : [];
            if(!codes.length){ alert("请选择物资"); return; }
            var actionBody = document.getElementById("actionBody");
            var detailLines = actionBody && typeof actionBody._reqSelectedDetailLines === "function"
              ? actionBody._reqSelectedDetailLines()
              : [];
            if(!detailLines.length){ alert("请选择物资"); return; }
            closeActionModal();
            alert("已提交领用申请（演示）：已选 " + detailLines.length + " 条领用物资明细");
            return;
          }
          if(actionCtx.mode==="transfer"){
            var detailLines = getTrfCheckedDetailLines();
            if (!detailLines.length) {
              alert("请选择物资");
              return;
            }
            var tFrom = document.getElementById("trfFromDept");
            var tTo = document.getElementById("trfToDept");
            var tReceiver = document.getElementById("trfReceiver");
            if (!tTo || !String(tTo.value || "").trim()) {
              alert("请选择转入部门");
              return;
            }
            if (tFrom && String(tFrom.value || "") === String(tTo.value || "")) {
              alert("转入部门不能与转出部门相同");
              return;
            }
            if (!tReceiver || !String(tReceiver.value || "").trim()) {
              alert("请输入接收人");
              return;
            }
            var firstLine = detailLines[0] || {};
            var flowNo = "LZ-2026-" + String(5000 + (tabs.flow.rows.length + 1)).padStart(4, "0");
            tabs.flow.rows.unshift({
              flowNo: flowNo,
              bizType: "内部流转",
              materialCode: firstLine.typeCode || firstLine.code || "",
              materialName: firstLine.typeName || firstLine.productName || firstLine.name || "",
              fromDept: tFrom ? tFrom.value : "机械所",
              toDept: tTo ? tTo.value : "",
              warehouse:
                (document.getElementById("trfFromWarehouse") &&
                  document.getElementById("trfFromWarehouse").value) ||
                firstLine.warehouse ||
                "",
              keeper:
                (document.getElementById("trfFromStoreKeeper") &&
                  document.getElementById("trfFromStoreKeeper").value) ||
                firstLine.handler ||
                "",
              toWarehouse:
                (document.getElementById("trfToWarehouse") &&
                  document.getElementById("trfToWarehouse").value) ||
                "",
              toKeeper:
                (document.getElementById("trfToStoreKeeper") &&
                  document.getElementById("trfToStoreKeeper").value) ||
                "",
              qty: detailLines.length,
              detailLines: detailLines.slice(),
              transferBy:
                (document.getElementById("trfFromKeeper") &&
                  document.getElementById("trfFromKeeper").value) ||
                "宋中波",
              receiver: tReceiver ? tReceiver.value : "",
              flowStatus: "审批中",
              applyTime: nowDate() + " 10:00",
              finishTime: "—",
              reason:
                (document.getElementById("trfReason") &&
                  document.getElementById("trfReason").value) ||
                "明细数量 " + detailLines.length + " 条"
            });
            closeActionModal();
            alert(
              "已提交内部流转（演示）：已选 " +
                detailLines.length +
                " 条明细；" +
                (tFrom ? tFrom.value : "机械所") +
                " → " +
                (tTo ? tTo.value : "电控所")
            );
            renderAll();
            return;
          }
          if(!actionCtx.row){ closeActionModal(); return; }
          if(actionCtx.mode==="edit"){
            if (actionCtx.row.reqNo) {
              actionCtx.row.name = document.getElementById("acName").value || actionCtx.row.name;
              actionCtx.row.reqDate = document.getElementById("acReqDate").value || actionCtx.row.reqDate;
              actionCtx.row.applicant = document.getElementById("acApplicant").value || actionCtx.row.applicant;
              actionCtx.row.applyDept = document.getElementById("acApplyDept").value || actionCtx.row.applyDept;
              actionCtx.row.status = document.getElementById("acStatus").value || actionCtx.row.status;
              actionCtx.row.remark = document.getElementById("acRemark").value || actionCtx.row.remark;
            } else {
              function val(id){ var el=document.getElementById(id); return el ? el.value : ""; }
              var acNameSel = document.getElementById("acNameSel");
              actionCtx.row.name = (acNameSel && acNameSel.value) ? acNameSel.value : actionCtx.row.name;
              actionCtx.row.spec = document.getElementById("acSpec").value || actionCtx.row.spec;
              actionCtx.row.dept = document.getElementById("acDept").value || actionCtx.row.dept;
              actionCtx.row.keeper = document.getElementById("acKeeper").value || actionCtx.row.keeper;
              actionCtx.row.loc = document.getElementById("acLoc").value || actionCtx.row.loc;
              actionCtx.row.location = document.getElementById("acLoc").value || actionCtx.row.location;
              actionCtx.row.contractNo = val("acContractNo") || actionCtx.row.contractNo;
              actionCtx.row.purchaseDept = val("acPurchaseDept") || actionCtx.row.purchaseDept;
              actionCtx.row.category = val("acCategory") || actionCtx.row.category;
              actionCtx.row.unitPriceExcl = val("acUnitPriceExcl") || actionCtx.row.unitPriceExcl;
              actionCtx.row.stockQty = val("acStockQty") || actionCtx.row.stockQty;
              actionCtx.row.fixedCode = val("acFixedCode") || actionCtx.row.fixedCode;
              actionCtx.row.supplier = val("acSupplier") || actionCtx.row.supplier;
              actionCtx.row.remark = document.getElementById("acRemark").value || actionCtx.row.remark;
            }
            closeActionModal();
            renderAll();
            return;
          }
          if(actionCtx.mode==="delete"){
            var listDel = tabs[state.current].rows;
            var kDel = rowPrimaryKey(actionCtx.row, state.current);
            tabs[state.current].rows = listDel.filter(function(x){ return rowPrimaryKey(x, state.current) !== String(kDel); });
            closeActionModal();
            renderAll();
            return;
          }
          closeActionModal();
          return;
        }

        var th = e.target.closest("[data-sort]");
        if(th){
          var key = th.getAttribute("data-sort"), st = state.sort[state.current];
          if(st.key===key){ st.dir = st.dir==="asc"?"desc":"asc"; }
          else { st.key = key; st.dir = "asc"; }
          renderAll();
          return;
        }
        var pageBtn = e.target.closest("[data-page]");
        if(pageBtn){
          state.page[state.current] = Number(pageBtn.getAttribute("data-page")) || 1;
          renderAll();
          return;
        }
        var op = e.target.getAttribute("data-op");
        if(op){
          var row = findRowByKey(e.target.getAttribute("data-key") || "");
          if(!row) return;
          if(op==="detail" || op==="name-detail"){ openDetail(row); return; }
          if(op==="edit"){ openActionModal("edit", row); return; }
          if(op==="delete"){
            openActionModal("delete", row);
            return;
          }
          window.location.href = jump(op,row);
        }
      });

      bindReqMatPickerEventsOnce();
      (function bindLedgerDetailRestoreOnce() {
        var detailBody = document.getElementById("detailBody");
        if (!detailBody || detailBody.__ledgerDetailRestoreBound) return;
        detailBody.__ledgerDetailRestoreBound = true;
        var pending = false;
        new MutationObserver(function () {
          if (pending) return;
          pending = true;
          setTimeout(function () {
            pending = false;
            restoreLedgerDetailOperationButtons();
          }, 0);
        }).observe(detailBody, { childList: true, subtree: true });
      })();
      renderAll();
})();
  </script>
</body>
</html>
