<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>项目公司入库/库存管理</title>
  <link rel="stylesheet" href="css/subpage-base.css" />
  <link rel="stylesheet" href="css/source-navbar-header.css" />
  <link rel="stylesheet" href="css/vendor/fa-all.min.css" />
  <link rel="stylesheet" href="css/warehouse-modal.css?v=20260618-detail-input-v3" />
  <style>
    body.page-subpage { background:#f5f7fb; }
    .main-scroll { padding:14px; }
    .carrier-card { border-radius:12px; box-shadow:0 8px 26px rgba(15,35,95,.06); border:1px solid #e8edf5; overflow:hidden; }
    .carrier-head { padding:14px 16px; border-bottom:1px solid #edf2f8; background:#fff; }
    .carrier-title { margin:0; font-size:24px; color:#1f2d3d; font-weight:700; }
    .carrier-toolbar { display:flex; justify-content:space-between; gap:12px; flex-wrap:wrap; padding:12px 16px; background:#fff; border-bottom:1px solid #edf2f8; }
    .toolbar-left,.toolbar-right { display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
    .carrier-search,.carrier-select { height:34px; border:1px solid #d9e2ef; border-radius:8px; padding:0 10px; min-width:180px; font-size:13px; background:#fff; }
    .carrier-btn-add { height:34px; min-width:84px; border-radius:8px; border:1px solid #bcd7ff; background:#fff; color:#1677ff; padding:0 12px; font-size:14px; font-weight:600; cursor:pointer; }
    #btnAdd { background:#1677ff; border-color:#1677ff; color:#fff; }
    #btnImport { border-color:#95de64; color:#389e0d; }
    #btnDeleteBatch { border-color:#ffccc7; color:#cf1322; background:#fff5f5; }
    .metrics { display:grid; grid-template-columns:repeat(4,minmax(0,1fr)); gap:10px; padding:12px 16px; background:#fff; border-bottom:1px solid #edf2f8; }
    .metric { border:1px solid #edf2f8; border-radius:10px; padding:10px 12px; background:#fafcff; }
    .metric .k { font-size:12px; color:#64748b; margin-bottom:4px; }
    .metric .v { font-size:30px; color:#1f7a55; font-weight:700; line-height:1; }
    .carrier-table-wrap { background:#fff; padding:0 8px 10px; }
    .carrier-table { width:100%; border-collapse:collapse; min-width:1120px; }
    .carrier-table th,.carrier-table td { border:1px solid #edf2f7; padding:8px 6px; font-size:13px; text-align:center; white-space:nowrap; }
    .carrier-table th { background:#f8fbff; color:#334155; font-weight:700; }
    .status-pill { display:inline-flex; align-items:center; justify-content:center; min-width:74px; height:28px; border-radius:999px; border:1px solid #d9d9d9; font-size:12px; font-weight:700; padding:0 10px; box-sizing:border-box; }
    .status-draft { color:#262626; border-color:#d9d9d9; background:#fff; }
    .status-pending { color:#d48806; border-color:#f3d7a1; background:#fff8e6; }
    .status-pass { color:#1677ff; border-color:#91caff; background:#e6f4ff; }
    .map-op-cell a { color:#1677ff; text-decoration:none; font-weight:600; margin-right:14px; }
    .map-op-cell a:last-child { margin-right:0; }
    .map-op-cell a:hover { color:#4096ff; }
    .modal-hd {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 14px;
      border-bottom: 1px solid #e8edf5;
      font-weight: 700;
      color: #1f2d3d;
    }
    .x-btn {
      width: 22px;
      height: 22px;
      border: 1px solid #d9d9d9;
      border-radius: 4px;
      background: #fff;
      color: #555;
      cursor: pointer;
      font-size: 16px;
      line-height: 1;
    }
    #inboundMask {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.45);
      z-index: 2600;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 16px;
      box-sizing: border-box;
    }
    #inboundMask.show { display: flex; }
    #inboundMask .modal {
      width: min(980px, 94vw);
      max-height: 88vh;
      background: #fff;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 16px 48px rgba(0, 0, 0, 0.2);
      display: flex;
      flex-direction: column;
    }
    #inboundMask .modal-hd {
      padding: 12px 16px;
      border-bottom: 1px solid #edf2f8;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-weight: 600;
      color: #1f3551;
    }
    #inboundMask .modal-bd {
      padding: 14px 16px;
      overflow: auto;
      max-height: calc(88vh - 104px);
      font-size: 13px;
      line-height: 1.6;
    }
    #inboundMask .modal-ft {
      padding: 10px 16px;
      border-top: 1px solid #edf2f8;
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      flex-wrap: wrap;
    }
    #inboundMask .x-btn,
    #inboundMask .btn {
      height: 32px;
      min-width: 80px;
      border-radius: 6px;
      border: 1px solid #d9d9d9;
      background: #fff;
      color: #595959;
      cursor: pointer;
    }
    #inboundMask .btn.primary { background: #1677ff; color: #fff; border-color: #1677ff; }
    #inboundMask .btn.danger { background: #fff1f0; color: #cf1322; border-color: #ffccc7; }

    .page-tabs {
      display: flex;
      gap: 2px;
      border-bottom: 2px solid #edf2f8;
      background: #fff;
      padding: 0 16px;
    }
    .page-tab {
      padding: 10px 18px;
      font-size: 14px;
      font-weight: 600;
      color: #64748b;
      cursor: pointer;
      border: none;
      background: transparent;
      position: relative;
      transition: color 0.2s;
    }
    .page-tab:hover { color: #1677ff; }
    .page-tab.is-active { color: #1677ff; }
    .page-tab.is-active::after {
      content: "";
      position: absolute;
      bottom: -2px;
      left: 0;
      right: 0;
      height: 2px;
      background: #1677ff;
    }
    .tab-panel { display: none; }
    .tab-panel.is-active { display: block; }
  </style>
</head>
<body class="page-source-navbar page-subpage">
  <div class="app">
    <header class="header">
      <div class="header-left">
        <button class="header-hamburger"><svg viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h16"/></svg></button>
        <a class="header-logo" href="#"><img src="assets/logo-chenergy.png" width="220" height="40" alt="" /></a>
        <div class="header-source-brand"><p>新能源物资供应链管理系统</p></div>
      </div>
      <div class="header-right"><span id="clock"></span><div class="user-avatar">用</div></div>
    </header>
    <div class="layout">
      <aside class="sidebar"></aside>
      <main class="main-scroll">
        <div class="page-tabs">
          <button type="button" class="page-tab is-active" data-tab="inbound">入库</button>
          <button type="button" class="page-tab" data-tab="inventory">库存管理</button>
        </div>

        <!-- 入库 tab -->
        <div id="tabInbound" class="tab-panel is-active">
          <section class="carrier-card" style="margin-top:16px;">
            <div class="carrier-toolbar">
              <div class="toolbar-left">
                <button type="button" class="carrier-btn-add" id="btnAdd">新增</button>
                <button type="button" class="carrier-btn-add" id="btnImport">导入</button>
                <button type="button" class="carrier-btn-add" id="btnTpl">下载模板</button>
                <button type="button" class="carrier-btn-add" id="btnExport">导出</button>
                <button type="button" class="carrier-btn-add" id="btnDeleteBatch">删除</button>
              </div>
              <div class="toolbar-right">
                <input class="carrier-search" id="qNo" placeholder="请输入入库单号" />
                <input class="carrier-search" id="qSupplier" placeholder="请输入供应商" />
                <select class="carrier-select" id="qStatus">
                  <option value="">全部状态</option>
                  <option>草稿</option>
                  <option>待入库</option>
                  <option>待确认</option>
                  <option>已确认</option>
                </select>
                <button type="button" class="carrier-btn-add" id="btnSearch">搜索</button>
                <button type="button" class="carrier-btn-add" id="btnReset">重置</button>
              </div>
            </div>
            <div class="metrics">
              <div class="metric"><div class="k">入库总单数</div><div class="v" id="mTotal">0</div></div>
              <div class="metric"><div class="k">待入库</div><div class="v" id="mPending">0</div></div>
              <div class="metric"><div class="k">待确认</div><div class="v" id="mReview">0</div></div>
              <div class="metric"><div class="k">已确认</div><div class="v" id="mDone">0</div></div>
            </div>
            <div class="carrier-table-wrap">
              <table class="carrier-table">
                <thead>
                  <tr>
                    <th><input type="checkbox" id="chkAll" /></th>
                    <th>入库单号</th>
                    <th>采购订单号</th>
                    <th>供应商</th>
                    <th>到货日期</th>
                    <th>验收状态</th>
                    <th>入库状态</th>
                    <th>关联部门</th>
                    <th>操作</th>
                  </tr>
                </thead>
                <tbody id="tb"></tbody>
              </table>
            </div>
          </section>
        </div>

        <!-- 库存管理 tab（与 inventory-management.html 一致） -->
        <div id="tabInventory" class="tab-panel">
          <section class="carrier-card" style="margin-top:16px;">
            <div class="stock-cards">
              <div class="stock-card">
                <div class="label">总库存金额</div>
                <div class="value" id="cardTotalAmount">¥ 0.00</div>
              </div>
              <div class="stock-card">
                <div class="label">物资种类数</div>
                <div class="value" id="cardTypeCount">0</div>
              </div>
              <div class="stock-card">
                <div class="label">预警物资数</div>
                <div class="value warn" id="cardWarningCount">0</div>
              </div>
            </div>

            <div class="carrier-toolbar">
              <button type="button" class="carrier-btn-add" id="btnTransfer">
                <i class="fa-solid fa-right-left" aria-hidden="true"></i>
                库存调拨
              </button>
              <div class="carrier-toolbar-right">
                <select class="carrier-select" id="filterWarehouse" aria-label="仓库">
                  <option value="">全部仓库</option>
                  <option value="华北主仓">华北主仓</option>
                  <option value="华东备件仓">华东备件仓</option>
                  <option value="华南应急仓">华南应急仓</option>
                </select>
                <select class="carrier-select" id="filterCategory" aria-label="物资分类">
                  <option value="">全部分类</option>
                  <option value="主机部件">主机部件</option>
                  <option value="电气备件">电气备件</option>
                  <option value="通用耗材">通用耗材</option>
                </select>
                <input type="search" class="carrier-search" id="filterKeyword" placeholder="搜索物资编码/名称" autocomplete="off" aria-label="搜索物资编码/名称" />
              </div>
            </div>

            <div class="carrier-table-wrap">
              <table class="carrier-table">
                <thead>
                  <tr>
                    <th>物资编码</th>
                    <th>物资名称</th>
                    <th>规格型号</th>
                    <th>仓库</th>
                    <th>货位</th>
                    <th>当前库存数量</th>
                    <th>单位</th>
                    <th>库存上限</th>
                    <th>库存下限</th>
                    <th>上次盘点时间</th>
                    <th style="min-width:220px;">操作</th>
                  </tr>
                </thead>
                <tbody id="stockTableBody"></tbody>
              </table>
            </div>

            <div class="carrier-pagination" role="navigation" aria-label="分页">
              <span id="stockTotalText">共 0 条</span>
              <span>每页</span>
              <select aria-label="每页条数">
                <option value="10" selected>10 条/页</option>
                <option value="20">20 条/页</option>
                <option value="50">50 条/页</option>
              </select>
              <div class="carrier-page-btns">
                <button type="button" aria-label="上一页">&lt;</button>
                <button type="button" class="is-current" aria-current="page">1</button>
                <button type="button" aria-label="下一页">&gt;</button>
              </div>
            </div>
          </section>
        </div>
      </main>
    </div>
  </div>

  <div class="modal-mask" id="inboundMask" aria-hidden="true">
    <div class="modal">
      <div class="modal-hd"><span id="inboundTitle">新增项目公司入库</span><button class="x-btn" id="inboundX" aria-label="关闭">×</button></div>
      <div class="modal-bd" id="inboundBody"></div>
      <div class="modal-ft">
        <button class="btn" id="inboundCancel">取消</button>
        <button class="btn primary" id="inboundSave">保存</button>
      </div>
    </div>
  </div>

  <script src="js/sidebar-actions.js"></script>
  <script src="js/subpage-feature-title.js"></script>
  <script src="js/subpage-clock.js"></script>
  <script>
    (function () {
      // ========== tab 切换 ==========
      var tabInbound = document.getElementById("tabInbound");
      var tabInventory = document.getElementById("tabInventory");
      var tabButtons = document.querySelectorAll(".page-tab[data-tab]");

      function getTab() {
        var m = location.hash.match(/^#tab=(.+)$/);
        return m ? m[1] : null;
      }
      function switchTab(name) {
        var isInbound = name === "inbound" || !name;
        if (isInbound) name = "inbound";
        else name = "inventory";

        tabButtons.forEach(function (btn) {
          btn.classList.toggle("is-active", btn.getAttribute("data-tab") === name);
        });
        tabInbound.classList.toggle("is-active", name === "inbound");
        tabInventory.classList.toggle("is-active", name === "inventory");

        if (name === "inventory") {
          location.hash = "tab=inventory";
          if (typeof renderStock === "function") renderStock();
        } else {
          location.hash = "tab=inbound";
        }
      }

      tabButtons.forEach(function (btn) {
        btn.addEventListener("click", function () {
          switchTab(btn.getAttribute("data-tab"));
        });
      });

      var initial = getTab();
      if (initial === "inventory") switchTab("inventory");
      else switchTab("inbound");

      // ========== 入库数据 ==========
      var rows = [
        { no: "PI-2026-001", po: "PO-2026-1001", supplier: "中车电气", date: "2026-04-18", qa: "已通过", st: "待入库", dept: "工程部" },
        { no: "PI-2026-002", po: "PO-2026-1002", supplier: "远景能源", date: "2026-04-19", qa: "已通过", st: "待确认", dept: "物资部" },
        { no: "PI-2026-003", po: "PO-2026-1003", supplier: "金风科技", date: "2026-04-20", qa: "已通过", st: "已确认", dept: "财务部" }
      ];
      while (rows.length < 10) {
        var i = rows.length + 1;
        rows.push({
          no: "PI-2026-" + String(100 + i),
          po: "PO-2026-" + String(2000 + i),
          supplier: ["中车电气", "远景能源", "金风科技", "许继电气"][i % 4],
          date: "2026-04-" + String(10 + (i % 18)).padStart(2, "0"),
          qa: "已通过",
          st: ["草稿", "待入库", "待确认", "已确认"][i % 4],
          dept: ["工程部", "物资部", "财务部", "经营发展中心"][i % 4]
        });
      }

      // ========== 公共工具 ==========
      function esc(v) { return String(v == null ? "" : v).replace(/[&<>"']/g, function (s) { return ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" })[s]; }); }

      // ========== 入库操作 ==========
      function statusClass(st) {
        if (st === "待入库" || st === "待确认") return "status-pending";
        if (st === "已确认") return "status-pass";
        return "status-draft";
      }
      function ops(st) {
        if (st === "草稿") return '<a href="#" data-op="view">查看</a> <a href="#" data-op="edit">编辑</a> <a href="#" data-op="delete">删除</a>';
        return '<a href="#" data-op="view">查看</a>';
      }
      function byNo(no) { for (var i = 0; i < rows.length; i++) if (rows[i].no === no) return rows[i]; return null; }

      function inboundFormHtml(data, readonly) {
        var d = data || { no: "", po: "", supplier: "", date: "", qa: "已通过", st: "草稿", dept: "" };
        var ro = readonly ? " readonly " : "";
        var dis = readonly ? " disabled " : "";
        var bg = readonly ? "background:#f5f5f5;" : "";
        function opt(v, cur) { return "<option" + (v === cur ? " selected" : "") + ">" + v + "</option>"; }
        return (
          '<div style="display:grid;grid-template-columns:130px 1fr;gap:10px 12px;font-size:13px;">' +
          "<label>入库单号</label><input class='carrier-search' id='fNo' value='" + esc(d.no) + "' " + ro + " style='" + bg + "min-width:0'>" +
          "<label>采购订单号</label><input class='carrier-search' id='fPo' value='" + esc(d.po) + "' " + ro + " style='" + bg + "min-width:0'>" +
          "<label>供应商</label><input class='carrier-search' id='fSupplier' value='" + esc(d.supplier) + "' " + ro + " style='" + bg + "min-width:0'>" +
          "<label>到货日期</label><input type='date' class='carrier-search' id='fDate' value='" + esc(d.date) + "' " + (readonly ? "disabled" : "") + " style='" + bg + "min-width:0'>" +
          "<label>验收状态</label><select class='carrier-select' id='fQa' " + dis + " style='" + bg + "min-width:0'>" + opt("已通过", d.qa || "已通过") + opt("待验收", d.qa || "") + "</select>" +
          "<label>入库状态</label><select class='carrier-select' id='fSt' " + dis + " style='" + bg + "min-width:0'>" + opt("草稿", d.st || "草稿") + opt("待入库", d.st || "") + opt("待确认", d.st || "") + opt("已确认", d.st || "") + "</select>" +
          "<label>关联部门</label><select class='carrier-select' id='fDept' " + dis + " style='" + bg + "min-width:0'>" + opt("工程部", d.dept || "") + opt("物资部", d.dept || "") + opt("财务部", d.dept || "") + opt("经营发展中心", d.dept || "") + "</select>" +
          "</div>"
        );
      }

      var inboundMode = "add";
      var inboundRefNo = "";

      function openInboundForm(mode, row) {
        inboundMode = mode;
        inboundRefNo = row && row.no ? row.no : "";
        var titleEl = document.getElementById("inboundTitle");
        var bodyEl = document.getElementById("inboundBody");
        var saveBtn = document.getElementById("inboundSave");
        if (mode === "delete") {
          titleEl.textContent = "删除项目公司入库";
          bodyEl.innerHTML = '<div style="font-size:14px;line-height:1.9;color:#1f2d3d;padding:8px 2px"><div>是否确认删除该条数据？</div><div style="margin-top:10px;color:#64748b;font-size:13px">入库单号：' + esc(row && row.no || "—") + '</div></div>';
          saveBtn.textContent = "确认删除";
          saveBtn.className = "btn danger";
        } else {
          titleEl.textContent = mode === "edit" ? "编辑项目公司入库" : (mode === "view" ? "查看项目公司入库" : "新增项目公司入库");
          bodyEl.innerHTML = inboundFormHtml(row, mode === "view");
          saveBtn.textContent = "保存";
          saveBtn.className = "btn primary";
          saveBtn.style.display = mode === "view" ? "none" : "";
        }
        var mask = document.getElementById("inboundMask");
        mask.classList.add("show");
        mask.setAttribute("aria-hidden", "false");
      }

      function closeInboundForm() {
        var mask = document.getElementById("inboundMask");
        mask.classList.remove("show");
        mask.setAttribute("aria-hidden", "true");
      }

      function updateInboundMetrics(list) {
        document.getElementById("mTotal").textContent = String(list.length);
        document.getElementById("mPending").textContent = String(list.filter(function (x) { return x.st === "待入库"; }).length);
        document.getElementById("mReview").textContent = String(list.filter(function (x) { return x.st === "待确认"; }).length);
        document.getElementById("mDone").textContent = String(list.filter(function (x) { return x.st === "已确认"; }).length);
      }

      function renderInbound() {
        var n = document.getElementById("qNo").value.trim();
        var s = document.getElementById("qSupplier").value.trim();
        var st = document.getElementById("qStatus").value.trim();
        var list = rows.filter(function (r) {
          if (n && r.no.indexOf(n) < 0) return false;
          if (s && r.supplier.indexOf(s) < 0) return false;
          if (st && r.st !== st) return false;
          return true;
        });
        updateInboundMetrics(list);
        document.getElementById("tb").innerHTML = list.map(function (r) {
          return "<tr data-no='" + esc(r.no) + "'>" +
            "<td><input type='checkbox' class='row-chk' data-no='" + esc(r.no) + "'></td>" +
            "<td>" + esc(r.no) + "</td><td>" + esc(r.po) + "</td><td>" + esc(r.supplier) + "</td><td>" + esc(r.date) + "</td>" +
            "<td><span class='status-pill status-pass'>" + esc(r.qa) + "</span></td><td><span class='status-pill " + statusClass(r.st) + "'>" + esc(r.st) + "</span></td><td>" + esc(r.dept) + "</td>" +
            "<td class='map-op-cell'>" + ops(r.st) + "</td></tr>";
        }).join("");
      }

      // ========== 库存管理（与 inventory-management.html 一致） ==========
      var ledger = [
        { materialCode: "MAT-GX-001", materialName: "齿轮箱", spec: "GW-GX-3.2MW", warehouse: "华北主仓", category: "主机部件", slot: "A-01-03", currentQty: 8, unit: "件", maxQty: 30, minQty: 10, lastCheckAt: "2026-03-20", unitPrice: 42000 },
        { materialCode: "MAT-BLQ-002", materialName: "变流器", spec: "BLQ-1500V", warehouse: "华东备件仓", category: "电气备件", slot: "B-03-02", currentQty: 16, unit: "件", maxQty: 26, minQty: 8, lastCheckAt: "2026-03-19", unitPrice: 16000 },
        { materialCode: "MAT-DJ-003", materialName: "偏航电机", spec: "YH-DJ-7.5kW", warehouse: "华南应急仓", category: "电气备件", slot: "C-01-08", currentQty: 6, unit: "件", maxQty: 20, minQty: 6, lastCheckAt: "2026-03-18", unitPrice: 7000 },
        { materialCode: "MAT-HC-004", materialName: "液压油", spec: "L-HM 46", warehouse: "华北主仓", category: "通用耗材", slot: "A-02-09", currentQty: 30, unit: "桶", maxQty: 80, minQty: 20, lastCheckAt: "2026-03-21", unitPrice: 220 }
      ];

      var stockRefs = {
        tableBody: document.getElementById("stockTableBody"),
        totalText: document.getElementById("stockTotalText"),
        cardTotalAmount: document.getElementById("cardTotalAmount"),
        cardTypeCount: document.getElementById("cardTypeCount"),
        cardWarningCount: document.getElementById("cardWarningCount"),
        filterWarehouse: document.getElementById("filterWarehouse"),
        filterCategory: document.getElementById("filterCategory"),
        filterKeyword: document.getElementById("filterKeyword"),
        btnTransfer: document.getElementById("btnTransfer")
      };

      var flowDemo = {
        "MAT-GX-001": [
          { t: "2026-03-21 10:20", type: "入库", qty: "+2", note: "采购入库" },
          { t: "2026-03-20 14:05", type: "出库", qty: "-1", note: "领用出库" },
          { t: "2026-03-18 09:00", type: "入库", qty: "+5", note: "调拨入" }
        ],
        "MAT-BLQ-002": [
          { t: "2026-03-19 11:00", type: "出库", qty: "-2", note: "检修领用" }
        ],
        "MAT-DJ-003": [
          { t: "2026-03-17 16:30", type: "入库", qty: "+3", note: "退货入库" }
        ],
        "MAT-HC-004": [
          { t: "2026-03-21 08:00", type: "入库", qty: "+10", note: "批量入库" }
        ]
      };

      var transferMask = document.getElementById("transferMask");
      var warnMask = document.getElementById("warnMask");
      var stockFlowMask = document.getElementById("stockFlowMask");
      var stockDetailMask = document.getElementById("stockDetailMask");
      var warnEditingCode = null;

      function anyModalOpen() {
        return [transferMask, warnMask, stockFlowMask, stockDetailMask].some(function (m) { return m && m.classList.contains("show"); });
      }
      function openMask(el) {
        if (!el) return;
        el.classList.add("show");
        el.setAttribute("aria-hidden", "false");
        document.body.style.overflow = "hidden";
      }
      function closeMask(el) {
        if (!el) return;
        el.classList.remove("show");
        el.setAttribute("aria-hidden", "true");
        if (!anyModalOpen()) document.body.style.overflow = "";
      }

      function money(n) { return n.toLocaleString("zh-CN", { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }
      function isLow(item) { return Number(item.currentQty) < Number(item.minQty) || Number(item.currentQty) > Number(item.maxQty); }

      function fillTransferPick() {
        var sel = document.getElementById("transferMaterialPick");
        if (!sel) return;
        sel.innerHTML = "";
        ledger.forEach(function (it) {
          var o = document.createElement("option");
          o.value = it.materialCode;
          o.textContent = it.materialCode + " " + it.materialName;
          sel.appendChild(o);
        });
      }

      function openTransferModal(code, fromToolbar) {
        fillTransferPick();
        var sel = document.getElementById("transferMaterialPick");
        var hint = document.getElementById("transferMatHint");
        if (sel) {
          sel.disabled = !fromToolbar && !!code;
          sel.value = code || (sel.options[0] && sel.options[0].value);
        }
        if (hint) hint.textContent = fromToolbar ? "可从下拉框选择要调拨的物资。" : "从当前行发起调拨。";
        var item = ledger.find(function (x) { return x.materialCode === (code || sel.value); });
        if (item) {
          document.getElementById("transferFrom").value = item.warehouse;
          document.getElementById("transferQty").value = "1";
        }
        openMask(transferMask);
      }

      function openWarnModal(code) {
        var item = ledger.find(function (x) { return x.materialCode === code; });
        if (!item) return;
        warnEditingCode = code;
        document.getElementById("warnMax").value = item.maxQty;
        document.getElementById("warnMin").value = item.minQty;
        openMask(warnMask);
      }

      function openStockDetail(code) {
        var item = ledger.find(function (x) { return x.materialCode === code; });
        if (!item) return;
        document.getElementById("stockDetailGrid").innerHTML = [
          ["物资编码", item.materialCode],
          ["物资名称", item.materialName],
          ["规格型号", item.spec],
          ["仓库", item.warehouse],
          ["货位", item.slot],
          ["当前库存数量", item.currentQty],
          ["单位", item.unit],
          ["库存上限", item.maxQty],
          ["库存下限", item.minQty],
          ["上次盘点时间", item.lastCheckAt]
        ].map(function (pair) {
          return '<div class="wh-detail-item"><div class="wh-detail-label">' + pair[0] + '</div><div class="wh-detail-value">' + pair[1] + '</div></div>';
        }).join("");
        openMask(stockDetailMask);
      }

      function openFlowModal(code) {
        var item = ledger.find(function (x) { return x.materialCode === code; });
        var rows = flowDemo[code] || [{ t: "—", type: "—", qty: "—", note: "暂无流水" }];
        document.getElementById("stockFlowTitle").textContent = item ? "物资：" + item.materialName + "（" + code + "）" : code;
        var tb = document.getElementById("stockFlowTbody");
        tb.innerHTML = rows.map(function (r) {
          return "<tr><td>" + r.t + "</td><td>" + r.type + "</td><td>" + r.qty + "</td><td>" + r.note + "</td></tr>";
        }).join("");
        openMask(stockFlowMask);
      }

      function renderStock() {
        var w = stockRefs.filterWarehouse.value;
        var c = stockRefs.filterCategory.value;
        var k = (stockRefs.filterKeyword.value || "").trim().toLowerCase();
        var rows = ledger.filter(function (x) {
          var hitW = !w || x.warehouse === w;
          var hitC = !c || x.category === c;
          var hitK = !k || x.materialCode.toLowerCase().indexOf(k) > -1 || x.materialName.toLowerCase().indexOf(k) > -1;
          return hitW && hitC && hitK;
        });
        stockRefs.tableBody.innerHTML = "";
        if (!rows.length) {
          stockRefs.tableBody.innerHTML = '<tr><td colspan="11" style="text-align:center;color:#8ca0b8;padding:26px;">暂无数据</td></tr>';
          stockRefs.totalText.textContent = "共 0 条";
          refreshCards(rows);
          return;
        }
        rows.forEach(function (item) {
          var low = isLow(item);
          var tr = document.createElement("tr");
          tr.setAttribute("data-code", item.materialCode);
          tr.innerHTML =
            "<td>" + item.materialCode + "</td>" +
            '<td><a href="#" data-action="flow" style="color:#1677ff;">' + item.materialName + "</a></td>" +
            "<td>" + item.spec + "</td>" +
            "<td>" + item.warehouse + "</td>" +
            "<td>" + item.slot + "</td>" +
            '<td class="cell-num">' + item.currentQty + "</td>" +
            "<td>" + item.unit + "</td>" +
            '<td class="cell-num">' + item.maxQty + "</td>" +
            '<td class="cell-num">' + item.minQty + "</td>" +
            "<td>" + item.lastCheckAt + "</td>" +
            '<td><div class="wh-ops">' +
            '<a href="#" data-action="view">查看</a>' +
            '<a href="#" data-action="flow">库存流水</a>' +
            '<a href="#" data-action="transfer">发起调拨</a>' +
            '<a href="#" data-action="warn">设置预警值</a>' +
            "</div></td>";
          stockRefs.tableBody.appendChild(tr);
        });
        stockRefs.totalText.textContent = "共 " + rows.length + " 条";
        refreshCards(rows);
      }

      function refreshCards(sourceRows) {
        var totalAmount = 0;
        var warning = 0;
        sourceRows.forEach(function (x) {
          totalAmount += Number(x.currentQty) * Number(x.unitPrice);
          if (isLow(x)) warning++;
        });
        stockRefs.cardTotalAmount.textContent = "¥ " + money(totalAmount);
        stockRefs.cardTypeCount.textContent = String(sourceRows.length);
        stockRefs.cardWarningCount.textContent = String(warning);
      }

      function removeStockCheckboxColumn() {
        Array.prototype.forEach.call(document.querySelectorAll(".carrier-main-inner table"), function (table) {
          var headRow = table.querySelector("thead tr");
          var firstTh = headRow && headRow.children ? headRow.children[0] : null;
          if (firstTh && firstTh.querySelector && firstTh.querySelector("input[type='checkbox']")) {
            firstTh.parentNode.removeChild(firstTh);
          }
          Array.prototype.forEach.call(table.querySelectorAll("tbody tr"), function (tr) {
            var firstTd = tr.children && tr.children[0];
            if (firstTd && firstTd.querySelector && firstTd.querySelector("input[type='checkbox']")) {
              firstTd.parentNode.removeChild(firstTd);
            }
          });
        });
      }

      function watchStockCheckboxColumn() {
        removeStockCheckboxColumn();
        setTimeout(removeStockCheckboxColumn, 150);
        var table = document.querySelector(".carrier-main-inner");
        if (!table || typeof MutationObserver !== "function") return;
        var pending = false;
        var observer = new MutationObserver(function () {
          if (pending) return;
          pending = true;
          setTimeout(function () { pending = false; removeStockCheckboxColumn(); }, 30);
        });
        observer.observe(table, { childList: true, subtree: true });
      }

      // ========== 库存弹窗事件 ==========
      document.getElementById("btnCloseStockFlow").addEventListener("click", function () { closeMask(stockFlowMask); });
      document.getElementById("btnOkStockFlow").addEventListener("click", function () { closeMask(stockFlowMask); });
      stockFlowMask.addEventListener("click", function (e) { if (e.target === stockFlowMask) closeMask(stockFlowMask); });

      document.getElementById("btnCloseStockDetail").addEventListener("click", function () { closeMask(stockDetailMask); });
      document.getElementById("btnOkStockDetail").addEventListener("click", function () { closeMask(stockDetailMask); });
      stockDetailMask.addEventListener("click", function (e) { if (e.target === stockDetailMask) closeMask(stockDetailMask); });

      document.getElementById("btnCloseTransfer").addEventListener("click", function () { closeMask(transferMask); });
      document.getElementById("btnCancelTransfer").addEventListener("click", function () { closeMask(transferMask); });
      transferMask.addEventListener("click", function (e) { if (e.target === transferMask) closeMask(transferMask); });
      document.getElementById("btnOkTransfer").addEventListener("click", function () {
        var code = document.getElementById("transferMaterialPick").value;
        var n = Number(document.getElementById("transferQty").value || 0);
        var toWh = document.getElementById("transferTo").value;
        if (!n || n <= 0) { alert("请输入有效调拨数量。"); return; }
        var item = ledger.find(function (x) { return x.materialCode === code; });
        if (!item || n > item.currentQty) { alert("库存不足。"); return; }
        item.currentQty -= n;
        item.warehouse = toWh;
        closeMask(transferMask);
        renderStock();
      });

      document.getElementById("btnCloseWarn").addEventListener("click", function () { closeMask(warnMask); });
      document.getElementById("btnCancelWarn").addEventListener("click", function () { closeMask(warnMask); });
      warnMask.addEventListener("click", function (e) { if (e.target === warnMask) closeMask(warnMask); });
      document.getElementById("btnOkWarn").addEventListener("click", function () {
        var item = ledger.find(function (x) { return x.materialCode === warnEditingCode; });
        if (!item) return;
        var min = Number(document.getElementById("warnMin").value);
        var max = Number(document.getElementById("warnMax").value);
        if (min < 0 || max <= 0 || min >= max) { alert("阈值不合法。"); return; }
        item.minQty = min;
        item.maxQty = max;
        closeMask(warnMask);
        renderStock();
      });

      document.addEventListener("keydown", function (e) {
        if (e.key !== "Escape") return;
        if (stockDetailMask.classList.contains("show")) closeMask(stockDetailMask);
        else if (stockFlowMask.classList.contains("show")) closeMask(stockFlowMask);
        else if (transferMask.classList.contains("show")) closeMask(transferMask);
        else if (warnMask.classList.contains("show")) closeMask(warnMask);
      });

      stockRefs.tableBody.addEventListener("click", function (e) {
        var a = e.target.closest("a[data-action]");
        if (!a) return;
        e.preventDefault();
        var tr = a.closest("tr");
        if (!tr) return;
        var code = tr.getAttribute("data-code");
        var action = a.getAttribute("data-action");
        var item = ledger.find(function (x) { return x.materialCode === code; });
        if (!item) return;
        if (action === "view") { openStockDetail(code); return; }
        if (action === "flow") { openFlowModal(code); return; }
        if (action === "transfer") { openTransferModal(code, false); return; }
        if (action === "warn") { openWarnModal(code); return; }
      });

      stockRefs.filterWarehouse.addEventListener("change", renderStock);
      stockRefs.filterCategory.addEventListener("change", renderStock);
      stockRefs.filterKeyword.addEventListener("input", renderStock);

      stockRefs.btnTransfer.addEventListener("click", function () { openTransferModal(null, true); });
      var transferPick = document.getElementById("transferMaterialPick");
      if (transferPick) {
        transferPick.addEventListener("change", function () {
          var item = ledger.find(function (x) { return x.materialCode === transferPick.value; });
          if (item) document.getElementById("transferFrom").value = item.warehouse;
        });
      }

      // ========== 入库入口与事件 ==========
      renderInbound();

      document.addEventListener("click", function (e) {
        if (e.target.id === "btnSearch") { renderInbound(); return; }
        if (e.target.id === "btnReset") {
          document.getElementById("qNo").value = "";
          document.getElementById("qSupplier").value = "";
          document.getElementById("qStatus").value = "";
          renderInbound();
          return;
        }
        if (e.target.id === "btnAdd") { openInboundForm("add"); return; }
        if (e.target.id === "btnImport") { alert("导入弹窗（演示）"); return; }
        if (e.target.id === "btnTpl") { alert("下载模板（演示）"); return; }
        if (e.target.id === "btnExport") { alert("导出（演示）"); return; }
        if (e.target.id === "btnDeleteBatch") { alert("批量删除（演示）"); return; }
        if (e.target.id === "chkAll") {
          var ck = !!e.target.checked;
          Array.prototype.forEach.call(document.querySelectorAll(".row-chk"), function (c) { c.checked = ck; });
          return;
        }
        var op = e.target.getAttribute("data-op");
        if (!op) return;
        e.preventDefault();
        var tr = e.target.closest("tr[data-no]");
        var row = tr ? byNo(tr.getAttribute("data-no")) : null;
        if (op === "view") openInboundForm("view", row);
        if (op === "edit") openInboundForm("edit", row);
        if (op === "delete") openInboundForm("delete", row);
      });

      document.getElementById("inboundX").addEventListener("click", closeInboundForm);
      document.getElementById("inboundCancel").addEventListener("click", closeInboundForm);
      document.getElementById("inboundMask").addEventListener("click", function (e) { if (e.target === this) closeInboundForm(); });
      document.getElementById("inboundSave").addEventListener("click", function () {
        if (inboundMode === "delete" && inboundRefNo) {
          rows = rows.filter(function (x) { return x.no !== inboundRefNo; });
          closeInboundForm();
          renderInbound();
          return;
        }
        var no = (document.getElementById("fNo").value || "").trim() || ("PI-2026-" + String(Math.floor(Math.random() * 900 + 100)));
        var row = {
          no: no,
          po: (document.getElementById("fPo").value || "").trim(),
          supplier: (document.getElementById("fSupplier").value || "").trim(),
          date: (document.getElementById("fDate").value || "").trim(),
          qa: (document.getElementById("fQa").value || "已通过").trim(),
          st: (document.getElementById("fSt").value || "草稿").trim(),
          dept: (document.getElementById("fDept").value || "").trim()
        };
        if (inboundMode === "edit" && inboundRefNo) {
          var old = byNo(inboundRefNo);
          if (old) { old.no = row.no; old.po = row.po; old.supplier = row.supplier; old.date = row.date; old.qa = row.qa; old.st = row.st; old.dept = row.dept; }
        } else { rows.unshift(row); }
        closeInboundForm();
        renderInbound();
      });
    })();
  </script>
</body>
</html>
