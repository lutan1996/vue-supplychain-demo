  <script>
    (function () {
      if (typeof echarts === "undefined") return;
      function bar(id, categories, values, horiz) {
        var el = document.getElementById(id);
        if (!el) return;
        var ch = echarts.init(el);
        ch.setOption({
          tooltip: { trigger: "axis" },
          grid: { left: horiz ? 80 : 40, right: 20, top: 20, bottom: 30 },
          xAxis: horiz ? { type: "value" } : { type: "category", data: categories },
          yAxis: horiz ? { type: "category", data: categories } : { type: "value" },
          series: [{
            type: horiz ? "bar" : "bar",
            data: horiz ? values : values,
            itemStyle: { color: "#1890ff" }
          }]
        });
        return ch;
      }
      bar("ch3", ["主齿轮箱", "发电机", "叶片", "变流器", "变桨", "偏航"], [120, 98, 86, 72, 65, 58], true);
      bar("ch5", ["华北", "华东", "华南", "西南", "西北"], [3200, 2800, 2100, 1600, 1400], true);
      var el4 = document.getElementById("ch4");
      if (el4) {
        var ch4 = echarts.init(el4);
        ch4.setOption({
          tooltip: { trigger: "axis" },
          xAxis: { type: "category", data: ["4月", "5月", "6月", "7月", "8月", "9月", "10月", "11月", "12月", "1月", "2月", "3月"] },
          yAxis: { type: "value" },
          series: [{ type: "line", smooth: true, data: [120, 132, 101, 134, 90, 230, 210, 182, 191, 234, 290, 330], areaStyle: { opacity: 0.12 }, itemStyle: { color: "#1890ff" } }]
        });
      }
      var el2 = document.getElementById("ch2");
      if (el2) {
        var ch2 = echarts.init(el2);
        ch2.setOption({
          tooltip: { trigger: "axis" },
          legend: { data: ["采购额"] },
          xAxis: { type: "category", data: ["2022", "2023", "2024", "2025", "2026"] },
          yAxis: { type: "value", name: "万元" },
          series: [{ name: "采购额", type: "line", data: [8200, 9100, 8800, 9600, 10200], itemStyle: { color: "#52c41a" } }]
        });
      }
      var el1 = document.getElementById("ch1");
      if (el1) {
        var ch1 = echarts.init(el1);
        ch1.setOption({
          tooltip: {},
          series: [{
            type: "pie",
            radius: ["32%", "58%"],
            data: [
              { name: "华北", value: 1200 },
              { name: "华东", value: 980 },
              { name: "华南", value: 760 },
              { name: "其它", value: 540 }
            ]
          }]
        });
      }
      var el6 = document.getElementById("ch6");
      if (el6) {
        echarts.init(el6).setOption({
          tooltip: { trigger: "axis" },
          legend: { data: ["内部循环", "外部循环", "报废"] },
          xAxis: { type: "category", data: ["Q1", "Q2", "Q3", "Q4"] },
          yAxis: { type: "value" },
          series: [
            { name: "内部循环", type: "bar", stack: "a", data: [12, 15, 10, 18], itemStyle: { color: "#1890ff" } },
            { name: "外部循环", type: "bar", stack: "a", data: [8, 9, 7, 11], itemStyle: { color: "#52c41a" } },
            { name: "报废", type: "bar", stack: "a", data: [3, 2, 4, 2], itemStyle: { color: "#ff7875" } }
          ]
        });
      }
      var el7 = document.getElementById("ch7");
      if (el7) {
        echarts.init(el7).setOption({
          tooltip: { trigger: "axis" },
          legend: { data: ["维修数量", "国产化部件"] },
          xAxis: { type: "category", data: ["1月", "2月", "3月", "4月", "5月", "6月"] },
          yAxis: [{ type: "value" }, { type: "value" }],
          series: [
            { name: "维修数量", type: "line", data: [22, 18, 25, 30, 28, 32], itemStyle: { color: "#722ed1" } },
            { name: "国产化部件", type: "bar", yAxisIndex: 1, data: [40, 44, 48, 52, 55, 60], itemStyle: { color: "#faad14" } }
          ]
        });
      }
      var el8 = document.getElementById("ch8");
      if (el8) {
        echarts.init(el8).setOption({
          tooltip: { trigger: "item" },
          series: [{
            type: "pie",
            radius: ["40%", "65%"],
            data: [
              { name: "轴承", value: 28 },
              { name: "滤芯", value: 22 },
              { name: "油脂", value: 18 },
              { name: "螺栓", value: 16 },
              { name: "其它", value: 16 }
            ]
          }]
        });
      }
      window.addEventListener("resize", function () {
        ["ch1", "ch2", "ch3", "ch4", "ch5", "ch6", "ch7", "ch8"].forEach(function (id) {
          var el = document.getElementById(id);
          if (el && echarts.getInstanceByDom(el)) echarts.getInstanceByDom(el).resize();
        });
      });
    })();
  </script>
