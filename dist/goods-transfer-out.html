      function renderTable() {
        var rows = currentRows();
        tableBody.innerHTML = "";
        rows.forEach(function (item, idx) {
          var st = statusMeta(item.status);
          var tr = document.createElement("tr");
          tr.setAttribute("data-no", item.no);
          tr.innerHTML =
            '<td><input type="checkbox" aria-label="选择行" /></td>' +
            "<td>" + (idx + 1) + "</td>" +
            "<td>" + item.no + "</td>" +
            '<td><span class="tag-method ' + methodCls(item.method) + '">' + item.method + "</span></td>" +
            "<td>" + item.name + "</td>" +
            "<td>" + item.qty + "</td>" +
            "<td>" + item.amount + "</td>" +
            "<td>" + item.receiver + "</td>" +
            "<td>" + item.applicant + "</td>" +
            "<td>" + item.date + "</td>" +
            '<td><span class="tag-gto-status ' + st.cls + '">' + st.text + "</span></td>" +
            '<td class="gto-op">' + opButtons(item) + "</td>";
          tableBody.appendChild(tr);
        });
        totalText.textContent = "共 " + rows.length + " 条";
      }
      function setTab(tabKey) {
        state.activeTab = tabKey;
        tabs.forEach(function (tab) {
          var active = tab.getAttribute("data-tab") === tabKey;
          tab.classList.toggle("is-active", active);
          tab.setAttribute("aria-selected", active ? "true" : "false");
        });
        renderTable();
      }
      function openModal(mask) {
        mask.classList.add("show");
        mask.setAttribute("aria-hidden", "false");
      }
      function closeModal(mask) {
        mask.classList.remove("show");
        mask.setAttribute("aria-hidden", "true");
      }
      function renderPickList() {
        pickList.innerHTML = materialOptions.map(function (m) {
          return '<label class="gto-pick-item"><input type="checkbox" value="' + m.id + '" /> ' + m.id + " / " + m.name + " / " + m.spec + " / 可选数量：" + m.qty + "</label>";
        }).join("");
      }
      function fillView(item) {
        var grid = document.getElementById("gtoDetailGrid");
        var st = statusMeta(item.status);
        grid.innerHTML =
          "<div><b>申请单号：</b>" + item.no + "</div>" +
          "<div><b>转出方式：</b>" + item.method + "</div>" +
          "<div><b>申请人：</b>" + item.applicant + "</div>" +
          "<div><b>申请日期：</b>" + item.date + "</div>" +
          "<div><b>接收单位：</b>" + item.receiver + "</div>" +
          "<div><b>状态：</b>" + st.text + "</div>" +
          '<div class="gto-detail-full"><b>物资清单：</b>' + item.assets.join("、") + "</div>";
      }

      tabs.forEach(function (tab) {
        tab.addEventListener("click", function () { setTab(tab.getAttribute("data-tab")); });
      });
      document.getElementById("gtoBtnAdd").addEventListener("click", function () {
        renderPickList();
        openModal(createMask);
      });
      document.querySelectorAll("[data-close-modal]").forEach(function (btn) {
        btn.addEventListener("click", function () {
          closeModal(createMask);
          closeModal(viewMask);
          closeModal(approveMask);
        });
      });
      [createMask, viewMask, approveMask].forEach(function (mask) {
        mask.addEventListener("click", function (e) {
          if (e.target === mask) closeModal(mask);
        });
      });
      document.getElementById("gtoCreateSubmit").addEventListener("click", function () {
        var method = document.getElementById("gtoCreateMethod").value;
        var receiver = document.getElementById("gtoCreateReceiver").value || "待填写";
        var amount = document.getElementById("gtoCreateAmount").value || "0.00";
        var checked = Array.prototype.slice.call(pickList.querySelectorAll("input:checked"));
        var names = checked.map(function (c) {
          var m = materialOptions.find(function (x) { return x.id === c.value; });
          return m ? m.name : c.value;
        });
        if (!checked.length) {
          alert("请至少选择一项物资");
          return;
        }
        data.unshift({
          no: "TC-" + new Date().getFullYear() + "-" + String(Math.floor(Math.random() * 900 + 100)),
          method: method,
          name: names.join("、"),
          qty: checked.length,
          amount: amount,
          receiver: receiver,
          applicant: "当前用户",
          date: new Date().toISOString().slice(0, 10),
          status: "pending",
          assets: names
        });
        closeModal(createMask);
        setTab("all");
      });
      tableBody.addEventListener("click", function (e) {
        var btn = e.target.closest("[data-act]");
        if (!btn) return;
        var tr = btn.closest("tr");
        var no = tr && tr.getAttribute("data-no");
        var item = data.find(function (x) { return x.no === no; });
        if (!item) return;
        var act = btn.getAttribute("data-act");
        state.currentItem = item;
        if (act === "view") {
          fillView(item);
          openModal(viewMask);
        } else if (act === "approve") {
          document.getElementById("gtoApproveSummary").innerHTML = "<b>申请单号：</b>" + item.no + "<br><b>物资名称：</b>" + item.name + "<br><b>金额：</b>" + item.amount;
          document.getElementById("gtoApproveComment").value = "";
          document.getElementById("gtoApproveResult").value = "passed";
          openModal(approveMask);
        } else if (act === "print") {
          alert("打印申请单：" + item.no);
        } else if (act === "resubmit") {
          item.status = "pending";
          setTab("pending");
        }
      });
      document.getElementById("gtoApproveSubmit").addEventListener("click", function () {
        if (!state.currentItem) return;
        var r = document.getElementById("gtoApproveResult").value;
        state.currentItem.status = r === "passed" ? "passed" : "rejected";
        closeModal(approveMask);
        setTab("all");
      });
      document.getElementById("gtoBtnBatchDel").addEventListener("click", function () {
        var checkedRows = Array.prototype.slice.call(tableBody.querySelectorAll('input[type="checkbox"]:checked'));
        var ids = checkedRows.map(function (c) { return c.closest("tr").getAttribute("data-no"); });
        if (!ids.length) {
          alert("请先勾选需要删除的申请");
          return;
        }
        data = data.filter(function (x) { return ids.indexOf(x.no) < 0; });
        setTab("all");
      });
      document.querySelector(".gto-btn--reset").addEventListener("click", function () {
        document.getElementById("gto-no").value = "";
        document.getElementById("gto-method").selectedIndex = 0;
        document.getElementById("gto-recv").value = "";
        document.getElementById("gto-applicant").value = "";
        document.getElementById("gto-date").value = "";
        document.getElementById("gto-approve").selectedIndex = 0;
        setTab(state.activeTab);
      });
      renderPickList();
      setTab("all");
    })();
  </script>
</body>
</html>
