  <div class="wh-modal-mask modal-mask" id="slotAddMask" aria-hidden="true">
    <div class="wh-modal-box" role="dialog" aria-modal="true" aria-labelledby="slotAddTitle">
      <div class="wh-modal-head">
        <h3 class="wh-modal-title" id="slotAddTitle">新增货位</h3>
        <button type="button" class="wh-modal-close" id="slotAddCloseX" aria-label="关闭">×</button>
      </div>
      <div class="wh-modal-body">
        <div class="wh-field">
          <label class="wh-label" for="slotNewCode">货位编码（唯一）</label>
          <input id="slotNewCode" class="wh-input" type="text" placeholder="请输入货位编码" autocomplete="off" />
        </div>
      </div>
      <div class="wh-modal-foot">
        <button type="button" class="wh-btn wh-btn--ghost" id="slotAddCancel">取消</button>
        <button type="button" class="wh-btn wh-btn--primary" id="slotAddOk">确定</button>

    </div>

  <div class="wh-modal-mask modal-mask" id="slotViewMask" aria-hidden="true">
    <div class="wh-modal-box wh-modal-box--md" role="dialog" aria-modal="true" aria-labelledby="slotViewTitle">
      <div class="wh-modal-head">
        <h3 class="wh-modal-title" id="slotViewTitle">查看货位</h3>
        <button type="button" class="wh-modal-close" id="slotViewCloseX" aria-label="关闭">×</button>

  <div class="wh-modal-mask modal-mask" id="slotEditMask" aria-hidden="true">

      <div class="wh-modal-head">

        <button type="button" class="wh-modal-close" id="slotEditCloseX" aria-label="关闭">×</button>
      </div>
      <div class="wh-modal-body">
        <div class="wh-field">
          <label class="wh-label" for="slotEditCode">货位编码</label>
          <input id="slotEditCode" class="wh-input" type="text" readonly />
        </div>
        <div class="wh-field">
          <label class="wh-label" for="slotEditName">货位名称</label>
          <input id="slotEditName" class="wh-input" type="text" placeholder="货位名称" />
        </div>
        <div class="wh-field">
          <label class="wh-label" for="slotEditWh">所属仓库</label>
          <select id="slotEditWh" class="wh-input">
            <option>华北主仓</option>
            <option>华东备件仓</option>
          </select>
        </div>
        <div class="wh-field">
          <label class="wh-label" for="slotEditStatus">货位状态</label>
          <select id="slotEditStatus" class="wh-input">
            <option>空闲</option>
            <option>占用</option>
          </select>
        </div>
        <div class="wh-field">
          <label class="wh-label" for="slotEditQr">二维码</label>
          <input id="slotEditQr" class="wh-input" type="text" placeholder="二维码编号" />
        </div>
        <div class="wh-field">
          <label class="wh-label" for="slotEditMat">当前存放物资</label>
          <input id="slotEditMat" class="wh-input" type="text" placeholder="当前存放物资" />
        </div>
      </div>
      <div class="wh-modal-foot">
        <button type="button" class="wh-btn wh-btn--ghost" id="slotEditCancel">取消</button>
        <button type="button" class="wh-btn wh-btn--primary" id="slotEditOk">确定</button>
      </div>
    </div>

  <script src="js/sidebar-actions.js"></script>

  <script>
    (function () {
      var slots = [
        { code: "A-01-03", name: "A区1排3位", wh: "华北主仓", st: "占用", qr: "QR-A0103", mat: "齿轮箱 MAT-GX-001" },
        { code: "B-02-01", name: "B区2排1位", wh: "华北主仓", st: "空闲", qr: "QR-B0201", mat: "—" }
      ];
      var tb = document.getElementById("slotTableBody");
      var addMask = document.getElementById("slotAddMask");
      var viewMask = document.getElementById("slotViewMask");
      var editMask = document.getElementById("slotEditMask");
      var editIndex = -1;

      function showToast(msg) {
        var t = document.createElement("div");
        t.textContent = msg;
        t.setAttribute("role", "status");
        t.style.cssText = "position:fixed;left:50%;bottom:88px;transform:translateX(-50%);background:rgba(0,0,0,.78);color:#fff;padding:10px 18px;border-radius:8px;font-size:13px;z-index:10050;max-width:90vw;text-align:center;";
        document.body.appendChild(t);
        setTimeout(function () { t.remove(); }, 2400);
      }

      function setBodyScroll() {
        var any = addMask.classList.contains("show") || viewMask.classList.contains("show") || editMask.classList.contains("show");
        document.body.style.overflow = any ? "hidden" : "";
      }

      function closeAdd() {
        addMask.classList.remove("show");
        addMask.setAttribute("aria-hidden", "true");
        setBodyScroll();
      }
      function closeEdit() {
        editMask.classList.remove("show");
        editMask.setAttribute("aria-hidden", "true");
        editIndex = -1;
        setBodyScroll();
      }
      function closeView() {
        viewMask.classList.remove("show");
        viewMask.setAttribute("aria-hidden", "true");
        setBodyScroll();
      }
      function openView(s) {
        document.getElementById("slotViewGrid").innerHTML = [
          ["货位编码", s.code],
          ["货位名称", s.name],
          ["所属仓库", s.wh],
          ["货位状态", s.st],
          ["二维码", s.qr],
          ["当前存放物资", s.mat]
        ].map(function (pair) {
          return '<div class="wh-detail-item"><div class="wh-detail-label">' + pair[0] + '</div><div class="wh-detail-value">' + pair[1] + '</div></div>';
        }).join("");
        viewMask.classList.add("show");
        viewMask.setAttribute("aria-hidden", "false");
        setBodyScroll();
      }

      function render() {
        tb.innerHTML = slots.map(function (s, i) {
          var stTag = s.st === "空闲"
            ? '<span class="tag-status" style="background:#f6ffed;color:#389e0d;">空闲</span>'
            : '<span class="tag-status" style="background:#e6f4ff;color:#1677ff;">占用</span>';
          return "<tr data-i='" + i + "'><td>" + s.code + "</td><td>" + s.name + "</td><td>" + s.wh + "</td><td>" + stTag + "</td><td>" + s.qr + "</td><td>" + s.mat + "</td><td><div class='wh-ops'><a href='#' class='slot-op' data-o='view'>查看</a><a href='#' class='slot-op' data-o='edit'>修改</a><a href='#' class='slot-op' data-o='delete'>删除</a></div></td></tr>";
        }).join("");
      }
      render();

      document.getElementById("btnSlotAdd").addEventListener("click", function () {
        document.getElementById("slotNewCode").value = "";
        addMask.classList.add("show");
        addMask.setAttribute("aria-hidden", "false");
        setBodyScroll();
      });
      document.getElementById("slotAddCancel").addEventListener("click", closeAdd);
      document.getElementById("slotAddCloseX").addEventListener("click", closeAdd);
      addMask.addEventListener("click", function (e) { if (e.target === addMask) closeAdd(); });

      document.getElementById("slotAddOk").addEventListener("click", function () {
        var c = (document.getElementById("slotNewCode").value || "").trim();
        if (!c) {
          showToast("请输入货位编码");
          return;
        }
        if (slots.some(function (x) { return x.code === c; })) {
          showToast("货位编码已存在，请更换");
          return;
        }
        slots.push({ code: c, name: "新货位", wh: "华北主仓", st: "空闲", qr: "QR-" + c.replace(/-/g, ""), mat: "—" });
        closeAdd();
        render();
        showToast("已新增货位 " + c);
      });

      document.getElementById("slotEditCancel").addEventListener("click", closeEdit);
      document.getElementById("slotEditCloseX").addEventListener("click", closeEdit);
      editMask.addEventListener("click", function (e) { if (e.target === editMask) closeEdit(); });
      document.getElementById("slotViewOk").addEventListener("click", closeView);
      document.getElementById("slotViewCloseX").addEventListener("click", closeView);
      viewMask.addEventListener("click", function (e) { if (e.target === viewMask) closeView(); });
      document.getElementById("slotEditOk").addEventListener("click", function () {
        if (editIndex < 0) return;
        var s = slots[editIndex];
        var name = (document.getElementById("slotEditName").value || "").trim();
        var wh = document.getElementById("slotEditWh").value;
        var st = document.getElementById("slotEditStatus").value;
        var qr = (document.getElementById("slotEditQr").value || "").trim();
        var mat = (document.getElementById("slotEditMat").value || "").trim();
        if (!name) {
          showToast("请输入货位名称");
          return;
        }
        s.name = name;
        s.wh = wh;
        s.st = st;
        s.qr = qr || "QR-" + s.code.replace(/-/g, "");
        s.mat = mat || "—";
        closeEdit();
        render();
        showToast("已保存货位 " + s.code);
      });

      tb.addEventListener("click", function (e) {
        var a = e.target.closest("a.slot-op");
        if (!a) return;
        e.preventDefault();
        var o = a.getAttribute("data-o");
        var tr = a.closest("tr");
        var i = tr ? parseInt(tr.getAttribute("data-i"), 10) : -1;
        if (o === "view" && i >= 0) {
          openView(slots[i]);
          return;
        }
        if (o === "delete" && i >= 0) {
          showActionConfirm("删除货位", "确认删除货位 " + slots[i].code + "？", function () {
            slots.splice(i, 1);
            render();
            showToast("已删除货位");
          });
          return;
        }
        if (o === "edit" && i >= 0) {
          editIndex = i;
          var s = slots[i];
          document.getElementById("slotEditCode").value = s.code;
          document.getElementById("slotEditName").value = s.name;
          document.getElementById("slotEditWh").value = s.wh;
          document.getElementById("slotEditStatus").value = s.st;
          document.getElementById("slotEditQr").value = s.qr;
          document.getElementById("slotEditMat").value = s.mat;
          editMask.classList.add("show");
          editMask.setAttribute("aria-hidden", "false");
          setBodyScroll();
        }
      });

      document.addEventListener("keydown", function (e) {
        if (e.key !== "Escape") return;
        if (addMask.classList.contains("show")) closeAdd();
        if (viewMask.classList.contains("show")) closeView();
        if (editMask.classList.contains("show")) closeEdit();
      });
    })();
  </script>
