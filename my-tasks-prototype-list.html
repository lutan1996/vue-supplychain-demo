        };
      })();
      var reminderGo = mt$("inventoryTaskReminderGo");
      var reminderClose = mt$("inventoryTaskReminderClose");
      var reminderDismiss = mt$("inventoryTaskReminderDismiss");
      function closeInventoryReminder() {
        var reminder = mt$("inventoryTaskReminder");
        if (reminder) reminder.hidden = true;
      }
      if (reminderGo) reminderGo.onclick = function () {
        window.location.href = "my-tasks-prototype-list.html?scene=todo";
      };
      if (reminderClose) reminderClose.onclick = closeInventoryReminder;
      if (reminderDismiss) reminderDismiss.onclick = closeInventoryReminder;

      document.getElementById("mtTitle").textContent = cfg.title;
      var s = document.getElementById("mtSearch");
      cfg.fields.forEach(function (f) {
        var item = document.createElement("div");
        item.className = "mt-item";
        item.innerHTML = "<label>" + (f || " ") + "</label>" + (f ? "<input placeholder='请输入" + f + "' />" : "<input style='visibility:hidden' />");
        s.appendChild(item);
      });
      var treeWrap = document.getElementById("mtTreeWrap");
      if (cfg.showTree) {
        treeWrap.hidden = false;
        (cfg.tree || []).forEach(function (t) {
          var li = document.createElement("li");
          li.textContent = t;
          document.getElementById("mtTreeList").appendChild(li);
        });
      } else {
        treeWrap.hidden = true;
        document.getElementById("mtLayout").style.gridTemplateColumns = "1fr";
      }
      function getTableRows() {
        var base = cfg.rows.slice();
        if (scene !== "todo") return base;
        var invRole = localStorage.getItem("inventoryDemoRole") || "dept_specialist";
        base = base.filter(function (row) {
          var procKey = String(row[3] || "");
          if (procKey.indexOf("pdtask_") === 0) return true;
          return true;
        });

        var extraRows = [];

        // 1) 跨部门物资流转：优先展示在最上方
        if (window.DemoCrossDeptHandoff) {
          var pend = DemoCrossDeptHandoff.getPendingForMech();
          for (var hi = pend.length - 1; hi >= 0; hi -= 1) {
            var t = pend[hi];
            extraRows.push([
              "",
              "H" + (hi + 1),
              "跨部门物资内部流转",
              "handoff_" + t.id,
              "办理内部流转领用",
              "机械所专责",
              "待领用",
              t.handoff_at || "—",
              "handle"
            ]);
          }
          // 由于上面倒序 push，整体再反转一次保证观感更像“最新在上”
          extraRows = extraRows.reverse();
        }

        // 2) 新建事项（本页 new-issue.html 提交产生）
        try {
          var roleId = sessionStorage.getItem("demoOrgRoleId") || "";
          var tasks = JSON.parse(localStorage.getItem("map_new_issue_tasks_v1") || "[]");
          var pend2 = tasks.filter(function (t) {
            if (String(t.status || "") !== "待审批") return false;
            var arr = t.assigneeRoleIds;
            if (arr && Array.isArray(arr) && arr.length) return arr.indexOf(roleId) >= 0;
            return true;
          });
          // 按时间倒序
          pend2.sort(function (a, b) {
            return String(b.createdAt || "").localeCompare(String(a.createdAt || ""));
          });
          for (var ni = 0; ni < pend2.length; ni += 1) {
            var x = pend2[ni];
            extraRows.push([
              "",
              String(ni + 1),
              String(x.procName || x.taskName || "新建事项审批"),
              String(x.id || ""),
              String(x.requestCardId || x.requestType || ""),
              "待审批人",
              "待审批",
              x.createdAt || "—",
              "handle"
            ]);
          }
        } catch (eNew) {}

        // 3) 盘点差异处理提交的大额审批，进入“我的任务”办理。
        try {
          var invTodos = inventoryStoredTodos();
          invTodos.forEach(function (t, idx) {
            extraRows.push([
              "",
              "PD" + (idx + 1),
              t.procName || "盘点差异审批",
              t.key || "pddiff_" + (idx + 1),
              t.taskName || "盘点差异审批",
              t.handler || "孙睿",
              t.status || "待审批",
              t.createdAt || "2026-06-29 10:30:00",
              "handle"
            ]);
          });
        } catch (eInvTodo) {}

        return extraRows.concat(base);
      }
      function renderMtTable() {
        var h = document.getElementById("mtHead");
        h.innerHTML = "";
        cfg.cols.forEach(function (x) {
          var th = document.createElement("th");
          th.textContent = x;
          h.appendChild(th);
        });
        var b = document.getElementById("mtBody");
        b.innerHTML = "";
        var displayRows = getTableRows();
        for (var i = 0; i < displayRows.length; i += 1) {
          var tr = document.createElement("tr");
          for (var j = 0; j < cfg.cols.length; j += 1) {
            var td = document.createElement("td");
            var val = displayRows[i][j];
            if (j === 0) {
              td.className = "mt-col-check";
              td.innerHTML = "<input type='checkbox' aria-label='选择行' />";
            } else if (cfg.cols[j] === "流程状态") {
              var sClass =
                val === "已驳回" ? "mt-s3" : val === "待审批" || val === "待领用" ? "mt-s2" : "mt-s1";
              td.innerHTML = "<span class='mt-status " + sClass + "'>" + val + "</span>";
            } else if (cfg.cols[j] === "状态") {
              td.innerHTML = "<span class='mt-status mt-s1'>" + val + "</span>";
            } else if (cfg.cols[j] === "办理人") {
              td.innerHTML = "<span class='mt-status mt-s1'>" + val + "</span>";
            } else if (cfg.cols[j] === "流程定义名称") {
              td.textContent = inventoryTodoPrefixedProcName(val, {
                "流程定义名称": String(val || ""),
                "流程定义KEY": String(displayRows[i][3] || ""),
                "任务名称": String(displayRows[i][4] || ""),
                "办理人": String(displayRows[i][5] || "")
              });
            } else if (cfg.cols[j] === "操作" && val === "icons") {
              /* 我发起的：已驳回可改/删/看；待审核类（审核中、待审批等）仅查看 + 流程跟踪 */
              var statusIdx = cfg.cols.indexOf("流程状态");
              var procStatus = statusIdx >= 0 ? String(displayRows[i][statusIdx] || "") : "";
              var canEdit = procStatus === "已驳回";
              if (canEdit) {
                td.innerHTML =
                  "<a href='#' class='mt-icon-btn' title='编辑'><i class='fa-regular fa-pen-to-square' aria-hidden='true'></i></a>" +
                  "<a href='#' class='mt-icon-btn' title='删除'><i class='fa-regular fa-trash-can' aria-hidden='true'></i></a>" +
                  "<a href='#' class='mt-icon-btn' title='查看'><i class='fa-regular fa-eye' aria-hidden='true'></i></a>";
              } else {
                td.innerHTML =
                  "<a href='#' class='mt-icon-btn' title='查看'><i class='fa-regular fa-eye' aria-hidden='true'></i></a>" +
                  "<a href='#' class='mt-icon-btn' title='流程跟踪'><i class='fa-regular fa-file-lines' aria-hidden='true'></i></a>";
              }
            } else if (cfg.cols[j] === "操作") {
              var txt = val === "handle" ? "办理" : "查看";
              var ico = val === "handle" ? "fa-pen-to-square" : "fa-eye";
              td.innerHTML = "<span class='mt-action'><i class='fa-regular " + ico + "'></i>" + txt + "</span>";
            } else {
              td.textContent = val;
            }
            tr.appendChild(td);
          }
          b.appendChild(tr);
        }
        var totalEl = document.getElementById("mtTotal");
        totalEl.textContent = String(displayRows.length);
      }
      function handoffTodoExtraCount() {
        if (scene !== "todo" || !window.DemoCrossDeptHandoff) return 0;
        return DemoCrossDeptHandoff.getPendingForMech().length;
      }
      renderMtTable();
      window.__mtCfg = cfg;
      var ps = document.getElementById("mtPageSize");
      try {
        if (cfg.page && cfg.page.indexOf("条/页") >= 0) {
          var n = parseInt(cfg.page, 10);
          if (!isNaN(n)) ps.value = String(n);
        }
      } catch (ePage) {}
      var btnWrap = document.getElementById("mtPageBtns");
      if (btnWrap && cfg.pageBtns && cfg.pageBtns.length) {
        btnWrap.innerHTML = "<button type='button' aria-label='上一页'>&lt;</button>";
        cfg.pageBtns.forEach(function (x, idx) {
          var isCurrent = idx === 0;
          var cls = isCurrent ? " class='is-current'" : "";
          var aria = isCurrent ? " aria-current='page'" : "";
          btnWrap.innerHTML += "<button type='button'" + cls + aria + ">" + x + "</button>";
        });
        btnWrap.innerHTML += "<button type='button' aria-label='下一页'>&gt;</button>";
      }

      var M = window.DemoListFormModal;
      if (M) {
        var root = document.querySelector("[data-list-form-demo]");
        if (root) {
          root.addEventListener("click", function (e) {
            var tr = e.target.closest("#mtBody tr");
            if (!tr) return;
            var cols = cfg.cols;
            var map = M.collectRowMapFromTr(tr, cols);
            var mod = document.getElementById("mtTitle").textContent.trim();
            if (e.target.closest('a[title="删除"]')) {
              e.preventDefault();
              M.openDeleteConfirm(cols, map, function () {
                var idx = Array.prototype.indexOf.call(tr.parentNode.children, tr);
                var hc = handoffTodoExtraCount();
                if (idx < hc) {
                  alert("内部流转待办请在领用申请页办理，勿从此处删除（演示）");
                  return;
                }
                cfg.rows.splice(idx - hc, 1);
                renderMtTable();
              });
              return;
            }
            if (e.target.closest('a[title="编辑"]')) {
              e.preventDefault();
              M.openEditForm(mod, cols, map, function (newMap) {
                var idx = Array.prototype.indexOf.call(tr.parentNode.children, tr);
                var hc = handoffTodoExtraCount();
                if (idx < hc) {
                  alert("内部流转待办请在领用申请页办理（演示）");
                  return;
                }
                var cfgIdx = idx - hc;
                for (var j = 0; j < cols.length; j++) {
                  var c = cols[j];
                  if (!c || c === "操作") continue;
                  if (newMap[c] != null && cfg.rows[cfgIdx]) cfg.rows[cfgIdx][j] = newMap[c];
                }
                renderMtTable();
              });
              return;
            }
            if (e.target.closest('a[title="查看"]')) {
              e.preventDefault();
              M.openDetailModal(mod, cols, map);
              return;
            }
            if (e.target.closest('a[title="流程跟踪"]')) {
              e.preventDefault();
              alert("流程跟踪（演示）");
              return;
            }
            var act = e.target.closest(".mt-action");
            if (act) {
              e.preventDefault();
              var t = (act.textContent || "").replace(/\s+/g, "");
              if (t.indexOf("办理") >= 0) {
                var procName = map["流程定义名称"] || "";
                var m3TaskMap = {
                  "订单需求管理审批": 1,
                  "录入销售合同单号": 1,
                  "录入物流单号": 1
                };
                var m10TaskMap = {
                  "库存管理审批": 1
                };
                var todoUnifiedForms = {
                  "领用申请审批": 1,
                  "货物质量验收审批": 1,
                  "项目公司入库审批": 1,
                  "退换货管理审批": 1
                };
                var procKey = map["流程定义KEY"] || "";
                if (procName.indexOf("盘点任务") >= 0 || procName === "盘点差异审批" || procKey.indexOf("pdtask_") === 0 || procKey.indexOf("pddiff_") === 0) {
                  try {
                    if (procKey.indexOf("pddiff_") === 0) {
                      var invTodo = inventoryStoredTodos().filter(function (x) { return x.key === procKey; })[0];
                      if (invTodo) {
                        map.taskNo = invTodo.taskNo;
                        map.flowType = invTodo.flowType;
                        map.assetNo = invTodo.assetNo;
                        map.code = invTodo.code;
                        map.typeCode = invTodo.typeCode;
                        map.product = invTodo.product;
                        map.name = invTodo.name;
                        map.materialTypeName = invTodo.materialTypeName;
                        map.dept = invTodo.dept;
                        map.bookLoc = invTodo.bookLoc;
                        map.realLoc = invTodo.realLoc;
                        map.user = invTodo.user;
                        map.bookQty = invTodo.bookQty;
                        map.realQty = invTodo.realQty;
                        map.unit = invTodo.unit;
                        map.health = invTodo.health;
                        map.result = invTodo.result;
                        map.reason = invTodo.reason;
                      }
                    }
                  } catch (eInvMap) {}
                  openInventoryTodoHandleModal(map);
                  return;
                }
                if (procKey.indexOf("handoff_") === 0) {
                  var hid = procKey.replace(/^handoff_/, "");
                  var destH =
                    "purchase-plan-approval-handle.html?task=" +
                    encodeURIComponent("领用申请审批") +
                    "&row=1&hid=" +
                    encodeURIComponent(hid);
                  if (typeof window.__demoGo === "function") window.__demoGo(destH);
                  else window.location.href = destH;
                  return;
                }
                if (procName === "订单需求管理审批") {
                  var destOrderHandle =
                    "purchase-plan-approval-handle.html?task=" +
                    encodeURIComponent(procName) +
                    "&row=" +
                    encodeURIComponent(map["序号"] || "");
                  if (typeof window.__demoGo === "function") window.__demoGo(destOrderHandle);
                  else window.location.href = destOrderHandle;
                  return;
                }
                if (m10TaskMap[procName]) {
                  if (window.M10QaInboundModal && typeof window.M10QaInboundModal.openReturnInitiator === "function") {
                    window.M10QaInboundModal.openReturnInitiator();
                  } else {
                    openMtQaAcceptModal();
                  }
                  return;
                }
                if (m3TaskMap[procName]) {
                  openMtQaAcceptModal();
                  return;
                }
                if (procName.indexOf("采购计划审批单") >= 0 || todoUnifiedForms[procName]) {
                  var rowNo = map["序号"] || "";
                  var pName = procName ? encodeURIComponent(procName) : "";
                  var qs = "?row=" + encodeURIComponent(rowNo || "") + (pName ? "&task=" + pName : "");
                  var dest = "purchase-plan-approval-handle.html" + qs;
                  if (typeof window.__demoGo === "function") window.__demoGo(dest);
                  else window.location.href = dest;
                  return;
                }
                M.openHandleFormModal(mod, map);
              } else M.openDetailModal(mod, cols, map);
            }
          });
        }
      }
    })();
  </script>
</body>
</html>
