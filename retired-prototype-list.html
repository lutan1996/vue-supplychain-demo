      var b = document.getElementById("rpBody");
      (cfg.rows || []).forEach(function (row) {
        var tr = document.createElement("tr");
        cfg.cols.forEach(function (col, idx) {
          var td = document.createElement("td");
          if (col === "操作") {
            td.className = "rp-ops";
            td.innerHTML =
              '<span class="rp-ops-inner">' +
              '<a href="#" class="rp-icon-btn" title="查看详情" aria-label="查看详情"><i class="fa-regular fa-eye" aria-hidden="true"></i></a>' +
              '<a href="#" class="rp-icon-btn" title="修改" aria-label="修改"><i class="fa-regular fa-pen-to-square" aria-hidden="true"></i></a>' +
              '<a href="#" class="rp-icon-btn" title="删除" aria-label="删除"><i class="fa-regular fa-trash-can" aria-hidden="true"></i></a>' +
              "</span>";
          } else if (col === "") {
            td.className = "rp-check";
            td.innerHTML = "<input type='checkbox' aria-label='选择行' />";
          } else {
            td.textContent = row[idx] != null ? row[idx] : "";
          }
          tr.appendChild(td);
        });
        b.appendChild(tr);
      });
      document.getElementById("rpTotal").textContent = String((cfg.rows || []).length);

      var resetBtn = document.getElementById("rpResetBtn");
      var searchBtn = document.getElementById("rpSearchBtn");
      if (resetBtn) {
        resetBtn.addEventListener("click", function (e) {
          e.preventDefault();
          document.querySelectorAll("#rpSearch input, #rpSearch select").forEach(function (el) {
            if (el.tagName === "SELECT") el.selectedIndex = 0;
            else el.value = "";
          });
        });
      }
      if (searchBtn) {
        searchBtn.addEventListener("click", function (e) {
          e.preventDefault();
        });
      }
    })();
  </script>
</body>
</html>
