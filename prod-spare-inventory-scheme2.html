    :root {

      --bg: #f0f3f8;
      --text: #1f2d3d;
    }
    * { box-sizing: border-box; }
    .ledger-page {
      display: flex;
      flex-direction: column;
      min-height: calc(100vh - 56px);
      background: var(--bg);
      color: var(--text);
      font-size: 13px;
    }
    .ledger-view-row {
      flex: 0 0 auto;
      min-height: 48px;
      padding: 9px 12px 7px;
      display: flex;
      align-items: center;
      background: #fff;
      border-bottom: 1px solid var(--border);
      position: relative;
      z-index: 20;
    }
    .page-view-switch { display: flex; gap: 4px; align-items: center; }
    .page-view-switch > a {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      height: 32px;
      padding: 0 14px;
      border-radius: 4px;
      color: #64748b;
      text-decoration: none;
      font-size: 13px;
    }
    .overview-dd { position: relative; display: inline-flex; }
    .overview-dd-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      height: 32px;
      padding: 0 12px;
      border: 0;
      border-radius: 4px;
      background: var(--primary);
      color: #fff;
      font-weight: 600;
      font-size: 13px;
      font-family: inherit;
      cursor: pointer;
    }
    .overview-dd-btn .caret { font-size: 10px; opacity: .92; margin-left: 2px; }
    .overview-dd-menu {
      display: none;
      position: absolute;
      left: 0;
      top: calc(100% + 4px);
      min-width: 112px;
      padding: 4px;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 6px;
      box-shadow: 0 10px 24px rgba(15, 23, 42, .14);
      z-index: 60;
    }
    .overview-dd.open .overview-dd-menu { display: block; }
    .overview-dd-menu a {
      display: block;
      padding: 8px 12px;
      border-radius: 4px;
      color: #334155;
      text-decoration: none;
      font-size: 13px;
      white-space: nowrap;
    }
    .overview-dd-menu a:hover { background: #f0f7ff; color: #1677ff; }
    .overview-dd-menu a.on { background: #e6f4ff; color: #1677ff; font-weight: 600; }
    .scheme2-empty {
      flex: 1;
      min-height: 0;
      background: var(--bg);
    }
  </style>

  <script>
    (function () {
      function jumpInventoryPage(file, action, label) {
        if (action && typeof navigateBySidebarAction === "function" && navigateBySidebarAction(action, { label: label || "" })) {
          return true;
        }
        try {
          if (window.top && window.top !== window && typeof window.top.__demoOpenPage === "function") {
            if (window.top.__demoOpenPage(file) === true) return true;
          }
        } catch (eTop) {}
        window.location.href = file;
        return true;
      }
      var dd = document.getElementById("overviewDd");
      var btn = document.getElementById("overviewDdBtn");
      var menu = document.getElementById("overviewDdMenu");
      if (dd && btn && menu) {
        btn.addEventListener("click", function (e) {
          e.preventDefault();
          e.stopPropagation();
          var open = !dd.classList.contains("open");
          dd.classList.toggle("open", open);
          btn.setAttribute("aria-expanded", open ? "true" : "false");
        });
        menu.addEventListener("click", function (e) {
          var a = e.target.closest("a[href]");
          if (!a) return;
          e.preventDefault();
          e.stopPropagation();
          dd.classList.remove("open");
          btn.setAttribute("aria-expanded", "false");
          if (a.classList.contains("on")) return;
          jumpInventoryPage(a.getAttribute("href"), a.getAttribute("data-action"), a.getAttribute("data-label"));
        }, true);
        document.addEventListener("click", function () {
          dd.classList.remove("open");
          btn.setAttribute("aria-expanded", "false");
        });
      }
      var wh = document.getElementById("linkWarehouseView");
      if (wh) {
        wh.addEventListener("click", function (e) {
          e.preventDefault();
          e.stopPropagation();
          jumpInventoryPage("prod-spare-storage-0714.html", "prod-spare-storage", "仓库视图");
        }, true);
      }
    })();
  </script>
