<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>领用申请 - 新能源物资供应链管理系统</title>
  <link rel="stylesheet" href="css/vendor/fa-all.min.css" />
  <link rel="stylesheet" href="css/subpage-base.css" />
  <link rel="stylesheet" href="css/carrier-management.css" />
  <link rel="stylesheet" href="css/source-navbar-header.css" />
  <style>
    .p-tag{display:inline-flex;padding:2px 8px;border-radius:10px;border:1px solid transparent;font-size:12px}
    .p-tag.wait{background:#fff7e6;border-color:#ffd591;color:#d48806}.p-tag.pass{background:#f6ffed;border-color:#b7eb8f;color:#389e0d}.p-tag.no{background:#fff1f0;border-color:#ffa39e;color:#cf1322}
    .p-kpis{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-bottom:10px}.p-k{background:#fff;border:1px solid #e6edf6;border-radius:10px;padding:12px}.p-k b{font-size:12px;color:#5b6b7f;display:block}.p-k span{font-size:20px;color:#1677ff;font-weight:700;display:block;margin-top:6px}
    .p-mask{position:fixed;inset:0;background:rgba(0,0,0,.35);display:none;align-items:center;justify-content:center;z-index:2500}.p-mask.show{display:flex}.p-box{width:min(560px,94vw);background:#fff;border-radius:10px;overflow:hidden}
    .p-hd{padding:12px 16px;border-bottom:1px solid #edf2f8;font-weight:600}.p-bd{padding:12px 16px}.p-ft{padding:10px 16px;border-top:1px solid #edf2f8;display:flex;justify-content:flex-end;gap:8px}
    .p-bd .row{display:grid;grid-template-columns:110px 1fr;gap:8px;align-items:center;margin-bottom:8px;font-size:13px}
    .p-bd textarea{width:100%;min-height:70px;border:1px solid #d9d9d9;border-radius:4px;padding:6px 8px;resize:vertical}
    .carrier-table tbody td:last-child a{
      color:#1677ff;text-decoration:none;font-weight:600;font-size:14px;line-height:1.2;
    }
    .carrier-table tbody td:last-child a:hover{ color:#4096ff; text-decoration:underline; }
  </style>
</head>
<body class="page-source-navbar page-subpage page-logistics">
  <div class="page-bg" aria-hidden="true"></div>
  <div class="app">
    <header class="header"><div class="header-left"><button class="header-hamburger" aria-label="菜单"><svg viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h16"/></svg></button><a class="header-logo" href="#"><img src="assets/logo-chenergy.png" width="220" height="40" alt="" /></a><div class="header-source-brand"><p>新能源供应链管理系统</p></div></div><div class="header-right"><span class="clock" id="clock"></span><div class="user-avatar">用</div></div></header>
    <div class="layout">
      <aside class="sidebar"><div class="nav-item nav-item--module-active"><span class="nav-label">采购管理</span></div></aside>
      <main class="main-scroll"><div class="carrier-main-inner">
        <h1 class="carrier-page-title">领用申请（XQ-PROC-4）</h1>
        <div class="p-kpis"><div class="p-k"><b>本月申请</b><span>32</span></div><div class="p-k"><b>待审批</b><span>6</span></div><div class="p-k"><b>已通过</b><span>24</span></div><div class="p-k"><b>未通过</b><span>2</span></div></div>
        <div class="carrier-toolbar"><button class="carrier-btn-add"><i class="fa-solid fa-plus"></i> 新增申请</button><div class="carrier-toolbar-right"><select class="carrier-select" id="useRole"><option value="applicant">申请人</option><option value="approver">审批人</option><option value="material">物资专责</option></select><input class="carrier-search" placeholder="申请编号/部门"/><select class="carrier-select"><option>全部状态</option><option>待审批</option><option>已通过</option><option>不通过</option></select><button class="carrier-btn-add">查询</button></div></div>
        <div class="carrier-table-wrap"><table class="carrier-table"><thead><tr><th>领用单号</th><th>领用类型</th><th>物资名称</th><th>规格型号</th><th>申请数量</th><th>单位</th><th>申请部门</th><th>申请人</th><th>申请时间</th><th>领用事由</th><th>领用状态</th><th>备注</th><th>操作</th></tr></thead><tbody id="tb">
          <tr><td>LY-2026-018</td><td>物资</td><td>变流器模块</td><td>VM-2200</td><td>10</td><td>台</td><td>华北运维部</td><td>王芳</td><td>2026-04-15</td><td>场站抢修</td><td data-status><span class="p-tag wait">审批中</span></td><td data-node>部门主管审核</td><td data-ops></td></tr>
          <tr><td>LY-2026-020</td><td>物资</td><td>智能风机控制器</td><td>V2.0</td><td>12</td><td>台</td><td>机械所</td><td>机械所专责</td><td>2026-04-29</td><td>电控所领用后·内部流转</td><td data-status><span class="p-tag wait">待领用</span></td><td data-node>待发起领用申请</td><td data-ops></td></tr>
        </tbody></table></div>
      </div></main>
    </div>
  </div>
  <div class="p-mask" id="m"><div class="p-box"><div class="p-hd">领用审批</div><div class="p-bd" id="t"></div><div class="p-ft"><button class="carrier-btn-add" id="c">取消</button><button class="carrier-btn-add" id="o">通过</button><button class="carrier-btn-add" id="r">不通过</button></div></div></div>
  <script src="js/sidebar-actions.js"></script><script src="js/subpage-feature-title.js"></script><script src="js/site-footer.js"></script>
<script src="js/subpage-clock.js"></script>
  <script>
    (function(){
      var tb=document.getElementById("tb"),m=document.getElementById("m"),t=document.getElementById("t"),cur=null;
      function openUnifiedProgress(){
        if(typeof window.openUnifiedProgressModal==="function" && window.openUnifiedProgressModal()) return;
        var flowMask=document.getElementById("mapUnifiedProgressModal");
        if(!flowMask && typeof window.ensureUnifiedProgressModal==="function") flowMask=window.ensureUnifiedProgressModal();
        if(flowMask) flowMask.classList.add("show");
      }
      function openQuickModal(title,bodyHtml,withProgress){
        var id="useQuickMask",qm=document.getElementById(id);
        if(!qm){
          qm=document.createElement("div");
          qm.id=id; qm.className="p-mask";
          qm.innerHTML='<div class="p-box"><div class="p-hd"><span id="useQuickTitle"></span><button type="button" class="carrier-btn-add" data-close-quick="1" style="margin-left:auto;height:auto;padding:0;border:none;background:transparent;color:#8c8c8c">×</button></div><div class="p-bd" id="useQuickBody"></div><div class="p-ft"><button class="carrier-btn-add" data-close-quick="1">取消</button></div></div>';
          document.body.appendChild(qm);
          qm.addEventListener("click",function(e){
            if(e.target===qm || (e.target && e.target.getAttribute("data-close-quick")==="1")) qm.classList.remove("show");
            var p=e.target&&e.target.closest?e.target.closest("[data-open-flow]"):null;
            if(p){ e.preventDefault(); openUnifiedProgress(); }
          });
        }
        qm.querySelector("#useQuickTitle").innerHTML=withProgress? title+'<a href="#" data-open-flow style="margin-left:10px;color:#1677ff;font-size:12px;text-decoration:none;font-weight:600;">流程进度</a>':title;
        qm.querySelector("#useQuickBody").innerHTML=bodyHtml;
        qm.classList.add("show");
      }
      function close(){m.classList.remove("show");cur=null;}
      document.getElementById("c").onclick=close;
      m.onclick=function(e){if(e.target===m)close();};
      function statusOf(tr){ return (tr.querySelector("[data-status]")||tr.children[10]).textContent.trim(); }
      function ensureTenRows(){
        var rows = Array.prototype.slice.call(tb.querySelectorAll("tr"));
        Array.prototype.slice.call(tb.querySelectorAll("tr.use-fill-row")).forEach(function(r){ r.remove(); });
        rows = Array.prototype.slice.call(tb.querySelectorAll("tr"));
        if (rows.length >= 10) return;
        var colCount = 13;
        for (var i = rows.length; i < 10; i++) {
          var tr = document.createElement("tr");
          tr.className = "use-fill-row";
          var html = "";
          for (var j = 0; j < colCount; j++) html += '<td style="color:#bfbfbf">—</td>';
          tr.innerHTML = html;
          tb.appendChild(tr);
        }
      }
      function renderOps(){
        var role = document.getElementById("useRole").value;
        Array.prototype.slice.call(tb.querySelectorAll("tr")).forEach(function(tr){
          if (tr.classList.contains("use-fill-row")) return;
          var st = statusOf(tr);
          var ops = ['<a href="#" data-a="detail">查看</a>','<a href="#" data-a="edit">编辑</a>','<a href="#" data-a="delete">删除</a>'];
          if (role === "material" && st.indexOf("已批准") >= 0) ops.push('<a href="#" data-a="outbound">确认出库</a>');
          tr.querySelector("[data-ops]").innerHTML = ops.join("");
        });
        ensureTenRows();
      }
      tb.onclick=function(e){
        var actionEl = e.target.closest("[data-a]");
        if(!actionEl) return;
        var act = actionEl.getAttribute("data-a");
        if(act==="detail"){ e.preventDefault(); var tr=actionEl.closest("tr"); openQuickModal("领用申请详情",'<div style="display:flex;justify-content:flex-start;margin:0 0 8px;"><a href="#" data-open-flow class="carrier-btn-add" style="height:28px;line-height:26px;padding:0 10px;border-radius:6px;font-size:12px;">流程进度</a></div><div class="row"><span>申请编号</span><span>'+tr.children[0].textContent+'</span></div><div class="row"><span>物资名称</span><span>'+tr.children[2].textContent+'</span></div><div class="row"><span>申请数量</span><span>'+tr.children[4].textContent+' '+tr.children[5].textContent+'</span></div><div class="row"><span>领用状态</span><span>'+tr.children[10].textContent.trim()+'</span></div>',false); return; }
        if(act==="new"){ e.preventDefault(); openQuickModal("新增领用申请",'<div class="row"><span>领用类型</span><select><option>物资</option><option>货物</option></select></div><div class="row"><span>物资名称</span><input class="carrier-search" /></div><div class="row"><span>申请数量</span><input class="carrier-search" /></div><div class="row"><span>领用事由</span><textarea></textarea></div>',false); return; }
        if(act==="edit"){ e.preventDefault(); var trEdit=actionEl.closest("tr"); openQuickModal("编辑领用申请",'<div class="row"><span>申请编号</span><span>'+trEdit.children[0].textContent+'</span></div><div class="row"><span>物资名称</span><input class="carrier-search" value="'+trEdit.children[2].textContent+'" /></div><div class="row"><span>申请数量</span><input class="carrier-search" value="'+trEdit.children[4].textContent+'" /></div>',false); return; }
        if(act==="delete"){ e.preventDefault(); alert("删除领用申请（演示，二次确认）"); return; }
        if(act==="outbound"){ e.preventDefault(); alert("打开确认出库弹窗（演示）"); return; }
        var a=e.target.closest("[data-a='need']");
        if(!a)return;
        e.preventDefault();
        cur=a.closest("tr");
        t.innerHTML='<div class="row"><span>申请编号</span><b>'+cur.children[0].textContent+'</b></div>'
          +'<div class="row"><span>领用类型</span><span>'+cur.children[1].textContent+'</span></div>'
          +'<div class="row"><span>物资名称</span><span>'+cur.children[2].textContent+'</span></div>'
          +'<div class="row"><span>规格型号</span><span>'+cur.children[3].textContent+'</span></div>'
          +'<div class="row"><span>申请数量</span><span>'+cur.children[4].textContent+' '+cur.children[5].textContent+'</span></div>'
          +'<div class="row"><span>申请部门</span><span>'+cur.children[6].textContent+'</span></div>'
          +'<div class="row"><span>申请人</span><span>'+cur.children[7].textContent+'</span></div>'
          +'<div class="row"><span>领用事由</span><span>'+cur.children[9].textContent+'</span></div>'
          +'<div class="row"><span>审批意见</span><textarea id="opinion" placeholder="请输入审批意见"></textarea></div>';
        m.classList.add("show");
      };
      document.getElementById("o").onclick=function(){
        if(!cur)return;
        var op = (document.getElementById("opinion").value||"").trim() || "同意需用";
        cur.querySelector("[data-status]").innerHTML='<span class="p-tag pass">已批准</span>';
        cur.querySelector("[data-node]").textContent="物资专责确认出库";
        close();
        renderOps();
      };
      document.getElementById("r").onclick=function(){
        if(!cur)return;
        var op = (document.getElementById("opinion").value||"").trim();
        if(!op){ alert("不通过时请填写审批意见"); return; }
        cur.querySelector("[data-status]").innerHTML='<span class="p-tag no">已驳回</span>';
        cur.querySelector("[data-node]").textContent="已驳回";
        close();
        renderOps();
      };
      function openCreateUseModal(prefill){
        prefill = prefill || {};
        var nameV = String(prefill.materialName || "");
        var qtyV = String(prefill.qty || "");
        var reasonV = String(prefill.reason || "");
        openQuickModal("新增领用申请",
          '<div class="row"><span>领用类型</span><select><option>物资</option><option>货物</option></select></div>'+
          '<div class="row"><span>物资名称</span><input class="carrier-search" value="'+nameV.replace(/"/g, "&quot;")+'" /></div>'+
          '<div class="row"><span>申请数量</span><input class="carrier-search" value="'+qtyV.replace(/"/g, "&quot;")+'" /></div>'+
          '<div class="row"><span>领用事由</span><textarea>'+reasonV.replace(/</g, "&lt;")+'</textarea></div>',false);
      }
      document.getElementById("useRole").addEventListener("change", renderOps);
      document.querySelector(".carrier-toolbar > .carrier-btn-add").addEventListener("click", function(){
        openCreateUseModal();
      });
      renderOps();

      try {
        function nowText(){
          var d = new Date();
          function p(n){ return String(n).padStart(2,"0"); }
          return d.getFullYear()+"-"+p(d.getMonth()+1)+"-"+p(d.getDate())+" "+p(d.getHours())+":"+p(d.getMinutes());
        }
        function upsertLeaderApprovalTask(payload){
          var key = "map_use_apply_approvals_v1";
          var list = [];
          try { list = JSON.parse(localStorage.getItem(key) || "[]"); } catch(eList) { list = []; }
          var hit = false;
          list = list.map(function(x){
            if (payload.sourceHid && String(x.sourceHid || "") === String(payload.sourceHid)) {
              hit = true;
              return payload;
            }
            return x;
          });
          if (!hit) list.push(payload);
          try { localStorage.setItem(key, JSON.stringify(list)); } catch(eSave) {}
        }
        var sp = new URLSearchParams(window.location.search || "");
        if (sp.get("openNew") === "1") {
          var prefill = {};
          var hid = sp.get("hid") || "";
          var srcHandoff = null;
          if (hid) {
            var list = JSON.parse(localStorage.getItem("map_handoff_tasks_v1") || "[]");
            for (var i = 0; i < list.length; i += 1) {
              if (String(list[i].id || "") === String(hid)) {
                srcHandoff = list[i];
                prefill.materialName = list[i].materialName || "";
                prefill.qty = list[i].qty || "";
                prefill.reason = "电控所已领用；内部流转批次" + (list[i].batchNo || "") + "，机械所办理领用";
                break;
              }
            }
          }
          if (srcHandoff) {
            upsertLeaderApprovalTask({
              id: "UA-" + String(srcHandoff.id || Date.now()),
              sourceHid: String(srcHandoff.id || ""),
              batchNo: srcHandoff.batchNo || "",
              materialName: srcHandoff.materialName || "",
              qty: srcHandoff.qty || "",
              fromDept: srcHandoff.fromDept || "",
              toDept: srcHandoff.toDept || "机械所",
              status: "待审批",
              taskName: "领用申请审批",
              createdAt: nowText()
            });
          }
          setTimeout(function(){ openCreateUseModal(prefill); }, 60);
          try {
            if (typeof window.mapDemoResetTaskReminder === "function") window.mapDemoResetTaskReminder();
          } catch (eRem) {}
        }
      } catch (eOpen) {}
    })();
  </script>
</body>
</html>
