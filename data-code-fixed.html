    function esc(s) {
      return String(s == null ? "" : s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/"/g, "&quot;");
    }

    var classTree = [

            ]},
          { code: "002", name: "机舱", a: "A0100100002", category: "生产类", def: "不包含叶片、轮毂、塔筒。", typeCode: "002", features: [
            { key: "f1", name: "制造商名称", required: true }, { key: "f2", name: "制造商型号", required: true },
            { key: "f3", name: "尺寸（长×宽×高，mm）", required: true }, { key: "f4", name: "重量（t）", required: true }

        ]},

          ]}
        ]}
      ]},

      { code: "A03", name: "工器具", open: false, children: [] },
      { code: "A04", name: "消防安防设备", open: false, children: [] }
    ];

    var allProducts = loadJson(STORAGE_PRODUCTS, {});
    var allFeatures = loadJson(STORAGE_FEATURES, {});

    function featTplFromTree(list) {
      return (list || []).map(function (f, i) { return { id: i + 1, name: f.name, required: !!f.required }; });
    }
    function seedFeaturesFromTree() {
      classTree.forEach(function (b) {
        (b.children || []).forEach(function (m) {
          (m.children || []).forEach(function (s) {
            var k = catKey({ big: b.code, mid: m.code, small: s.code });
            if (!allFeatures[k] && s.features && s.features.length) allFeatures[k] = featTplFromTree(s.features);
          });
        });
      });
      saveJson(STORAGE_FEATURES, allFeatures);
    }
    function featuresForSel() {
      var key = catKey(sel);
      if (!allFeatures[key]) allFeatures[key] = [];
      return allFeatures[key];
    }
    function featKeyByIndex(i) { return "f" + i; }

      if (window.DemoProductCatalogData && DemoProductCatalogData.ensureDemoProducts) {
        allProducts = DemoProductCatalogData.ensureDemoProducts();

    ensureDemoProducts();

    var sel = { big: "", mid: "", small: "" };

      var b = classTree.find(function (x) { return x.code === big; });
      if (!b) return null;

      var feats = p.features || {};
      return {
        id: p.id,
        b: p.b || "",
        a: p.a || (currentSmall && currentSmall.a) || "",
        productName: p.productName || p.name || "",
        mfrName: p.mfrName || feats.f1 || "",
        model: p.model || feats.f2 || "",
        features: feats

    function renderTree() {
      function renderBig(b) {
        var bLabel = b.code + " " + b.name;
        var bShow = treeLabelMatches(bLabel);
        var kids = "";
        if (b.children && b.children.length) {

            .map(function (m) {
              return renderMid(b, m, bLabel);

        if (!bShow && !kids && treeSearchQ) return "";
        var has = b.children && b.children.length;
        var toggle = has ? '<button type="button" class="btn br" style="height:20px;padding:0 6px" data-t="big" data-code="' + esc(b.code) + '">' + (b.open ? "▾" : "▸") + "</button>" : '<span style="width:22px"></span>';
        var row = '<div style="display:flex;align-items:center;gap:6px;padding:6px 8px;cursor:pointer" data-sel="big" data-code="' + esc(b.code) + '">' + toggle + '<span style="font-size:13px">' + esc(bLabel) + "</span></div>";
        return row + (kids ? '<div style="margin-left:18px;display:' + (b.open ? "block" : "none") + '">' + kids + "</div>" : "");
      }
      function renderMid(b, m, parentLabel) {
        var mLabel = m.code + " " + m.name;
        var mShow = treeLabelMatches(mLabel) || treeLabelMatches(parentLabel);
        var kids = "";
        if (m.children && m.children.length) {
          kids = m.children
            .map(function (s) {
              return renderSmall(b, m, s, mLabel, mShow);
            })
            .join("");
        }
        if (!mShow && !kids && treeSearchQ) return "";
        var has = m.children && m.children.length;
        var toggle = has ? '<button type="button" class="btn br" style="height:20px;padding:0 6px" data-t="mid" data-big="' + esc(b.code) + '" data-code="' + esc(m.code) + '">' + (m.open ? "▾" : "▸") + "</button>" : '<span style="width:22px"></span>';
        var row = '<div style="display:flex;align-items:center;gap:6px;padding:6px 8px;cursor:pointer" data-sel="mid" data-big="' + esc(b.code) + '" data-code="' + esc(m.code) + '">' + toggle + '<span style="font-size:13px">' + esc(mLabel) + "</span></div>";
        return row + (kids ? '<div style="margin-left:18px;display:' + (m.open ? "block" : "none") + '">' + kids + "</div>" : "");
      }
      function renderSmall(b, m, s, parentLabel, parentShow) {
        var sLabel = s.code + " " + s.name + " " + (s.a || "");
        var sShow = treeLabelMatches(sLabel) || parentShow || treeLabelMatches(parentLabel);
        if (!sShow && treeSearchQ) return "";
        var active = sel.big === b.code && sel.mid === m.code && sel.small === s.code;
        return '<div style="display:flex;align-items:center;gap:6px;padding:6px 8px;border-radius:4px;cursor:pointer;color:' + (active ? "#1677ff" : "#334155") + ";background:" + (active ? "#e6f4ff" : "transparent") + '" data-sel="small" data-big="' + esc(b.code) + '" data-mid="' + esc(m.code) + '" data-code="' + esc(s.code) + '">' +
          '<span style="width:22px"></span><span style="font-size:13px;font-weight:' + (active ? "600" : "400") + '">' + esc(s.code + " " + s.name) + "</span></div>";
      }
      var html = classTree.map(renderBig).join("");
      treeEl.innerHTML = html || '<p style="padding:8px;color:#94a3b8;font-size:12px">无匹配节点</p>';
    }

    function renderTypeInfo() {
      if (!typeSummaryEl) return;
      if (!currentSmall) {
        typeSummaryEl.innerHTML = '<p style="margin:0;color:#8b9ab0">—</p>';
        return;
      }
      typeSummaryEl.innerHTML =
        '<div class="pd-type-grid-all">' +
        '<div class="pd-type-item"><span class="k">物资类型定义</span><span class="v">' +
        esc(currentSmall.def || "—") +
        "</span></div>" +
        '<div class="pd-type-item"><span class="k">物资类型名称</span><span class="v">' +
        esc(currentSmall.name) +
        "</span></div>" +
        '<div class="pd-type-item"><span class="k">物资类型码</span><span class="v">' +
        esc(currentSmall.a || "—") +
        "</span></div>" +
        "</div>";
    }

    function treeLabelMatches(label) {
      if (!treeSearchQ) return true;
      return String(label || "").toLowerCase().indexOf(treeSearchQ) >= 0;
    }

    function visibleFeatCols() {
      var seen = {};
      featuresForSel().forEach(function (def) {
        if (!def) return;
        var id = Number(def.id);
        if (!id) return;
        if (isBaseFeatName(def.name || "")) return;
        seen[id] = 1;
      });
      productsForSel().map(normalizeProduct).forEach(function (p) {
        extraFeatIndices(p).forEach(function (i) {
          seen[i] = 1;
        });
      });
      return Object.keys(seen)
        .map(Number)
        .sort(function (a, b) {
          return a - b;
        });
    }

    function featCellByFeatIndex(p, featIndex) {
      var key = featKeyByIndex(featIndex);
      var feats = p.features || {};
      var name = feats[key + "_name"] || "";
      var param = feats[key] || "";
      if (!name) {
        var def = featuresForSel().find(function (x) {
          return Number(x.id) === featIndex;
        });
        if (def) name = def.name || "";
      }
      if (isBaseFeatName(name)) return "<td>—</td>";
      var text = name && param ? name + "：" + param : name || param || "";
      return "<td>" + esc(text || "—") + "</td>";
    }

    function buildProductHead(featCols) {
      var h =
        '<tr><th class="pd-col-fixed">产品名称</th><th class="pd-col-fixed">制造商名称</th><th class="pd-col-fixed">产品型号</th><th class="pd-col-fixed">产品编码</th>';
      featCols.forEach(function (i, idx) {
        h += "<th>特征值" + (idx + 1) + "</th>";
      });
      h += '<th class="pd-col-op">操作</th></tr>';
      productHead.innerHTML = h;
    }

    function isBaseFeatName(name) {
      return /制造商名称|制造商型号|产品型号/.test(String(name || ""));
    }
    function extraFeatIndices(p) {
      var feats = p.features || {};
      var defs = featuresForSel();
      var out = [];
      var i;
      for (i = 1; i <= FEAT_COLS; i++) {
        var key = featKeyByIndex(i);
        var name = feats[key + "_name"] || "";
        if (!name) {
          var def = defs.find(function (x) { return Number(x.id) === i; });
          if (def) name = def.name || "";
        }
        if (isBaseFeatName(name)) continue;
        if (name || feats[key]) out.push(i);
      }
      return out;
    }
    function featDisplayText(p, tableColIndex) {
      var indices = extraFeatIndices(p);
      var featIndex = indices[tableColIndex - 1];
      if (!featIndex) return "";
      var key = featKeyByIndex(featIndex);
      var feats = p.features || {};
      var name = feats[key + "_name"] || "";
      var param = feats[key] || "";
      if (!name) {
        var def = featuresForSel().find(function (x) { return Number(x.id) === featIndex; });
        if (def) name = def.name || "";
      }
      if (name && param) return name + "：" + param;
      if (name) return name;
      if (param) return param;
      return "";
    }

    function featCell(p, i) {
      var text = featDisplayText(p, i);
      return "<td>" + esc(text || "—") + "</td>";
    }

    function renderProductList() {
      var list = productsForSel().map(normalizeProduct);
      var featCols = visibleFeatCols();
      buildProductHead(featCols);
      if (!list.length) {
        productBody.innerHTML =
          '<tr><td colspan="' +
          (4 + featCols.length + 1) +
          '" style="text-align:center;color:#8b9ab0">暂无产品，请点击右上角「新增」</td></tr>';
        return;
      }
      productBody.innerHTML = list
        .map(function (p) {
          var cells =
            "<td>" +
            esc(p.productName) +
            "</td><td>" +
            esc(p.mfrName) +
            "</td><td>" +
            esc(p.model) +
            "</td><td>" +
            esc(p.b || "—") +
            "</td>";
          featCols.forEach(function (i) {
            cells += featCellByFeatIndex(p, i);
          });
          cells +=
            '<td class="pd-col-op"><span class="pd-row-actions">' +
            iconBtn("view", p.id, "查看") +
            iconBtn("edit", p.id, "编辑") +
            iconBtn("del", p.id, "删除") +
            "</span></td>";
          return '<tr data-pid="' + esc(p.id) + '">' + cells + "</tr>";
        })
        .join("");
    }

    function renderModalFeatInputs(p) {
      var html = "";
      for (var i = 1; i <= FEAT_COLS; i++) {
        html += '<div class="pd-feat-row">' +
          '<div class="pd-field"><label>特征值' + i + '名称</label><input data-feat-name-idx="' + i + '" value="" placeholder="如：额定风速" /></div>' +
          '<div class="pd-field"><label>特征值' + i + '参数</label><input data-feat-idx="' + i + '" value="" placeholder="如：10.3m/s" /></div>' +
          "</div>";
      }
      mFeatGrid.innerHTML = html;
    }

    function applyPdMfrSourceFromName(name) {
      var rec = window.DemoManufacturerData ? DemoManufacturerData.findByName(name) : null;
      if (mSource) mSource.value = rec && rec.source ? rec.source : "";
    }
    function initPdManufacturerDd(selectedName) {
      if (!mMfrDdRoot || !mMfr || !window.DemoTwoColDd || !window.DemoManufacturerData) return;
      if (pdMfrDdInst && pdMfrDdInst.destroy) {
        pdMfrDdInst.destroy();
        pdMfrDdInst = null;
      }
      DemoManufacturerData.ensureSeeded();
      var rows = [{ value: "", c1: "", c2: "请选择制造商", placeholder: true }];
      DemoManufacturerData.ddRows().forEach(function (r) {
        rows.push({ value: r.value, c1: r.c1, c2: r.c2 });
      });
      pdMfrDdInst = DemoTwoColDd.mount({
        root: mMfrDdRoot,
        hiddenInput: mMfr,
        placeholder: "请选择制造商",
        searchPlaceholder: "搜索制造商编号或名称",
        col1: "制造商编号",
        col2: "制造商名称",
        rows: rows,
        onChange: function () {
          applyPdMfrSourceFromName(mMfr.value);
        }
      });
      if (selectedName) {
        pdMfrDdInst.setValue(String(selectedName), true);
        applyPdMfrSourceFromName(selectedName);
      } else {
        mMfr.value = "";
        if (mSource) mSource.value = "";
      }
    }
    function setModalEditable(editable) {
      if (modalEl) modalEl.classList.toggle("is-readonly", !editable);
      mName.readOnly = !editable;
      mModel.readOnly = !editable;
      if (mMfrDdRoot) mMfrDdRoot.style.pointerEvents = editable ? "" : "none";
      Array.prototype.forEach.call(mFeatGrid.querySelectorAll("input"), function (ip) {
        ip.readOnly = !editable;
      });
    }
    function openModal(mode, product) {
      modalMode = mode;
      editingProductId = (mode === "edit" || mode === "view") && product ? product.id : null;
      modalTitle.textContent = mode === "view" ? "查看产品" : (mode === "edit" ? "编辑产品" : "新增产品");
      var p = product ? normalizeProduct(product) : null;
      mName.value = p ? p.productName : "";
      mModel.value = p ? p.model : "";
      initPdManufacturerDd(p ? p.mfrName : "");
      if (mProductCode) mProductCode.value = p ? p.b : (mode === "add" ? nextB() : "");
      renderModalFeatInputs(p);
      setModalEditable(mode !== "view");
      modalSave.style.display = mode === "view" ? "none" : "";
      modalCancel.textContent = mode === "view" ? "关闭" : "取消";
      modalMask.classList.add("show");
      modalMask.setAttribute("aria-hidden", "false");
    }
    function closeModal() {
      modalMask.classList.remove("show");
      modalMask.setAttribute("aria-hidden", "true");
      editingProductId = null;
      modalMode = "add";
      setModalEditable(true);
      modalSave.style.display = "";
      modalCancel.textContent = "取消";
    }
    function openDeleteModal(product) {
      if (!product) return;
      pendingDeleteId = product.id;
      var name = (product.productName || "").trim() || "该产品";
      deleteText.textContent = "是否确认删除产品「" + name + "」？删除后不可恢复。";
      deleteModalMask.classList.add("show");
      deleteModalMask.setAttribute("aria-hidden", "false");
    }
    function closeDeleteModal() {
      deleteModalMask.classList.remove("show");
      deleteModalMask.setAttribute("aria-hidden", "true");
      pendingDeleteId = null;
    }
    function readModalFeatures() {
      var feats = {};
      Array.prototype.forEach.call(mFeatGrid.querySelectorAll("input[data-feat-name-idx]"), function (ip) {
        var idx = Number(ip.getAttribute("data-feat-name-idx"));
        feats[featKeyByIndex(idx) + "_name"] = (ip.value || "").trim();
      });
      Array.prototype.forEach.call(mFeatGrid.querySelectorAll("input[data-feat-idx]"), function (ip) {
        feats[featKeyByIndex(Number(ip.getAttribute("data-feat-idx")))] = (ip.value || "").trim();
      });
      return feats;
    }

    function renderPanel() {
      currentSmall = findSmall(sel.big, sel.mid, sel.small);
      if (!currentSmall) {
        hintEl.style.display = "block";
        contentEl.classList.remove("is-show");
        btnAdd.disabled = true;
        return;
      }
      hintEl.style.display = "none";
      contentEl.classList.add("is-show");
      btnAdd.disabled = false;
      renderTypeInfo();
      renderProductList();
    }

    var addIconEl = document.getElementById("pdBtnAddIcon");
    if (addIconEl) addIconEl.innerHTML = ICON_PLUS;

    btnAdd.addEventListener("click", function () {
      if (!currentSmall) return;
      openModal("add", null);
    });
    modalCancel.addEventListener("click", closeModal);
    modalMask.addEventListener("click", function (e) { if (e.target === modalMask) closeModal(); });
    modalSave.addEventListener("click", function () {
      if (modalMode === "view") return;
      if (!currentSmall) return;
      var productName = mName.value.trim();
      var mfrName = mMfr.value.trim();
      var model = mModel.value.trim();
      if (!productName) { alert("请填写产品名称"); return; }
      if (!mfrName) { alert("请选择制造商名称"); return; }
      if (!model) { alert("请填写产品型号"); return; }
      var feats = readModalFeatures();
      feats.f1 = mfrName;
      feats.f2 = model;
      var list = productsForSel();
      var payload = normalizeProduct({
        id: editingProductId || ("p-" + Date.now()),
        b: (mProductCode && mProductCode.value) || nextB(),
        a: currentSmall.a,
        productName: productName,
        mfrName: mfrName,
        model: model,
        features: feats
      });
      if (editingProductId) {
        var idx = list.findIndex(function (x) { return x.id === editingProductId; });
        if (idx >= 0) list[idx] = payload;
      } else {
        list.push(payload);
      }
      saveJson(STORAGE_PRODUCTS, allProducts);
      closeModal();
      renderProductList();
      alert("保存成功（演示）");
    });

    productBody.addEventListener("click", function (e) {
      var btn = e.target.closest("[data-act]");
      if (!btn) return;
      e.preventDefault();
      var pid = btn.getAttribute("data-pid");
      var p = productsForSel().find(function (x) { return x.id === pid; });
      if (!p) return;
      if (btn.getAttribute("data-act") === "view") openModal("view", p);
      if (btn.getAttribute("data-act") === "edit") openModal("edit", p);
      if (btn.getAttribute("data-act") === "del") openDeleteModal(p);
    });

    deleteCancel.addEventListener("click", closeDeleteModal);
    deleteModalMask.addEventListener("click", function (e) {
      if (e.target === deleteModalMask) closeDeleteModal();
    });
    deleteOk.addEventListener("click", function () {
      if (!pendingDeleteId) return;
      allProducts[catKey(sel)] = productsForSel().filter(function (x) { return x.id !== pendingDeleteId; });
      saveJson(STORAGE_PRODUCTS, allProducts);
      closeDeleteModal();
      renderProductList();
      if (typeof window.mapDemoToast === "function") window.mapDemoToast("已删除！");
    });

    treeEl.addEventListener("click", function (e) {
      var t = e.target.closest("[data-t]");
      if (t) {
        e.stopPropagation();
        if (t.getAttribute("data-t") === "big") {
          var b = classTree.find(function (x) { return x.code === t.getAttribute("data-code"); });
          if (b) b.open = !b.open;
        } else {
          var b2 = classTree.find(function (x) { return x.code === t.getAttribute("data-big"); });
          var m2 = b2 && (b2.children || []).find(function (x) { return x.code === t.getAttribute("data-code"); });
          if (m2) m2.open = !m2.open;
        }
        renderTree();
        return;
      }
      var r = e.target.closest("[data-sel]");
      if (!r || r.getAttribute("data-sel") !== "small") return;
      sel = { big: r.getAttribute("data-big"), mid: r.getAttribute("data-mid"), small: r.getAttribute("data-code") };
      renderTree();
      renderPanel();
    });

    if (treeSearchEl) {
      treeSearchEl.addEventListener("input", function () {
        treeSearchQ = String(this.value || "").trim().toLowerCase();
        renderTree();
      });
    }

    renderTree();
    renderPanel();
  })();
</script>
</body>
</html>
