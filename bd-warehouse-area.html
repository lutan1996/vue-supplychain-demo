  <style>
    .bd-wh .main-scroll { background:#f0f3f8; }
    .bd-wh .carrier-main-inner { padding:12px 14px 16px; }
    .bd-filter {
      display:flex; flex-wrap:wrap; gap:10px; align-items:center;
      background:#fff; border:1px solid #e8edf4; border-radius:6px;
      padding:10px 12px; margin-bottom:10px; font-size:12px;
    }
    .bd-filter label { color:#64748b; white-space:nowrap; }
    .bd-filter select, .bd-filter input {

      padding:0 10px; font-size:12px; min-width:140px; background:#fff;

    .bd-filter .ops { margin-left:auto; display:flex; gap:8px; }
    .bd-btn {
      height:30px; padding:0 14px; border-radius:4px; font-size:12px;
      cursor:pointer; border:1px solid #cbd5e1; background:#fff; color:#334155;
    }
    .bd-btn.pri { background:#1677ff; border-color:#1677ff; color:#fff; }
    .bd-btn.ghost { background:#fff; color:#1677ff; border-color:#91caff; }
    .bd-panel {
      background:#fff; border:1px solid #e8edf4; border-radius:6px; overflow:hidden;
    }
    .bd-table { width:100%; border-collapse:collapse; font-size:12px; }
    .bd-table th, .bd-table td {
      padding:10px 12px; border-bottom:1px solid #eef2f7; text-align:left;
      white-space:nowrap; color:#334155;
    }
    .bd-table thead th { background:#f7f9fc; color:#5a6b82; font-weight:600; }
    .bd-table tbody tr:hover td { background:#f8fbff; }
    .bd-tag {
      display:inline-block; padding:1px 8px; border-radius:2px; font-size:11px;
      border:1px solid transparent;
    }
    .bd-tag.ok { color:#389e0d; background:#f6ffed; border-color:#b7eb8f; }
    .bd-tag.wait { color:#1677ff; background:#e6f4ff; border-color:#91caff; }
    .bd-op a { color:#1677ff; text-decoration:none; margin-right:10px; }
    .bd-op a.warn { color:#d46b08; }
    .bd-op a.danger { color:#cf1322; }
    .bd-foot {
      display:flex; justify-content:space-between; align-items:center;
      padding:10px 12px; font-size:12px; color:#64748b; background:#fafbfd;
      border-top:1px solid #eef2f7;
    }
    .bd-modal-mask {
      position:fixed; inset:0; background:rgba(15,23,42,.4); z-index:1200;
      display:none; align-items:center; justify-content:center;
    }
    .bd-modal-mask.open { display:flex; }
    .bd-modal {
      width:560px; max-width:92vw; background:#fff; border-radius:8px;
      box-shadow:0 12px 40px rgba(0,0,0,.18); overflow:hidden;
    }
    .bd-modal-hd {
      padding:12px 16px; border-bottom:1px solid #eef2f7; font-weight:600; font-size:14px;
    }
    .bd-modal-bd { padding:14px 16px; display:grid; gap:12px; max-height:70vh; overflow:auto; }
    .bd-field { display:grid; gap:6px; font-size:12px; color:#475569; }
    .bd-field .req { color:#f5222d; }
    .bd-field input, .bd-field select, .bd-field textarea {
      height:32px; border:1px solid #d9e2ec; border-radius:4px; padding:0 10px; font-size:12px;
    }
    .bd-field textarea { height:72px; padding:8px 10px; resize:vertical; }
    .bd-radios { display:flex; gap:14px; flex-wrap:wrap; align-items:center; }
    .bd-layer-tbl { width:100%; border-collapse:collapse; font-size:12px; }
    .bd-layer-tbl th, .bd-layer-tbl td { border:1px solid #e8edf4; padding:8px; text-align:center; }
    .bd-step { display:inline-flex; align-items:center; gap:6px; }
    .bd-step button {
      width:26px; height:26px; border:1px solid #d9e2ec; border-radius:4px; background:#fff; cursor:pointer;
    }
    .bd-step input { width:48px; height:26px; text-align:center; }
    .bd-modal-ft {
      padding:10px 16px; border-top:1px solid #eef2f7; display:flex; justify-content:flex-end; gap:8px;
    }
    /* 货架方位画布 */
    .ori-canvas {
      min-height:420px; margin:12px; border:1px dashed #91caff; border-radius:8px;
      background:linear-gradient(180deg,#f8fbff,#eef5ff); position:relative; padding:20px;
    }
    .ori-shelf {
      display:inline-block; width:120px; margin:10px; vertical-align:top;
      background:#fff; border:1px solid #91caff; border-radius:6px; overflow:hidden;
      box-shadow:0 2px 8px rgba(22,119,255,.08);
    }
    .ori-shelf .nm { background:#1677ff; color:#fff; padding:6px 8px; font-size:12px; font-weight:600; }
    .ori-shelf .layer {
      border-top:1px solid #e8edf4; padding:8px; font-size:11px; color:#475569; cursor:context-menu;
    }
    .ori-shelf .layer:hover { background:#e6f4ff; }
    .ori-tip { position:absolute; right:16px; bottom:12px; color:#cf1322; font-size:12px; }
  </style>

<script>
var areaEditing=null,areaMode='new';
function areaControls(disabled){document.querySelectorAll('#modalArea input,#modalArea select').forEach(function(x){x.disabled=disabled});document.getElementById('okArea').style.display=disabled?'none':''}
function openArea(mode,row){areaMode=mode;areaEditing=row||null;document.getElementById('areaModalTitle').textContent=mode==='new'?'新建库区':(mode==='edit'?'修改库区':'库区详情');document.getElementById('areaOrg').value=row?row.cells[2].textContent.trim():'';document.getElementById('areaWh').value=row?row.cells[3].textContent.trim():'';document.getElementById('areaName').value=row?row.cells[1].textContent.trim():'';document.getElementById('areaIp').value=row&&row.cells[4].textContent.trim()!=='—'?row.cells[4].textContent.trim():'';document.getElementById('areaRemark').value=row?row.cells[6].textContent.trim():'';areaControls(mode==='detail');document.getElementById('modalArea').classList.add('open')}
function areaOps(){return '<a href="#" data-action="detail">详情</a><a href="#" data-action="edit">修改</a><a href="#" data-action="publish">发布</a><a href="#" class="danger" data-action="delete">删除</a><a href="bd-warehouse-shelf.html">货架查询</a>'}
function renumberArea(){document.querySelectorAll('#areaRows tr').forEach(function(r,i){r.cells[0].textContent=i+1});document.querySelector('.bd-foot span').textContent='共 '+document.querySelectorAll('#areaRows tr').length+' 条'}
document.getElementById('btnNewArea').onclick=function(){openArea('new')};
document.getElementById('cancelArea').onclick=function(){document.getElementById('modalArea').classList.remove('open')};
document.getElementById('okArea').onclick=function(){var org=document.getElementById('areaOrg').value,wh=document.getElementById('areaWh').value,name=document.getElementById('areaName').value.trim(),ip=document.getElementById('areaIp').value.trim()||'—',remark=document.getElementById('areaRemark').value.trim();if(!org||!wh||!name){alert('请填写所属组织、仓库和库区名称');return}if(areaMode==='new'){var row=document.getElementById('areaRows').insertRow();row.innerHTML='<td></td><td>'+name+'</td><td>'+org+'</td><td>'+wh+'</td><td>'+ip+'</td><td><span class="bd-tag wait">未发布</span></td><td>'+remark+'</td><td class="bd-op">'+areaOps()+'</td>'}else{areaEditing.cells[1].textContent=name;areaEditing.cells[2].textContent=org;areaEditing.cells[3].textContent=wh;areaEditing.cells[4].textContent=ip;areaEditing.cells[6].textContent=remark}renumberArea();document.getElementById('modalArea').classList.remove('open')};
document.getElementById('areaRows').onclick=function(e){var a=e.target.closest('a[data-action]');if(!a)return;e.preventDefault();var row=a.closest('tr'),act=a.dataset.action;if(act==='detail'||act==='edit')openArea(act,row);if(act==='delete'&&confirm('确定删除该库区吗？')){row.remove();renumberArea()}if(act==='publish'){var tag=row.cells[5].querySelector('.bd-tag'),published=tag.textContent==='已发布';tag.textContent=published?'未发布':'已发布';tag.className='bd-tag '+(published?'wait':'ok');a.textContent=published?'发布':'取消发布';a.className=published?'':'warn'}};
document.getElementById('btnQueryArea').onclick=function(){var org=document.getElementById('areaFilterOrg').value,wh=document.getElementById('areaFilterWh').value,st=document.getElementById('areaFilterStatus').value,name=document.getElementById('areaFilterName').value.trim();document.querySelectorAll('#areaRows tr').forEach(function(r){r.style.display=(!org||r.cells[2].textContent.trim()===org)&&(!wh||r.cells[3].textContent.trim()===wh)&&(!st||r.cells[5].textContent.trim()===st)&&(!name||r.cells[1].textContent.indexOf(name)>-1)?'':'none'})};
document.getElementById('btnResetArea').onclick=function(){['areaFilterOrg','areaFilterWh','areaFilterStatus'].forEach(function(id){document.getElementById(id).value=''});document.getElementById('areaFilterName').value='';document.querySelectorAll('#areaRows tr').forEach(function(r){r.style.display=''})};
</script>
