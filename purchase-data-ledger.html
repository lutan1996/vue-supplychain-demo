    .status-pass{color:#1677ff;border-color:#91caff;background:#e6f4ff}
    .status-reject{color:#cf1322;border-color:#ffb3b3;background:#fff}
    .status-draft{color:#262626;border-color:#d9d9d9;background:#fff}
    .table-wrap{overflow:auto}
    table{width:100%;min-width:1400px;border-collapse:collapse;font-size:12px}
    th,td{border:1px solid #edf2f7;padding:8px 6px;white-space:nowrap;text-align:center}
    th{background:#fafcff;color:#334155;font-weight:600}
    .pdl-modal-mask{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:3000;display:none;align-items:center;justify-content:center;padding:16px;box-sizing:border-box}
    .pdl-modal-mask.show{display:flex}
    .pdl-dialog{background:#fff;border-radius:10px;width:100%;max-width:1100px;max-height:92vh;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 16px 48px rgba(0,0,0,.18)}
    .pdl-dlg-hd{padding:12px 16px;border-bottom:1px solid #edf2f7;font-weight:600;font-size:16px;color:#1f3551;display:flex;justify-content:space-between;align-items:center}
    .pdl-dlg-bd{padding:12px 16px;overflow-y:auto;font-size:13px}
    .pdl-dlg-ft{padding:10px 16px;border-top:1px solid #edf2f7;display:flex;justify-content:flex-end;gap:10px}
    .pdl-sec{margin-bottom:16px}
    .pdl-sec-h{margin:0 0 10px;font-size:14px;color:#1f3551;border-left:3px solid #1677ff;padding-left:8px;font-weight:600}
    .pdl-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px 12px}
    @media(max-width:900px){.pdl-grid{grid-template-columns:repeat(2,1fr)}}
    @media(max-width:520px){.pdl-grid{grid-template-columns:1fr}}
    .pdl-f{display:flex;flex-direction:column;gap:4px;min-width:0}
    .pdl-f label{font-size:12px;color:#64748b}
    .pdl-f input,.pdl-f select,.pdl-f textarea{height:32px;border:1px solid #d3dce8;border-radius:6px;padding:0 8px;font-size:13px;box-sizing:border-box;width:100%}
    .pdl-f textarea{height:56px;min-height:56px;padding:6px 8px;resize:vertical}
    .pdl-f-full{grid-column:1/-1}
    .pdl-ro{background:#f8fafc;color:#334155;font-weight:500;padding:8px 10px;border-radius:6px;border:1px solid #e6ecf3;min-height:20px}
    .pdl-row-hid{display:none}
    .pdl-x{background:none;border:none;font-size:20px;line-height:1;cursor:pointer;color:#64748b;padding:4px 8px}
    .pdl-req::after{content:" *";color:#cf1322;font-weight:600}

</head>

      function fmtKpiShow(a, b){
        if (!a || !b) return "—";
        var da = new Date(String(a).slice(0, 10) + "T00:00:00");
        var db = new Date(String(b).slice(0, 10) + "T00:00:00");
        if (isNaN(da.getTime()) || isNaN(db.getTime())) return "—";
        var n = Math.ceil((da - db) / 864e5);
        if (!isFinite(n)) return "—";
        return n + " 天";
      }

      function kpiDiffNum(a, b){
        if (!a || !b) return null;
        var da = new Date(String(a).slice(0, 10) + "T00:00:00");
        var db = new Date(String(b).slice(0, 10) + "T00:00:00");
        if (isNaN(da.getTime()) || isNaN(db.getTime())) return null;
        var n = Math.ceil((da - db) / 864e5);
        return isFinite(n) ? n : null;
      }

      function stripMoneyForForm(raw){
        var s = normalize(String(raw || "")).replace(/[¥,\s]/g, "");
        var n = parseFloat(s);
        return isNaN(n) ? "" : String(n);
      }

        var m = {

          "material":["在库","领用中","已领用"],
          "order":["草稿","待确认","已确认","已发货","已完成","已驳回"],
          "goods-quality":["待验收","入库中","已验收"],

      function fillBySchema(schema, i, key){
        var statusPool = tabStatusPool(key);
        var st = statusPool[i % statusPool.length];
        var row = { __id: key + "-" + (i + 1) };
        schema.forEach(function(h, idx){
          var t = normalize(h).replace(/\s+/g,"");
          if (!t) { row[h] = ""; return; }
          if (t === "流程进度") { row[h] = PROC_PROGRESS[i % PROC_PROGRESS.length]; return; }
          if (t.indexOf("状态")>=0 || (t.indexOf("进度")>=0 && t !== "流程进度") || t.indexOf("结论")>=0) { row[h] = st; return; }
          if (t.indexOf("操作")>=0 || t.indexOf("详情")>=0) { row[h] = "__OPS__"; return; }
          if (t.indexOf("框架协议号/常规合同编号")>=0) {
            row[h] = i >= 7
              ? "CG-2026-" + String(100 + (i % 5)).padStart(3,"0") + "-0" + ((i % 3) + 1)
              : "KJ-2026-" + String(100 + (i % 5)).padStart(3,"0");
            return;
          }
          if (t.indexOf("执行合同编号")>=0) {
            if (i >= 7) { row[h] = ""; return; }
            row[h] = "ZX-2026-" + String(100 + (i % 5)).padStart(3,"0") + "-0" + ((i % 3) + 1);
            return;
          }
          if (t.indexOf("单号")>=0 || t.indexOf("编号")>=0) { row[h] = "NO-" + (2026042500 + i + 1); return; }
          if (t.indexOf("合同")>=0 && t.indexOf("号")>=0) { row[h] = "HT-2026-" + (100 + i + 1); return; }
          if (t.indexOf("供应商名称")>=0) { row[h] = ["华东电控股份有限公司","北方能源装备有限公司","中能建设配套供应商"][i % 3]; return; }
          if (t.indexOf("采购标包号")>=0) { row[h] = "SP-CG-2026-" + String(100 + i).padStart(3,"0"); return; }
          if (t.indexOf("科技项目名称")>=0) { row[h] = (i % 3 === 0) ? ("科技课题-" + ((i % 4) + 1)) : ""; return; }
          if (t.indexOf("项目类别")>=0) { row[h] = ["一类","二类","三类"][i % 3]; return; }
          if (t.indexOf("项目/WBS")>=0 || (t.indexOf("WBS")>=0 && t.indexOf("编码")>=0)) { row[h] = "WBS-2026-" + (100 + i); return; }
          if (t.indexOf("项目名称")>=0) { row[h] = "新能源示范项目" + ((i % 6) + 1); return; }
          if (t.indexOf("是否")===0 || (h.indexOf("是否")===0 && t.indexOf("是否")>=0)) { row[h] = (i % 2 === 0) ? "是" : "否"; return; }
          if (t.indexOf("框架协议金额")>=0) { row[h] = (i % 2 === 0) ? String((0.8 + i * 0.31).toFixed(2)) : ""; return; }
          if (t.indexOf("执行合同金额")>=0 || t.indexOf("采购合同金额")>=0) {
            row[h] = stripMoneyForForm("¥" + (1000 + i * 320));
            return;
          }
          if (t.indexOf("采购方式")>=0) { row[h] = ["公开招标","竞争性谈判","询价"][i % 3]; return; }
          if (t.indexOf("采购标的类别")>=0 || (t.indexOf("标的")>=0 && t.indexOf("类别")>=0)) { row[h] = ["物资","服务","工程"][i % 3]; return; }
          if (t.indexOf("网址")>=0) { row[h] = "https://demo.example/p/" + i; return; }
          if (t.indexOf("物资")>=0 || t.indexOf("货物")>=0 || (t.indexOf("名称")>=0 && t.indexOf("项目")<0 && t.indexOf("科技")<0)) { row[h] = ["变流器模块","IGBT驱动板","汇流箱","接线端子","支架组件","逆变器","电缆","保护器"][i%8]; return; }
          if (t.indexOf("规格")>=0 || t.indexOf("型号")>=0) { row[h] = "XH-" + (101 + i); return; }
          if (t.indexOf("数量")>=0) { row[h] = String(10 + (i % 9) * 5); return; }
          if (t === "单位") { row[h] = ["台","件","套","米","个"][i%5]; return; }
          if (t.indexOf("中标")>=0 && t.indexOf("成交")>=0 && t.indexOf("金额")>=0) { row[h] = "¥" + (1000 + i * 320); return; }
          if (t.indexOf("价")>=0 || t.indexOf("金额")>=0) { row[h] = "¥" + (1000 + i * 320); return; }
          if (t.indexOf("日期")>=0 || t.indexOf("时间")>=0) { row[h] = "2026-04-" + String(10 + (i % 18)).padStart(2,"0"); return; }
          if (t.indexOf("部门")>=0) { row[h] = ["采购部","工程部","财务部","经营发展中心"][i%4]; return; }
          if (t.indexOf("人")>=0) { row[h] = ["王玉","赵六","李四","钱七","宋中波"][i%5]; return; }
          if (t.indexOf("仓")>=0 || t.indexOf("库位")>=0 || t.indexOf("货位")>=0 || t.indexOf("地点")>=0) { row[h] = ["中心库A-01","中心库B-12","区域库C-03","中转区D-02"][i%4]; return; }
          if (t.indexOf("备注")>=0) { row[h] = "正常"; return; }
          if (t.indexOf("序号")>=0) { row[h] = String(i+1); return; }
          row[h] = "正常";
        });
        if (key === "exec") {
          row["考核点1：采购时长"] = fmtKpiShow(row["SRM提报时间"], row["采购合同签订时间"]);
          row["考核点2：合同签订时长"] = fmtKpiShow(row["合同用印时间"], row["中标/成交通知书下发时间"]);
        }
        return row;
      }

      async function loadSchemaAndRows(tab){
        if (!tab) return { schema: currentSchema, rows: makeRowsByTab(activeTab) };
        var schemaKey = tab.key;
        if (schemaCache[schemaKey]) return schemaCache[schemaKey];
        var schema = (TAB_SCHEMAS[schemaKey] || TAB_SCHEMAS[tab.key] || currentSchema).slice();
        var parsed = [];
        for (var i=0;i<10;i++) parsed.push(fillBySchema(schema, i, tab.key));
        var result = { schema: schema, rows: parsed };
        schemaCache[schemaKey] = result;
        return result;
      }

      function renderRows(){
        var n = (document.getElementById("qName").value || "").trim();
        var d = (document.getElementById("qDept").value || "").trim();
        var s = (document.getElementById("qStatus").value || "").trim();
        var list = rows.filter(function(r){
          var name = normalize(r["物资名称"] || r["名称"] || r["货物名称"] || r["项目名称"] || r["供应商名称"] || "");
          var dept = normalize(r["保管部门"] || r["部门"] || r["申请部门"] || r["业务部门"] || "");
          var st = normalize(r["当前状态"] || r["状态"] || r["审批状态"] || "");
          if(n && name.indexOf(n)<0) return false;
          if(d && dept.indexOf(d)<0) return false;
          if(s && st.indexOf(s)<0) return false;
          return true;
        });
        document.getElementById("tbody").innerHTML = list.map(function(r){
          var code = normalize(r["物资编码"] || r["编号"] || r["单号"] || r["入库单号"] || r["发货单号"] || r["合同编号"] || r.__id || ("ROW-" + Math.random()));
          var tr = "<tr data-code='"+esc(code)+"'><td><input type='checkbox' class='row-chk' data-code='"+esc(code)+"'></td>";
          currentSchema.forEach(function(h){
            var hk = normalize(h).replace(/\s+/g,"");
            var val = r[h];
            if (val == null || val === "") val = "";
            var isFlowProgress = hk === "流程进度" || normalize(h).replace(/\s+/g,"") === "流程进度";
            if (!isFlowProgress && (hk.indexOf("状态")>=0 || hk.indexOf("进度")>=0 || hk.indexOf("结论")>=0)) {
              tr += "<td><span class='status-pill "+statusClass(normalize(val))+"'>"+esc(normalize(val)||"草稿")+"</span></td>";
            } else if (hk.indexOf("操作")>=0 || hk.indexOf("详情")>=0 || val === "__OPS__") {
              tr += "<td>"+opHtmlByStatus(normalize(r["状态"] || r["当前状态"] || r["审批状态"] || "草稿"))+"</td>";
            } else {
              tr += "<td>"+esc(val)+"</td>";
            }
          });
          tr += "</tr>";
          return tr;
        }).join("") || '<tr><td colspan="' + (currentSchema.length + 1) + '" style="padding:20px;color:#94a3b8">暂无数据</td></tr>';
      }

      document.addEventListener("click", function(e){
        var tabBtn = e.target.closest("[data-tab-key]");
        if(tabBtn){
          activeTab = tabBtn.getAttribute("data-tab-key") || "exec";
          renderTabs();
          var current = TABS.find(function(t){ return t.key === activeTab; });
          loadSchemaAndRows(current).then(function(res){
            renderHeader(res.schema);
            rows = res.rows;
            renderRows();
          });
          return;
        }
        if(e.target.id === "btnSearch"){ renderRows(); return; }
        if(e.target.id === "btnReset"){ document.getElementById("qName").value=""; document.getElementById("qDept").value=""; document.getElementById("qStatus").value=""; renderRows(); return; }
        if(e.target.id === "btnAdd"){
          if (activeTab === "exec"){ openPdlLedgerModal("add", null); return; }
          rows.unshift(fillBySchema(currentSchema, 0, activeTab));
          renderRows();
          return;
        }
        if(e.target.id === "btnDeleteBatch"){
          var ids = Array.prototype.slice.call(document.querySelectorAll(".row-chk:checked")).map(function(c){ return c.getAttribute("data-code"); });
          if(!ids.length){ alert("请先勾选要删除的数据"); return; }
          rows = rows.filter(function(r){
            var code = normalize(r["物资编码"] || r["编号"] || r["单号"] || r["入库单号"] || r["发货单号"] || r["合同编号"] || r.__id);
            return ids.indexOf(code) < 0;
          });
          renderRows();
          return;
        }
        if(e.target.id === "chkAll"){
          var ck = !!e.target.checked;
          Array.prototype.forEach.call(document.querySelectorAll(".row-chk"), function(c){ c.checked = ck; });
          return;
        }
        var op = e.target.getAttribute("data-op");
        if(op){
          var tr = e.target.closest("tr[data-code]");
          if(!tr) return;
          var code = tr.getAttribute("data-code");
          var row = rows.find(function(r){
            var c = normalize(r["物资编码"] || r["编号"] || r["单号"] || r["入库单号"] || r["发货单号"] || r["合同编号"] || r.__id);
            return c === code;
          });
          if(!row) return;
          if(op === "view"){ alert("查看详情（演示）"); return; }
          if(op === "edit"){
            if (activeTab === "exec"){ openPdlLedgerModal("edit", row); return; }
            alert("编辑弹窗（演示）"); return;
          }
          if(op === "delete"){
            rows = rows.filter(function(r){
              var c = normalize(r["物资编码"] || r["编号"] || r["单号"] || r["入库单号"] || r["发货单号"] || r["合同编号"] || r.__id);
              return c !== code;
            });
            renderRows(); return;
          }
        }
        if(e.target.id === "btnImport"){ alert("已导入「" + TABS.find(function(t){return t.key===activeTab;}).name + "」（演示）"); return; }
        if(e.target.id === "btnTpl"){ alert("已下载「" + TABS.find(function(t){return t.key===activeTab;}).name + "」模板（演示）"); return; }
        if(e.target.id === "btnExport"){ alert("已导出「" + TABS.find(function(t){return t.key===activeTab;}).name + "」（演示）"); return; }
      });

      renderTabs();
      initPdlLedgerModal();
      renderHeader(currentSchema);
      loadSchemaAndRows(TABS.find(function(t){ return t.key === activeTab; })).then(function(res){
        renderHeader(res.schema);
        rows = res.rows;
        renderRows();
      });
    })();
  </script>
</body>
</html>
