<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>购入物资 - 新能源物资供应链管理系统</title>
  <link rel="stylesheet" href="css/vendor/fa-all.min.css" />
  <link rel="stylesheet" href="css/subpage-base.css" />
  <link rel="stylesheet" href="css/carrier-management.css" />
  <link rel="stylesheet" href="css/source-navbar-header.css" />
  <link rel="stylesheet" href="css/sales-management.css" />
</head>
<body class="page-source-navbar page-subpage sales-page" data-sales-page="purchased">
<div class="page-bg" aria-hidden="true"></div><div class="app">
<header class="header"><div class="header-left"><button type="button" class="header-hamburger" aria-label="菜单"><svg viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h16"/></svg></button><a class="header-logo" href="#"><img src="assets/logo-chenergy.png" alt="" width="220" height="40"/></a><div class="header-source-brand"><p>新能源供应链管理系统</p></div></div><div class="header-right"><span class="clock" id="clock"></span><div class="user-avatar">用</div></div></header>
<div class="layout"><aside class="sidebar" aria-label="主导航"><div class="nav-item"><span class="nav-label">销售管理</span></div></aside>
<main class="main-scroll"><div class="carrier-main-inner"><div class="sales-shell">
  <div class="sales-head"><div><h1>购入物资</h1><p class="sales-subtitle">项目公司收货后的购入物资台账，可查看详情与物资轨迹。</p></div></div>
  <div class="sales-body">
    <div class="sales-toolbar"><div class="sales-filter-row"><input class="sales-input" placeholder="物资名称/编码" /><input class="sales-input" placeholder="订单编号" /><input class="sales-input" placeholder="销售合同编号" /><select class="sales-select"><option>全部公司</option><option>河北龙源</option><option>天津龙源</option><option>甘肃龙源</option></select><select class="sales-select"><option>全部场站</option><option>麒麟山风电场</option><option>沙井子风电场</option><option>酒泉场站</option></select><select class="sales-select"><option>全部状态</option><option>已购入</option><option>在用</option><option>待处理</option></select><input class="sales-input" type="date" /><input class="sales-input" type="date" /><button class="sales-btn sales-btn-primary" id="salesPurchasedQuery">查询</button><button class="sales-btn" id="salesPurchasedExport">导出</button></div></div>
    <div class="sales-table-wrap"><table class="sales-table"><thead><tr><th>购入单号</th><th>订单编号</th><th>下单公司</th><th>场站名称</th><th>物资编码</th><th>物资名称</th><th>规格型号</th><th>产品编码</th><th>制造商名称</th><th>销售合同编号</th><th>购入数量</th><th>单位</th><th>购入单价</th><th>购入金额</th><th>收货日期</th><th>物流单号</th><th>存放地点</th><th>当前状态</th><th>操作</th></tr></thead><tbody id="salesPurchasedBody"></tbody></table></div>
  </div>
</div></div></main></div></div>
<script src="js/sidebar-actions.js"></script><script src="js/subpage-feature-title.js"></script><script src="js/site-footer.js"></script><script src="js/map-demo-toast.js"></script><script src="js/subpage-clock.js"></script><script src="js/sales-management.js"></script>
</body>
</html>
