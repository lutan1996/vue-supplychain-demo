      border-radius: 4px;
      padding: 8px 10px 8px 12px;
      position: relative;
      overflow: hidden;
      min-width: 0;

      width: 3px;

      font-size: 11px;

      height: 16px;
      padding: 0 5px;
      border: 1px solid #d1d5db;
      border-radius: 3px;
      background: #f3f4f6;
      color: #6b7280;
      font-size: 10px;
      line-height: 1;
      white-space: nowrap;
    }
    .wh-slot {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: #4b5563;

    .wh-slot-track {

    .wh-split {
      display: grid;
      grid-template-columns: minmax(112px, 0.88fr) minmax(0, 1.28fr);
      gap: 0 8px;
      min-height: 0;
      flex: 1 1 auto;
      align-items: stretch;
      border-top: 1px solid #eef2f7;
      padding-top: 4px;
      overflow: hidden;
    }
    .wh-split-l {
      display: flex;
      flex-direction: column;
      align-items: stretch;
      justify-content: center;
      gap: 4px;
      min-width: 0;
      min-height: 0;
      padding-right: 8px;
      border-right: 1px solid #e5e7eb;
      overflow: hidden;
    }
    .wh-split-r {
      display: flex;
      flex-direction: column;
      gap: 2px;
      min-width: 0;
      min-height: 0;
      overflow: hidden;
    }
    .wh-ring-el {
      width: 76px;
      height: 76px;
      min-width: 76px;
      min-height: 76px;
      margin: 0 auto;
      overflow: hidden;
      flex: 0 0 auto;
    }
    .wh-ring-legend {
      margin: 0;
      padding: 0;
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 2px;
      min-width: 0;
      flex: 0 0 auto;
    }
    .wh-ring-legend li {
      display: grid;
      grid-template-columns: 6px minmax(0, 1fr) auto;
      align-items: center;
      gap: 4px;
      font-size: 10px;
      line-height: 1.2;
      color: #4b5563;
      min-width: 0;

    .wh-ring-legend i {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex: 0 0 auto;
    }
    .wh-ring-legend em {
      font-style: normal;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .wh-ring-legend b {
      font-weight: 500;
      color: #374151;
      white-space: nowrap;
      font-variant-numeric: tabular-nums;
    }
    .wh-bar-legend {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 1px 6px;
      font-size: 9px;
      color: #6b7280;
      line-height: 1.15;
      flex: 0 0 auto;
    }
    .wh-bar-legend span {
      display: inline-flex;
      align-items: center;
      gap: 2px;
      white-space: nowrap;
    }
    .wh-bar-legend i {
      width: 6px;
      height: 6px;
      border-radius: 1px;
      flex: 0 0 auto;
    }
    .wh-bar-el {
      width: 100%;
      flex: 1 1 auto;
      min-height: 0;
      height: auto;
    }

    @media (max-width: 1280px) {

    @media (max-width: 900px) {

    }
  </style>

        { key: "outQty", name: "总出库数量", value: 140, unit: "件", acc: "#faad14" },
        { key: "outAmt", name: "总出库金额", value: 4400, unit: "万元", acc: "#faad14" },
        { key: "idle", name: "呆滞总金额（超60天）", value: 140, unit: "万元", acc: "#cf1322" },
        { key: "scrap", name: "总废旧报废金额", value: 140, unit: "万元", acc: "#f5222d" }
      ];

      var ZONES = ["风电库区", "光伏库区", "储能库区", "返修库区", "报废库区"];

      /* 各仓库类型下的柱状图基础倍数，切换页签时数值变化 */
      var TYPE_FACTOR = {
        "全部": 1.0,
        "中心主仓": 1.0,
        "场站周转仓": 0.72,
        "近修备件仓": 0.55,
        "报废暂存仓": 0.38,
        "其他仓": 0.46
      };

      var WAREHOUSES = [
        {
          id: "w1", name: "仓库名称",
          score: { qtyPct: 86, amtPct: 92, inQtyPct: 70, inAmtPct: 74, outQtyPct: 68, outAmtPct: 71, idlePct: 40, scrapPct: 28 },
          ringDist: [1895, 980, 520, 420], ringUtil: [11, 820],
          types: ["中心主仓", "场站周转仓", "返修备件仓", "报废暂存仓"],
          barBase: { stock: [18, 16, 14, 12, 10], scrap: [8, 7, 6, 9, 11], idle: [6, 5, 4, 5, 7] }
        },
        {
          id: "w2", name: "仓库名称",
          score: { qtyPct: 64, amtPct: 58, inQtyPct: 82, inAmtPct: 79, outQtyPct: 55, outAmtPct: 52, idlePct: 66, scrapPct: 48 },
          ringDist: [1260, 840, 610, 390], ringUtil: [28, 760],
          types: ["中心主仓", "场站周转仓", "返修备件仓", "报废暂存仓"],
          barBase: { stock: [14, 15, 13, 11, 9], scrap: [6, 8, 7, 10, 12], idle: [5, 6, 5, 4, 8] }
        },
        {
          id: "w3", name: "仓库名称",
          score: { qtyPct: 41, amtPct: 47, inQtyPct: 36, inAmtPct: 39, outQtyPct: 88, outAmtPct: 84, idlePct: 22, scrapPct: 71 },
          ringDist: [980, 720, 480, 350], ringUtil: [42, 690],
          types: ["中心主仓", "场站周转仓", "返修备件仓", "报废暂存仓"],
          barBase: { stock: [12, 13, 11, 10, 8], scrap: [5, 6, 5, 8, 10], idle: [4, 5, 3, 6, 9] }
        },
        {
          id: "w4", name: "仓库名称",
          score: { qtyPct: 73, amtPct: 68, inQtyPct: 61, inAmtPct: 59, outQtyPct: 44, outAmtPct: 47, idlePct: 51, scrapPct: 33 },
          ringDist: [1520, 910, 640, 410], ringUtil: [19, 740],
          types: ["中心主仓", "场站周转仓", "返修备件仓", "报废暂存仓"],
          barBase: { stock: [16, 14, 15, 11, 9], scrap: [7, 6, 8, 9, 10], idle: [5, 4, 6, 5, 7] }
        },
        {
          id: "w5", name: "仓库名称",
          score: { qtyPct: 55, amtPct: 62, inQtyPct: 48, inAmtPct: 52, outQtyPct: 77, outAmtPct: 73, idlePct: 35, scrapPct: 58 },
          ringDist: [1100, 760, 530, 380], ringUtil: [33, 710],
          types: ["中心主仓", "场站周转仓", "返修备件仓", "报废暂存仓"],
          barBase: { stock: [13, 12, 14, 10, 8], scrap: [6, 7, 5, 8, 11], idle: [4, 5, 4, 6, 8] }
        },
        {
          id: "w6", name: "仓库名称",
          score: { qtyPct: 38, amtPct: 44, inQtyPct: 91, inAmtPct: 86, outQtyPct: 29, outAmtPct: 31, idlePct: 74, scrapPct: 42 },
          ringDist: [860, 690, 470, 320], ringUtil: [48, 650],
          types: ["中心主仓", "场站周转仓", "返修备件仓", "报废暂存仓"],
          barBase: { stock: [10, 11, 9, 12, 7], scrap: [4, 5, 6, 7, 9], idle: [3, 4, 5, 4, 6] }
        },
        {
          id: "w7", name: "仓库名称",
          score: { qtyPct: 49, amtPct: 53, inQtyPct: 57, inAmtPct: 54, outQtyPct: 63, outAmtPct: 60, idlePct: 45, scrapPct: 39 },
          ringDist: [940, 700, 450, 360], ringUtil: [36, 680],
          types: ["中心主仓", "场站周转仓", "返修备件仓", "报废暂存仓"],
          barBase: { stock: [11, 12, 10, 9, 8], scrap: [5, 5, 4, 7, 8], idle: [4, 3, 4, 5, 6] }
        },
        {
          id: "w8", name: "仓库名称",
          score: { qtyPct: 67, amtPct: 71, inQtyPct: 43, inAmtPct: 46, outQtyPct: 52, outAmtPct: 50, idlePct: 58, scrapPct: 44 },
          ringDist: [1340, 880, 560, 400], ringUtil: [24, 730],
          types: ["中心主仓", "场站周转仓", "返修备件仓", "报废暂存仓"],
          barBase: { stock: [15, 13, 12, 10, 9], scrap: [6, 7, 6, 8, 9], idle: [5, 4, 5, 5, 7] }
        },
        {
          id: "w9", name: "仓库名称",
          score: { qtyPct: 32, amtPct: 36, inQtyPct: 78, inAmtPct: 75, outQtyPct: 41, outAmtPct: 38, idlePct: 69, scrapPct: 55 },
          ringDist: [780, 620, 410, 300], ringUtil: [52, 620],
          types: ["中心主仓", "场站周转仓", "返修备件仓", "报废暂存仓"],
          barBase: { stock: [9, 10, 8, 11, 6], scrap: [3, 4, 5, 6, 8], idle: [3, 3, 4, 4, 5] }
        }
      ];

      var state = {
        level: "group",
        company: "",
        station: "",
        stationColOpen: true,
        typeTab: TYPE_TABS[0],
        sortKey: SORT_OPTS[0].key
      };

      var chartMap = {};

      function companyData(key) {
        return ORG_DATA.filter(function (c) { return c.key === key; })[0];
      }

      function scaleArr(arr, factor) {
        return arr.map(function (v) { return Math.max(1, Math.round(v * factor)); });
      }

      function barDataFor(wh) {
        var f = TYPE_FACTOR[state.typeTab] || 1;
        return {
          stock: scaleArr(wh.barBase.stock, f),
          scrap: scaleArr(wh.barBase.scrap, f * 0.95),
          idle: scaleArr(wh.barBase.idle, f * 0.9)
        };
      }

      function sortedWarehouses() {
        var key = state.sortKey;
        return WAREHOUSES.slice().sort(function (a, b) {
          var av = (a.score && a.score[key]) || 0;
          var bv = (b.score && b.score[key]) || 0;
          return bv - av; /* 正序：值高/大的在前 */
        });
      }

      function renderOrg() {
        var kw = (document.getElementById("orgSearch").value || "").trim();
        var html = '<div class="tree-item group' + (state.level === "group" ? " on" : "") + '" data-level="group">龙源电力(总计)</div>';
        ORG_DATA.forEach(function (c) {
          if (kw && c.name.indexOf(kw) < 0 && !(c.stations || []).some(function (s) { return s.indexOf(kw) >= 0; })) return;
          html += '<div class="tree-item' + (state.company === c.key ? " on" : "") + '" data-level="company" data-key="' + c.key + '">' + c.name + "</div>";
        });
        document.getElementById("orgList").innerHTML = html;

        var psBody = document.getElementById("psBody");
        var stationList = document.getElementById("stationList");
        var stationToggle = document.getElementById("stationToggle");
        var showStation = state.level !== "group";
        if (!showStation) {
          psBody.classList.remove("has-station", "station-collapsed");
          stationList.innerHTML = "";
          return;
        }
        psBody.classList.add("has-station");
        if (state.stationColOpen) {
          psBody.classList.remove("station-collapsed");
          stationToggle.textContent = "◀";
          stationToggle.title = "收起风电场";
          stationToggle.setAttribute("aria-expanded", "true");
        } else {
          psBody.classList.add("station-collapsed");
          stationToggle.textContent = "▶";
          stationToggle.title = "展开风电场";
          stationToggle.setAttribute("aria-expanded", "false");
        }
        var c = companyData(state.company);
        stationList.innerHTML = (c ? c.stations : []).map(function (s) {
          if (kw && s.indexOf(kw) < 0 && (!c || c.name.indexOf(kw) < 0)) return "";
          return '<div class="station-item' + (state.station === s ? " on" : "") + '" data-station="' + s + '">' + s + "</div>";
        }).join("");
      }

      function renderKpi() {
        document.getElementById("kpiRow").innerHTML = KPI.map(function (k) {
          return (
            '<div class="kpi-card" style="--acc:' + k.acc + '">' +
              '<div class="k">' + k.name + "</div>" +
              '<div class="v">' + k.value + '<span class="u">' + k.unit + "</span></div>" +
            "</div>"
          );
        }).join("");
      }

      function renderTypeTabs() {
        document.getElementById("typeTabs").innerHTML = TYPE_TABS.map(function (t) {
          return '<button type="button" role="tab" data-type="' + t + '" class="' + (state.typeTab === t ? "on" : "") + '">' + t + "</button>";
        }).join("");
      }

      function renderSort() {
        var sel = document.getElementById("sortSelect");
        sel.innerHTML = SORT_OPTS.map(function (o) {
          return '<option value="' + o.key + '"' + (state.sortKey === o.key ? " selected" : "") + ">" + o.label + "</option>";
        }).join("");
      }

      function ringLegendHtml(items, colors) {
        return (
          '<ul class="wh-ring-legend">' +
          items.map(function (it, i) {
            return (
              "<li><i style=\"background:" + colors[i % colors.length] + "\"></i>" +
              "<em title=\"" + it.name + "\">" + it.name + "</em>" +
              "<b>" + it.value + "</b></li>"
            );
          }).join("") +
          "</ul>"
        );
      }

      function ringOption(items, colors) {
        var max = 0;
        items.forEach(function (it) { if (it.value > max) max = it.value; });
        max = Math.max(max * 1.15, 1);
        var series = [];
        /* 图1/图2：更大同心环 + 圆角端点 */
        var n = items.length;
        var step = n > 2 ? 11 : 13;
        var outer0 = n > 2 ? 78 : 80;
        var thickness = n > 2 ? 9 : 10;
        items.forEach(function (it, i) {
          var outer = outer0 - i * step;
          var inner = Math.max(outer - thickness, 14);
          series.push({
            type: "pie",
            radius: [inner + "%", outer + "%"],
            center: ["50%", "50%"],
            startAngle: 90,
            padAngle: 0,
            label: { show: false },
            labelLine: { show: false },
            itemStyle: { borderRadius: 20 },
            data: [
              {
                value: it.value,
                name: it.name + " " + it.value,
                itemStyle: { color: colors[i % colors.length], borderRadius: 20 }
              },
              {
                value: max - it.value,
                name: "",
                itemStyle: { color: "#eef2f7", borderRadius: 0 },
                tooltip: { show: false },
                emphasis: { disabled: true }
              }
            ]
          });
        });
        return {
          animation: false,
          tooltip: { trigger: "item", formatter: function (p) { return p && p.name ? p.name : ""; } },
          legend: { show: false },
          series: series
        };
      }

      function barOption(data) {
        /* 横向堆叠：蓝=库存金额，红=报废金额，黄=超60天以上呆滞金额 */
        var totals = data.stock.map(function (v, i) {
          return v + data.scrap[i] + data.idle[i];
        });
        return {
          color: ["#1677ff", "#cf1322", "#faad14"],
          tooltip: { trigger: "axis", confine: true, textStyle: { fontSize: 11 }, axisPointer: { type: "shadow" } },
          legend: { show: false },
          grid: { left: 50, right: 24, top: 1, bottom: 4, containLabel: false },
          xAxis: {
            type: "value",
            show: false,
            splitLine: { show: false }
          },
          yAxis: {
            type: "category",
            data: ZONES.slice().reverse(),
            axisTick: { show: false },
            axisLine: { show: false },
            axisLabel: {
              fontSize: 9,
              color: "#6b7280",
              margin: 4,
              width: 46,
              overflow: "none",
              interval: 0
            }
          },
          series: [
            {
              name: "库存金额",
              type: "bar",
              stack: "amt",
              barWidth: 6,
              barCategoryGap: "38%",
              data: data.stock.slice().reverse()
            },
            {
              name: "报废金额",
              type: "bar",
              stack: "amt",
              barWidth: 6,
              data: data.scrap.slice().reverse()
            },
            {
              name: "超60天以上呆滞金额",
              type: "bar",
              stack: "amt",
              barWidth: 6,
              data: data.idle.slice().reverse(),
              label: {
                show: true,
                position: "right",
                distance: 3,
                fontSize: 9,
                color: "#374151",
                formatter: function (p) {
                  return totals[totals.length - 1 - p.dataIndex];
                }
              }
            }
          ]
        };
      }

      function ensureChart(id, el) {
        if (!window.echarts || !el) return null;
        if (chartMap[id]) {
          chartMap[id].resize();
          return chartMap[id];
        }
        chartMap[id] = echarts.init(el);
        return chartMap[id];
      }

      function disposeCharts() {
        Object.keys(chartMap).forEach(function (k) {
          try { chartMap[k].dispose(); } catch (e) {}
        });
        chartMap = {};
      }

      function selectedOrgName() {
        if (state.level === "group" || !state.company) return "龙源电力";
        var c = companyData(state.company);
        return (c && c.name) || state.company;
      }

      /* 只改卡片上的公司名，立刻生效，不整卡重绘 */
      function syncCardOrgName() {
        var name = selectedOrgName();
        var nodes = document.querySelectorAll("#whCards .org");
        for (var i = 0; i < nodes.length; i++) nodes[i].textContent = name;
      }

      function renderCards() {
        disposeCharts();
        var list = sortedWarehouses();
        var orgName = selectedOrgName();
        var root = document.getElementById("whCards");
        root.innerHTML = list.map(function (wh) {
          var used = wh.ringUtil[0] || 0;
          var free = wh.ringUtil[1] || 0;
          var pct = Math.max(0, Math.min(100, Math.round((used / Math.max(used + free, 1)) * 100)));
          /* 已占用占比过小时用数值本身作进度示意（原数据可能是占比） */
          if (pct < 3 && used <= 100) pct = used;
          return (
            '<article class="wh-card" data-id="' + wh.id + '">' +
              '<div class="wh-card-hd">' +
                "<h3>" + wh.name + "</h3>" +
                '<span class="wh-card-status">仓库状态：<b>正常</b></span>' +
              "</div>" +
              '<div class="wh-card-meta">' +
                '<span class="org">' + orgName + "</span>" +
                (wh.types || []).map(function (t) {
                  return '<span class="wh-tag">' + t + "</span>";
                }).join("") +
              "</div>" +
              '<div class="wh-slot">' +
                "<span>已占用库位</span>" +
                '<div class="wh-slot-track"><div class="wh-slot-fill" style="width:' + pct + '%"></div></div>' +
                '<span class="wh-slot-val">' + used + "</span>" +
              "</div>" +
              '<div class="wh-split">' +
                '<div class="wh-split-l">' +
                  '<div class="wh-ring-el" id="dist-' + wh.id + '"></div>' +
                  '<div id="dist-leg-' + wh.id + '"></div>' +
                "</div>" +
                '<div class="wh-split-r">' +
                  '<div class="wh-bar-legend">' +
                    '<span><i style="background:#1677ff"></i>库存金额</span>' +
                    '<span><i style="background:#cf1322"></i>报废金额</span>' +
                    '<span><i style="background:#faad14"></i>超60天以上呆滞金额</span>' +
                  "</div>" +
                  '<div class="wh-bar-el" id="bar-' + wh.id + '"></div>' +
                "</div>" +
              "</div>" +
            "</article>"
          );
        }).join("");

        list.forEach(function (wh) {
          var distItems = [
            { name: "风电库区", value: wh.ringDist[0] },
            { name: "光伏库区", value: wh.ringDist[1] },
            { name: "储能库区", value: wh.ringDist[2] },
            { name: "返修库区", value: wh.ringDist[3] }
          ];
          var distColors = ["#22d3ee", "#1d4ed8", "#f87171", "#fbbf24"];
          var distLeg = document.getElementById("dist-leg-" + wh.id);
          if (distLeg) distLeg.innerHTML = ringLegendHtml(distItems, distColors);
          var dist = ensureChart("dist-" + wh.id, document.getElementById("dist-" + wh.id));
          if (dist) dist.setOption(ringOption(distItems, distColors), true);

          var bar = ensureChart("bar-" + wh.id, document.getElementById("bar-" + wh.id));
          if (bar) bar.setOption(barOption(barDataFor(wh)), true);
        });

        requestAnimationFrame(function () {
          requestAnimationFrame(function () {
            Object.keys(chartMap).forEach(function (k) {
              try { chartMap[k].resize(); } catch (e) {}
            });
          });
        });
      }

      function updateBarsOnly() {
        sortedWarehouses().forEach(function (wh) {
          var bar = chartMap["bar-" + wh.id];
          if (bar) bar.setOption(barOption(barDataFor(wh)), true);
        });
      }

      function openStationDetail(org, station) {
        var href =
          "prod-spare-station-detail-0714.html?org=" +
          encodeURIComponent(org) +
          "&station=" +
          encodeURIComponent(station);
        try {
          if (window.top && window.top !== window && typeof window.top.__demoOpenPage === "function") {
            if (window.top.__demoOpenPage(href) === true) return;
          }
        } catch (eTop) {}
        window.location.href = href;
      }

      function renderAll() {
        renderOrg();
        renderKpi();
        renderTypeTabs();
        renderSort();
        renderCards();
      }

      document.getElementById("orgList").addEventListener("click", function (e) {
        var item = e.target.closest(".tree-item");
        if (!item) return;
        if (item.getAttribute("data-level") === "group") {
          state.level = "group";
          state.company = "";
          state.station = "";
        } else {
          state.level = "company";
          state.company = item.getAttribute("data-key") || (item.textContent || "").trim();
          state.station = "";
          state.stationColOpen = true;
        }
        renderOrg();
        syncCardOrgName(); /* 选上海龙源 → 卡片立刻变上海龙源 */
      });

      document.getElementById("stationToggle").addEventListener("click", function () {
        state.stationColOpen = !state.stationColOpen;
        renderOrg();
      });

      document.getElementById("stationList").addEventListener("click", function (e) {
        var item = e.target.closest(".station-item");
        if (!item) return;
        var station = item.getAttribute("data-station") || "";
        state.station = station;
        renderOrg();
        if (!station || !state.company) return;
        openStationDetail(state.company, station);
      });

      /* 点击任意仓库卡片整块 → 跳转仓库具体页（场站详情） */
      document.getElementById("whCards").addEventListener("click", function (e) {
        var card = e.target.closest(".wh-card");
        if (!card) return;
        var org = state.company || "上海龙源";
        var station = state.station;
        if (!station) {
          var c = companyData(org);
          station = (c && c.stations && c.stations[0]) || "崇明风电场";
        }
        openStationDetail(org, station);
      });

      document.getElementById("orgSearch").addEventListener("input", renderOrg);

      document.getElementById("typeTabs").addEventListener("click", function (e) {
        var btn = e.target.closest("button[data-type]");
        if (!btn) return;
        state.typeTab = btn.getAttribute("data-type");
        renderTypeTabs();
        updateBarsOnly(); /* 切换图2页签 → 下方柱状图数值变化 */
      });

      document.getElementById("sortSelect").addEventListener("change", function () {
        state.sortKey = this.value;
        renderCards(); /* 按…占比 → 值高/大的排最前 */
      });

      window.addEventListener("resize", function () {
        Object.keys(chartMap).forEach(function (k) {
          try { chartMap[k].resize(); } catch (e) {}
        });
      });

      renderAll();
    })();
  </script>
</body>
