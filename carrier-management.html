  <!-- 新增/编辑承运商弹框（与基础页面同一套 modal 样式） -->
  <div class="modal-mask" id="carrierModalMask" aria-hidden="true">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="carrierModalTitle">
      <div class="modal-header">
        <h2 class="modal-title" id="carrierModalTitle">新增承运商</h2>
        <button class="modal-close" id="btnCloseCarrierModal" aria-label="关闭">×</button>
      </div>

      <div class="modal-body">
        <div class="field full">
          <label for="carrierId">承运商编号</label>
          <input id="carrierId" type="text" placeholder="如：CYS2024001" />
        </div>

        <div class="field full">
          <label for="carrierName">承运商名称</label>
          <input id="carrierName" type="text" />
        </div>

        <div class="field full">
          <label for="carrierCredit">统一社会信用代码</label>
          <input id="carrierCredit" type="text" />
        </div>

        <div class="field full">
          <label for="carrierLegal">法定代表人</label>
          <input id="carrierLegal" type="text" />
        </div>

        <div class="field full">
          <label for="carrierContact">联系人/联系电话</label>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
            <input id="carrierContact" type="text" placeholder="联系人" />
            <input id="carrierPhone" type="text" placeholder="联系电话" />
          </div>
        </div>

        <div class="field">
          <label for="carrierStatus">状态</label>
          <select id="carrierStatus">
            <option value="enabled">合作中</option>
            <option value="disabled">已终止</option>
          </select>
        </div>
        <div class="field">
          <label for="carrierEntryTime">入库时间</label>
          <input id="carrierEntryTime" type="date" />
        </div>

        <div class="field full" style="margin:0;padding:6px 0 2px;border-top:1px solid #e8eef7;font-size:12px;color:#7b8fa7;">扩展信息</div>

        <div class="field">
          <label for="carrierCapital">注册资本</label>
          <input id="carrierCapital" type="text" />
        </div>

        <div class="field full">
          <label for="carrierAddr">注册地址</label>
          <input id="carrierAddr" type="text" />
        </div>

        <div class="field full">
          <label for="carrierScope">经营范围</label>
          <textarea id="carrierScope"></textarea>
        </div>

        <div class="field full">
          <label for="carrierFiles">资质文件（可上传）</label>
          <input id="carrierFiles" type="file" multiple />
          <div class="help" id="carrierFilesHelp"></div>
        </div>

        <div class="field full">
          <label for="carrierRemark">备注</label>
          <textarea id="carrierRemark" placeholder="请输入备注（可选）"></textarea>
        </div>
      </div>

      <div class="modal-footer" style="justify-content:flex-end;">
        <div class="footer-actions">
          <button class="btn" id="btnCancelCarrierModal" type="button">取消</button>
          <button class="btn btn-primary" id="btnSaveCarrierModal" type="button">保存</button>
        </div>
      </div>
    </div>
  </div>

      function esc(s) {
        return String(s == null ? "" : s)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/\"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      function statusLabel(status) {
        return status === "enabled" ? "合作中" : "已终止";
      }
      function statusTagClass(status) {
        return status === "enabled" ? "tag-status--enabled" : "tag-status--disabled";
      }

      function updateTotalVisible() {
        var rows = tbody.querySelectorAll("tr");
        var n = 0;
        rows.forEach(function (row) {
          if (row.style.display !== "none") n++;
        });
        totalEl.textContent = "共 " + n + " 条";
      }

      function renderTable() {
        tbody.innerHTML = "";
        carrierStore.forEach(function (c) {
          var tr = document.createElement("tr");
          tr.setAttribute("data-status", c.status);
          var opToggleText = c.status === "enabled" ? "禁用" : "启用";
          var tag = '<span class="tag-status ' + statusTagClass(c.status) + '">' + statusLabel(c.status) + "</span>";
          tr.innerHTML =
            "<td>" +
            esc(c.id) +
            "</td>" +
            "<td>" +
            esc(c.name) +
            "</td>" +
            "<td>" +
            esc(c.creditCode) +
            "</td>" +
            "<td>" +
            esc(c.legalPerson) +
            "</td>" +
            "<td>" +
            esc(c.contactPerson) +
            " / " +
            esc(c.contactPhone) +
            "</td>" +
            "<td>" +
            tag +
            "</td>" +
            "<td>" +
            esc(c.entryTime) +
            "</td>" +
            '<td><div class="wh-ops">' +
            '<a href="#" class="carrier-op" data-op="view" data-id="' +
            esc(c.id) +
            '" title="查看" aria-label="查看">查看</a>' +
            '<a href="#" class="carrier-op" data-op="edit" data-id="' +
            esc(c.id) +
            '" title="编辑" aria-label="编辑">编辑</a>' +
            '<a href="#" class="carrier-op" data-op="toggle" data-id="' +
            esc(c.id) +
            '" title="' +
            opToggleText +
            '" aria-label="' +
            opToggleText +
            '">' +
            opToggleText +
            "</a>" +
            "</div></td>";
          tbody.appendChild(tr);
        });
        applyFilter();
      }

      function applyFilter() {
        var st = filter.value;
        var q = (search.value || "").trim().toLowerCase();
        tbody.querySelectorAll("tr").forEach(function (row) {
          var status = row.getAttribute("data-status") || "";
          var okStatus = !st || status === st;
          var text = row.textContent.toLowerCase();
          var okSearch = !q || text.indexOf(q) !== -1;
          row.style.display = okStatus && okSearch ? "" : "none";
        });
        updateTotalVisible();
      }

      filter.addEventListener("change", applyFilter);
      search.addEventListener("input", applyFilter);

      // ====== 承运商 modal 交互 ======
      var editingId = null;
      var selectedFileNames = [];
      var pendingToggleId = null;

      function openModal(mode, carrier) {
        editingId = mode === "edit" && carrier ? carrier.id : null;
        selectedFileNames = [];
        if (carrierFiles) carrierFiles.value = "";

        modalTitle.textContent = mode === "add" ? "新增承运商" : "编辑承运商";

        if (mode === "edit" && carrier) {
          if (carrierId) {
            carrierId.value = carrier.id || "";
            carrierId.setAttribute("readonly", "readonly");
          }
          carrierName.value = carrier.name || "";
          carrierCredit.value = carrier.creditCode || "";
          carrierLegal.value = carrier.legalPerson || "";
          carrierCapital.value = carrier.registeredCapital || "";
          carrierAddr.value = carrier.registeredAddress || "";
          carrierContact.value = carrier.contactPerson || "";
          carrierPhone.value = carrier.contactPhone || "";
          carrierScope.value = carrier.scope || "";
          carrierRemark.value = carrier.remark || "";
          if (carrierStatus) carrierStatus.value = carrier.status === "disabled" ? "disabled" : "enabled";
          if (carrierEntryTime) carrierEntryTime.value = carrier.entryTime || "";
          carrierFilesHelp.textContent = carrier.attachments && carrier.attachments.length ? "已存在：" + carrier.attachments.join("，") : "未选择文件";
        } else {
          if (carrierId) {
            carrierId.value = "CYS" + fmtIdDate() + String(Math.floor(Math.random() * 900 + 100));
            carrierId.removeAttribute("readonly");
          }
          carrierName.value = "";
          carrierCredit.value = "";
          carrierLegal.value = "";
          carrierCapital.value = "";
          carrierAddr.value = "";
          carrierContact.value = "";
          carrierPhone.value = "";
          carrierScope.value = "";
          carrierRemark.value = "";
          if (carrierStatus) carrierStatus.value = "enabled";
          if (carrierEntryTime) carrierEntryTime.value = new Date().toISOString().slice(0, 10);
          carrierFilesHelp.textContent = "未选择文件";
        }

        modalMask.setAttribute("aria-hidden", "false");
        modalMask.classList.add("show");
      }

      function closeModal() {
        modalMask.setAttribute("aria-hidden", "true");
        modalMask.classList.remove("show");
      }
      function openViewModal(carrier) {
        if (!carrier || !viewMask) return;
        document.getElementById("cvId").textContent = carrier.id || "";
        document.getElementById("cvName").textContent = carrier.name || "";
        document.getElementById("cvCredit").textContent = carrier.creditCode || "";
        document.getElementById("cvLegal").textContent = carrier.legalPerson || "";
        document.getElementById("cvContact").textContent = carrier.contactPerson || "";
        document.getElementById("cvPhone").textContent = carrier.contactPhone || "";
        document.getElementById("cvStatus").textContent = statusLabel(carrier.status);
        document.getElementById("cvEntryTime").textContent = carrier.entryTime || "";
        document.getElementById("cvCapital").textContent = carrier.registeredCapital || "";
        document.getElementById("cvAddr").textContent = carrier.registeredAddress || "";
        document.getElementById("cvScope").textContent = carrier.scope || "—";
        document.getElementById("cvFiles").textContent = carrier.attachments && carrier.attachments.length ? carrier.attachments.join("，") : "—";
        document.getElementById("cvRemark").textContent = carrier.remark || "—";
        viewMask.setAttribute("aria-hidden", "false");
        viewMask.classList.add("show");
      }
      function closeViewModal() {
        if (!viewMask) return;
        viewMask.setAttribute("aria-hidden", "true");
        viewMask.classList.remove("show");
      }
      function openToggleConfirm(carrier) {
        if (!carrier || !toggleConfirmMask) return;
        pendingToggleId = carrier.id;
        var targetAction = carrier.status === "enabled" ? "停用" : "启用";
        if (toggleConfirmText) {
          toggleConfirmText.textContent = "确认要" + targetAction + "承运商【" + (carrier.name || carrier.id || "") + "】吗？";
        }
        toggleConfirmMask.setAttribute("aria-hidden", "false");
        toggleConfirmMask.classList.add("show");
      }
      function closeToggleConfirm() {
        pendingToggleId = null;
        if (!toggleConfirmMask) return;
        toggleConfirmMask.setAttribute("aria-hidden", "true");
        toggleConfirmMask.classList.remove("show");
      }

      function fmtIdDate() {
        // YYYYMMDD，用于新增时生成演示编号
        var d = new Date();
        var y = d.getFullYear();
        var m = String(d.getMonth() + 1).padStart(2, "0");
        var day = String(d.getDate()).padStart(2, "0");
        return "" + y + m + day;
      }

      if (carrierFiles) {
        carrierFiles.addEventListener("change", function () {
          var files = Array.prototype.slice.call(carrierFiles.files || []);
          selectedFileNames = files.map(function (f) {
            return f && f.name ? f.name : "";
          }).filter(Boolean);
          carrierFilesHelp.textContent = selectedFileNames.length ? "已选择：" + selectedFileNames.join("，") : "未选择文件";
        });
      }

      if (btnClose) btnClose.addEventListener("click", closeModal);
      if (btnCancel) btnCancel.addEventListener("click", closeModal);
      if (modalMask) {
        modalMask.addEventListener("click", function (e) {
          if (e.target === modalMask) closeModal();
        });
      }
      if (btnCloseView) btnCloseView.addEventListener("click", closeViewModal);
      if (btnCancelView) btnCancelView.addEventListener("click", closeViewModal);
      if (viewMask) {
        viewMask.addEventListener("click", function (e) {
          if (e.target === viewMask) closeViewModal();
        });
      }
      if (btnCloseToggleConfirm) btnCloseToggleConfirm.addEventListener("click", closeToggleConfirm);
      if (btnCancelToggleConfirm) btnCancelToggleConfirm.addEventListener("click", closeToggleConfirm);
      if (toggleConfirmMask) {
        toggleConfirmMask.addEventListener("click", function (e) {
          if (e.target === toggleConfirmMask) closeToggleConfirm();
        });
      }
      if (btnOkToggleConfirm) {
        btnOkToggleConfirm.addEventListener("click", function () {
          if (!pendingToggleId) return;
          var carrier = carrierStore.find(function (x) { return x.id === pendingToggleId; });
          if (carrier) {
            carrier.status = carrier.status === "enabled" ? "disabled" : "enabled";
            renderTable();
          }
          closeToggleConfirm();
        });
      }

      if (btnSave) {
        btnSave.addEventListener("click", function () {
          var idVal = carrierId ? (carrierId.value || "").trim() : "";
          var name = (carrierName.value || "").trim();
          var credit = (carrierCredit.value || "").trim();
          var legal = (carrierLegal.value || "").trim();
          var capital = (carrierCapital.value || "").trim();
          var addr = (carrierAddr.value || "").trim();
          var contact = (carrierContact.value || "").trim();
          var phone = (carrierPhone.value || "").trim();
          var scope = (carrierScope.value || "").trim();
          var remark = (carrierRemark.value || "").trim();

          var attachments = selectedFileNames.slice();
          if (!idVal || !name || !credit) {
            alert("请至少填写：承运商编号、承运商名称、统一社会信用代码");
            return;
          }

          if (editingId) {
            var carrier = carrierStore.find(function (x) { return x.id === editingId; });
            if (carrier) {
              carrier.name = name;
              carrier.creditCode = credit;
              carrier.legalPerson = legal;
              carrier.registeredCapital = capital;
              carrier.registeredAddress = addr;
              carrier.contactPerson = contact;
              carrier.contactPhone = phone;
              carrier.scope = scope;
              carrier.remark = remark;
              if (carrierStatus) carrier.status = carrierStatus.value === "disabled" ? "disabled" : "enabled";
              if (carrierEntryTime && carrierEntryTime.value) carrier.entryTime = carrierEntryTime.value;
              // 若本次选择了新文件，则覆盖；否则保留原文件
              if (attachments.length) carrier.attachments = attachments;
            }
          } else {
            // 校验编号唯一
            var exists = carrierStore.some(function (x) { return x.id === idVal; });
            if (exists) {
              alert("承运商编号已存在，请更换后重试。");
              return;
            }
            var et = (carrierEntryTime && carrierEntryTime.value) ? carrierEntryTime.value : new Date().toISOString().slice(0, 10);
            var stNew = carrierStatus && carrierStatus.value === "disabled" ? "disabled" : "enabled";
            carrierStore.unshift({
              id: idVal,
              name: name,
              creditCode: credit,
              legalPerson: legal,
              registeredCapital: capital,
              registeredAddress: addr,
              contactPerson: contact,
              contactPhone: phone,
              scope: scope,
              attachments: attachments,
              remark: remark,
              status: stNew,
              entryTime: et
            });
          }

          closeModal();
          renderTable();
        });
      }

      // 表格操作：编辑/禁用启用
      tbody.addEventListener("click", function (e) {
        var a = e.target && e.target.closest ? e.target.closest("a.carrier-op") : null;
        if (!a) return;
        e.preventDefault();
        var op = a.getAttribute("data-op");
        var id = a.getAttribute("data-id");
        var carrier = carrierStore.find(function (x) { return x.id === id; });
        if (!carrier) return;

        if (op === "view") {
          openViewModal(carrier);
        } else if (op === "edit") {
          openModal("edit", carrier);
        } else if (op === "toggle") {
          openToggleConfirm(carrier);
        }
      });

      document.querySelector(".carrier-btn-add").addEventListener("click", function () {
        openModal("add");
      });

      renderTable();
    })();
  </script>
</body>
</html>
