    .notice-table--h-only tbody td { padding: 12px 12px; border: none; border-bottom: 1px solid #e8e8e8; color: #333; vertical-align: middle; }
    .notice-table--h-only tbody tr:hover { background: #fafafa; }
    .notice-table--h-only .col-check { width: 48px; text-align: center; }
    .notice-table--h-only .col-name { min-width: 200px; max-width: 420px; white-space: normal; word-break: break-word; }
    .notice-table--h-only .col-ops { white-space: nowrap; text-align: center; width: 120px; }
    .notice-table--h-only .col-ops a { color: #1890ff; font-size: 12px; margin: 0 4px; text-decoration: none; }
    .notice-table--h-only .col-ops a:hover { opacity: 0.85; }

  <script>
    (function () {
      var cfg = {
        filterLabels: ["招标编号", "招标名称", "招标地址"],
        filterPlaceholders: ["请输入招标编号", "请输入招标名称", "请输入招标地址"],
        cols: ["招标编号", "招标名称", "招标地址", "操作"],
        rows: [
          { no: "1243243", name: "外交部发言人就有关问题答记者问（例行发布会摘要）", addr: "1243324" },
          { no: "13331", name: "全国两会开幕在即，各界关注经济社会发展目标", addr: "12342134" },
          { no: "ZB-2026-008", name: "中老铁路国际旅客列车开行满周年运营情况通报", addr: "重庆市" }
        ]
      };
      document.title = "招标公告 - 新能源物资供应链管理系统";
      var filters = document.getElementById("npFilters");
      cfg.filterLabels.forEach(function (label, i) {
        var div = document.createElement("div");
        div.className = "np-inline-field";
        var id = "np-f-" + i;
        div.innerHTML =
          "<label for=\"" + id + "\">" + label + "</label>" +
          "<input id=\"" + id + "\" type=\"text\" placeholder=\"" + cfg.filterPlaceholders[i] + "\" />";
        filters.appendChild(div);
      });
      var head = document.getElementById("npHead");
      var th0 = document.createElement("th");
      th0.className = "col-check";
      th0.innerHTML = "<input type=\"checkbox\" aria-label=\"全选\" />";
      head.appendChild(th0);
      cfg.cols.forEach(function (c) {
        var th = document.createElement("th");
        if (c === "招标名称") th.className = "col-name";
        if (c === "操作") th.className = "col-ops";
        th.textContent = c;
        head.appendChild(th);
      });
      var body = document.getElementById("npBody");
      cfg.rows.forEach(function (row) {
        var tr = document.createElement("tr");
        var td0 = document.createElement("td");
        td0.className = "col-check";
        td0.innerHTML = "<input type=\"checkbox\" aria-label=\"选择行\" />";
        tr.appendChild(td0);
        var td1 = document.createElement("td");
        td1.textContent = row.no;
        tr.appendChild(td1);
        var td2 = document.createElement("td");
        td2.className = "col-name";
        td2.textContent = row.name;
        tr.appendChild(td2);
        var td3 = document.createElement("td");
        td3.textContent = row.addr;
        tr.appendChild(td3);
        var td4 = document.createElement("td");
        td4.className = "col-ops";
        td4.innerHTML =
          "<a href=\"#\" title=\"编辑\" aria-label=\"编辑\"><i class=\"fa-solid fa-pen-to-square\"></i></a>" +
          "<a href=\"#\" title=\"删除\" aria-label=\"删除\"><i class=\"fa-solid fa-trash-can\"></i></a>";
        tr.appendChild(td4);
        body.appendChild(tr);
      });
      document.getElementById("npTotal").textContent = String(cfg.rows.length);
      document.getElementById("npBtnReset").addEventListener("click", function () {
        cfg.filterLabels.forEach(function (_, i) {
          var el = document.getElementById("np-f-" + i);
          if (el) el.value = "";
        });
      });
    })();
  </script>
