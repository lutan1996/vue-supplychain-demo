  <style>
    .bd-wh .main-scroll { background:#f0f3f8; }
    .bd-wh .carrier-main-inner { padding:12px 14px 16px; }
    .bd-filter {
      display:flex; flex-wrap:wrap; gap:10px; align-items:center;
      background:#fff; border:1px solid #e8edf4; border-radius:6px;
      padding:10px 12px; margin-bottom:10px; font-size:12px;
    }
    .bd-filter label { color:#64748b; white-space:nowrap; }
    .bd-filter select, .bd-filter input {
      height:30px; border:1px solid #d9e2ec; border-radius:4px;
      padding:0 10px; font-size:12px; min-width:140px; background:#fff;
    }
    .bd-filter .ops { margin-left:auto; display:flex; gap:8px; }
    .bd-btn {
      height:30px; padding:0 14px; border-radius:4px; font-size:12px;
      cursor:pointer; border:1px solid #cbd5e1; background:#fff; color:#334155;
    }
    .bd-btn.pri { background:#1677ff; border-color:#1677ff; color:#fff; }
    .bd-btn.ghost { background:#fff; color:#1677ff; border-color:#91caff; }
    .bd-panel {
      background:#fff; border:1px solid #e8edf4; border-radius:6px; overflow:hidden;
    }
    .bd-table { width:100%; border-collapse:collapse; font-size:12px; }
    .bd-table th, .bd-table td {
      padding:10px 12px; border-bottom:1px solid #eef2f7; text-align:left;
      white-space:nowrap; color:#334155;
    }
    .bd-table thead th { background:#f7f9fc; color:#5a6b82; font-weight:600; }
    .bd-table tbody tr:hover td { background:#f8fbff; }
    .bd-tag {
      display:inline-block; padding:1px 8px; border-radius:2px; font-size:11px;
      border:1px solid transparent;
    }
    .bd-tag.ok { color:#389e0d; background:#f6ffed; border-color:#b7eb8f; }
    .bd-tag.wait { color:#1677ff; background:#e6f4ff; border-color:#91caff; }
    .bd-op a { color:#1677ff; text-decoration:none; margin-right:10px; }
    .bd-op a.warn { color:#d46b08; }
    .bd-op a.danger { color:#cf1322; }
    .bd-foot {
      display:flex; justify-content:space-between; align-items:center;
      padding:10px 12px; font-size:12px; color:#64748b; background:#fafbfd;
      border-top:1px solid #eef2f7;
    }
    .bd-modal-mask {
      position:fixed; inset:0; background:rgba(15,23,42,.4); z-index:1200;
      display:none; align-items:center; justify-content:center;
    }
    .bd-modal-mask.open { display:flex; }
    .bd-modal {
      width:560px; max-width:92vw; background:#fff; border-radius:8px;
      box-shadow:0 12px 40px rgba(0,0,0,.18); overflow:hidden;
    }
    .bd-modal-hd {
      padding:12px 16px; border-bottom:1px solid #eef2f7; font-weight:600; font-size:14px;
    }
    .bd-modal-bd { padding:14px 16px; display:grid; gap:12px; max-height:70vh; overflow:auto; }
    .bd-field { display:grid; gap:6px; font-size:12px; color:#475569; }
    .bd-field .req { color:#f5222d; }
    .bd-field input, .bd-field select, .bd-field textarea {
      height:32px; border:1px solid #d9e2ec; border-radius:4px; padding:0 10px; font-size:12px;
    }
    .bd-field textarea { height:72px; padding:8px 10px; resize:vertical; }
    .bd-radios { display:flex; gap:14px; flex-wrap:wrap; align-items:center; }
    .bd-layer-tbl { width:100%; border-collapse:collapse; font-size:12px; }
    .bd-layer-tbl th, .bd-layer-tbl td { border:1px solid #e8edf4; padding:8px; text-align:center; }
    .bd-step { display:inline-flex; align-items:center; gap:6px; }
    .bd-step button {
      width:26px; height:26px; border:1px solid #d9e2ec; border-radius:4px; background:#fff; cursor:pointer;
    }
    .bd-step input { width:48px; height:26px; text-align:center; }
    .bd-modal-ft {
      padding:10px 16px; border-top:1px solid #eef2f7; display:flex; justify-content:flex-end; gap:8px;
    }
    /* 货架方位画布 */
    .ori-canvas {
      min-height:420px; margin:12px; border:1px dashed #91caff; border-radius:8px;
      background:linear-gradient(180deg,#f8fbff,#eef5ff); position:relative; padding:20px;
    }
    .ori-shelf {
      display:inline-block; width:120px; margin:10px; vertical-align:top;
      background:#fff; border:1px solid #91caff; border-radius:6px; overflow:hidden;
      box-shadow:0 2px 8px rgba(22,119,255,.08);
    }
    .ori-shelf .nm { background:#1677ff; color:#fff; padding:6px 8px; font-size:12px; font-weight:600;display:flex;align-items:center;justify-content:space-between;gap:4px; }
    .ori-shelf .nm .acts{display:flex;gap:3px}
    .ori-shelf .nm button{border:0;background:rgba(255,255,255,.18);color:#fff;border-radius:3px;cursor:pointer;width:20px;height:20px;padding:0}
    .ori-shelf .layer {
      border-top:1px solid #e8edf4; padding:8px; font-size:11px; color:#475569; cursor:context-menu;
    }
    .ori-shelf .layer:hover { background:#e6f4ff; }
    .ori-tip { position:absolute; right:16px; bottom:12px; color:#cf1322; font-size:12px; }
  </style>
</head>
<body class="page-source-navbar page-subpage page-logistics bd-wh">

    </header>
    <div class="layout">

      </aside>
      <main class="main-scroll"><div class="carrier-main-inner">

        <div class="bd-filter">
          <label>所属组织</label><select id="oriOrg"><option value="">请选择所属组织</option><option selected>齐心营风电场</option><option>横龙风电场</option></select>
          <label>所属仓库</label><select id="oriWh"><option value="">请选择所属仓库</option><option selected>临时测试</option><option>横龙仓库</option></select>
          <label>所属库区</label><select id="oriArea"><option value="">请选择所属库区</option><option selected>临时库区</option><option>第一库区</option></select>
          <label>货架名称</label><input id="oriName" placeholder="请输入货架名称" />
          <div class="ops">
            <button class="bd-btn pri" id="btnQueryOri">查询</button>
            <button class="bd-btn ghost" id="btnAddOri">新增方位</button>
            <button class="bd-btn" id="btnResetOri">还原方位配置</button>
            <button class="bd-btn pri" id="btnSaveOri">提交方位配置</button>
          </div>
        </div>
        <div class="bd-panel">
          <div class="ori-canvas" id="oriCanvas">
            <div class="ori-shelf"><div class="nm"><span>临时货架</span><span class="acts"><button data-action="edit" title="修改">✎</button><button data-action="delete" title="删除">×</button></span></div><div class="layer" data-tip="1层 · 3 位">1层 · 3 位</div><div class="layer" data-tip="2层 · 2 位">2层 · 2 位</div></div>
            <div class="ori-shelf"><div class="nm"><span>1号货架</span><span class="acts"><button data-action="edit" title="修改">✎</button><button data-action="delete" title="删除">×</button></span></div><div class="layer">1层 · 4 位</div><div class="layer">2层 · 4 位</div><div class="layer">3层 · 2 位</div></div>
            <div class="ori-shelf"><div class="nm"><span>2号货架</span><span class="acts"><button data-action="edit" title="修改">✎</button><button data-action="delete" title="删除">×</button></span></div><div class="layer">1层 · 5 位</div><div class="layer">2层 · 5 位</div></div>
            <div class="ori-tip">*提示：鼠标右键点击货架层级查看详细内容</div>

  <script src="js/sidebar-actions.js"></script>

<script>
var oriCanvas=document.getElementById('oriCanvas'),oriInitial=oriCanvas.innerHTML;
document.getElementById('oriCanvas').addEventListener('contextmenu',function(e){
  var layer=e.target.closest('.layer'); if(!layer) return;
  e.preventDefault();
  alert('货架层级详情\n'+layer.closest('.ori-shelf').querySelector('.nm span').textContent+' · '+layer.textContent);
});
oriCanvas.addEventListener('click',function(e){var b=e.target.closest('button[data-action]');if(!b)return;var shelf=b.closest('.ori-shelf'),act=b.dataset.action;if(act==='delete'&&confirm('确定删除该货架方位吗？'))shelf.remove();if(act==='edit'){var old=shelf.querySelector('.nm>span').textContent,name=prompt('请输入货架名称',old);if(name&&name.trim())shelf.querySelector('.nm>span').textContent=name.trim()}});
document.getElementById('btnAddOri').onclick=function(){var name=prompt('请输入新增货架名称','新货架');if(!name||!name.trim())return;var shelf=document.createElement('div');shelf.className='ori-shelf';shelf.innerHTML='<div class="nm"><span>'+name.trim()+'</span><span class="acts"><button data-action="edit" title="修改">✎</button><button data-action="delete" title="删除">×</button></span></div><div class="layer">1层 · 3 位</div><div class="layer">2层 · 3 位</div>';oriCanvas.insertBefore(shelf,oriCanvas.querySelector('.ori-tip'))};
document.getElementById('btnQueryOri').onclick=function(){var kw=document.getElementById('oriName').value.trim();oriCanvas.querySelectorAll('.ori-shelf').forEach(function(s){s.style.display=!kw||s.querySelector('.nm>span').textContent.indexOf(kw)>-1?'inline-block':'none'})};
document.getElementById('btnResetOri').onclick=function(){oriCanvas.innerHTML=oriInitial;document.getElementById('oriName').value=''};
document.getElementById('btnSaveOri').onclick=function(){alert('方位配置已提交，共 '+oriCanvas.querySelectorAll('.ori-shelf').length+' 个货架')};
</script>
