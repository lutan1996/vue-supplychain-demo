  <script>
    (function () {
      function tickClock() {
        var el = document.getElementById('clock');
        if (!el) return;
        var d = new Date();
        var pad = function (n) { return n < 10 ? '0' + n : '' + n; };
        el.textContent = d.getFullYear() + '-' + pad(d.getMonth() + 1) + '-' + pad(d.getDate()) +
          '  ' + pad(d.getHours()) + ':' + pad(d.getMinutes()) + ':' + pad(d.getSeconds());
      }
      tickClock();
      setInterval(tickClock, 1000);
    })();
  </script>
  <script src="js/warehouse-submenu.js"></script>
  <script>
    (function () {
      var rows = [
        { code: "CK00001", name: "集团中心仓", type: "中心库", region: "集团", address: "北京市朝阳区xx路1号", manager: "程秀", phone: "13800000001", status: "启用", parent: "集团" , stockQty: 12},
        { code: "CK01001", name: "华北区域仓", type: "区域库", region: "华北", address: "河北省张家口xx园区", manager: "王雷", phone: "13800000002", status: "启用", parent: "集团中心仓", stockQty: 8},
        { code: "CK01011", name: "张北场站仓", type: "场站库", region: "华北", address: "张北风场A区", manager: "李凯", phone: "13800000003", status: "启用", parent: "华北区域仓", stockQty: 0}
      ];

      var refs = {
        body: document.getElementById("warehouseBody"),
        total: document.getElementById("warehouseTotalText"),
        fName: document.getElementById("f-name"),
        fKeeper: document.getElementById("f-keeper"),
        fRegion: document.getElementById("f-region"),
        fAddress: document.getElementById("f-address")
      };
      var detailMask = document.getElementById("warehouseDetailMask");

      function render() {
        var name = (refs.fName.value || "").trim();
        var keeper = (refs.fKeeper.value || "").trim();
        var region = (refs.fRegion.value || "").trim();
        var address = (refs.fAddress.value || "").trim();
        var list = rows.filter(function (x) {
          return (!name || x.name.indexOf(name) > -1) &&
            (!keeper || x.manager.indexOf(keeper) > -1) &&
            (!region || x.region.indexOf(region) > -1) &&
            (!address || x.address.indexOf(address) > -1);
        });
        refs.body.innerHTML = "";
        list.forEach(function (x) {
          var tr = document.createElement("tr");
          tr.setAttribute("data-code", x.code);
          tr.innerHTML =
            '<td><input type="checkbox" aria-label="选择行" /></td>' +
            "<td>" + x.code + "</td>" +
            "<td>" + x.name + "<div style='font-size:12px;color:#8ca0b8;'>上级：" + x.parent + "</div></td>" +
            "<td>" + x.type + "</td>" +
            "<td>" + x.region + "</td>" +
            "<td>" + x.address + "</td>" +
            "<td>" + x.manager + "</td>" +
            "<td>" + x.phone + "</td>" +
            "<td>" + x.status + "</td>" +
            '<td><div class="wh-ops"><a href="#" data-action="view">查看</a><a href="#" data-action="edit">修改</a><a href="#" data-action="del">删除</a></div></td>';
          refs.body.appendChild(tr);
        });
        refs.total.textContent = "共 " + list.length + " 条";
      }

      function genCode() {
        return "CK" + String(Math.floor(Math.random() * 90000 + 10000));
      }
      function openDetail(item) {
        document.getElementById("warehouseDetailGrid").innerHTML = [
          ["仓库编码", item.code],
          ["仓库名称", item.name],
          ["仓库类型", item.type],
          ["所属区域", item.region],
          ["详细地址", item.address],
          ["库管员", item.manager],
          ["联系电话", item.phone],
          ["状态", item.status],
          ["上级仓库", item.parent]
        ].map(function (pair) {
          return '<div class="wh-detail-item"><div class="wh-detail-label">' + pair[0] + '</div><div class="wh-detail-value">' + pair[1] + '</div></div>';
        }).join("");
        detailMask.classList.add("show");
        detailMask.setAttribute("aria-hidden", "false");
        document.body.style.overflow = "hidden";
      }
      function closeDetail() {
        detailMask.classList.remove("show");
        detailMask.setAttribute("aria-hidden", "true");
        document.body.style.overflow = "";
      }

      document.querySelector(".btn-toolbar--primary").addEventListener("click", function () {
        showActionPrompt("新增仓库", "仓库名称：", "", function (name) {
          if (!name) return;
          showActionPrompt("新增仓库", "仓库类型（中心库/区域库/场站库）：", "场站库", function (type) {
            showActionPrompt("新增仓库", "上级仓库（集团→区域→场站）：", "集团中心仓", function (parent) {
              showActionPrompt("新增仓库", "所属区域：", "华北", function (region) {
                showActionPrompt("新增仓库", "详细地址：", "示例地址", function (address) {
                  showActionPrompt("新增仓库", "负责人：", "管理员", function (manager) {
                    showActionPrompt("新增仓库", "联系电话：", "13800000000", function (phone) {
                      rows.unshift({ code: genCode(), name: name.trim(), type: (type || "场站库").trim(), region: (region || "华北").trim(), address: (address || "").trim(), manager: (manager || "").trim(), phone: (phone || "").trim(), status: "启用", parent: (parent || "集团中心仓").trim(), stockQty: 0 });
                      render();
                    });
                  });
                });
              });
            });
          });
        });
      });

      refs.body.addEventListener("click", function (e) {
        var a = e.target.closest("a[data-action]");
        if (!a) return;
        e.preventDefault();
        var tr = a.closest("tr");
        var code = tr && tr.getAttribute("data-code");
        var item = rows.find(function (x) { return x.code === code; });
        if (!item) return;
        var action = a.getAttribute("data-action");
        if (action === "view") {
          openDetail(item);
          return;
        }
        if (action === "edit") {
          showActionPrompt("编辑", "负责人：", item.manager, function (manager) {
            if (!manager) return;
            item.manager = manager.trim();
            showActionPrompt("编辑", "联系电话：", item.phone, function (phone) {
              item.phone = (phone || item.phone).trim();
              render();
            });
          });
          return;
        }
        if (action === "del") {
          if (item.stockQty > 0) {
            alert("该仓库存在库存，不可删除。");
            return;
          }
          showActionConfirm("删除", "确认删除该仓库？", function () {
            rows = rows.filter(function (x) { return x.code !== item.code; });
            render();
          });
        }
      });

      document.querySelector(".btn.btn-primary").addEventListener("click", render);
      document.querySelector(".btn.btn-default").addEventListener("click", function () {
        refs.fName.value = "";
        refs.fKeeper.value = "";
        refs.fRegion.value = "";
        refs.fAddress.value = "";
        render();
      });

      function whToast(msg) {
        var t = document.createElement("div");
        t.textContent = msg;
        t.setAttribute("role", "status");
        t.style.cssText = "position:fixed;left:50%;bottom:88px;transform:translateX(-50%);background:rgba(0,0,0,.78);color:#fff;padding:10px 18px;border-radius:8px;font-size:13px;z-index:10050;max-width:90vw;text-align:center;";
        document.body.appendChild(t);
        setTimeout(function () { t.remove(); }, 2400);
      }
      var tbEdit = document.querySelector(".btn-toolbar--success");
      var tbDel = document.querySelector(".btn-toolbar--danger");
      var tbExport = document.querySelector(".btn-toolbar--warning");
      if (tbEdit) tbEdit.addEventListener("click", function () { whToast("请先勾选要修改的仓库（演示）"); });
      if (tbDel) tbDel.addEventListener("click", function () { whToast("请先勾选要删除的仓库（演示）"); });
      if (tbExport) tbExport.addEventListener("click", function () { whToast("正在导出仓库列表（演示）…"); });
      var iconBtns = document.querySelectorAll(".wh-toolbar-icons button");
      if (iconBtns[0]) iconBtns[0].addEventListener("click", function () { whToast("在结果中搜索（演示）"); });
      if (iconBtns[1]) iconBtns[1].addEventListener("click", function () { render(); whToast("列表已刷新"); });
      document.getElementById("warehouseDetailCloseX").addEventListener("click", closeDetail);
      document.getElementById("warehouseDetailOk").addEventListener("click", closeDetail);
      detailMask.addEventListener("click", function (e) { if (e.target === detailMask) closeDetail(); });
      document.addEventListener("keydown", function (e) {
        if (e.key === "Escape" && detailMask.classList.contains("show")) closeDetail();
      });

      render();
    })();
  </script>
</body>
</html>
