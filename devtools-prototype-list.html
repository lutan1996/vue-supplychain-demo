      position: relative;
    }
    .dt-pie::after {
      content: "";
      position: absolute;
      inset: 45px;
      background: #fff;
      border-radius: 50%;
    }
    .dt-gauge {
      height: 140px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      padding-bottom: 8px;

      border-bottom: none;
      border-radius: 90px 90px 0 0;
      box-sizing: border-box;
      position: relative;
    }
    .dt-gauge-arc::after {
      content: "";
      position: absolute;
      left: 50%;
      bottom: 0;
      width: 3px;
      height: 70px;
      background: #1890ff;
      transform-origin: bottom center;
      transform: translateX(-50%) rotate(-55deg);
      border-radius: 2px;

      subT.querySelectorAll(".dt-tab").forEach(function (t) {
        t.addEventListener("click", function () {
          subT.querySelectorAll(".dt-tab").forEach(function (x) { x.classList.remove("is-active"); });
          t.classList.add("is-active");
        });
      });
    }
    var innerT = document.getElementById("dtInnerToolbar");
    innerT.className = "dt-toolbar-row";
    innerT.innerHTML = "";
    var tools = document.createElement("div");
    tools.className = "dt-tools";
    (cfg.tools || []).forEach(function (k) {
      var b = toolBtn(k);
      if (b) tools.appendChild(b);
    });
    innerT.appendChild(tools);
    var icons = document.createElement("div");
    icons.className = "dt-toolbar-icons";
    icons.innerHTML = '<button type="button" class="dt-icon-btn"><i class="fa-solid fa-magnifying-glass"></i></button><button type="button" class="dt-icon-btn"><i class="fa-solid fa-rotate-right"></i></button>';
    innerT.appendChild(icons);
    fillTable("dtHead", "dtBody", "dtFoot", "dtEmpty", cfg);
  } else {
    split.classList.add("hidden");
    std.classList.remove("hidden");
    var filt = document.getElementById("dtFilters");
    filt.innerHTML = "";
    if (cfg.filterRange) {
      document.getElementById("dtFilterBar").style.display = "";
      filt.innerHTML = "";
      var fr = document.createElement("div");
      fr.className = "dt-field";
      fr.style.gridColumn = "1 / -1";
      fr.style.display = "flex";
      fr.style.alignItems = "center";
      fr.style.flexWrap = "wrap";
      fr.style.gap = "10px";
      fr.innerHTML =
        '<label style="min-width:100px">' + cfg.filterRange.label + '</label>' +
        '<input type="text" placeholder="' + cfg.filterRange.leftPh + '" style="width:140px;height:32px;border:1px solid #d9d9d9;border-radius:4px;padding:0 10px;box-sizing:border-box" />' +
        '<span style="color:#666;font-size:13px">至</span>' +
        '<input type="text" placeholder="' + cfg.filterRange.rightPh + '" style="width:140px;height:32px;border:1px solid #d9d9d9;border-radius:4px;padding:0 10px;box-sizing:border-box" />';
      filt.appendChild(fr);
    } else {
      document.getElementById("dtFilterBar").style.display = "";
      buildFilters(filt, cfg);
    }
    var toolsEl = document.getElementById("dtTools");
    toolsEl.innerHTML = "";
    if (cfg.showToolbar === false) {
      document.getElementById("dtToolbarRow").classList.add("hidden");
    } else {
      document.getElementById("dtToolbarRow").classList.remove("hidden");
      (cfg.tools || []).forEach(function (k) {
        var b = toolBtn(k);
        if (b) toolsEl.appendChild(b);
      });
    }
    document.getElementById("dtToolbarIcons").style.display = cfg.toolbarIcons === false ? "none" : "flex";
    fillTable("dtHeadStd", "dtBodyStd", "dtFootStd", "dtEmptyStd", cfg);
  }

  if (!cfg.split && cfg.type !== "cache") {
    var resetStd = document.getElementById("dtResetBtn");
    if (resetStd) {
      resetStd.addEventListener("click", function (e) {
        e.preventDefault();
        document.querySelectorAll("#dtFilters input").forEach(function (inp) { inp.value = ""; });
      });
    }
  }
})();
  </script>
</body>
</html>
