<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <title>生产物资库存管理 - 新能源物资供应链管理系统</title>
  <link rel="stylesheet" href="css/vendor/fa-all.min.css" />
  <link rel="stylesheet" href="css/subpage-base.css" />
  <link rel="stylesheet" href="css/carrier-management.css" />
  <link rel="stylesheet" href="css/source-navbar-header.css" />
  <style>
    :root {
      --primary: #1677ff;
      --primary-soft: #e6f4ff;
      --text: #1f2d3d;
      --muted: #8c9bb0;
      --border: #e8edf4;
      --bg: #f0f3f8;
    }
    * { box-sizing: border-box; }
    .ledger-page {
      display: flex;
      flex-direction: column;
      min-height: calc(100vh - 56px);
      background: var(--bg);
      color: var(--text);
      font-size: 13px;
    }
    .ledger-view-row {
      flex: 0 0 auto;
      min-height: 48px;
      padding: 9px 12px 7px;
      display: flex;
      align-items: center;
      background: #fff;
      border-bottom: 1px solid var(--border);
    }
    .page-view-switch { display: flex; gap: 4px; }
    .page-view-switch a {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      height: 32px;
      padding: 0 14px;
      border-radius: 4px;
      color: #64748b;
      text-decoration: none;
      font-size: 13px;
    }
    .page-view-switch a.on {
      background: var(--primary-soft);
      color: var(--primary);
      font-weight: 600;
    }

    .ly-home {
      flex: 1;
      min-height: 0;
      display: grid;
      grid-template-columns: 200px auto minmax(0, 1.15fr) minmax(300px, 0.9fr);
      gap: 0;
      overflow: hidden;
    }
    .ly-home.no-station { grid-template-columns: 200px minmax(0, 1.45fr) minmax(300px, 0.95fr); }
    .ly-home.station-collapsed { grid-template-columns: 200px 44px minmax(0, 1.2fr) minmax(300px, 0.9fr); }
    .ly-home.no-station.station-collapsed { grid-template-columns: 200px minmax(0, 1.45fr) minmax(300px, 0.95fr); }

    .ly-col {
      min-height: 0;
      display: flex;
      flex-direction: column;
      background: #fff;
      border-right: 1px solid var(--border);
      overflow: hidden;
    }
    .ly-col:last-child { border-right: 0; }
    .col-hd {
      padding: 10px 12px 8px;
      border-bottom: 1px solid var(--border);
      background: #f8fbff;
    }
    .col-hd h2, .col-hd h3 {
      margin: 0;
      font-size: 13px;
      font-weight: 700;
      color: #1f2d3d;
    }
    .col-hd p {
      margin: 3px 0 0;
      font-size: 10px;
      color: var(--muted);
    }
    .col-hd-row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 6px;
    }

    .org-tree { flex: 1; overflow: auto; padding: 6px 8px 12px; }
    .org-tree .node {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 10px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      color: #334155;
      user-select: none;
    }
    .org-tree .node:hover { background: #f0f7ff; color: var(--primary); }
    .org-tree .node.on { background: var(--primary-soft); color: var(--primary); font-weight: 600; }
    .org-tree .node.l2 { padding-left: 24px; }
    .org-tree .node .arrow { width: 12px; font-size: 10px; color: #94a3b8; flex: 0 0 auto; }
    .org-tree .group-wrap.open > .node.l1 .arrow::before { content: "▼"; }
    .org-tree .group-wrap:not(.open) > .node.l1 .arrow::before { content: "›"; }
    .org-tree .children { display: none; }
    .org-tree .group-wrap.open > .children { display: block; }

    .station-col { width: 168px; transition: width .2s ease; }
    .station-col.hidden { display: none; }
    .station-col.collapsed { width: 44px; min-width: 44px; }
    .station-col.collapsed .station-list,
    .station-col.collapsed .col-hd span,
    .station-col.collapsed .col-hd p { display: none; }
    .icon-btn {
      flex: 0 0 auto;
      width: 24px;
      height: 24px;
      border: 1px solid #c9d7ea;
      border-radius: 4px;
      background: #fff;
      color: #64748b;
      cursor: pointer;
      font-size: 12px;
      line-height: 1;
    }
    .station-list { flex: 1; overflow: auto; padding: 6px; }
    .station-item {
      padding: 9px 10px;
      border-radius: 6px;
      cursor: pointer;
      border: 1px solid transparent;
      margin-bottom: 4px;
    }
    .station-item:hover { background: #f0f7ff; border-color: #d6e4ff; }
    .station-item.on { background: var(--primary-soft); border-color: #91caff; }
    .station-item b { display: block; font-size: 12px; margin-bottom: 3px; }
    .station-item small { font-size: 10px; color: var(--muted); line-height: 1.35; }

    .main-col { background: #eef4fa; }
    .tab-row {
      display: flex;
      align-items: center;
      gap: 0;
      padding: 0 12px;
      background: #fff;
      border-bottom: 1px solid var(--border);
    }
    .tab-row.equip-tabs { border-bottom: 0; padding-top: 8px; }
    .tab-row.mat-tabs { padding-bottom: 0; background: #fafbfd; }
    .tab-btn {
      height: 34px;
      padding: 0 14px;
      border: 0;
      border-bottom: 2px solid transparent;
      background: transparent;
      color: #64748b;
      font-size: 13px;
      cursor: pointer;
      margin-bottom: -1px;
    }
    .tab-btn.on {
      color: var(--primary);
      border-bottom-color: var(--primary);
      font-weight: 600;
    }
    .tab-btn.mat { font-size: 12px; height: 30px; padding: 0 10px; }
    .main-head {
      padding: 8px 12px;
      background: #fff;
      border-bottom: 1px solid var(--border);
      font-size: 12px;
      color: #64748b;
    }
    .main-head b { color: #1f2d3d; }

    .main-stage {
      flex: 1;
      min-height: 0;
      overflow: auto;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 8px 12px 12px;
      background:
        radial-gradient(ellipse 80% 60% at 50% 40%, rgba(22,119,255,.10), transparent 70%),
        linear-gradient(180deg, #edf4fb 0%, #e8f0f8 48%, #dfeaf5 100%);
    }
    .diagram-wrap {
      width: min(100%, 620px);
      height: min(100%, 580px);
      min-height: 420px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      border-radius: 12px;
      overflow: visible;
      background: radial-gradient(ellipse at 50% 35%, rgba(56,189,248,.12), transparent 65%), linear-gradient(180deg, #eef6ff 0%, #e3edf7 100%);
      box-shadow: inset 0 0 0 1px rgba(148,163,184,.25);
    }
    .diagram-wrap canvas {
      display: block;
      width: 100% !important;
      height: 100% !important;
      outline: none;
    }
    .diagram-callout-svg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 4;
      overflow: visible;
    }
    .diagram-callout-svg line {
      stroke: #1f2d3d;
      stroke-width: 1.2;
      stroke-linecap: round;
    }
    .diagram-callout-svg text {
      fill: #1f2d3d;
      font-size: 13px;
      font-weight: 600;
      pointer-events: auto;
      cursor: pointer;
      user-select: none;
    }
    .diagram-callout-svg g.on line { stroke: #1677ff; stroke-width: 1.6; }
    .diagram-callout-svg g.on text { fill: #1677ff; }

    .group-panel, .station-panel {
      width: 100%;
      max-width: 920px;
      padding: 8px 4px;
    }
    .group-panel h2 { margin: 0 0 6px; font-size: 20px; }
    .group-panel p { margin: 0 0 14px; color: var(--muted); }
    .group-kpis {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 14px;
    }
    .group-kpi {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
    }
    .group-kpi .k { font-size: 11px; color: var(--muted); margin-bottom: 4px; }
    .group-kpi .v { font-size: 20px; font-weight: 700; }
    .group-cards {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }
    .group-card {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
      cursor: pointer;
    }
    .group-card:hover { border-color: #91caff; box-shadow: 0 4px 14px rgba(22,119,255,.08); }
    .group-card b { display: block; font-size: 13px; margin-bottom: 6px; }
    .group-card small { color: var(--muted); font-size: 11px; line-height: 1.4; }

    .station-panel .cam-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-top: 10px;
    }
    .cam-box {
      background: #0f172a;
      border-radius: 8px;
      height: 120px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #94a3b8;
      font-size: 12px;
      border: 1px solid #1e293b;
    }
    .unit-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
    .unit-tag {
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 11px;
      background: #f0fdf4;
      color: #166534;
      border: 1px solid #bbf7d0;
    }
    .unit-tag.warn { background: #fff7ed; color: #c2410c; border-color: #fed7aa; }
    .unit-tag.idle { background: #f8fafc; color: #64748b; border-color: #e2e8f0; }

    .detail-body { flex: 1; overflow: auto; padding: 12px 14px 16px; }
    .detail-empty { color: var(--muted); font-size: 12px; line-height: 1.6; padding: 24px 8px; text-align: center; }
    .part-summary {
      background: #f8fbff;
      border: 1px solid #d6e4ff;
      border-radius: 8px;
      padding: 10px 12px;
      margin-bottom: 10px;
    }
    .part-summary h4 { margin: 0 0 6px; font-size: 15px; }
    .part-summary p { margin: 0; font-size: 12px; color: #64748b; line-height: 1.55; }
    .detail-kpis {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      margin-bottom: 10px;
    }
    .detail-kpi {
      background: #fafbfd;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 10px;
    }
    .detail-kpi .k { font-size: 10px; color: var(--muted); margin-bottom: 2px; }
    .detail-kpi .v { font-size: 16px; font-weight: 700; }
    .detail-kpi .v small { font-size: 11px; font-weight: 600; color: var(--muted); }
    .mini-chart {
      background: #fafbfd;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px;
      margin-bottom: 10px;
    }
    .mini-chart h5 { margin: 0 0 8px; font-size: 12px; }
    .bar-mini-row {
      display: grid;
      grid-template-columns: 52px 1fr 34px;
      gap: 6px;
      align-items: center;
      font-size: 11px;
      margin-bottom: 4px;
      color: #64748b;
    }
    .bar-mini-row .track { height: 6px; background: #e8edf4; border-radius: 4px; overflow: hidden; }
    .bar-mini-row .track i { display: block; height: 100%; border-radius: 4px; background: linear-gradient(90deg,#69b1ff,#1677ff); }
    .spare-list { border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
    .spare-list-hd { padding: 8px 10px; background: #f7f9fc; border-bottom: 1px solid var(--border); font-size: 12px; font-weight: 700; }
    .spare-item { padding: 8px 10px; border-bottom: 1px solid #eef2f7; font-size: 12px; }
    .spare-item:last-child { border-bottom: 0; }
    .spare-item b { color: #1f2d3d; }
    .spare-item span { color: #64748b; display: block; margin-top: 2px; line-height: 1.4; }

    @media (max-width: 1280px) {
      .ly-home { grid-template-columns: 180px auto minmax(0, 1fr) 280px; }
      .group-kpis, .group-cards { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
  </style>
</head>

        emissive: opts.emissive != null ? opts.emissive : 0x000000,
        emissiveIntensity: opts.emissiveIntensity != null ? opts.emissiveIntensity : 0,
        depthWrite: opts.depthWrite != null ? opts.depthWrite : true,
        side: opts.side != null ? opts.side : THREE.FrontSide
      });
      var mesh = new THREE.Mesh(geo, mat);
      mesh.position.set(x, y, z);
      if (opts.rx) mesh.rotation.x = opts.rx;
      if (opts.ry) mesh.rotation.y = opts.ry;
      if (opts.rz) mesh.rotation.z = opts.rz;
      mesh.userData.partId = partId;
      mesh.userData.matType = opts.matType || "";
      if (opts.renderOrder != null) mesh.renderOrder = opts.renderOrder;
      scene.add(mesh);
      if (partId) meshes.push(mesh);
      return mesh;
    }

    function projectLocalPoint(local, scene, camera, w, h) {
      var v = new THREE.Vector3(local.x, local.y, local.z);
      scene.localToWorld(v);
      v.project(camera);
      return {
        x: (v.x * 0.5 + 0.5) * w,

    function setupWindCalloutSvg(container) {
      var w = container.clientWidth || 560;

      var svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
      svg.setAttribute("class", "diagram-callout-svg");
      svg.setAttribute("viewBox", "0 0 " + w + " " + h);
      svg.setAttribute("preserveAspectRatio", "none");
      scene3d.calloutItems = WIND_CALLOUT_DEFS.map(function (d) {
        var g = document.createElementNS("http://www.w3.org/2000/svg", "g");
        g.setAttribute("data-part", d.id);
        if (state.partId === d.id) g.setAttribute("class", "on");

        text.textContent = d.name;
        text.addEventListener("click", function () { selectPart(d.id); });
        g.appendChild(line);
        g.appendChild(text);
        svg.appendChild(g);
        return { partId: d.id, name: d.name, matType: d.matType, anchor: d.anchor, offset: d.offset, g: g, line: line, text: text };
      });
      container.appendChild(svg);

        if (!visible) return;
        var ap = projectLocalPoint(c.anchor, scene3d.scene, scene3d.camera, w, h);
        var lx = ap.x + c.offset.x;
        var ly = ap.y + c.offset.y;
        c.line.setAttribute("x1", ap.x);
        c.line.setAttribute("y1", ap.y);
        c.line.setAttribute("x2", lx);
        c.line.setAttribute("y2", ly);
        c.text.setAttribute("x", lx + 4);
        c.text.setAttribute("y", ly + 4);
        c.g.style.opacity = ap.behind ? "0.35" : "1";
        c.g.setAttribute("class", state.partId === c.partId ? "on" : "");
      });
    }

    function buildWindScene(scene, meshes) {
      var dy = WIND_Y_OFFSET;
      function wy(y) { return y + dy; }
      addMesh(scene, [], new THREE.CylinderGeometry(0.38, 0.55, 8.2, 20), 0xb8c5d6, 0, wy(4.15), 0, "", { metalness: 0.45, roughness: 0.5 });
      addMesh(scene, meshes, new THREE.BoxGeometry(0.75, 0.62, 0.62), 0x334155, 0.38, wy(8.85), 0.15, "gearbox", { matType: "齿轮箱", metalness: 0.65, renderOrder: 0 });
      addMesh(scene, meshes, new THREE.CylinderGeometry(0.56, 0.56, 1.1, 32), 0xf97316, 1.0, wy(8.85), 0.15, "generator", { matType: "电机/变流", rx: Math.PI / 2, metalness: 0.55, renderOrder: 0 });
      addMesh(scene, meshes, new THREE.CylinderGeometry(0.42, 0.42, 0.18, 32), 0xea580c, 1.55, wy(8.85), 0.15, "", { rx: Math.PI / 2, metalness: 0.5 });
      addMesh(scene, meshes, new THREE.BoxGeometry(0.62, 1.1, 0.72), 0x38bdf8, 1.62, wy(8.95), 0.15, "cabinet", { matType: "电机/变流", metalness: 0.4, renderOrder: 0 });
      addMesh(scene, [], new THREE.BoxGeometry(2.35, 0.1, 1.35), 0x2dd4bf, 0.15, wy(8.72), 0.15, "", { metalness: 0.2, roughness: 0.6 });
      addMesh(scene, [], new THREE.CylinderGeometry(0.12, 0.12, 0.95, 16), 0x64748b, -0.35, wy(8.85), 0.15, "", { metalness: 0.55, rx: Math.PI / 2 });
      addMesh(scene, [], new THREE.BoxGeometry(0.28, 0.28, 0.28), 0x6366f1, -1.05, wy(8.72), 0.45, "", { metalness: 0.4 });
      addMesh(scene, [], new THREE.BoxGeometry(0.32, 0.28, 0.22), 0xdc2626, 0.55, wy(8.65), -0.25, "", { metalness: 0.35 });
      addMesh(scene, [], new THREE.BoxGeometry(0.14, 0.22, 0.14), 0x0ea5e9, 0.42, wy(3.8), 0.42, "", { metalness: 0.3 });
      addMesh(scene, meshes, new THREE.SphereGeometry(0.62, 28, 28), 0x475569, -1.05, wy(8.85), 0.15, "hub", { metalness: 0.7, renderOrder: 0 });
      addMesh(scene, meshes, new THREE.BoxGeometry(2.85, 1.52, 1.82), 0x7dd3fc, 0.15, wy(8.85), 0.15, "nacelle", {
        metalness: 0.1, roughness: 0.3, transparent: true, opacity: 0.1, side: THREE.DoubleSide, depthWrite: false, renderOrder: 5
      });
      for (var i = 0; i < 3; i++) {
        var blade = addMesh(scene, meshes, new THREE.BoxGeometry(0.16, 5.4, 0.82), 0xe2e8f0, -1.05, wy(8.85), 0.15, i === 0 ? "blade" : "", {
          matType: "叶片", metalness: 0.3, transparent: true, opacity: 0.38, side: THREE.DoubleSide, depthWrite: false, renderOrder: 4
        });
        blade.rotation.z = (i * Math.PI * 2 / 3) - Math.PI / 2;
        blade.translateY(2.7);
        if (i !== 0) blade.userData.partId = "";
      }
      addMesh(scene, meshes, new THREE.CylinderGeometry(0.55, 0.8, 8.5, 32), 0xdce3ec, 0, wy(4.25), 0, "tower", {
        metalness: 0.45, roughness: 0.45, transparent: true, opacity: 0.14, side: THREE.DoubleSide, depthWrite: false, renderOrder: 4
      });
      for (var t = 1; t <= 4; t++) {
        addMesh(scene, [], new THREE.TorusGeometry(0.52 + t * 0.04, 0.03, 8, 32), 0x94a3b8, 0, wy(t * 1.8), 0, "", { metalness: 0.6, rx: Math.PI / 2, transparent: true, opacity: 0.35, depthWrite: false });
      }
      addMesh(scene, [], new THREE.CylinderGeometry(0.04, 0.04, 0.8, 12), 0x64748b, 0.15, wy(9.65), 0.15, "", { metalness: 0.5, transparent: true, opacity: 0.45, depthWrite: false });
    }

    function buildPvScene(scene, meshes) {
      addMesh(scene, [], new THREE.BoxGeometry(7, 0.12, 4.5), 0x64748b, 0, 0.45, 0, "", { metalness: 0.45 });
      for (var r = 0; r < 4; r++) {
        for (var c = 0; c < 6; c++) {
          var pid = (r === 1 && c === 3) ? "module" : "";
          var panel = addMesh(scene, meshes, new THREE.BoxGeometry(0.88, 0.05, 1.45), 0x1e3a8a, -2.5 + c * 0.95, 0.95 + r * 0.12, -0.8 + r * 0.45, pid, { matType: "组件", rx: -0.48, metalness: 0.65, roughness: 0.25 });
          if (!pid) panel.userData.partId = "";
        }
      }
      addMesh(scene, meshes, new THREE.BoxGeometry(0.85, 1.35, 0.65), 0xf59e0b, 3.0, 1.05, 0.6, "inverter", { matType: "逆变器", metalness: 0.4 });
      addMesh(scene, meshes, new THREE.BoxGeometry(0.45, 2.0, 0.38), 0x94a3b8, -3.4, 1.35, 1.3, "bracket", { matType: "支架", metalness: 0.55 });
      addMesh(scene, meshes, new THREE.BoxGeometry(0.75, 0.95, 0.52), 0x334155, 2.1, 0.95, -1.3, "combiner", { matType: "汇流箱", metalness: 0.45 });
      addMesh(scene, meshes, new THREE.CylinderGeometry(0.035, 0.035, 4.2, 12), 0xdc2626, 1.2, 0.65, 0.1, "cable", { matType: "线缆", rx: Math.PI / 2 });
      addMesh(scene, [], new THREE.SphereGeometry(0.35, 16, 16), 0xfbbf24, 4.5, 5.5, -3, "", { emissive: 0xfbbf24, emissiveIntensity: 0.75, metalness: 0.1 });
    }

    function buildStorageScene(scene, meshes) {
      addMesh(scene, [], new THREE.BoxGeometry(5.8, 2.9, 2.5), 0xd1fae5, 0, 1.55, 0, "", { roughness: 0.75 });
      addMesh(scene, [], new THREE.BoxGeometry(5.5, 2.7, 2.3), 0x047857, 0, 1.55, 0, "", { transparent: true, opacity: 0.12, metalness: 0.2 });
      for (var i = 0; i < 5; i++) {
        var bat = addMesh(scene, meshes, new THREE.BoxGeometry(0.85, 1.65, 0.72), 0x10b981, -1.8 + i * 0.9, 1.55, 0, i === 2 ? "battery" : "", { matType: "电池模组", metalness: 0.45, roughness: 0.35 });
        if (i !== 2) bat.userData.partId = "";
      }
      addMesh(scene, meshes, new THREE.BoxGeometry(1.05, 1.85, 0.85), 0x2563eb, 2.35, 1.65, 0.65, "pcs", { matType: "PCS", metalness: 0.5 });
      addMesh(scene, meshes, new THREE.BoxGeometry(0.55, 0.42, 0.38), 0x6366f1, -2.35, 2.55, 0.85, "bms", { matType: "BMS", metalness: 0.35 });
      addMesh(scene, meshes, new THREE.CylinderGeometry(0.2, 0.2, 0.55, 16), 0xef4444, 2.4, 2.65, -0.75, "fire", { matType: "消防", metalness: 0.4 });
      addMesh(scene, meshes, new THREE.BoxGeometry(0.85, 0.55, 0.55), 0x0ea5e9, -2.05, 0.85, -0.85, "cooling", { matType: "温控", metalness: 0.35 });
    }

    function updateMeshVisibility() {
      scene3d.meshes.forEach(function (m) {
        if (!m.userData.partId) return;
        var part = getCurrentParts().filter(function (p) { return p.id === m.userData.partId; })[0];
        m.visible = !part || partMatchesMat(part);
      });
      updateCalloutLabels();
    }

    function initScene3d(container, builder) {
      disposeScene3d();
      scene3d.container = container;
      container.innerHTML = "";
      var w = container.clientWidth || 560;
      var h = container.clientHeight || 480;
      var renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
      renderer.setSize(w, h);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
      container.appendChild(renderer.domElement);

      var scene = new THREE.Scene();
      var camera = new THREE.PerspectiveCamera(45, w / h, 0.1, 200);
      if (state.equip === "wind") {
        camera.position.set(10, 5.2, 12);
        camera.lookAt(0, 3.6, 0);
      } else {
        camera.position.set(8, 6.5, 11);
        camera.lookAt(0, 1.5, 0);
      }

      scene.add(new THREE.AmbientLight(0xffffff, 0.55));
      var key = new THREE.DirectionalLight(0xffffff, 0.95);
      key.position.set(6, 12, 8);
      scene.add(key);
      var rim = new THREE.DirectionalLight(0x38bdf8, 0.45);
      rim.position.set(-8, 6, -6);
      scene.add(rim);

      var ground = new THREE.Mesh(
        new THREE.CircleGeometry(14, 64),
        new THREE.MeshStandardMaterial({ color: 0xdbeafe, metalness: 0.1, roughness: 0.85 })
      );
      ground.rotation.x = -Math.PI / 2;
      scene.add(ground);

      builder(scene, scene3d.meshes);
      updateMeshVisibility();
      if (state.equip === "wind") {
        setupWindCalloutSvg(container);
        updateCalloutLabels();
      }

      scene3d.renderer = renderer;
      scene3d.scene = scene;
      scene3d.camera = camera;
      scene3d.lastEquip = state.equip;

      var raycaster = new THREE.Raycaster();
      var mouse = new THREE.Vector2();
      renderer.domElement.addEventListener("click", function (e) {
        var rect = renderer.domElement.getBoundingClientRect();
        mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
        mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
        raycaster.setFromCamera(mouse, camera);
        var hits = raycaster.intersectObjects(scene3d.meshes.filter(function (m) { return m.visible && m.userData.partId; }), false);
        if (hits[0]) selectPart(hits[0].object.userData.partId);
      });

      function animate() {
        scene3d.animId = requestAnimationFrame(animate);
        scene.rotation.y += 0.004;
        scene3d.meshes.forEach(function (m) {
          if (!m.material || !m.material.emissive) return;
          if (m.userData.partId === state.partId) {
            m.material.emissive.setHex(0x1677ff);
            m.material.emissiveIntensity = 0.42;
          } else {
            m.material.emissive.setHex(0x000000);
            m.material.emissiveIntensity = 0;
          }
        });
        if (state.equip === "wind") updateCalloutLabels();
        renderer.render(scene, camera);
      }
      animate();
    }

    function renderDiagram() {
      if (state.level !== "company" || state.station) return;
      groupPanel.style.display = "none";
      stationPanel.style.display = "none";
      diagramWrap.style.display = "flex";
      var labels = { wind: "风机结构", pv: "光伏设备", storage: "储能设备" };
      mainHead.innerHTML = '<b>' + state.company + '</b> · ' + labels[state.equip] + ' · 3D 立体模型 · 点击部位查看备件';
      if (typeof THREE === "undefined") {
        diagramWrap.innerHTML = '<div class="detail-empty">3D 引擎加载中，请刷新页面</div>';
        return;
      }
      if (scene3d.renderer && scene3d.lastEquip === state.equip && scene3d.container === diagramWrap && (state.equip !== "wind" || scene3d.calloutSvg)) {
        updateMeshVisibility();
        return;
      }
      var builder = buildWindScene;
      if (state.equip === "pv") builder = buildPvScene;
      if (state.equip === "storage") builder = buildStorageScene;
      initScene3d(diagramWrap, builder);
    }

    function renderPartDetail(partId) {
      var part = getCurrentParts().filter(function (p) { return p.id === partId; })[0];
      if (!part) return;
      var spares = part.spares.filter(function () { return partMatchesMat(part); });
      var totalQty = spares.reduce(function (n, s) { return n + s.qty; }, 0);
      detailTitle.textContent = part.name + " · 关联备件";
      detailSub.textContent = (state.company || "龙源电力") + " · 部位联动详情";
      detailBody.innerHTML =
        '<div class="part-summary"><h4>' + part.name + '</h4><p>' + part.desc + '</p></div>' +
        '<div class="detail-kpis">' +
          '<div class="detail-kpi"><div class="k">关联备件品种</div><div class="v">' + spares.length + '<small> 种</small></div></div>' +
          '<div class="detail-kpi"><div class="k">当前库存数量</div><div class="v">' + totalQty + '<small> 件</small></div></div>' +
          '<div class="detail-kpi"><div class="k">物资类型</div><div class="v" style="font-size:13px">' + part.type + '</div></div>' +
          '<div class="detail-kpi"><div class="k">适用机型</div><div class="v" style="font-size:13px">金风 GW150 / UP2000</div></div>' +
        '</div>' +
        '<div class="mini-chart"><h5>库存状态分布</h5>' +
        (part.stats || []).map(function (s) {
          return '<div class="bar-mini-row"><span>' + s.label + '</span><div class="track"><i style="width:' + s.pct + '%"></i></div><b>' + s.pct + '%</b></div>';
        }).join("") + '</div>' +
        '<div class="spare-list"><div class="spare-list-hd">关联生产备件清单</div>' +
        (spares.length ? spares.map(function (s) {
          return '<div class="spare-item"><b>' + s.name + ' · ' + s.code + '</b><span>规格型号：' + s.model + ' · 库存：' + s.qty + ' 件 · 状态：' + s.status + '</span></div>';
        }).join("") : '<div class="spare-item"><span>当前筛选下暂无关联备件</span></div>') +
        '</div>';
    }

    function updateLayoutClasses() {
      lyHome.classList.toggle("no-station", state.level === "group");
      stationCol.classList.toggle("hidden", state.level === "group");
      stationCol.classList.toggle("collapsed", state.stationCollapsed && state.level === "company");
      lyHome.classList.toggle("station-collapsed", state.stationCollapsed && state.level === "company");
    }

    function renderAll() {
      renderOrgTree();
      updateLayoutClasses();
      if (state.level === "group") {
        renderEquipTabs(false);
        renderMatTabs(false);
        renderGroupPanel();
        return;
      }
      renderStations();
      if (state.station) {
        renderEquipTabs(false);
        renderMatTabs(false);
        renderStationPanel();
        return;
      }
      renderEquipTabs(true);
      renderMatTabs(true);
      renderDiagram();
      if (state.partId) renderPartDetail(state.partId);
      else {
        detailTitle.textContent = "零部件详情";
        detailSub.textContent = "点击 3D 模型中的部位查看关联备件";
        detailBody.innerHTML = '<div class="detail-empty">请在中间 3D 立体模型中选择一个部位，右侧将展示关联生产备件、库存数量及状态分布。</div>';
      }
    }

    function selectCompany(key) {
      state.level = "company";
      state.company = key;
      state.station = "";
      state.partId = "";
      renderAll();
    }

    function selectStation(name) {
      state.station = name;
      state.partId = "";
      renderAll();
    }

    function selectPart(id) {
      state.partId = id;
      updateCalloutLabels();
      renderPartDetail(id);
    }

    function selectGroup() {
      state.level = "group";
      state.company = "";
      state.station = "";
      state.partId = "";
      renderAll();
    }

    document.getElementById("orgTree").addEventListener("click", function (e) {
      var node = e.target.closest(".node");
      if (!node) return;
      if (node.getAttribute("data-level") === "group") {
        node.parentElement.classList.toggle("open");
        selectGroup();
        return;
      }
      if (node.getAttribute("data-level") === "company") selectCompany(node.getAttribute("data-key"));
    });

    document.getElementById("btnStationToggle").addEventListener("click", function () {
      state.stationCollapsed = !state.stationCollapsed;
      this.textContent = state.stationCollapsed ? "▶" : "◀";
      renderAll();
    });

    selectCompany("山西龙源");
  </script>
</body>
</html>
