<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>生产物资库存管理 - 新能源物资供应链管理系统</title>
  <link rel="stylesheet" href="css/vendor/fa-all.min.css" />
  <link rel="stylesheet" href="css/subpage-base.css" />
  <link rel="stylesheet" href="css/carrier-management.css" />
  <link rel="stylesheet" href="css/source-navbar-header.css" />
  <style>
    :root {
      --primary: #1677ff;
      --primary-soft: #e6f4ff;
      --text: #1f2d3d;
      --muted: #8c9bb0;
      --border: #e8edf4;
      --bg: #f0f3f8;
      --rail: #0b1f3a;
    }
    * { box-sizing: border-box; }
    .ledger-page {
      display: flex;
      flex-direction: column;
      min-height: calc(100vh - 56px);
      background: var(--bg);
      color: var(--text);
      font-size: 13px;
    }
    .ledger-view-row {
      flex: 0 0 auto;
      min-height: 48px;
      padding: 9px 12px 7px;
      display: flex;
      align-items: center;
      background: #fff;
      border-bottom: 1px solid var(--border);
    }
    .page-view-switch {
      display: flex;
      gap: 4px;
    }
    .page-view-switch a {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      height: 32px;
      padding: 0 14px;
      border-radius: 4px;
      color: #64748b;
      text-decoration: none;
      font-size: 13px;
    }
    .page-view-switch a.on {
      background: var(--primary-soft);
      color: var(--primary);
      font-weight: 600;
    }

    .ly-home {
      flex: 1;
      min-height: 0;
      display: grid;
      grid-template-columns: 200px auto minmax(0, 1.15fr) minmax(280px, 0.85fr);
      gap: 0;
      overflow: hidden;
    }
    .ly-home.no-station {
      grid-template-columns: 200px minmax(0, 1.35fr) minmax(300px, 0.95fr);
    }
    .ly-home.station-collapsed {
      grid-template-columns: 200px 44px minmax(0, 1.2fr) minmax(280px, 0.85fr);
    }
    .ly-col {
      min-height: 0;
      display: flex;
      flex-direction: column;
      background: #fff;
      border-right: 1px solid var(--border);
      overflow: hidden;
    }
    .ly-col:last-child { border-right: 0; }

    .org-col { background: var(--rail); color: #dbe7f5; border-right-color: #173456; }
    .org-col .col-hd {
      padding: 12px 14px 10px;
      border-bottom: 1px solid rgba(255,255,255,.08);
    }
    .org-col .col-hd h2 {
      margin: 0;
      font-size: 15px;
      color: #fff;
      font-weight: 700;
    }
    .org-col .col-hd p {
      margin: 4px 0 0;
      font-size: 11px;
      color: #8fb0d4;
    }
    .org-tree {
      flex: 1;
      overflow: auto;
      padding: 6px 0 12px;
    }
    .org-tree .node {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 14px;
      cursor: pointer;
      font-size: 12px;
      color: #dbe7f5;
      user-select: none;
    }
    .org-tree .node:hover { background: rgba(22,119,255,.28); color: #fff; }
    .org-tree .node.on { background: #1677ff; color: #fff; }
    .org-tree .node.l2 { padding-left: 28px; }
    .org-tree .node .arrow {
      width: 12px;
      font-size: 10px;
      color: #7ea2c9;
      flex: 0 0 auto;
    }
    .org-tree .group-wrap.open > .node.l1 .arrow::before { content: "▼"; }
    .org-tree .group-wrap:not(.open) > .node.l1 .arrow::before { content: "›"; }
    .org-tree .children { display: none; }
    .org-tree .group-wrap.open > .children { display: block; }

    .station-col { width: 168px; transition: width .2s ease; }
    .station-col.collapsed { width: 44px; min-width: 44px; }
    .station-col.collapsed .station-list,
    .station-col.collapsed .col-hd span,
    .station-col.collapsed .col-hd p { display: none; }
    .station-col .col-hd {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 6px;
      padding: 10px 10px 8px;
      border-bottom: 1px solid var(--border);
      background: #f8fbff;
    }
    .station-col .col-hd span {
      font-size: 13px;
      font-weight: 700;
      color: #1f2d3d;
    }
    .station-col .col-hd p {
      margin: 2px 0 0;
      font-size: 10px;
      color: var(--muted);
    }
    .station-toggle {
      flex: 0 0 auto;
      width: 24px;
      height: 24px;
      border: 1px solid #c9d7ea;
      border-radius: 4px;
      background: #fff;
      color: #64748b;
      cursor: pointer;
      font-size: 12px;
      line-height: 1;
    }
    .station-list {
      flex: 1;
      overflow: auto;
      padding: 6px;
    }
    .station-item {
      padding: 9px 10px;
      border-radius: 6px;
      cursor: pointer;
      border: 1px solid transparent;
      margin-bottom: 4px;
    }
    .station-item:hover { background: #f0f7ff; border-color: #d6e4ff; }
    .station-item.on { background: var(--primary-soft); border-color: #91caff; }
    .station-item b {
      display: block;
      font-size: 12px;
      color: #1f2d3d;
      margin-bottom: 3px;
    }
    .station-item small {
      font-size: 10px;
      color: var(--muted);
      line-height: 1.35;
    }

    .turbine-col { background: #eef4fa; border-right-color: #dbe6f2; }
    .turbine-top {
      padding: 10px 12px 8px;
      border-bottom: 1px solid #dbe6f2;
      background: #fff;
    }
    .turbine-top h3 {
      margin: 0 0 8px;
      font-size: 13px;
      font-weight: 700;
    }
    .mat-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .mat-chip {
      height: 26px;
      padding: 0 10px;
      border: 1px solid #d6e4ff;
      border-radius: 13px;
      background: #f8fbff;
      color: #475569;
      font-size: 11px;
      cursor: pointer;
      white-space: nowrap;
    }
    .mat-chip.on {
      background: var(--primary);
      border-color: var(--primary);
      color: #fff;
      font-weight: 600;
    }
    .turbine-stage {
      flex: 1;
      min-height: 0;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 12px;
      overflow: hidden;
    }
    .turbine-img-wrap {
      position: relative;
      width: min(100%, 520px);
      max-height: 100%;
    }
    .turbine-img-wrap img {
      display: block;
      width: 100%;
      height: auto;
      max-height: calc(100vh - 220px);
      object-fit: contain;
      user-select: none;
      pointer-events: none;
    }
    .hotspot {
      position: absolute;
      border: 2px solid transparent;
      border-radius: 6px;
      background: rgba(22,119,255,0);
      cursor: pointer;
      transition: background .15s, border-color .15s, box-shadow .15s;
    }
    .hotspot:hover,
    .hotspot.on {
      background: rgba(22,119,255,.18);
      border-color: #1677ff;
      box-shadow: 0 0 0 3px rgba(22,119,255,.15);
    }
    .hotspot .tag {
      position: absolute;
      left: 50%;
      top: -20px;
      transform: translateX(-50%);
      padding: 1px 6px;
      border-radius: 3px;
      background: #1677ff;
      color: #fff;
      font-size: 10px;
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transition: opacity .15s;
    }
    .hotspot:hover .tag,
    .hotspot.on .tag { opacity: 1; }

    .detail-col { background: #fff; }
    .detail-col .col-hd {
      padding: 12px 14px 10px;
      border-bottom: 1px solid var(--border);
    }
    .detail-col .col-hd h3 {
      margin: 0;
      font-size: 14px;
      font-weight: 700;
    }
    .detail-col .col-hd p {
      margin: 4px 0 0;
      font-size: 11px;
      color: var(--muted);
    }
    .detail-body {
      flex: 1;
      overflow: auto;
      padding: 12px 14px 16px;
    }
    .detail-empty {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.6;
      padding: 24px 8px;
      text-align: center;
    }
    .part-summary {
      background: #f8fbff;
      border: 1px solid #d6e4ff;
      border-radius: 8px;
      padding: 10px 12px;
      margin-bottom: 10px;
    }
    .part-summary h4 {
      margin: 0 0 6px;
      font-size: 15px;
      color: #1f2d3d;
    }
    .part-summary p {
      margin: 0;
      font-size: 12px;
      color: #64748b;
      line-height: 1.55;
    }
    .detail-kpis {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      margin-bottom: 10px;
    }
    .detail-kpi {
      background: #fafbfd;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 10px;
    }
    .detail-kpi .k { font-size: 10px; color: var(--muted); margin-bottom: 2px; }
    .detail-kpi .v { font-size: 16px; font-weight: 700; color: #1f2d3d; }
    .detail-kpi .v small { font-size: 11px; font-weight: 600; color: var(--muted); }
    .spare-list {
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }
    .spare-list-hd {
      padding: 8px 10px;
      background: #f7f9fc;
      border-bottom: 1px solid var(--border);
      font-size: 12px;
      font-weight: 700;
    }
    .spare-item {
      padding: 8px 10px;
      border-bottom: 1px solid #eef2f7;
      font-size: 12px;
    }
    .spare-item:last-child { border-bottom: 0; }
    .spare-item b { color: #1f2d3d; }
    .spare-item span { color: #64748b; display: block; margin-top: 2px; line-height: 1.4; }
    .group-panel {
      flex: 1;
      padding: 20px 24px;
      overflow: auto;
    }
    .group-panel h2 {
      margin: 0 0 6px;
      font-size: 20px;
    }
    .group-panel p {
      margin: 0 0 16px;
      color: var(--muted);
      font-size: 13px;
    }
    .group-cards {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      max-width: 920px;
    }
    .group-card {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
      cursor: pointer;
    }
    .group-card:hover { border-color: #91caff; box-shadow: 0 4px 14px rgba(22,119,255,.08); }
    .group-card b { display: block; font-size: 13px; margin-bottom: 6px; }
    .group-card small { color: var(--muted); font-size: 11px; line-height: 1.4; }

    @media (max-width: 1280px) {
      .ly-home { grid-template-columns: 180px auto minmax(0, 1fr) 260px; }
      .group-cards { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
  </style>
</head>

        spares: [
          { code: "B00001888", name: "变频器模块", qty: 1, model: "VF-800", status: "正常" },
          { code: "B00002119", name: "偏航电机", qty: 3, model: "PY-DJ-55", status: "正常" }
        ]},
      { id: "nacelle", name: "机舱", type: "偏航", left: "34%", top: "22%", width: "38%", height: "22%",
        desc: "承载发电机、变桨、偏航、冷却及监测系统的核心舱体。",
        spares: [
          { code: "B00002119", name: "偏航电机", qty: 3, model: "PY-DJ-55", status: "正常" },
          { code: "B00000028", name: "偏航减速机", qty: 2, model: "PY-JS-3.0", status: "正常" }
        ]},
      { id: "tower", name: "塔架", type: "滤芯/传感器", left: "42%", top: "62%", width: "16%", height: "30%",
        desc: "支撑机舱与叶片的基础结构，含塔筒监测与内部辅材。",
        spares: [
          { code: "B00001236", name: "塔筒振动传感器", qty: 15, model: "TS-300", status: "正常" },
          { code: "B00001235", name: "齿轮箱滤芯", qty: 86, model: "GX-LX-90", status: "正常" }
        ]},
      { id: "gearbox", name: "齿轮箱", type: "齿轮箱", left: "46%", top: "42%", width: "12%", height: "14%",
        desc: "双馈/增速机型传动链核心部件，关联润滑油回路与滤芯。",
        spares: [
          { code: "B00001235", name: "齿轮箱滤芯", qty: 86, model: "GX-LX-90", status: "正常" },
          { code: "B00000055", name: "液压泵", qty: 4, model: "YY-B-80", status: "正常" }
        ]}
    ];

    var state = {
      level: "group",
      company: "",
      station: "",
      partId: "",
      matType: "全部",
      stationCollapsed: false
    };

    var orgTreeEl = document.getElementById("orgTree");
    var stationCol = document.getElementById("stationCol");
    var stationListEl = document.getElementById("stationList");
    var lyHome = document.getElementById("lyHome");
    var groupPanel = document.getElementById("groupPanel");
    var turbineWrap = document.getElementById("turbineWrap");
    var detailBody = document.getElementById("detailBody");
    var detailTitle = document.getElementById("detailTitle");
    var detailSub = document.getElementById("detailSub");
    var turbineTitle = document.getElementById("turbineTitle");

    function renderOrgTree() {
      var html = '<div class="group-wrap open">' +
        '<div class="node l1 on" data-level="group" data-key="龙源电力"><span class="arrow"></span>龙源电力</div>' +
        '<div class="children">';
      ORG_DATA.forEach(function (c) {
        var active = state.level === "company" && state.company === c.key ? " on" : "";
        html += '<div class="node l2' + active + '" data-level="company" data-key="' + c.key + '">' + c.name + '</div>';
      });
      html += '</div></div>';
      orgTreeEl.innerHTML = html;
    }

    function companyData(key) {
      return ORG_DATA.filter(function (c) { return c.key === key; })[0];
    }

    function renderGroupPanel() {
      groupPanel.style.display = "block";
      turbineWrap.style.display = "none";
      turbineTitle.textContent = "龙源电力 · 项目公司概览";
      var cards = ORG_DATA.map(function (c) {
        var total = c.stations.reduce(function (s, x) { return s + parseInt(x.units, 10) || 0; }, 0);
        return '<div class="group-card" data-company="' + c.key + '"><b>' + c.name + '</b><small>' +
          c.stations.length + ' 个风电场 · 约 ' + total + ' 台机组</small></div>';
      }).join("");
      groupPanel.innerHTML = '<h2>龙源电力</h2><p>点击左侧或下方项目公司，查看下属风电场及风机备件结构。</p><div class="group-cards">' + cards + '</div>';
      groupPanel.querySelectorAll("[data-company]").forEach(function (el) {
        el.onclick = function () { selectCompany(el.getAttribute("data-company")); };
      });
    }

    function renderStations() {
      var c = companyData(state.company);
      document.getElementById("stationColTitle").textContent = state.company + " · 风电场";
      document.getElementById("stationColSub").textContent = c ? ("共 " + c.stations.length + " 个场站") : "";
      if (!c) {
        stationListEl.innerHTML = '<div class="detail-empty">请选择项目公司</div>';
        return;
      }
      stationListEl.innerHTML = c.stations.map(function (s) {
        var on = state.station === s.name ? " on" : "";
        return '<div class="station-item' + on + '" data-station="' + s.name + '"><b>' + s.name + '</b><small>' +
          s.units + '<br/>' + s.status + '</small></div>';
      }).join("");
      stationListEl.querySelectorAll(".station-item").forEach(function (el) {
        el.onclick = function () { selectStation(el.getAttribute("data-station")); };
      });
    }

    function renderMatBar() {
      document.getElementById("matBar").innerHTML = MAT_TYPES.map(function (t) {
        return '<button type="button" class="mat-chip' + (state.matType === t ? " on" : "") + '" data-type="' + t + '">' + t + '</button>';
      }).join("");
      document.getElementById("matBar").querySelectorAll(".mat-chip").forEach(function (btn) {
        btn.onclick = function () {
          state.matType = btn.getAttribute("data-type");
          renderMatBar();
          if (state.partId) renderPartDetail(state.partId);
        };
      });
    }

    function renderHotspots() {
      var parts = TURBINE_PARTS.filter(function (p) {
        return state.matType === "全部" || p.type.indexOf(state.matType.replace("/", "")) >= 0 || state.matType.indexOf(p.type.replace("/", "")) >= 0;
      });
      var existing = turbineWrap.querySelectorAll(".hotspot");
      existing.forEach(function (n) { n.remove(); });
      parts.forEach(function (p) {
        var btn = document.createElement("button");
        btn.type = "button";
        btn.className = "hotspot" + (state.partId === p.id ? " on" : "");
        btn.style.left = p.left;
        btn.style.top = p.top;
        btn.style.width = p.width;
        btn.style.height = p.height;
        btn.setAttribute("data-part", p.id);
        btn.innerHTML = '<span class="tag">' + p.name + '</span>';
        btn.onclick = function () { selectPart(p.id); };
        turbineWrap.appendChild(btn);
      });
    }

    function renderPartDetail(partId) {
      var part = TURBINE_PARTS.filter(function (p) { return p.id === partId; })[0];
      if (!part) return;
      var spares = part.spares.filter(function (s) {
        if (state.matType === "全部") return true;
        return part.type.indexOf(state.matType.replace("/", "")) >= 0 || state.matType.indexOf(part.type.replace("/", "")) >= 0;
      });
      var totalQty = spares.reduce(function (n, s) { return n + s.qty; }, 0);
      var scope = state.station || state.company || "龙源电力";
      detailTitle.textContent = part.name + " · 关联备件";
      detailSub.textContent = scope + " · 点击风机部位联动展示";
      detailBody.innerHTML =
        '<div class="part-summary"><h4>' + part.name + '</h4><p>' + part.desc + '</p></div>' +
        '<div class="detail-kpis">' +
          '<div class="detail-kpi"><div class="k">关联备件品种</div><div class="v">' + spares.length + '<small> 种</small></div></div>' +
          '<div class="detail-kpi"><div class="k">当前库存数量</div><div class="v">' + totalQty + '<small> 件</small></div></div>' +
          '<div class="detail-kpi"><div class="k">物资类型</div><div class="v" style="font-size:13px">' + part.type + '</div></div>' +
          '<div class="detail-kpi"><div class="k">适用机型</div><div class="v" style="font-size:13px">金风 GW150 / UP2000</div></div>' +
        '</div>' +
        '<div class="spare-list"><div class="spare-list-hd">关联生产备件清单</div>' +
        (spares.length ? spares.map(function (s) {
          return '<div class="spare-item"><b>' + s.name + ' · ' + s.code + '</b><span>规格型号：' + s.model +
            ' · 库存数量：' + s.qty + ' 件 · 库存状态：' + s.status + '</span></div>';
        }).join("") : '<div class="spare-item"><span>当前物资类型筛选下暂无关联备件。</span></div>') +
        '</div>';
    }

    function showCompanyView() {
      lyHome.classList.remove("no-station");
      groupPanel.style.display = "none";
      turbineWrap.style.display = "block";
      turbineTitle.textContent = state.company + " · 风机结构 · 备件关联视图";
      renderStations();
      renderMatBar();
      renderHotspots();
      if (state.partId) renderPartDetail(state.partId);
      else {
        detailTitle.textContent = "零部件详情";
        detailSub.textContent = "点击风机结构图中的部位查看关联备件";
        detailBody.innerHTML = '<div class="detail-empty">请在中间风机结构图中选择一个部位，右侧将展示该部位关联的生产备件、库存数量与适用机型等信息。</div>';
      }
    }

    function selectCompany(key) {
      state.level = "company";
      state.company = key;
      state.station = "";
      state.partId = "";
      renderOrgTree();
      showCompanyView();
    }

    function selectStation(name) {
      state.station = name;
      renderStations();
      if (state.partId) renderPartDetail(state.partId);
    }

    function selectPart(id) {
      state.partId = id;
      renderHotspots();
      renderPartDetail(id);
    }

    function selectGroup() {
      state.level = "group";
      state.company = "";
      state.station = "";
      state.partId = "";
      renderOrgTree();
      renderGroupPanel();
      stationListEl.innerHTML = '<div class="detail-empty">请选择项目公司</div>';
      document.getElementById("stationColTitle").textContent = "风电场";
      document.getElementById("stationColSub").textContent = "请选择左侧项目公司";
      detailTitle.textContent = "零部件详情";
      detailSub.textContent = "选择项目公司后查看风机结构与备件";
      detailBody.innerHTML = '<div class="detail-empty">请先在左侧选择项目公司（如山西龙源），再点击风电场与风机部位查看备件详情。</div>';
    }

    orgTreeEl.addEventListener("click", function (e) {
      var node = e.target.closest(".node");
      if (!node) return;
      var level = node.getAttribute("data-level");
      if (level === "group") {
        var wrap = node.parentElement;
        if (wrap.classList.contains("group-wrap")) wrap.classList.toggle("open");
        selectGroup();
        return;
      }
      if (level === "company") selectCompany(node.getAttribute("data-key"));
    });

    document.getElementById("btnStationToggle").addEventListener("click", function () {
      state.stationCollapsed = !state.stationCollapsed;
      stationCol.classList.toggle("collapsed", state.stationCollapsed);
      lyHome.classList.toggle("station-collapsed", state.stationCollapsed);
      this.textContent = state.stationCollapsed ? "▶" : "◀";
      this.title = state.stationCollapsed ? "展开风电场列" : "折叠风电场列";
    });

    renderOrgTree();
    renderMatBar();
    renderHotspots();
    selectGroup();
    selectCompany("山西龙源");
  </script>
</body>
</html>
