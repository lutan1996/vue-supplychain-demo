<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>生产物资库存管理 - 新能源物资供应链管理系统</title>
  <link rel="stylesheet" href="css/vendor/fa-all.min.css" />
  <link rel="stylesheet" href="css/subpage-base.css" />
  <link rel="stylesheet" href="css/carrier-management.css" />
  <link rel="stylesheet" href="css/source-navbar-header.css" />
  <style>
    :root {
      --primary: #1677ff;
      --primary-soft: #e6f4ff;
      --text: #1f2d3d;
      --muted: #8c9bb0;
      --border: #e8edf4;
      --bg: #f0f3f8;
    }
    * { box-sizing: border-box; }
    .ledger-page {
      display: flex;
      flex-direction: column;
      min-height: calc(100vh - 56px);
      background: var(--bg);
      color: var(--text);
      font-size: 13px;
    }
    .ledger-view-row {
      flex: 0 0 auto;
      min-height: 48px;
      padding: 9px 12px 7px;
      display: flex;
      align-items: center;
      background: #fff;
      border-bottom: 1px solid var(--border);
    }
    .page-view-switch { display: flex; gap: 4px; }
    .page-view-switch a {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      height: 32px;
      padding: 0 14px;
      border-radius: 4px;
      color: #64748b;
      text-decoration: none;
      font-size: 13px;
    }
    .page-view-switch a.on {
      background: var(--primary-soft);
      color: var(--primary);
      font-weight: 600;
    }

    .ly-home {
      flex: 1;
      min-height: 0;
      display: grid;
      grid-template-columns: 200px auto minmax(0, 1.15fr) minmax(300px, 0.9fr);
      gap: 0;
      overflow: hidden;
    }
    .ly-home.no-station { grid-template-columns: 200px minmax(0, 1.45fr) minmax(300px, 0.95fr); }
    .ly-home.station-collapsed { grid-template-columns: 200px 44px minmax(0, 1.2fr) minmax(300px, 0.9fr); }
    .ly-home.no-station.station-collapsed { grid-template-columns: 200px minmax(0, 1.45fr) minmax(300px, 0.95fr); }

    .ly-col {
      min-height: 0;
      display: flex;
      flex-direction: column;
      background: #fff;
      border-right: 1px solid var(--border);
      overflow: hidden;
    }
    .ly-col:last-child { border-right: 0; }
    .col-hd {
      padding: 10px 12px 8px;
      border-bottom: 1px solid var(--border);
      background: #f8fbff;
    }
    .col-hd h2, .col-hd h3 {
      margin: 0;
      font-size: 13px;
      font-weight: 700;
      color: #1f2d3d;
    }
    .col-hd p {
      margin: 3px 0 0;
      font-size: 10px;
      color: var(--muted);
    }
    .col-hd-row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 6px;
    }

    .org-tree { flex: 1; overflow: auto; padding: 6px 8px 12px; }
    .org-tree .node {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 10px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      color: #334155;
      user-select: none;
    }
    .org-tree .node:hover { background: #f0f7ff; color: var(--primary); }
    .org-tree .node.on { background: var(--primary-soft); color: var(--primary); font-weight: 600; }
    .org-tree .node.l2 { padding-left: 24px; }
    .org-tree .node .arrow { width: 12px; font-size: 10px; color: #94a3b8; flex: 0 0 auto; }
    .org-tree .group-wrap.open > .node.l1 .arrow::before { content: "▼"; }
    .org-tree .group-wrap:not(.open) > .node.l1 .arrow::before { content: "›"; }
    .org-tree .children { display: none; }
    .org-tree .group-wrap.open > .children { display: block; }

    .station-col { width: 168px; transition: width .2s ease; }
    .station-col.hidden { display: none; }
    .station-col.collapsed { width: 44px; min-width: 44px; }
    .station-col.collapsed .station-list,
    .station-col.collapsed .col-hd span,
    .station-col.collapsed .col-hd p { display: none; }
    .icon-btn {
      flex: 0 0 auto;
      width: 24px;
      height: 24px;
      border: 1px solid #c9d7ea;
      border-radius: 4px;
      background: #fff;
      color: #64748b;
      cursor: pointer;
      font-size: 12px;
      line-height: 1;
    }
    .station-list { flex: 1; overflow: auto; padding: 6px; }
    .station-item {
      padding: 9px 10px;
      border-radius: 6px;
      cursor: pointer;
      border: 1px solid transparent;
      margin-bottom: 4px;
    }
    .station-item:hover { background: #f0f7ff; border-color: #d6e4ff; }
    .station-item.on { background: var(--primary-soft); border-color: #91caff; }
    .station-item b { display: block; font-size: 12px; margin-bottom: 3px; }
    .station-item small { font-size: 10px; color: var(--muted); line-height: 1.35; }

    .main-col { background: #eef4fa; }
    .tab-row {
      display: flex;
      align-items: center;
      gap: 0;
      padding: 0 12px;
      background: #fff;
      border-bottom: 1px solid var(--border);
    }
    .tab-row.equip-tabs { border-bottom: 0; padding-top: 8px; }
    .tab-row.mat-tabs { padding-bottom: 0; background: #fafbfd; }
    .tab-btn {
      height: 34px;
      padding: 0 14px;
      border: 0;
      border-bottom: 2px solid transparent;
      background: transparent;
      color: #64748b;
      font-size: 13px;
      cursor: pointer;
      margin-bottom: -1px;
    }
    .tab-btn.on {
      color: var(--primary);
      border-bottom-color: var(--primary);
      font-weight: 600;
    }
    .tab-btn.mat { font-size: 12px; height: 30px; padding: 0 10px; }
    .main-head {
      padding: 8px 12px;
      background: #fff;
      border-bottom: 1px solid var(--border);
      font-size: 12px;
      color: #64748b;
    }
    .main-head b { color: #1f2d3d; }

    .main-stage {
      flex: 1;
      min-height: 0;
      overflow: auto;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 12px;
    }
    .diagram-wrap {
      width: min(100%, 560px);
      height: min(100%, 560px);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .diagram-wrap svg { width: 100%; height: 100%; max-height: calc(100vh - 260px); }
    .svg-part {
      cursor: pointer;
      transition: filter .15s, opacity .15s;
    }
    .svg-part:hover { filter: brightness(1.08); }
    .svg-part.on { filter: drop-shadow(0 0 6px rgba(22,119,255,.65)); }
    .svg-part .hit { fill: rgba(22,119,255,0); stroke: transparent; }
    .svg-part.on .hit, .svg-part:hover .hit { fill: rgba(22,119,255,.12); stroke: #1677ff; stroke-width: 1.2; }
    .svg-label {
      font-size: 11px;
      fill: #334155;
      pointer-events: none;
      font-family: inherit;
    }

    .group-panel, .station-panel {
      width: 100%;
      max-width: 920px;
      padding: 8px 4px;
    }
    .group-panel h2 { margin: 0 0 6px; font-size: 20px; }
    .group-panel p { margin: 0 0 14px; color: var(--muted); }
    .group-kpis {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 14px;
    }
    .group-kpi {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
    }
    .group-kpi .k { font-size: 11px; color: var(--muted); margin-bottom: 4px; }
    .group-kpi .v { font-size: 20px; font-weight: 700; }
    .group-cards {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }
    .group-card {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
      cursor: pointer;
    }
    .group-card:hover { border-color: #91caff; box-shadow: 0 4px 14px rgba(22,119,255,.08); }
    .group-card b { display: block; font-size: 13px; margin-bottom: 6px; }
    .group-card small { color: var(--muted); font-size: 11px; line-height: 1.4; }

    .station-panel .cam-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-top: 10px;
    }
    .cam-box {
      background: #0f172a;
      border-radius: 8px;
      height: 120px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #94a3b8;
      font-size: 12px;
      border: 1px solid #1e293b;
    }
    .unit-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
    .unit-tag {
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 11px;
      background: #f0fdf4;
      color: #166534;
      border: 1px solid #bbf7d0;
    }
    .unit-tag.warn { background: #fff7ed; color: #c2410c; border-color: #fed7aa; }
    .unit-tag.idle { background: #f8fafc; color: #64748b; border-color: #e2e8f0; }

    .detail-body { flex: 1; overflow: auto; padding: 12px 14px 16px; }
    .detail-empty { color: var(--muted); font-size: 12px; line-height: 1.6; padding: 24px 8px; text-align: center; }
    .part-summary {
      background: #f8fbff;
      border: 1px solid #d6e4ff;
      border-radius: 8px;
      padding: 10px 12px;
      margin-bottom: 10px;
    }
    .part-summary h4 { margin: 0 0 6px; font-size: 15px; }
    .part-summary p { margin: 0; font-size: 12px; color: #64748b; line-height: 1.55; }
    .detail-kpis {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      margin-bottom: 10px;
    }
    .detail-kpi {
      background: #fafbfd;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 10px;
    }
    .detail-kpi .k { font-size: 10px; color: var(--muted); margin-bottom: 2px; }
    .detail-kpi .v { font-size: 16px; font-weight: 700; }
    .detail-kpi .v small { font-size: 11px; font-weight: 600; color: var(--muted); }
    .mini-chart {
      background: #fafbfd;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px;
      margin-bottom: 10px;
    }
    .mini-chart h5 { margin: 0 0 8px; font-size: 12px; }
    .bar-mini-row {
      display: grid;
      grid-template-columns: 52px 1fr 34px;
      gap: 6px;
      align-items: center;
      font-size: 11px;
      margin-bottom: 4px;
      color: #64748b;
    }
    .bar-mini-row .track { height: 6px; background: #e8edf4; border-radius: 4px; overflow: hidden; }
    .bar-mini-row .track i { display: block; height: 100%; border-radius: 4px; background: linear-gradient(90deg,#69b1ff,#1677ff); }
    .spare-list { border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
    .spare-list-hd { padding: 8px 10px; background: #f7f9fc; border-bottom: 1px solid var(--border); font-size: 12px; font-weight: 700; }
    .spare-item { padding: 8px 10px; border-bottom: 1px solid #eef2f7; font-size: 12px; }
    .spare-item:last-child { border-bottom: 0; }
    .spare-item b { color: #1f2d3d; }
    .spare-item span { color: #64748b; display: block; margin-top: 2px; line-height: 1.4; }

    @media (max-width: 1280px) {
      .ly-home { grid-template-columns: 180px auto minmax(0, 1fr) 280px; }
      .group-kpis, .group-cards { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
  </style>
</head>

        spares: [{ code: "B00002119", name: "偏航电机", qty: 3, model: "PY-DJ-55", status: "正常" }],
        stats: [{ label: "正常", pct: 80 }, { label: "借出", pct: 15 }, { label: "待检", pct: 5 }] },
      { id: "nacelle", name: "机舱", type: "偏航", desc: "承载发电机、变桨、偏航、冷却及监测系统的核心舱体。",
        spares: [{ code: "B00000028", name: "偏航减速机", qty: 2, model: "PY-JS-3.0", status: "正常" }],
        stats: [{ label: "正常", pct: 76 }, { label: "借出", pct: 14 }, { label: "待检", pct: 10 }] },
      { id: "tower", name: "塔架", type: "滤芯/传感器", desc: "支撑机舱与叶片的基础结构，含塔筒监测与内部辅材。",
        spares: [{ code: "B00001236", name: "塔筒振动传感器", qty: 15, model: "TS-300", status: "正常" }],
        stats: [{ label: "正常", pct: 88 }, { label: "借出", pct: 7 }, { label: "待检", pct: 5 }] }
    ];

    var state = {
      level: "group",
      company: "",
      station: "",
      equip: "wind",
      matType: "全部",
      partId: "",
      stationCollapsed: false
    };

    var lyHome = document.getElementById("lyHome");
    var stationCol = document.getElementById("stationCol");
    var groupPanel = document.getElementById("groupPanel");
    var stationPanel = document.getElementById("stationPanel");
    var diagramWrap = document.getElementById("diagramWrap");
    var detailBody = document.getElementById("detailBody");
    var detailTitle = document.getElementById("detailTitle");
    var detailSub = document.getElementById("detailSub");
    var mainHead = document.getElementById("mainHead");

    function companyData(key) {
      return ORG_DATA.filter(function (c) { return c.key === key; })[0];
    }

    function stationStatusText(s) {
      var parts = [s.run + "台运行"];
      if (s.maint) parts.push(s.maint + "台检修");
      if (s.standby) parts.push(s.standby + "台备用");
      return s.units + "台 · " + parts.join(" · ");
    }

    function renderOrgTree() {
      var html = '<div class="group-wrap open">' +
        '<div class="node l1' + (state.level === "group" ? " on" : "") + '" data-level="group"><span class="arrow"></span>龙源电力</div><div class="children">';
      ORG_DATA.forEach(function (c) {
        html += '<div class="node l2' + (state.company === c.key ? " on" : "") + '" data-level="company" data-key="' + c.key + '">' + c.name + '</div>';
      });
      html += '</div></div>';
      document.getElementById("orgTree").innerHTML = html;
    }

    function renderEquipTabs(show) {
      var el = document.getElementById("equipTabs");
      if (!show) { el.style.display = "none"; return; }
      el.style.display = "flex";
      el.innerHTML = EQUIP_TABS.map(function (t) {
        return '<button type="button" class="tab-btn' + (state.equip === t.id ? " on" : "") + '" data-equip="' + t.id + '">' + t.label + '</button>';
      }).join("");
      el.querySelectorAll(".tab-btn").forEach(function (btn) {
        btn.onclick = function () {
          state.equip = btn.getAttribute("data-equip");
          state.partId = "";
          renderAll();
        };
      });
    }

    function renderMatTabs(show) {
      var el = document.getElementById("matTabs");
      if (!show) { el.style.display = "none"; return; }
      el.style.display = "flex";
      el.innerHTML = MAT_TYPES.map(function (t) {
        return '<button type="button" class="tab-btn mat' + (state.matType === t ? " on" : "") + '" data-type="' + t + '">' + t + '</button>';
      }).join("");
      el.querySelectorAll(".tab-btn").forEach(function (btn) {
        btn.onclick = function () {
          state.matType = btn.getAttribute("data-type");
          renderMatTabs(true);
          renderDiagram();
          if (state.partId) renderPartDetail(state.partId);
        };
      });
    }

    function renderStations() {
      var c = companyData(state.company);
      document.getElementById("stationColTitle").textContent = state.company + " · 风电场";
      document.getElementById("stationColSub").textContent = c ? ("共 " + c.stations.length + " 个场站") : "";
      var list = document.getElementById("stationList");
      if (!c) { list.innerHTML = ""; return; }
      list.innerHTML = c.stations.map(function (s) {
        return '<div class="station-item' + (state.station === s.name ? " on" : "") + '" data-station="' + s.name + '"><b>' + s.name + '</b><small>' + stationStatusText(s) + '</small></div>';
      }).join("");
      list.querySelectorAll(".station-item").forEach(function (el) {
        el.onclick = function () { selectStation(el.getAttribute("data-station")); };
      });
    }

    function renderGroupPanel() {
      groupPanel.style.display = "block";
      stationPanel.style.display = "none";
      diagramWrap.style.display = "none";
      var totalUnits = 0, totalStations = 0;
      ORG_DATA.forEach(function (c) {
        totalStations += c.stations.length;
        c.stations.forEach(function (s) { totalUnits += s.units; });
      });
      var cards = ORG_DATA.map(function (c) {
        var units = c.stations.reduce(function (n, s) { return n + s.units; }, 0);
        return '<div class="group-card" data-company="' + c.key + '"><b>' + c.name + '</b><small>' + c.stations.length + ' 个风电场 · ' + units + ' 台机组</small></div>';
      }).join("");
      groupPanel.innerHTML =
        '<h2>龙源电力 · 集团总览</h2><p>点击项目公司进入公司层级，查看下属风电场及风机备件结构。</p>' +
        '<div class="group-kpis">' +
          '<div class="group-kpi"><div class="k">项目公司</div><div class="v">' + ORG_DATA.length + '</div></div>' +
          '<div class="group-kpi"><div class="k">风电场</div><div class="v">' + totalStations + '</div></div>' +
          '<div class="group-kpi"><div class="k">机组总数</div><div class="v">' + totalUnits + '</div></div>' +
          '<div class="group-kpi"><div class="k">在运机组</div><div class="v">' + Math.round(totalUnits * 0.92) + '</div></div>' +
        '</div><div class="group-cards">' + cards + '</div>';
      groupPanel.querySelectorAll("[data-company]").forEach(function (el) {
        el.onclick = function () { selectCompany(el.getAttribute("data-company")); };
      });
      mainHead.innerHTML = '<b>龙源电力</b> · 集团总览';
      detailTitle.textContent = "龙源电力 · 汇总信息";
      detailSub.textContent = "集团层级视图";
      detailBody.innerHTML =
        '<div class="part-summary"><h4>龙源电力</h4><p>当前为集团总览。选择具体项目公司（如山西龙源）后，右侧将推出现场列表及风机结构图。</p></div>' +
        '<div class="mini-chart"><h5>各项目公司机组分布</h5>' +
        ORG_DATA.map(function (c) {
          var u = c.stations.reduce(function (n, s) { return n + s.units; }, 0);
          return '<div class="bar-mini-row"><span>' + c.name.replace("龙源", "") + '</span><div class="track"><i style="width:' + Math.min(100, u / 2) + '%"></i></div><b>' + u + '</b></div>';
        }).join("") + '</div>';
    }

    function renderStationPanel() {
      var c = companyData(state.company);
      var s = c && c.stations.filter(function (x) { return x.name === state.station; })[0];
      groupPanel.style.display = "none";
      stationPanel.style.display = "block";
      diagramWrap.style.display = "none";
      if (!s) return;
      var tags = [];
      for (var i = 0; i < s.run; i++) tags.push('<span class="unit-tag">#' + (i + 1) + ' 运行</span>');
      for (var j = 0; j < s.maint; j++) tags.push('<span class="unit-tag warn">#' + (s.run + j + 1) + ' 检修</span>');
      for (var k = 0; k < s.standby; k++) tags.push('<span class="unit-tag idle">#' + (s.run + s.maint + k + 1) + ' 备用</span>');
      stationPanel.innerHTML =
        '<h2>' + s.name + '</h2><p>场站层级视图 · 运行监控与现场感知（风机结构图在公司层级展示）</p>' +
        '<div class="group-kpis">' +
          '<div class="group-kpi"><div class="k">机组总数</div><div class="v">' + s.units + '</div></div>' +
          '<div class="group-kpi"><div class="k">运行</div><div class="v">' + s.run + '</div></div>' +
          '<div class="group-kpi"><div class="k">检修</div><div class="v">' + s.maint + '</div></div>' +
          '<div class="group-kpi"><div class="k">备用</div><div class="v">' + s.standby + '</div></div>' +
        '</div><div class="unit-tags">' + tags.join("") + '</div>' +
        '<div class="cam-grid"><div class="cam-box">主控室监控</div><div class="cam-box">升压站监控</div><div class="cam-box">风机阵列 A 区</div><div class="cam-box">风机阵列 B 区</div></div>';
      mainHead.innerHTML = '<b>' + state.company + '</b> · ' + s.name + ' · 场站监控';
      detailTitle.textContent = s.name + " · 运行概况";
      detailSub.textContent = "场站层级 · 监控视图";
      detailBody.innerHTML =
        '<div class="part-summary"><h4>' + s.name + '</h4><p>' + stationStatusText(s) + '。场站层级侧重运行监控，备件结构请返回公司层级查看。</p></div>' +
        '<div class="mini-chart"><h5>机组状态分布</h5>' +
          '<div class="bar-mini-row"><span>运行</span><div class="track"><i style="width:' + (s.run / s.units * 100) + '%"></i></div><b>' + s.run + '</b></div>' +
          '<div class="bar-mini-row"><span>检修</span><div class="track"><i style="width:' + (s.maint / s.units * 100) + '%;background:#fa8c16"></i></div><b>' + s.maint + '</b></div>' +
          '<div class="bar-mini-row"><span>备用</span><div class="track"><i style="width:' + (s.standby / s.units * 100) + '%;background:#94a3b8"></i></div><b>' + s.standby + '</b></div>' +
        '</div>';
    }

    function turbineSvg() {
      var parts = TURBINE_PARTS.filter(function (p) {
        if (state.matType === "全部") return true;
        return p.type.indexOf(state.matType.replace("/", "")) >= 0 || state.matType.indexOf(p.type.replace("/", "")) >= 0;
      });
      var svg = '<svg viewBox="0 0 520 560" xmlns="http://www.w3.org/2000/svg" aria-label="风机三维结构图">';
      svg += '<defs>' +
        '<linearGradient id="gTower" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#cbd5e1"/><stop offset="50%" stop-color="#f8fafc"/><stop offset="100%" stop-color="#94a3b8"/></linearGradient>' +
        '<linearGradient id="gNacelle" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#e2e8f0"/><stop offset="100%" stop-color="#94a3b8"/></linearGradient>' +
        '<linearGradient id="gBlade" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#f8fafc"/><stop offset="100%" stop-color="#cbd5e1"/></linearGradient>' +
        '<linearGradient id="gHub" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#64748b"/><stop offset="100%" stop-color="#334155"/></linearGradient>' +
        '<linearGradient id="gGen" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#fdba74"/><stop offset="100%" stop-color="#fb923c"/></linearGradient>' +
        '<linearGradient id="gBox" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#bae6fd"/><stop offset="100%" stop-color="#7dd3fc"/></linearGradient>' +
        '</defs>';
      svg += '<ellipse cx="260" cy="520" rx="120" ry="18" fill="rgba(15,23,42,.08)"/>';
      svg += '<g class="svg-part' + (state.partId === "tower" ? " on" : "") + '" data-part="tower"><polygon points="235,510 285,510 270,280 250,280" fill="url(#gTower)" stroke="#64748b" stroke-width="1.2"/><rect class="hit" x="235" y="280" width="50" height="230" rx="4"/><text class="svg-label" x="292" y="420">塔架</text></g>';
      svg += '<g class="svg-part' + (state.partId === "nacelle" ? " on" : "") + '" data-part="nacelle"><polygon points="210,290 340,260 350,220 200,250" fill="url(#gNacelle)" stroke="#64748b" stroke-width="1.2"/><rect class="hit" x="200" y="220" width="150" height="72" rx="6"/><text class="svg-label" x="355" y="255">机舱</text></g>';
      svg += '<g class="svg-part' + (state.partId === "blade" ? " on" : "") + '" data-part="blade"><polygon points="70,360 190,250 210,265 95,380" fill="url(#gBlade)" stroke="#64748b" stroke-width="1.2"/><rect class="hit" x="70" y="245" width="145" height="140" rx="8" transform="rotate(-18 140 310)"/><text class="svg-label" x="48" y="350">叶片</text></g>';
      svg += '<g class="svg-part' + (state.partId === "hub" ? " on" : "") + '" data-part="hub"><circle cx="205" cy="255" r="24" fill="url(#gHub)" stroke="#475569" stroke-width="1.5"/><rect class="hit" x="181" y="231" width="48" height="48" rx="24"/><text class="svg-label" x="170" y="248">轮毂</text></g>';
      svg += '<g class="svg-part' + (state.partId === "gearbox" ? " on" : "") + '" data-part="gearbox"><rect x="230" y="238" width="36" height="28" rx="4" fill="#475569" stroke="#334155"/><rect class="hit" x="228" y="236" width="40" height="32" rx="4"/><text class="svg-label" x="272" y="256">齿轮箱</text></g>';
      svg += '<g class="svg-part' + (state.partId === "generator" ? " on" : "") + '" data-part="generator"><rect x="268" y="232" width="42" height="36" rx="6" fill="url(#gGen)" stroke="#ea580c" stroke-width="1.2"/><rect class="hit" x="266" y="230" width="46" height="40" rx="6"/><text class="svg-label" x="318" y="252">发电机</text></g>';
      svg += '<g class="svg-part' + (state.partId === "cabinet" ? " on" : "") + '" data-part="cabinet"><rect x="312" y="228" width="34" height="40" rx="4" fill="url(#gBox)" stroke="#0284c7" stroke-width="1.2"/><rect class="hit" x="310" y="226" width="38" height="44" rx="4"/><text class="svg-label" x="350" y="248">电器柜</text></g>';
      svg += '</svg>';
      return svg;
    }

    function pvSvg() {
      return '<svg viewBox="0 0 520 360" xmlns="http://www.w3.org/2000/svg"><defs><linearGradient id="pvG" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#1e3a8a"/><stop offset="100%" stop-color="#3b82f6"/></linearGradient></defs><polygon points="60,260 460,180 460,120 60,200" fill="url(#pvG)" stroke="#1d4ed8"/><polygon points="80,220 440,150 440,110 80,180" fill="#60a5fa" opacity=".55"/><text x="180" y="300" fill="#64748b" font-size="14">光伏组件阵列 · 演示视图</text></svg>';
    }

    function storageSvg() {
      return '<svg viewBox="0 0 520 360" xmlns="http://www.w3.org/2000/svg"><defs><linearGradient id="stG" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#10b981"/><stop offset="100%" stop-color="#047857"/></linearGradient></defs><rect x="160" y="80" width="200" height="200" rx="16" fill="url(#stG)" stroke="#059669"/><rect x="190" y="110" width="140" height="30" rx="6" fill="#ecfdf5" opacity=".8"/><rect x="190" y="160" width="140" height="30" rx="6" fill="#ecfdf5" opacity=".6"/><text x="175" y="310" fill="#64748b" font-size="14">储能电池舱 · 演示视图</text></svg>';
    }

    function renderDiagram() {
      if (state.level !== "company" || state.station) return;
      groupPanel.style.display = "none";
      stationPanel.style.display = "none";
      diagramWrap.style.display = "flex";
      if (state.equip === "wind") {
        diagramWrap.innerHTML = turbineSvg();
        diagramWrap.querySelectorAll(".svg-part").forEach(function (g) {
          var id = g.getAttribute("data-part");
          if (!TURBINE_PARTS.some(function (p) { return p.id === id; })) return;
          g.onclick = function () { selectPart(id); };
        });
      } else if (state.equip === "pv") {
        diagramWrap.innerHTML = pvSvg();
      } else {
        diagramWrap.innerHTML = storageSvg();
      }
      mainHead.innerHTML = '<b>' + state.company + '</b> · ' + (state.equip === "wind" ? "风机结构" : state.equip === "pv" ? "光伏设备" : "储能设备") + ' · 点击部位查看备件';
    }

    function renderPartDetail(partId) {
      var part = TURBINE_PARTS.filter(function (p) { return p.id === partId; })[0];
      if (!part) return;
      var spares = part.spares;
      if (state.matType !== "全部") {
        spares = spares.filter(function () {
          return part.type.indexOf(state.matType.replace("/", "")) >= 0 || state.matType.indexOf(part.type.replace("/", "")) >= 0;
        });
      }
      var totalQty = spares.reduce(function (n, s) { return n + s.qty; }, 0);
      detailTitle.textContent = part.name + " · 关联备件";
      detailSub.textContent = (state.company || "龙源电力") + " · 部位联动详情";
      detailBody.innerHTML =
        '<div class="part-summary"><h4>' + part.name + '</h4><p>' + part.desc + '</p></div>' +
        '<div class="detail-kpis">' +
          '<div class="detail-kpi"><div class="k">关联备件品种</div><div class="v">' + spares.length + '<small> 种</small></div></div>' +
          '<div class="detail-kpi"><div class="k">当前库存数量</div><div class="v">' + totalQty + '<small> 件</small></div></div>' +
          '<div class="detail-kpi"><div class="k">物资类型</div><div class="v" style="font-size:13px">' + part.type + '</div></div>' +
          '<div class="detail-kpi"><div class="k">适用机型</div><div class="v" style="font-size:13px">金风 GW150 / UP2000</div></div>' +
        '</div>' +
        '<div class="mini-chart"><h5>库存状态分布</h5>' +
        (part.stats || []).map(function (s) {
          return '<div class="bar-mini-row"><span>' + s.label + '</span><div class="track"><i style="width:' + s.pct + '%"></i></div><b>' + s.pct + '%</b></div>';
        }).join("") + '</div>' +
        '<div class="spare-list"><div class="spare-list-hd">关联生产备件清单</div>' +
        (spares.length ? spares.map(function (s) {
          return '<div class="spare-item"><b>' + s.name + ' · ' + s.code + '</b><span>规格型号：' + s.model + ' · 库存：' + s.qty + ' 件 · 状态：' + s.status + '</span></div>';
        }).join("") : '<div class="spare-item"><span>当前筛选下暂无关联备件</span></div>') +
        '</div>';
    }

    function updateLayoutClasses() {
      lyHome.classList.toggle("no-station", state.level === "group");
      stationCol.classList.toggle("hidden", state.level === "group");
      stationCol.classList.toggle("collapsed", state.stationCollapsed && state.level === "company");
      lyHome.classList.toggle("station-collapsed", state.stationCollapsed && state.level === "company");
    }

    function renderAll() {
      renderOrgTree();
      updateLayoutClasses();
      if (state.level === "group") {
        renderEquipTabs(false);
        renderMatTabs(false);
        renderGroupPanel();
        return;
      }
      renderStations();
      if (state.station) {
        renderEquipTabs(false);
        renderMatTabs(false);
        renderStationPanel();
        return;
      }
      renderEquipTabs(true);
      renderMatTabs(true);
      renderDiagram();
      if (state.partId) renderPartDetail(state.partId);
      else {
        detailTitle.textContent = "零部件详情";
        detailSub.textContent = "点击风机结构图中的部位查看关联备件";
        detailBody.innerHTML = '<div class="detail-empty">请在中间结构图中选择一个部位，右侧将展示关联生产备件、库存数量及状态分布。</div>';
      }
    }

    function selectCompany(key) {
      state.level = "company";
      state.company = key;
      state.station = "";
      state.partId = "";
      renderAll();
    }

    function selectStation(name) {
      state.station = name;
      state.partId = "";
      renderAll();
    }

    function selectPart(id) {
      state.partId = id;
      renderDiagram();
      renderPartDetail(id);
    }

    function selectGroup() {
      state.level = "group";
      state.company = "";
      state.station = "";
      state.partId = "";
      renderAll();
    }

    document.getElementById("orgTree").addEventListener("click", function (e) {
      var node = e.target.closest(".node");
      if (!node) return;
      if (node.getAttribute("data-level") === "group") {
        node.parentElement.classList.toggle("open");
        selectGroup();
        return;
      }
      if (node.getAttribute("data-level") === "company") selectCompany(node.getAttribute("data-key"));
    });

    document.getElementById("btnStationToggle").addEventListener("click", function () {
      state.stationCollapsed = !state.stationCollapsed;
      this.textContent = state.stationCollapsed ? "▶" : "◀";
      renderAll();
    });

    selectCompany("山西龙源");
  </script>
</body>
</html>
