            <div class="carrier-toolbar-right">

  <div class="wh-modal-mask modal-mask" id="idleTransferMask" aria-hidden="true">
    <div class="wh-modal-box" role="dialog" aria-modal="true" aria-labelledby="idleXferTitle">
      <div class="wh-modal-head">
        <h3 class="wh-modal-title" id="idleXferTitle">调拨申请</h3>
        <button type="button" class="wh-modal-close" id="btnIdleXferClose" aria-label="关闭">×</button>
      </div>
      <div class="wh-modal-body" style="display:grid;gap:10px;grid-template-columns:1fr 1fr;">
        <div class="wh-field" style="grid-column:1/-1;">
          <label class="wh-label" for="idleRecvUnit">接收单位</label>
          <select id="idleRecvUnit" class="wh-input">
            <option>龙源内部</option>
            <option>集团内部</option>
            <option>外部</option>
          </select>
        </div>
        <div class="wh-field" style="grid-column:1/-1;">
          <label class="wh-label" for="idleDispose">处置方式</label>
          <select id="idleDispose" class="wh-input">
            <option>转让</option>
            <option>租赁</option>
            <option>调剂</option>
          </select>
        </div>
        <div class="wh-field" style="grid-column:1/-1;">
          <label class="wh-label" for="idleRecvPerson">接收人</label>
          <input id="idleRecvPerson" class="wh-input" type="text" placeholder="姓名" />
        </div>
        <div class="wh-field">
          <label class="wh-label" for="idleXferQty">调拨数量</label>
          <input id="idleXferQty" class="wh-input" type="number" min="1" value="1" />
        </div>
        <div class="wh-field">
          <label class="wh-label" for="idleXferDate">调拨日期</label>
          <input id="idleXferDate" class="wh-input" type="date" />
        </div>
      </div>
      <div class="wh-modal-foot">
        <button type="button" class="wh-btn wh-btn--ghost" id="btnIdleXferCancel">取消</button>
        <button type="button" class="wh-btn wh-btn--primary" id="btnIdleXferOk">确定</button>
      </div>
    </div>
  </div>

  <div class="wh-modal-mask modal-mask" id="idleDetailMask" aria-hidden="true">

      </div>
      <div class="wh-modal-body">
        <div class="wh-detail-grid" id="idleDetailGrid"></div>
      </div>

  <script src="js/sidebar-actions.js"></script>

  <script src="js/warehouse-submenu.js"></script>
  <script src="js/site-footer.js"></script>
  <script src="js/subpage-clock.js"></script>
  <script>
    (function () {
      // 库存管理台账（演示数据来源）
      var stockLedger = [
        {
          materialCode: "MAT-GX-001",
          materialName: "齿轮箱",
          spec: "GW-GX-3.2MW",
          qty: 5,
          warehouse: "华北主仓",
          location: "A-01-03",
          category: "主机部件",
          inboundDate: "2022-01-10",
          lastOutboundDate: "2025-12-20",
          status: "pending",
          stagnant: false
        },
        {
          materialCode: "MAT-BLQ-002",
          materialName: "变流器",
          spec: "BLQ-1500V",
          qty: 9,
          warehouse: "华东备件仓",
          location: "B-03-02",
          category: "电气备件",
          inboundDate: "2024-08-15",
          lastOutboundDate: "2026-02-25",
          status: "pending"
        },
        {
          materialCode: "MAT-HC-004",
          materialName: "液压油",
          spec: "L-HM 46",
          qty: 26,
          warehouse: "华南应急仓",
          location: "C-02-09",
          category: "通用耗材",
          inboundDate: "2021-12-01",
          lastOutboundDate: "2021-12-01",
          status: "pending",
          stagnant: true
        },
        {
          materialCode: "MAT-DJ-003",
          materialName: "偏航电机",
          spec: "YH-DJ-7.5kW",
          qty: 0,
          warehouse: "华北主仓",
          location: "A-04-01",
          category: "电气备件",
          inboundDate: "2023-11-12",
          lastOutboundDate: "2026-03-12",
          status: "allocated"
        }
      ];

      var adjustmentOrders = []; // 调拨生成的调剂单
      var idleThreshold = 1095; // 满 3 年（约 1095 天）未出库认定呆滞
      var today = new Date("2026-03-23"); // 演示基准日期
      var xferTargetCode = null;
      var xferMask = document.getElementById("idleTransferMask");
      var detailMask = document.getElementById("idleDetailMask");

      var refs = {
        tbody: document.getElementById("idleTableBody"),
        total: document.getElementById("idleTotalText"),
        filterWarehouse: document.getElementById("filterWarehouse"),
        filterCategory: document.getElementById("filterCategory"),
        filterDuration: document.getElementById("filterDuration"),
        btnRegister: document.getElementById("btnRegisterIdle")
      };

      function daysBetween(a, b) {
        var x = Date.parse(a + "T00:00:00");
        var y = Date.parse(b.toISOString().slice(0, 10) + "T00:00:00");
        return Math.max(0, Math.floor((y - x) / 86400000));
      }

      function statusMeta(code) {
        if (code === "allocated") return { cls: "tag-status--allocated", text: "已调拨" };
        if (code === "scrapped") return { cls: "tag-status--scrapped", text: "已报废" };
        return { cls: "tag-status--pending", text: "待处理" };
      }

      function noOutboundRecord(item) {
        if (!item.lastOutboundDate || !item.inboundDate) return true;
        return item.lastOutboundDate <= item.inboundDate;
      }

      function identifyIdleMaterials() {
        return stockLedger
          .map(function (item) {
            return Object.assign({}, item, {
              idleDays: daysBetween(item.lastOutboundDate, today),
              inboundDays: daysBetween(item.inboundDate, today),
              isStagnant: item.stagnant === true || (daysBetween(item.inboundDate, today) >= idleThreshold && noOutboundRecord(item) && item.qty > 0)
            });
          })
          .filter(function (item) {
            return item.inboundDays >= idleThreshold && item.qty > 0;
          });
      }

      function applyFilters() {
        var wh = refs.filterWarehouse.value;
        var cat = refs.filterCategory.value;
        var dur = Number(refs.filterDuration.value || 0);
        var rows = identifyIdleMaterials().filter(function (x) {
          var hitWh = !wh || x.warehouse === wh;
          var hitCat = !cat || x.category === cat;
          var hitDur = !dur || x.idleDays > dur;
          return hitWh && hitCat && hitDur;
        });
        render(rows);
      }

      function render(rows) {
        refs.tbody.innerHTML = "";
        if (!rows.length) {
          refs.tbody.innerHTML = '<tr><td colspan="9" style="text-align:center;color:#8ca0b8;padding:26px;">暂无闲置物资</td></tr>';
          refs.total.textContent = "共 0 条";
          return;
        }
        rows.forEach(function (x) {
          var st = statusMeta(x.status);
          var tr = document.createElement("tr");
          tr.setAttribute("data-code", x.materialCode);
          var stagTag = x.isStagnant ? '<span class="tag-status tag-stagnant">呆滞物资</span>' : "";
          tr.innerHTML =
            "<td>" + x.materialCode + "</td>" +
            "<td>" + x.materialName + stagTag + "</td>" +
            "<td>" + x.spec + "</td>" +
            "<td>" + x.inboundDate + "</td>" +
            "<td>" + x.lastOutboundDate + "</td>" +
            '<td class="cell-num">' + x.idleDays + "</td>" +
            "<td>第58条第（三）项：入库满3年未使用</td>" +
            '<td><span class="tag-status ' + st.cls + '">' + st.text.replace("已调拨", "调剂中").replace("待处理", "待调剂").replace("已报废", "已处置") + "</span></td>" +
            '<td><div class="wh-ops">' +
            '<a href="#" data-action="view">查看详情</a>' +
            '<a href="#" data-action="allocate">发起调拨申请</a>' +
            "</div></td>";
          refs.tbody.appendChild(tr);
        });
        refs.total.textContent = "共 " + rows.length + " 条";
      }

      function generateAdjustNo() {
        return "TJ" + today.toISOString().slice(0, 10).replace(/-/g, "") + String(Math.floor(Math.random() * 900 + 100));
      }

      refs.btnRegister.addEventListener("click", function () {
        showActionPrompt("登记闲置", "请输入物资编码：", "", function (code) {
          if (!code) return;
          code = code.trim();
          var item = stockLedger.find(function (x) { return x.materialCode === code; });
          if (!item) {
            alert("未找到该物资编码。");
            return;
          }
          item.status = "pending";
          applyFilters();
        });
      });

      refs.tbody.addEventListener("click", function (e) {
        var a = e.target.closest("a[data-action]");
        if (!a) return;
        e.preventDefault();
        var action = a.getAttribute("data-action");
        var tr = a.closest("tr");
        if (!tr) return;
        var code = tr.getAttribute("data-code");
        var item = stockLedger.find(function (x) { return x.materialCode === code; });
        if (!item) return;

        if (action === "view") {
          openDetail(item);
          return;
        }

        if (action === "allocate") {
          if (item.qty <= 0) {
            alert("库存为 0，无法发起调拨。");
            return;
          }
          xferTargetCode = code;
          document.getElementById("idleRecvUnit").selectedIndex = 0;
          document.getElementById("idleDispose").selectedIndex = 2;
          document.getElementById("idleRecvPerson").value = "张三";
          document.getElementById("idleXferQty").value = "1";
          document.getElementById("idleXferDate").value = today.toISOString().slice(0, 10);
          openXfer();
          return;
        }
      });

      function closeXfer() {
        xferMask.classList.remove("show");
        xferMask.setAttribute("aria-hidden", "true");
        xferTargetCode = null;
        document.body.style.overflow = "";
      }
      function openXfer() {
        xferMask.classList.add("show");
        xferMask.setAttribute("aria-hidden", "false");
        document.body.style.overflow = "hidden";
      }
      function closeDetail() {
        detailMask.classList.remove("show");
        detailMask.setAttribute("aria-hidden", "true");
        document.body.style.overflow = "";
      }
      function openDetail(item) {
        document.getElementById("idleDetailGrid").innerHTML = [
          ["物资编码", item.materialCode],
          ["物资名称", item.materialName],
          ["规格型号", item.spec],
          ["入库日期", item.inboundDate],
          ["最后出库日期", item.lastOutboundDate],
          ["闲置天数", daysBetween(item.lastOutboundDate, today) + " 天"],
          ["闲置认定标准", "第58条第（三）项：入库满3年未使用"],
          ["当前状态", statusMeta(item.status).text.replace("已调拨", "调剂中").replace("待处理", "待调剂").replace("已报废", "已处置")]
        ].map(function (pair) {
          return '<div class="wh-detail-item"><div class="wh-detail-label">' + pair[0] + '</div><div class="wh-detail-value">' + pair[1] + '</div></div>';
        }).join("");
        detailMask.classList.add("show");
        detailMask.setAttribute("aria-hidden", "false");
        document.body.style.overflow = "hidden";
      }
      document.getElementById("btnIdleXferClose").addEventListener("click", closeXfer);
      document.getElementById("btnIdleXferCancel").addEventListener("click", closeXfer);
      document.getElementById("idleDetailCloseX").addEventListener("click", closeDetail);
      document.getElementById("idleDetailOk").addEventListener("click", closeDetail);
      xferMask.addEventListener("click", function (e) {
        if (e.target === xferMask) closeXfer();
      });
      detailMask.addEventListener("click", function (e) {
        if (e.target === detailMask) closeDetail();
      });
      document.addEventListener("keydown", function (e) {
        if (e.key === "Escape" && xferMask.classList.contains("show")) closeXfer();
        if (e.key === "Escape" && detailMask.classList.contains("show")) closeDetail();
      });
      document.getElementById("btnIdleXferOk").addEventListener("click", function () {
        if (!xferTargetCode) return;
        var item = stockLedger.find(function (x) { return x.materialCode === xferTargetCode; });
        if (!item) return;
        var unitType = document.getElementById("idleRecvUnit").value;
        var method = document.getElementById("idleDispose").value;
        var receiver = (document.getElementById("idleRecvPerson").value || "").trim();
        var n = Number(document.getElementById("idleXferQty").value);
        if (!receiver) {
          alert("请填写接收人。");
          return;
        }
        if (!n || n <= 0 || n > item.qty) {
          alert("调拨数量不合法。");
          return;
        }
        var adjustNo = generateAdjustNo();
        adjustmentOrders.push({
          adjustNo: adjustNo,
          materialCode: item.materialCode,
          qty: n,
          receiver: receiver,
          unitType: unitType,
          method: method,
          sourceWarehouse: item.warehouse,
          createdAt: document.getElementById("idleXferDate").value || today.toISOString().slice(0, 10)
        });
        item.qty -= n;
        item.status = "allocated";
        closeXfer();
        applyFilters();
      });

      refs.filterWarehouse.addEventListener("change", applyFilters);
      refs.filterCategory.addEventListener("change", applyFilters);
      refs.filterDuration.addEventListener("change", applyFilters);

      applyFilters();
    })();
  </script>
